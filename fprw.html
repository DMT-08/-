<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教师端 - 班级学生数据及任务分配</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
    
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: linear-gradient(to bottom right, #EFF6FF, #DFE7FF);
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 自定义滚动条 */
    .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 4px; border: 2px solid transparent; background-clip: padding-box; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #94A3B8; }

    /* ================= 表格核心修复样式 ================= */
    table {
      border-collapse: separate;
      border-spacing: 0;
      width: 100%;
    }
    
    th, td {
      border-bottom: 1px solid #E2E8F0;
      border-right: 1px solid #E2E8F0;
      white-space: nowrap;
    }

    /* 顶部表头吸顶 */
    thead tr:nth-child(1) th { position: sticky; top: 0; z-index: 20; border-top: 1px solid #E2E8F0; }
    thead tr:nth-child(2) th { position: sticky; top: 48px; z-index: 20; } /* 等于第一行高度 */
    
    /* 左侧列粘性定位 */
    .fixed-col { position: sticky; z-index: 10; }
    thead tr:nth-child(1) th.fixed-col,
    thead tr:nth-child(2) th.fixed-col { z-index: 30; }

    /* 像素定位避免缝隙 */
    .fixed-col-1 { left: 0; min-width: 60px; max-width: 60px; }
    .fixed-col-2 { left: 60px; min-width: 110px; max-width: 110px; }
    .fixed-col-3 { left: 170px; min-width: 100px; max-width: 100px; }

    /* 右侧阴影分割线 */
    .fixed-col-3::after {
      content: ''; position: absolute; top: 0; right: -1px; bottom: -1px; width: 2px;
      background-color: #CBD5E1; box-shadow: 3px 0 6px rgba(0,0,0,0.05); z-index: 5;
    }

    /* 去除表尾和表右边界的多余边框，让外部容器接管圆角边框 */
    tbody tr:last-child td { border-bottom: none; }
    th:last-child, td:last-child { border-right: none; }

    /* 骨架屏（Shimmer）动画 */
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skeleton-box {
      background: linear-gradient(90deg, #F1F5F9 25%, #E2E8F0 50%, #F1F5F9 75%);
      background-size: 400% 100%; animation: shimmer 1.5s infinite linear; border-radius: 4px;
    }

    /* 弹窗过渡动画 */
    .modal-enter { opacity: 0; transform: scale(0.95); }
    .modal-enter-active { opacity: 1; transform: scale(1); transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    .modal-leave { opacity: 1; transform: scale(1); }
    .modal-leave-active { opacity: 0; transform: scale(0.95); transition: all 0.2s ease-in; pointer-events: none; }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#1F5FFF', 'primary-light': '#E6F0FF' },
          boxShadow: { 'card': '0 20px 40px -10px rgba(31, 95, 255, 0.15), 0 10px 20px -5px rgba(31, 95, 255, 0.1)' }
        }
      }
    }
  </script>
</head>
<body>

  <!-- 主应用容器 1300*813 -->
  <div class="w-[1300px] h-[813px] bg-white rounded-[32px] shadow-card flex flex-col overflow-hidden relative">

    <!-- 顶部导航区 -->
    <header class="h-[72px] flex items-center justify-between px-8 bg-white border-b border-gray-100 flex-shrink-0 relative z-40">
      
      <div class="flex items-center space-x-3">
        <button class="p-2 -ml-2 rounded-full hover:bg-[#F1F5F9] transition-colors text-gray-500 cursor-pointer">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h1 class="text-2xl font-black text-gray-900 tracking-tight">班级数据</h1>
        
        <!-- 班级下拉框与班级分配按钮 -->
        <div class="ml-4 flex items-center">
          <div class="relative" id="class-dropdown-container">
            <div onclick="toggleDropdown()" class="flex items-center space-x-1.5 px-4 py-2 bg-primary-light rounded-full text-primary font-bold cursor-pointer active:bg-blue-100 transition-colors">
              <span class="text-sm">24级软件3班</span>
              <svg id="class-dropdown-icon" class="w-4 h-4 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
            </div>
            <div id="class-dropdown-menu" class="absolute top-full left-0 mt-2 w-44 bg-white border border-gray-100 rounded-2xl shadow-xl opacity-0 invisible transition-all duration-200 origin-top-left z-50">
              <ul class="py-2 text-center text-sm font-medium">
                <li class="px-4 py-2.5 text-primary bg-primary-light/50 cursor-pointer">24级软件3班</li>
                <li class="px-4 py-2.5 text-gray-600 active:bg-gray-50 cursor-pointer">英语实验1班</li>
                <li class="px-4 py-2.5 text-gray-600 active:bg-gray-50 cursor-pointer">2404班</li>
              </ul>
            </div>
          </div>
        </div>
      </div>

      <div class="flex items-center space-x-6">
        <div class="flex bg-[#F1F5F9] p-1 rounded-xl text-sm font-bold shadow-inner">
          <button id="btn-today" class="transition-all bg-primary text-white shadow-md px-6 py-2 rounded-lg" onclick="toggleData('today')">今日数据</button>
          <button id="btn-summary" class="transition-all text-gray-500 hover:text-gray-800 px-6 py-2 rounded-lg bg-transparent" onclick="toggleData('summary')">汇总数据</button>
        </div>
        
        <button onclick="triggerRefresh()" class="w-10 h-10 flex items-center justify-center rounded-full bg-white border border-gray-200 shadow-sm hover:shadow hover:border-gray-300 hover:text-primary transition-all text-gray-500">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
      </div>
    </header>

    <!-- 表格区域：外部保留 p-6 间距 -->
    <main class="flex-1 overflow-hidden flex flex-col p-6 z-10 relative bg-white">
      
      <!-- 表格内部包裹容器：border 和 rounded 限制内容，使得表中表完美铺满且不溢出直角 -->
      <div class="flex-1 bg-white border border-gray-200 rounded-xl overflow-hidden flex flex-col shadow-sm relative">
        
        <!-- 滚动容器 -->
        <div class="flex-1 custom-scrollbar overflow-auto relative">
          <!-- 刷新动效遮罩 -->
          <div id="loading-overlay" class="absolute inset-0 z-50 hidden"></div>
          
          <table class="text-center text-sm w-full relative">
            <thead>
              <tr class="h-[48px]">
                <th rowspan="2" class="p-3 fixed-col fixed-col-1 bg-[#F8FAFC] text-gray-500">序号</th>
                <th rowspan="2" class="p-3 fixed-col fixed-col-2 bg-[#F8FAFC] text-gray-900 font-bold">学生姓名</th>
                <th rowspan="2" class="p-3 fixed-col fixed-col-3 bg-[#F8FAFC] text-gray-900 font-bold">总词汇</th>
                
                <th colspan="3" class="p-3 bg-[#EFF6FF] text-blue-600 font-bold tracking-wide">正向过词</th>
                <th colspan="3" class="p-3 bg-[#FAF5FF] text-purple-600 font-bold tracking-wide">听写</th>
                <th colspan="3" class="p-3 bg-[#F0FDF4] text-emerald-600 font-bold tracking-wide">正向测试</th>
                <th colspan="3" class="p-3 bg-[#FFFBEB] text-amber-600 font-bold tracking-wide">练习</th>
                <th colspan="3" class="p-3 bg-[#FFF1F2] text-rose-600 font-bold tracking-wide">游戏</th>
              </tr>
              <tr id="header-row-2" class="text-xs font-bold h-[48px]">
                <!-- 由 JS 渲染 -->
              </tr>
            </thead>
            <tbody class="text-gray-700 font-medium" id="table-body">
              <!-- 数据或骨架屏由 JS 渲染 -->
            </tbody>
          </table>
        </div>

      </div>
    </main>
    
    <!-- ================= 任务分配弹窗 ================= -->
    <div id="assign-modal-wrapper" class="fixed inset-0 z-[100] flex items-center justify-center bg-gray-900/40 backdrop-blur-sm hidden modal-leave">
      <div class="bg-white w-[880px] h-[600px] rounded-2xl shadow-2xl flex flex-col overflow-hidden relative">
        <!-- 弹窗 Header -->
        <div class="h-16 px-6 border-b border-gray-100 flex items-center justify-between bg-white flex-shrink-0">
          <div class="flex items-center space-x-2">
            <div class="w-8 h-8 rounded-full bg-primary-light flex items-center justify-center text-primary">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg>
            </div>
            <h2 class="text-lg font-bold text-gray-800">分配任务 <span class="text-gray-400 mx-1">|</span> <span id="assign-target-name" class="text-primary">张三</span></h2>
          </div>
          <button onclick="closeAssignModal()" class="p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-full transition-colors">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <!-- 弹窗双栏 Body -->
        <div class="flex-1 flex overflow-hidden bg-gray-50/50">
          <!-- 左栏：已分配 -->
          <div class="w-1/2 border-r border-gray-200 flex flex-col bg-[#F8FAFC]">
            <div class="px-5 py-3 border-b border-gray-200 bg-white shadow-sm z-10">
              <h3 class="font-bold text-gray-700 flex justify-between items-center">
                <span>已分配任务</span>
                <span id="assigned-count" class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-xs">0</span>
              </h3>
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar" id="assigned-tasks-list">
              <!-- JS渲染已分配任务 -->
            </div>
          </div>

          <!-- 右栏：可分配（任务库） -->
          <div class="w-1/2 flex flex-col bg-white">
            <div class="px-5 py-3 border-b border-gray-100 shadow-sm z-10 flex flex-col space-y-3">
               <h3 class="font-bold text-gray-700 flex justify-between items-center">
                <span>可分配任务库</span>
                <span id="available-count" class="bg-gray-100 text-gray-600 px-2 py-0.5 rounded text-xs">0</span>
              </h3>
              <!-- 搜索框 -->
              <div class="relative">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="task-search" placeholder="搜索任务名称..." oninput="renderAssignUI()" class="w-full bg-gray-50 border border-gray-200 rounded-lg pl-9 pr-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all">
              </div>
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar" id="available-tasks-list">
              <!-- JS渲染可分配任务 -->
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    // ================= 表格数据与渲染逻辑 =================
    const names = [
      "杨永浩", "尹嘉旺", "赵永好", "陈韵铃", "周义龙", "魏志豪", "陈佳瑶", "陈嘉睿", 
      "程艾琳", "华建文", "陈雨婷", "陈锦营", "刘耿鸿", "彭少杰", "伍腾康", "杨大宇", 
      "杨振权", "黄雅娜", "李佳恒", "彭梓俊", "胡语健", "庄学波", "张晓峰", "潘昱慈", 
      "杨晟旭", "黄宏伟", "康耀", "谢文楠", "谢镇城", "李测试", "郑伟华", "吴一凡"
    ];

    let currentView = 'today'; 
    let studentsData = [];
    
    const categoryStyles = [
      { bg: 'bg-[#EFF6FF]', text: 'text-blue-500' },
      { bg: 'bg-[#FAF5FF]', text: 'text-purple-500' },
      { bg: 'bg-[#F0FDF4]', text: 'text-emerald-500' },
      { bg: 'bg-[#FFFBEB]', text: 'text-amber-500' },
      { bg: 'bg-[#FFF1F2]', text: 'text-rose-500' }
    ];

    const generateStudentData = () => {
      const data = [];
      for (let i = 0; i < 32; i++) {
        const totalVocab = [2893, 2910, 3103, 3109, 2996, 3194][Math.floor(Math.random() * 6)];
        data.push({
          id: i + 1,
          name: names[i] || `学生${i+1}`,
          totalVocab: totalVocab,
          today: {
            zxTotal: Math.floor(Math.random() * 1400) + 100, zxTodayAdd: Math.random() > 0.5 ? Math.floor(Math.random() * 50) : 0, zxYestAdd: Math.random() > 0.3 ? Math.floor(Math.random() * 40) : 0,
            txTotal: Math.floor(Math.random() * 2800) + 50,  txTodayAdd: Math.random() > 0.7 ? Math.floor(Math.random() * 20) : 0, txYestAdd: Math.random() > 0.5 ? Math.floor(Math.random() * 15) : 0,
            ztTotal: Math.random() > 0.6 ? Math.floor(Math.random() * 300) : 0, ztTodayAdd: 0, ztYestAdd: 0,
            lxTotal: Math.floor(Math.random() * 1000), lxTodayAdd: Math.random() > 0.8 ? Math.floor(Math.random() * 10) : 0, lxYestAdd: 0,
            yxTotal: Math.floor(Math.random() * 1000), yxTodayAdd: Math.random() > 0.5 ? Math.floor(Math.random() * 100) : 0, yxYestAdd: Math.random() > 0.5 ? Math.floor(Math.random() * 80) : 0
          },
          summary: {
            zxPass: Math.floor(Math.random() * 1400) + 100, zxFail: Math.floor(Math.random() * 50), zxUnknown: Math.floor(Math.random() * 1000),
            txPass: Math.floor(Math.random() * 2000) + 500, txFail: Math.floor(Math.random() * 10), txUnknown: Math.floor(Math.random() * 500),
            ztPass: Math.random() > 0.6 ? Math.floor(Math.random() * 100) : 0, ztFail: 0, ztUnknown: Math.floor(Math.random() * 2800),
            lxPass: Math.floor(Math.random() * 800), lxFail: Math.floor(Math.random() * 20), lxUnknown: Math.floor(Math.random() * 2000),
            yxPass: Math.floor(Math.random() * 1000), yxFail: Math.floor(Math.random() * 200), yxUnknown: Math.floor(Math.random() * 1500)
          }
        });
      }
      return data;
    };

    const renderHeaders = () => {
      const headerRow2 = document.getElementById('header-row-2');
      let cols = currentView === 'today' ? ['总量', '今增', '昨增'] : ['通过', '未过', '未知'];
      
      let headerHTML = '';
      for(let i = 0; i < 5; i++) {
          const style = categoryStyles[i];
          headerHTML += `
            <th class="p-2 ${style.bg} ${style.text} border-b border-gray-200 border-r">${cols[0]}</th>
            <th class="p-2 ${style.bg} ${style.text} border-b border-gray-200 border-r">${cols[1]}</th>
            <th class="p-2 ${style.bg} ${style.text} border-b border-gray-200 border-r">${cols[2]}</th>
          `;
      }
      headerRow2.innerHTML = headerHTML;
    };

    const formatNum = (num, type) => {
      if (num === 0) return `<span class="text-gray-300">0</span>`;
      if (type === 'add') return `<span class="text-emerald-500 font-bold">+${num}</span>`;
      if (type === 'fail') return `<span class="text-rose-500 font-bold">${num}</span>`;
      return num;
    };

    const renderTable = () => {
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = '';

      studentsData.forEach((student, index) => {
        const isEven = index % 2 === 0;
        const rowBg = isEven ? 'bg-white' : 'bg-[#FAFAFA]';
        const hoverBg = 'group-hover:bg-[#F0F7FF]';
        
        const tr = document.createElement('tr');
        tr.className = `${rowBg} active:bg-[#F0F7FF] transition-colors cursor-default h-[46px]`;
        
        // 核心交互：平板端无悬浮，直接常驻显示下划线和分配图标
        const nameCellHtml = `<div class="inline-flex items-center space-x-1 cursor-pointer text-blue-600 active:text-blue-800 font-bold transition-colors" onclick="openAssignModal('${student.name}', 'student')">
                 <span class="underline underline-offset-4">${student.name}</span>
                 <svg class="w-3.5 h-3.5 text-blue-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
               </div>`;

        let colsHTML = `
          <td class="p-2 fixed-col fixed-col-1 ${rowBg} ${hoverBg} text-gray-400 text-xs transition-colors">${student.id}</td>
          <td class="p-2 fixed-col fixed-col-2 ${rowBg} ${hoverBg} transition-colors">${nameCellHtml}</td>
          <td class="p-2 fixed-col fixed-col-3 ${rowBg} ${hoverBg} font-extrabold text-gray-800 transition-colors">${student.totalVocab}</td>
        `;

        if (currentView === 'today') {
          const td = student.today;
          colsHTML += `
            <td class="p-2">${formatNum(td.zxTotal)}</td><td class="p-2">${formatNum(td.zxTodayAdd, 'add')}</td><td class="p-2">${formatNum(td.zxYestAdd, 'add')}</td>
            <td class="p-2">${formatNum(td.txTotal)}</td><td class="p-2">${formatNum(td.txTodayAdd, 'add')}</td><td class="p-2">${formatNum(td.txYestAdd, 'add')}</td>
            <td class="p-2">${formatNum(td.ztTotal)}</td><td class="p-2">${formatNum(td.ztTodayAdd, 'add')}</td><td class="p-2">${formatNum(td.ztYestAdd, 'add')}</td>
            <td class="p-2">${formatNum(td.lxTotal)}</td><td class="p-2">${formatNum(td.lxTodayAdd, 'add')}</td><td class="p-2">${formatNum(td.lxYestAdd, 'add')}</td>
            <td class="p-2">${formatNum(td.yxTotal)}</td><td class="p-2">${formatNum(td.yxTodayAdd, 'add')}</td><td class="p-2">${formatNum(td.yxYestAdd, 'add')}</td>
          `;
        } else {
           const sd = student.summary;
           colsHTML += `
            <td class="p-2">${formatNum(sd.zxPass)}</td><td class="p-2">${formatNum(sd.zxFail, 'fail')}</td><td class="p-2 text-gray-400">${formatNum(sd.zxUnknown)}</td>
            <td class="p-2">${formatNum(sd.txPass)}</td><td class="p-2">${formatNum(sd.txFail, 'fail')}</td><td class="p-2 text-gray-400">${formatNum(sd.txUnknown)}</td>
            <td class="p-2">${formatNum(sd.ztPass)}</td><td class="p-2">${formatNum(sd.ztFail, 'fail')}</td><td class="p-2 text-gray-400">${formatNum(sd.ztUnknown)}</td>
            <td class="p-2">${formatNum(sd.lxPass)}</td><td class="p-2">${formatNum(sd.lxFail, 'fail')}</td><td class="p-2 text-gray-400">${formatNum(sd.lxUnknown)}</td>
            <td class="p-2">${formatNum(sd.yxPass)}</td><td class="p-2">${formatNum(sd.yxFail, 'fail')}</td><td class="p-2 text-gray-400">${formatNum(sd.yxUnknown)}</td>
          `;
        }
        
        tr.innerHTML = colsHTML;
        tbody.appendChild(tr);
      });
    };

    const renderSkeleton = () => {
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = '';
      for (let i = 0; i < 15; i++) {
        const isEven = i % 2 === 0;
        const rowBg = isEven ? 'bg-white' : 'bg-[#FAFAFA]';
        const tr = document.createElement('tr');
        tr.className = `${rowBg} h-[46px] border-b border-gray-100`;
        let colsHTML = `
          <td class="p-2 fixed-col fixed-col-1 ${rowBg}"><div class="skeleton-box h-4 w-6 mx-auto"></div></td>
          <td class="p-2 fixed-col fixed-col-2 ${rowBg}"><div class="skeleton-box h-4 w-14 mx-auto"></div></td>
          <td class="p-2 fixed-col fixed-col-3 ${rowBg}"><div class="skeleton-box h-4 w-12 mx-auto"></div></td>
        `;
        for (let j = 0; j < 15; j++) { colsHTML += `<td class="p-2"><div class="skeleton-box h-4 w-8 mx-auto"></div></td>`; }
        tr.innerHTML = colsHTML;
        tbody.appendChild(tr);
      }
    };

    window.toggleData = (viewType) => {
      if (currentView === viewType) return; 
      currentView = viewType;
      
      const btnToday = document.getElementById('btn-today');
      const btnSummary = document.getElementById('btn-summary');

      if (viewType === 'today') {
        btnToday.className = "transition-all bg-primary text-white shadow-md px-6 py-2 rounded-lg";
        btnSummary.className = "transition-all text-gray-500 hover:text-gray-800 px-6 py-2 rounded-lg bg-transparent shadow-none";
      } else {
        btnSummary.className = "transition-all bg-primary text-white shadow-md px-6 py-2 rounded-lg";
        btnToday.className = "transition-all text-gray-500 hover:text-gray-800 px-6 py-2 rounded-lg bg-transparent shadow-none";
      }

      renderHeaders();
      renderTable();
    };

    window.triggerRefresh = () => {
      renderSkeleton();
      setTimeout(() => { studentsData = generateStudentData(); renderTable(); }, 800);
    };

    // ================= 任务分配弹窗逻辑 =================
    // 模拟的全局任务数据库
    const taskDatabase = [
      { id: 101, name: '必修一 Unit 1 核心词汇', words: 45, tag: '词汇' },
      { id: 102, name: '单元音单音节(新)', words: 30, tag: '发音' },
      { id: 103, name: '必修一 Unit 2 重点词组', words: 25, tag: '词组' },
      { id: 104, name: '模块三 综合复习卷一', words: 60, tag: '综合' },
      { id: 105, name: '高考高频词 冲刺一', words: 50, tag: '冲刺' },
      { id: 106, name: '高二听力特训预习词汇', words: 40, tag: '听力' },
      { id: 107, name: '期中考试模拟核心词', words: 100, tag: '考试' },
      { id: 108, name: '拓展阅读词汇(上)', words: 35, tag: '阅读' },
      { id: 109, name: '不规则动词变化表(一)', words: 20, tag: '语法' },
      { id: 110, name: '四级高频词汇精选', words: 80, tag: '拓展' }
    ];

    let assignedIds = []; // 动态记录已分配的ID

    window.openAssignModal = (targetName, type) => {
      document.getElementById('assign-target-name').innerText = targetName;
      
      // 模拟进入弹窗时，随机默认有1-2个已分配任务
      assignedIds = [101, 102];
      document.getElementById('task-search').value = '';
      
      const wrapper = document.getElementById('assign-modal-wrapper');
      wrapper.classList.remove('hidden');
      // 触发动画
      requestAnimationFrame(() => {
        wrapper.classList.remove('modal-leave', 'modal-leave-active');
        wrapper.classList.add('modal-enter');
        requestAnimationFrame(() => {
          wrapper.classList.add('modal-enter-active');
        });
      });

      renderAssignUI();
    };

    window.closeAssignModal = () => {
      const wrapper = document.getElementById('assign-modal-wrapper');
      wrapper.classList.remove('modal-enter', 'modal-enter-active');
      wrapper.classList.add('modal-leave-active');
      setTimeout(() => {
        wrapper.classList.add('hidden');
        wrapper.classList.remove('modal-leave-active');
      }, 200);
    };

    // 移动任务逻辑
    window.moveTask = (taskId, action) => {
      if (action === 'add' && !assignedIds.includes(taskId)) {
        assignedIds.unshift(taskId); // 加到前面
      } else if (action === 'remove') {
        assignedIds = assignedIds.filter(id => id !== taskId);
      }
      renderAssignUI();
    };

    // 渲染双栏任务界面
    window.renderAssignUI = () => {
      const keyword = document.getElementById('task-search').value.trim().toLowerCase();
      
      // 数据过滤
      const assignedTasks = taskDatabase.filter(t => assignedIds.includes(t.id));
      const availableTasks = taskDatabase.filter(t => !assignedIds.includes(t.id) && t.name.toLowerCase().includes(keyword));

      // 数量更新
      document.getElementById('assigned-count').innerText = assignedTasks.length;
      document.getElementById('available-count').innerText = availableTasks.length;

      // 渲染左侧已分配
      const assignedList = document.getElementById('assigned-tasks-list');
      if (assignedTasks.length === 0) {
        assignedList.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-gray-400 text-sm"><svg class="w-12 h-12 mb-2 text-gray-200" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>暂无分配任务</div>`;
      } else {
        assignedList.innerHTML = assignedTasks.map(t => `
          <div class="bg-white p-3 rounded-xl border border-gray-100 shadow-sm flex items-center justify-between transition-colors">
            <div class="flex flex-col">
              <span class="text-sm font-bold text-gray-800">${t.name}</span>
              <div class="flex items-center space-x-2 mt-1 text-xs text-gray-500">
                <span class="bg-gray-100 px-1.5 py-0.5 rounded text-gray-600">${t.tag}</span>
                <span>${t.words} 词</span>
              </div>
            </div>
            <button onclick="moveTask(${t.id}, 'remove')" class="px-3 py-1.5 rounded-lg text-sm font-medium text-red-500 bg-red-50 active:bg-red-500 active:text-white transition-colors">取消</button>
          </div>
        `).join('');
      }

      // 渲染右侧可分配
      const availableList = document.getElementById('available-tasks-list');
      if (availableTasks.length === 0) {
        availableList.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-gray-400 text-sm"><svg class="w-10 h-10 mb-2 text-gray-200" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>未搜索到相关任务</div>`;
      } else {
        availableList.innerHTML = availableTasks.map(t => `
          <div class="bg-white p-3 rounded-xl border border-gray-100 shadow-sm flex items-center justify-between transition-colors">
            <div class="flex flex-col">
              <span class="text-sm font-bold text-gray-800">${t.name}</span>
              <div class="flex items-center space-x-2 mt-1 text-xs text-gray-500">
                <span class="bg-gray-100 px-1.5 py-0.5 rounded text-gray-600">${t.tag}</span>
                <span>${t.words} 词</span>
              </div>
            </div>
            <button onclick="moveTask(${t.id}, 'add')" class="px-4 py-1.5 rounded-lg text-sm font-medium text-white bg-primary active:bg-blue-700 shadow-sm transition-colors flex items-center space-x-1">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              <span>加入</span>
            </button>
          </div>
        `).join('');
      }
    };

    // 班级下拉框的点击交互逻辑
    window.toggleDropdown = () => {
      const menu = document.getElementById('class-dropdown-menu');
      const icon = document.getElementById('class-dropdown-icon');
      if (menu.classList.contains('invisible')) {
        menu.classList.remove('invisible', 'opacity-0');
        menu.classList.add('visible', 'opacity-100');
        icon.classList.add('rotate-180');
      } else {
        menu.classList.add('invisible', 'opacity-0');
        menu.classList.remove('visible', 'opacity-100');
        icon.classList.remove('rotate-180');
      }
    };

    // 点击空白处关闭下拉框
    document.addEventListener('click', (e) => {
      const container = document.getElementById('class-dropdown-container');
      if (container && !container.contains(e.target)) {
        const menu = document.getElementById('class-dropdown-menu');
        const icon = document.getElementById('class-dropdown-icon');
        menu.classList.add('invisible', 'opacity-0');
        menu.classList.remove('visible', 'opacity-100');
        icon.classList.remove('rotate-180');
      }
    });

    // 初始化
    studentsData = generateStudentData();
    renderHeaders();
    renderTable();
  </script>
</body>
</html>
