<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 记词 - 极致原生体验</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #EFF6FF 0%, #DFE7FF 100%);
            background-attachment: fixed;
            color: #1f2937;
            overflow: hidden; 
            overscroll-behavior-y: none;
        }

        .bg-brand { background-color: #1F5FFF; }
        .text-brand { color: #1F5FFF; }
        .border-brand { border-color: #1F5FFF; }
        .hover-bg-brand:hover { background-color: #004ce6; }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .view-section { display: none; opacity: 0; transition: opacity 0.2s ease-in-out; }
        .view-section.active { display: flex; opacity: 1; }

        .shadow-premium {
            box-shadow: 0 4px 20px -4px rgba(0, 0, 0, 0.03), 0 2px 8px -2px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.9);
        }

        .modal-enter { animation: modalFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .judge-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }

        @keyframes pulse-red-light {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.15); }
            50% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
        }
        .pulse-alert-light { animation: pulse-red-light 2s infinite; }

        /* 自定义滚动条 - 更轻量隐形 (沉浸视图使用) */
        .no-scrollbar::-webkit-scrollbar { width: 4px; }
        .no-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .no-scrollbar::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.3); border-radius: 2px; }
        .no-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.6); }
        
        /* 弹窗及淡入动画 (沉浸视图使用) */
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* 去除数字输入框自带的上下箭头 */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
        
        /* 倍速选择器对齐补丁 */
        .select-center { text-align: center; text-align-last: center; appearance: none; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- ================= 全局原生弹窗 ================= -->
    <div id="native-modal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-gray-900/40 backdrop-blur-sm transition-opacity duration-300 opacity-0">
        <div class="bg-white rounded-[24px] p-6 md:p-7 w-[90%] max-sm:max-w-[320px] max-w-sm shadow-2xl flex flex-col items-center text-center modal-enter" id="native-modal-content">
            <h3 id="modal-title" class="text-[20px] font-extrabold text-gray-900 mb-2 w-full text-center">提示</h3>
            <div id="modal-msg" class="text-[15px] text-gray-600 mb-6 leading-relaxed w-full flex flex-col items-center justify-center text-center"></div>
            <div class="flex gap-3 w-full">
                <button id="modal-cancel-btn" class="hidden flex-1 bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold text-[15px] py-3.5 rounded-[16px] transition-all active:scale-95">取消</button>
                <button id="modal-btn" class="flex-1 bg-brand hover-bg-brand text-white font-bold text-[15px] py-3.5 rounded-[16px] shadow-sm active:scale-95 transition-all">
                    我知道了
                </button>
            </div>
        </div>
    </div>


    <!-- ================= 视图 1：主界面 (仪表盘) ================= -->
    <div id="view-dashboard" class="view-section active flex-col w-full h-full max-w-[1300px] mx-auto p-4 md:p-5 overflow-hidden gap-4">
        
        <!-- Header -->
        <header class="flex justify-between items-center shrink-0">
            <div class="flex items-center gap-4">
                <button class="w-10 h-10 bg-white rounded-[14px] flex items-center justify-center shadow-premium active:scale-90 transition-transform text-slate-700 cursor-pointer" onclick="showModal('返回提示', '<div class=\'mt-1 font-medium\'>学习可随时退出，<br>此处将返回上一级页面。</div>')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="mr-0.5">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <h1 class="text-[32px] font-extrabold text-gray-900 tracking-tight leading-none">
                    AI 记词
                </h1>
            </div>
            <button onclick="toggleTeacherTasks()" class="bg-white text-brand border border-blue-100 px-3.5 py-2 rounded-[10px] font-bold text-[13px] shadow-sm active:scale-95 transition-transform flex items-center gap-1.5">
                <i class="ph-bold ph-gear text-[16px]"></i> 模拟下发任务
            </button>
        </header>

        <!-- 1. 顶部：可视化优化看板 -->
        <div class="flex shrink-0 gap-4 max-md:flex-col">
            <!-- 左侧主指标 -->
            <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-[24px] p-4 flex items-center justify-between w-[280px] md:w-[320px] max-md:w-full shadow-lg shadow-blue-500/20 shrink-0 relative overflow-hidden">
                <i class="ph-fill ph-target absolute left-4 top-1/2 -translate-y-1/2 text-[100px] text-white opacity-[0.03] transform -translate-x-1/4 pointer-events-none"></i>
                
                <div class="flex flex-col relative z-10 justify-center">
                    <span class="text-[12px] font-bold text-white/80 mb-0.5">总学习目标</span>
                    <div class="flex items-baseline gap-1 drop-shadow-sm">
                        <span class="text-[36px] font-extrabold text-white tracking-tight leading-none" id="statTotalTarget">3000</span>
                        <span class="text-[14px] font-bold text-white/80">词</span>
                    </div>
                    
                    <div class="mt-2 bg-white/10 px-2.5 py-1 rounded-[6px] backdrop-blur-sm border border-white/10 flex items-center gap-3 w-max">
                        <div class="flex items-baseline gap-1.5">
                            <span class="text-[11px] text-white/70 font-medium">已学</span>
                            <span id="statLearnedSum" class="text-[13px] font-bold text-white font-mono leading-none">1730</span>
                        </div>
                        <div class="w-[1px] h-2.5 bg-white/20"></div>
                        <div class="flex items-baseline gap-1.5">
                            <span class="text-[11px] text-white/70 font-medium">待学</span>
                            <span id="statUnlearned" class="text-[13px] font-bold text-white font-mono leading-none">1270</span>
                        </div>
                    </div>
                </div>

                <div class="relative w-[72px] h-[72px] flex items-center justify-center z-10 shrink-0 drop-shadow-md">
                    <svg class="w-full h-full transform -rotate-90">
                        <circle cx="36" cy="36" r="28" stroke="rgba(255,255,255,0.15)" stroke-width="7" fill="none" />
                        <circle id="targetProgressRing" cx="36" cy="36" r="28" stroke="white" stroke-width="7" fill="none" stroke-dasharray="175.9" stroke-dashoffset="90" stroke-linecap="round" class="transition-all duration-1000 ease-out" />
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span class="text-[16px] font-extrabold text-white leading-none font-mono" id="targetProgressText">57%</span>
                    </div>
                </div>
            </div>

            <!-- 右侧细节指标网格 -->
            <div class="flex-1 bg-white/90 backdrop-blur-xl rounded-[24px] shadow-premium p-3 flex flex-col gap-2 min-w-0">
                <div class="grid grid-cols-2 gap-2 flex-1 min-h-0">
                    <div class="bg-[#F0FDF4] border border-[#BBF7D0] rounded-[16px] px-3 md:px-4 py-3.5 flex items-center justify-between relative overflow-hidden group transition-all hover:shadow-md h-full w-full">
                        <div class="flex items-center gap-2 text-green-700 z-10 shrink-0">
                            <div class="w-[38px] h-[32px] rounded-[10px] bg-white text-green-500 flex items-center justify-center shadow-sm border border-green-100 shrink-0">
                                <i class="ph-bold ph-check text-[18px]"></i>
                            </div>
                            <span class="text-[13px] font-bold hidden sm:inline">累计认识</span>
                        </div>
                        <div class="flex items-baseline gap-1 z-10 whitespace-nowrap">
                            <span class="text-[24px] font-extrabold text-green-700 leading-none tracking-tight font-mono" id="statKnownTotal">1280</span>
                            <span class="text-[12px] font-bold text-green-600/70">词</span>
                        </div>
                    </div>

                    <div class="bg-[#FEF2F2] border border-[#FECACA] rounded-[16px] px-3 md:px-4 py-3.5 flex items-center justify-between relative overflow-hidden group transition-all hover:shadow-md h-full w-full">
                        <div class="flex items-center gap-2 text-red-700 z-10 shrink-0">
                            <div class="w-[38px] h-[32px] rounded-[10px] bg-white text-red-500 flex items-center justify-center shadow-sm border border-red-100 shrink-0">
                                <i class="ph-bold ph-x text-[18px]"></i>
                            </div>
                            <span class="text-[13px] font-bold hidden sm:inline">累计生词</span>
                        </div>
                        <div class="flex items-baseline gap-1 z-10 whitespace-nowrap">
                            <span class="text-[24px] font-extrabold text-red-700 leading-none tracking-tight font-mono" id="statUnknownTotal">450</span>
                            <span class="text-[12px] font-bold text-red-600/70">词</span>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-3 divide-x divide-gray-200/80 bg-[#F8FAFC] rounded-[16px] border border-gray-200/80 py-2.5 shrink-0 shadow-[inset_0_2px_4px_rgba(0,0,0,0.01)]">
                    <div class="flex items-center justify-center gap-2 md:gap-2.5 px-1">
                        <div class="w-8 h-8 rounded-[10px] bg-white shadow-sm border border-blue-100 flex items-center justify-center text-blue-500 shrink-0 hidden lg:flex">
                            <i class="ph-fill ph-microphone-stage text-[16px]"></i>
                        </div>
                        <div class="flex items-baseline gap-1 whitespace-nowrap">
                            <span class="text-[12px] font-bold text-gray-500 mr-0.5">跟读</span>
                            <span class="text-[20px] font-extrabold text-gray-800 leading-none font-mono" id="statReadTotal">1200</span>
                            <span class="text-[11px] font-semibold text-gray-400">次</span>
                        </div>
                    </div>

                    <div class="flex items-center justify-center gap-2 md:gap-2.5 px-1">
                        <div class="w-8 h-8 rounded-[10px] bg-white shadow-sm border border-cyan-100 flex items-center justify-center text-cyan-600 shrink-0 hidden lg:flex">
                            <i class="ph-fill ph-headphones text-[16px]"></i>
                        </div>
                        <div class="flex items-baseline gap-1 whitespace-nowrap">
                            <span class="text-[12px] font-bold text-gray-500 mr-0.5">音记</span>
                            <span class="text-[20px] font-extrabold text-gray-800 leading-none font-mono" id="statMemoTotal">1100</span>
                            <span class="text-[11px] font-semibold text-gray-400">次</span>
                        </div>
                    </div>

                    <div class="flex items-center justify-center gap-2 md:gap-2.5 px-1">
                        <div class="w-8 h-8 rounded-[10px] bg-white shadow-sm border border-rose-100 flex items-center justify-center text-rose-500 shrink-0 hidden lg:flex">
                            <i class="ph-fill ph-pencil-simple text-[16px]"></i>
                        </div>
                        <div class="flex items-baseline gap-1 whitespace-nowrap">
                            <span class="text-[12px] font-bold text-gray-500 mr-0.5">听写</span>
                            <span class="text-[20px] font-extrabold text-gray-800 leading-none font-mono" id="statDictTotal">1050</span>
                            <span class="text-[11px] font-semibold text-gray-400">次</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 2. 中下部主体 -->
        <div class="flex-1 min-h-0 grid grid-cols-1 lg:grid-cols-[1fr_1.5fr] gap-5 md:gap-6 mt-1">
            <!-- 【左侧】：生词本入口 -->
            <div class="bg-[#FFFDF8] rounded-[24px] shadow-premium p-6 flex flex-col h-full min-h-0 border border-[#FDE68A] relative overflow-hidden justify-center items-center text-center group cursor-pointer hover:border-orange-300 transition-all" onclick="switchView('view-vocab')">
                <div class="absolute -right-4 -top-4 w-24 h-24 bg-orange-100/50 rounded-full blur-xl group-hover:bg-orange-200/50 transition-colors pointer-events-none"></div>
                <div class="absolute -left-4 -bottom-4 w-20 h-20 bg-yellow-100/50 rounded-full blur-lg group-hover:bg-yellow-200/50 transition-colors pointer-events-none"></div>

                <div class="w-16 h-16 bg-gradient-to-br from-orange-100 to-orange-50 rounded-[18px] flex items-center justify-center text-orange-500 mb-4 group-hover:-translate-y-1 group-hover:shadow-md transition-all relative z-10 border border-orange-200">
                    <i class="ph-fill ph-books text-[32px]"></i>
                </div>
                <h2 class="text-[20px] font-extrabold text-gray-800 mb-1.5 relative z-10">我的生词本</h2>
                <p class="text-[13px] text-gray-500 mb-5 relative z-10">待消灭盲点: <span id="dashVocabCount" class="font-extrabold text-orange-500 text-[15px]">0</span> 词</p>
                <button class="bg-white text-orange-500 border border-orange-200 px-5 py-2.5 rounded-[12px] font-bold text-[13px] group-hover:bg-orange-500 group-hover:text-white transition-colors shadow-sm relative z-10 flex items-center gap-1.5">
                    进入详情 <i class="ph-bold ph-arrow-right"></i>
                </button>
            </div>

            <!-- 【右侧】：AI 学习中枢 -->
            <div class="bg-white rounded-[24px] shadow-premium p-4 md:p-5 flex flex-col justify-between gap-4 h-full min-h-0 relative">
                <!-- 【第一层】关卡引擎 -->
                <div class="bg-gray-50/60 rounded-[16px] border border-gray-100 p-3 shrink-0 relative overflow-hidden h-[80px] flex flex-col justify-center">
                    <div id="hubIdleState" class="absolute inset-0 flex flex-row items-center justify-center gap-1 opacity-80 transition-opacity">
                        <i class="ph-fill ph-info text-[20px] text-gray-400"></i>
                        <span class="text-[13px] font-bold text-gray-500">生词本暂未集满，暂未生成关卡，或</span>
                        <button onclick="promptManualGenerate()" class="text-orange-500 hover:text-orange-600 transition-all font-extrabold text-[13px]">主动生成</button>
                    </div>

                    <div id="hubActiveState" class="hidden absolute inset-0 bg-[#FFF5F5] border-[2px] border-[#FECACA] flex-row items-center justify-between p-3 z-20 pulse-alert-light rounded-[16px] gap-3">
                        <div class="flex flex-col shrink-0">
                            <h3 class="font-extrabold text-[15px] text-red-600 flex items-center gap-1"><i class="ph-fill ph-warning-circle"></i> 阻断关卡</h3>
                            <span class="text-[10px] font-bold text-red-500 mt-1">待消灭 <span id="hubLevelCount" class="text-[12px]">0</span> 词</span>
                        </div>
                        <div class="flex-1 flex flex-row items-center justify-center gap-1 md:gap-2 overflow-hidden px-2" id="hubStepsContainer"></div>
                        <button onclick="enterScoringView()" class="shrink-0 bg-red-500 hover:bg-red-600 text-white font-bold py-2.5 px-4 rounded-[12px] shadow-sm active:scale-95 transition-all text-[13px] flex items-center justify-center gap-1.5">
                            攻坚解锁 <i class="ph-bold ph-arrow-right"></i>
                        </button>
                    </div>
                </div>

                <!-- 【第二层】中间引擎区 -->
                <div class="grid grid-cols-2 gap-4 h-[90px] shrink-0">
                    <button id="btnNew" onclick="startPassing('new', '学习新词')" class="w-full h-full"></button>
                    <button id="btnOld" onclick="startPassing('old', '复习旧词')" class="w-full h-full"></button>
                </div>

                <!-- 【第三层】老师任务列表 -->
                <div class="bg-gray-50/60 rounded-[16px] border border-gray-100 p-3 shrink-0 flex flex-col relative overflow-hidden flex-1 min-h-[150px]">
                    <div class="flex items-center gap-1.5 mb-2 px-1 shrink-0 text-slate-700">
                        <i class="ph-fill ph-chalkboard-teacher text-indigo-500 text-[16px]"></i>
                        <span class="text-[14px] font-bold">老师指定任务</span>
                    </div>
                    <div id="assignedTaskContainer" class="w-full overflow-y-auto hide-scrollbar flex flex-col gap-2 pb-1 relative z-10"></div>
                    <div id="noAssignedTaskBox" class="absolute inset-0 flex flex-col items-center justify-center text-center opacity-50 pointer-events-none z-0 mt-4">
                        <i class="ph-fill ph-coffee text-[32px] text-gray-400 mb-1"></i>
                        <p class="text-[12px] font-bold text-gray-500 mt-1">暂未发布指定任务</p>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <!-- ================= 视图：我的生词本 ================= -->
    <div id="view-vocab" class="view-section flex-col w-full h-full max-w-[1300px] mx-auto p-4 md:p-5 overflow-hidden gap-4">
        <div class="flex items-center justify-between shrink-0 mb-2 px-2">
            <div class="flex items-center gap-4">
                <button onclick="switchView('view-dashboard')" class="w-11 h-11 bg-white hover:bg-gray-50 rounded-[14px] shadow-sm flex items-center justify-center transition-colors text-slate-600 active:scale-95 border border-gray-100">
                    <i class="ph-bold ph-caret-left text-[22px]"></i>
                </button>
                <h2 class="font-extrabold text-[32px] text-gray-900 tracking-tight leading-none">我的生词本</h2>
            </div>
            <button onclick="promptManualGenerate()" class="bg-gradient-to-r from-orange-400 to-orange-50 hover:from-orange-50 hover:to-orange-600 text-white pl-2 pr-4 py-1.5 rounded-[14px] font-bold text-[14px] shadow-md shadow-orange-500/20 active:scale-95 transition-all flex items-center gap-2 group border border-orange-400/50">
                <div class="bg-white/25 backdrop-blur-sm rounded-[10px] w-8 h-8 flex items-center justify-center shadow-[inset_0_1px_3px_rgba(255,255,255,0.4)] border border-white/20 group-hover:rotate-12 transition-transform duration-300">
                    <i class="ph-fill ph-magic-wand text-yellow-50 text-[18px]"></i>
                </div>
                一键生成关卡
            </button>
        </div>

        <div class="bg-white rounded-[24px] shadow-premium flex flex-col flex-1 min-h-0 border border-gray-100 relative overflow-hidden">
            <div class="flex justify-between items-center px-5 py-4 border-b border-gray-100 bg-gray-50/50 shrink-0">
                <div class="flex items-center gap-2 overflow-x-auto hide-scrollbar" id="vocab-filters-full">
                    <button onclick="setVocabFilterFull('all')" id="full-filter-all"></button>
                    <button onclick="setVocabFilterFull('new')" id="full-filter-new"></button>
                    <button onclick="setVocabFilterFull('old')" id="full-filter-old"></button>
                </div>
                <div class="text-[13px] text-gray-500 font-medium">共 <span id="fullVocabCount">0</span> 词</div>
            </div>
            <div class="flex-1 min-h-0 overflow-y-auto px-5 py-4 hide-scrollbar bg-gray-50/30">
                <div id="fullVocabList" class="flex flex-col gap-4 content-start"></div>
            </div>
        </div>
    </div>


    <!-- ================= 视图：过词训练 ================= -->
    <div id="view-passing" class="view-section flex-col w-full h-full p-4 md:p-5 overflow-hidden max-w-[1300px] mx-auto gap-4">
        <div class="flex items-center justify-between shrink-0 mb-3 px-2">
            <div class="flex items-center gap-4">
                <button onclick="switchView('view-dashboard')" class="w-11 h-11 bg-[#F1F5F9] hover:bg-[#E2E8F0] rounded-[14px] flex items-center justify-center transition-colors text-slate-600 shadow-sm active:scale-95">
                    <i class="ph-bold ph-caret-left text-[22px]"></i>
                </button>
                <h2 class="font-extrabold text-[32px] text-gray-900 tracking-tight leading-none" id="passingTitle">学习新词</h2>
            </div>
        </div>

        <div class="flex-1 min-h-0 flex flex-col bg-white rounded-[24px] shadow-premium relative overflow-hidden">
            <div class="px-5 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50 shrink-0">
                <span class="text-[13px] text-gray-500 font-medium">共 <span id="totalPassCount">10</span> 词</span>
                <div class="flex items-center bg-gray-200/60 p-1 rounded-[12px] gap-1 shrink-0">
                    <button id="pass-filter-all" onclick="setPassFilter('all')" class="px-3 py-1.5 rounded-[10px] bg-white shadow-sm text-gray-800 text-[13px] font-bold transition-all">全部 <span id="statAllCount">0</span></button>
                    <button id="pass-filter-known" onclick="setPassFilter('known')" class="px-3 py-1.5 rounded-[10px] text-gray-500 hover:text-gray-700 text-[13px] font-bold transition-all flex items-center gap-1"><div class="w-1.5 h-1.5 rounded-full bg-[#10B981]"></div>认识 <span id="statKnown">0</span></button>
                    <button id="pass-filter-unknown" onclick="setPassFilter('unknown')" class="px-3 py-1.5 rounded-[10px] text-gray-500 hover:text-gray-700 text-[13px] font-bold transition-all flex items-center gap-1"><div class="w-1.5 h-1.5 rounded-full bg-[#EF4444]"></div>不认识 <span id="statUnknown">0</span></button>
                </div>
            </div>
            <div id="wordListContainer" class="flex-1 min-h-0 overflow-y-auto px-5 py-4 flex flex-col gap-4 pb-24 hide-scrollbar bg-gray-50/30 content-start"></div>
            <div class="absolute bottom-0 left-0 w-full bg-white border-t border-gray-100 px-6 py-4 flex justify-between items-center z-10 shadow-[0_-4px_20px_rgba(0,0,0,0.03)] shrink-0">
                <div class="flex items-center gap-1.5 text-[#F97316] text-[15px] font-medium cursor-pointer active:opacity-70 transition-all whitespace-nowrap" onclick="scrollToFirstUnanswered()">
                    <i class="ph-fill ph-warning-circle text-[22px]"></i>

    <!-- Javascript 逻辑 -->
    <script>
        function showModal(title, msg, onConfirm = null, isConfirm = false) {
            const titleEl = document.getElementById('modal-title');
            const msgEl = document.getElementById('modal-msg');
            const modal = document.getElementById('native-modal');
            const btn = document.getElementById('modal-btn');
            const cancelBtn = document.getElementById('modal-cancel-btn');
            if(titleEl) titleEl.innerText = title;
            if(msgEl) msgEl.innerHTML = msg;
            if (modal) {
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                setTimeout(() => modal.classList.replace('opacity-0', 'opacity-100'), 10);
            }
            const hideModal = () => {
                if (modal) modal.classList.replace('opacity-100', 'opacity-0');
                setTimeout(() => {
                    if (modal) {
                        modal.classList.add('hidden');
                        modal.classList.remove('flex');
                    }
                }, 300);
            };
            if (isConfirm) {
                cancelBtn.classList.remove('hidden');
                cancelBtn.classList.add('block');
                btn.innerText = '确认';
                cancelBtn.onclick = hideModal;
                btn.onclick = () => {
                    hideModal();
                    if (onConfirm) setTimeout(onConfirm, 300);
                };
            } else {
                cancelBtn.classList.add('hidden');
                cancelBtn.classList.remove('block');
                btn.innerText = '我知道了';
                btn.onclick = () => {
                    hideModal();
                    if (onConfirm) setTimeout(onConfirm, 300);
                };
            }
        }

        const dataStore = {
            stats: { 
                totalPlanned: 3000, totalLearned: 1250, unlearnedNew: 1270, unlearnedOld: 30, todayLearned: 120,
                totalPool: 5000, totalTarget: 3000, known: 1280, read: 1200, memo: 1100, dict: 1050, 
                unknown: 450, unknownNew: 420, unlearned: 1270
            }
        };

        const rawWordsData = [
            { word: "dilemma", phonetic: "/dɪˈlemə/", meaning: "进退两难的困境", type: "new" },
            { word: "ambitious", phonetic: "/æmˈbɪʃəs/", meaning: "有野心的", type: "new" },
            { word: "vulnerable", phonetic: "/ˈvʌlnərəbl/", meaning: "脆弱的，易受伤害的", type: "new" },
            { word: "symptom", phonetic: "/ˈsɪmptəm/", meaning: "症状，征兆", type: "new" },
            { word: "comprehend", phonetic: "/ˌkɑːmprɪˈhend/", meaning: "理解，领悟", type: "new" },
            { word: "fascinate", phonetic: "/ˈfæsɪneɪt/", meaning: "深深吸引", type: "new" },
            { word: "lucrative", phonetic: "/ˈluːkrətɪv/", meaning: "赚大钱的", type: "new" },
            { word: "meticulous", phonetic: "/mɪˈtɪkjələs/", meaning: "一丝不苟的", type: "new" },
            { word: "phenomenon", phonetic: "/fəˈnɑːmɪnən/", meaning: "现象，杰出的人", type: "old" },
            { word: "evaluate", phonetic: "/ɪˈvæljueɪt/", meaning: "评估，评价", type: "old" },
            { word: "extraordinary", phonetic: "/ɪkˈstrɔːrdəneri/", meaning: "非凡的并且超出寻常的", type: "old" },
            { word: "anonymous", phonetic: "/əˈnɑːnɪməs/", meaning: "匿名的，无名的", type: "old" },
            { word: "innovative", phonetic: "/ˈɪnəveɪtɪv/", meaning: "创新的，革新的", type: "old" },
            { word: "paradigm", phonetic: "/pəˈrædɪm/", meaning: "范例，典范", type: "old" },
            { word: "resilient", phonetic: "/rɪˈzɪliənt/", meaning: "有弹性的，适应力强的", type: "old" },
            { word: "scrutinize", phonetic: "/skruːtɪnaɪz/", meaning: "仔细检查", type: "old" }
        ];

        let testWords = []; 
        let TOTAL_WORDS = 0;
        const VOCAB_THRESHOLD = 5; 
        
        const state = {
            activeLevel: null, 
            vocabBook: [ 
                { word: "dilemma", phonetic: "/dɪˈlemə/", meaning: "进退两难的困境", type: "new" },
                { word: "ambitious", phonetic: "/æmˈbɪʃəs/", meaning: "有野心的", type: "new" },
                { word: "vulnerable", phonetic: "/ˈvʌlnərəbl/", meaning: "脆弱的，易受伤害的", type: "new" },
                { word: "symptom", phonetic: "/ˈsɪmptəm/", meaning: "症状，征兆", type: "new" },
                { word: "phenomenon", phonetic: "/fəˈnɑːmɪnən/", meaning: "现象，杰出的人", type: "old" },
                { word: "evaluate", phonetic: "/ɪˈvæljueɪt/", meaning: "评估，评价", type: "old" },
                { word: "extraordinary", phonetic: "/ɪkˈstrɔːrdəneri/", meaning: "非凡的并且超出寻常的", type: "old" },
                { word: "anonymous", phonetic: "/əˈnɑːnɪməs/", meaning: "匿名的，无名的", type: "old" }
            ], 
            vocabFilter: 'all', 
            passFilter: 'all',
            passingStats: { known: 0, unknown: 0, remaining: 0, answered: 0 },
            currentActionType: '', 
            currentTaskId: null,
            assignedTasks: [],
            _tempUnknowns: [],
            wordOffset: 0 
        };

        function initData(count = 10) {
            testWords = [];
            for (let i = 0; i < count; i++) {
                const rawIndex = (state.wordOffset + i) % rawWordsData.length;
                const baseWord = rawWordsData[rawIndex];
                testWords.push({ id: state.wordOffset + i, word: baseWord.word, phonetic: baseWord.phonetic, meaning: baseWord.meaning, type: baseWord.type, status: null });
            }
            state.wordOffset += count;
            TOTAL_WORDS = count;
        }

        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            const targetView = document.getElementById(viewId);
            if (targetView) targetView.classList.add('active');
            if(viewId === 'view-dashboard') renderDashboardUI();
            if(viewId === 'view-vocab') renderVocabBookFull();
        }

        function getTodayDateString() { return new Date().toDateString(); }

        function toggleTeacherTasks() {
            if (state.assignedTasks.length > 0) {
                state.assignedTasks = [];
                showModal('重置任务', '<div class="mt-1 font-medium">已清空老师下发的指定任务。</div>', renderDashboardUI);
            } else {
                state.assignedTasks = [
                    { id: 101, title: "高二核心易错词冲刺", count: 10, target: 3, current: 0, lastDone: null },
                    { id: 102, title: "阅读长难句高频词", count: 15, target: 1, current: 0, lastDone: null },
                    { id: 103, title: "高考大纲提分包", count: 20, target: 2, current: 0, lastDone: null }
                ];
                showModal('任务送达', '<div class="mt-1 font-medium">已下发 <b class="text-gray-900 text-[18px] px-0.5">3</b> 个指定批次任务！<br>请在下方的列表中查看。</div>', renderDashboardUI);
            }
        }

        function setVocabFilterFull(type) { state.vocabFilter = type; renderVocabBookFull(); }

        function setPassFilter(filter) {
            state.passFilter = filter;
            ['all', 'known', 'unknown'].forEach(f => {
                const btn = document.getElementById(`pass-filter-${f}`);
                if (!btn) return;
                if (f === filter) {
                    btn.classList.add('bg-white', 'shadow-sm', 'text-gray-800');
                    btn.classList.remove('text-gray-500', 'hover:text-gray-700', 'bg-transparent');
                } else {
                    btn.classList.remove('bg-white', 'shadow-sm', 'text-gray-800');
                    btn.classList.add('text-gray-500', 'hover:text-gray-700', 'bg-transparent');
                }
            });
            testWords.forEach(w => {
                const row = document.getElementById(`word-row-${w.id}`);
                if (!row) return;
                if (filter === 'all') row.style.display = 'flex';
                else if (filter === 'known') row.style.display = w.status === 'known' ? 'flex' : 'none';
                else if (filter === 'unknown') row.style.display = w.status === 'unknown' ? 'flex' : 'none';
            });
        }

        function renderDataDashboard() {
            const setVal = (id, val) => { const el = document.getElementById(id); if (el) el.innerText = val; }; 
            const total = dataStore.stats.totalTarget;
            const known = dataStore.stats.known;
            const unknown = dataStore.stats.unknown;
            const unlearned = dataStore.stats.unlearned;
            const learnedSum = known + unknown;
            setVal('statTotalTarget', total);
            setVal('statLearnedSum', learnedSum);
            setVal('statUnlearned', unlearned);
            const ringPct = Math.round((learnedSum / total) * 100) || 0;
            const ringEl = document.getElementById('targetProgressRing');
            const ringText = document.getElementById('targetProgressText');
            if (ringText) ringText.innerText = ringPct + '%';
            if (ringEl) ringEl.style.strokeDashoffset = 175.9 - (ringPct / 100) * 175.9;
            setVal('statKnownTotal', known);
            setVal('statUnknownTotal', unknown);
            setVal('statReadTotal', dataStore.stats.read);
            setVal('statMemoTotal', dataStore.stats.memo);
            setVal('statDictTotal', dataStore.stats.dict);
        }

        function renderVocabBookFull() {
            const container = document.getElementById('fullVocabList');
            if (!container) return;
            container.innerHTML = '';
            const validVocab = state.vocabBook; 
            const newCount = validVocab.filter(w => w.type === 'new').length;
            const oldCount = validVocab.filter(w => w.type === 'old').length;
            const allCount = validVocab.length;
            const themes = {
                all: { lightBg: 'bg-gray-100', lightBorder: 'border-gray-200', hoverBg: 'bg-gray-200', darkText: 'text-gray-700', lightIconText: 'text-gray-400', lightIconBg: 'bg-gray-200/80', solidBg: 'bg-gray-800' },
                new: { lightBg: 'bg-blue-50', lightBorder: 'border-blue-100', hoverBg: 'bg-blue-100', darkText: 'text-blue-600', lightIconText: 'text-blue-400', lightIconBg: 'bg-blue-100/80', solidBg: 'bg-[#1F5FFF]' },
                old: { lightBg: 'bg-emerald-50', lightBorder: 'border-emerald-100', hoverBg: 'bg-emerald-100', darkText: 'text-emerald-600', lightIconText: 'text-emerald-400', lightIconBg: 'bg-emerald-100/80', solidBg: 'bg-[#10B981]' }
            };
            const updateTab = (id, label, iconClass, count, typeKey) => {
                const btn = document.getElementById(id);
                if (!btn) return;
                const isActive = state.vocabFilter === typeKey;
                const isFull = typeKey !== 'all' && count >= VOCAB_THRESHOLD;
                const theme = themes[typeKey];
                let contentHtml = '';
                if (isActive) {
                    let badgeHtml = typeKey === 'all' ? `<span class="bg-white/20 text-white px-1.5 py-0.5 rounded-[6px] font-mono text-[10px] ml-1.5">${count}</span>` : (isFull ? `<span class="bg-red-500 text-white border border-red-400 font-extrabold animate-pulse ml-1.5 px-1.5 py-0.5 rounded-[6px] leading-none text-[10px] shadow-sm">${count}/${VOCAB_THRESHOLD}</span>` : `<span class="bg-white/20 text-white px-1.5 py-0.5 rounded-[6px] font-mono text-[10px] ml-1.5">${count}/${VOCAB_THRESHOLD}</span>`);
                    contentHtml = `<div class="bg-white ${theme.darkText} w-5 h-5 rounded-[6px] flex items-center justify-center mr-1.5 shadow-sm shrink-0"><i class="${iconClass} text-[12px]"></i></div><span class="text-white whitespace-nowrap">${label}</span>${badgeHtml}`;
                    btn.className = `text-[13px] font-bold pr-2.5 pl-2 py-2 rounded-[12px] shadow-md transition-all duration-300 flex items-center shrink-0 ${theme.solidBg} border border-transparent transform scale-[1.02]`;
                } else {
                    let badgeHtml = typeKey === 'all' ? `<span class="${theme.lightIconBg} ${theme.darkText} opacity-70 px-1.5 py-0.5 rounded-[6px] font-mono text-[10px] ml-1.5">${count}</span>` : (isFull ? `<span class="bg-red-100 text-red-600 border border-red-200 font-extrabold animate-pulse ml-1.5 px-1.5 py-0.5 rounded-[6px] leading-none text-[10px]">${count}/${VOCAB_THRESHOLD}</span>` : `<span class="${theme.lightIconBg} ${theme.darkText} opacity-70 px-1.5 py-0.5 rounded-[6px] font-mono text-[10px] ml-1.5">${count}/${VOCAB_THRESHOLD}</span>`);
                    contentHtml = `<i class="${iconClass} ${theme.lightIconText} text-[18px] mr-1 shrink-0"></i><span class="${theme.darkText} whitespace-nowrap">${label}</span>${badgeHtml}`;
                    btn.className = `text-[13px] font-bold pr-3 pl-2.5 py-2 rounded-[12px] transition-all duration-300 flex items-center shrink-0 ${theme.lightBg} border ${theme.lightBorder} hover:${theme.hoverBg}`;
                }
                btn.innerHTML = contentHtml;
            };
            updateTab('full-filter-all', '全部', 'ph-bold ph-list-dashes', allCount, 'all');
            updateTab('full-filter-new', '新词', 'ph-bold ph-rocket', newCount, 'new');
            updateTab('full-filter-old', '旧词', 'ph-bold ph-arrows-clockwise', oldCount, 'old');
            const filteredList = validVocab.filter(item => state.vocabFilter === 'all' || item.type === state.vocabFilter);
            const countEl = document.getElementById('fullVocabCount');

            } else {
                wordEnEl.innerText = currWord.en; wordEnEl.className = `text-gray-800 tracking-wide ` + baseClasses;
                wordCnEl.innerText = currWord.cn; wordCnEl.className = 'text-gray-800 tracking-widest ' + baseClasses;
                phonEl.innerText = currWord.phon; phonEl.className = 'text-gray-800 tracking-widest font-serif ' + baseClasses;
            }
            
            const prevBtn = document.getElementById('prev-btn'); const nextBtn = document.getElementById('next-btn');
            prevBtn.disabled = currentScoreIdx === 0; prevBtn.className = currentScoreIdx === 0 ? "flex items-center text-gray-300 font-medium text-[14px] py-1.5 px-3 rounded-full cursor-not-allowed opacity-50 whitespace-nowrap shrink-0" : "flex items-center text-[#3B82F6] hover:text-[#2563EB] transition-colors font-medium text-[14px] py-1.5 px-3 rounded-full cursor-pointer hover:bg-blue-50 whitespace-nowrap shrink-0";
            nextBtn.disabled = currentScoreIdx === scoringData.length - 1; nextBtn.className = currentScoreIdx === scoringData.length - 1 ? "flex items-center text-gray-300 font-medium text-[14px] py-1.5 px-3 rounded-full cursor-not-allowed opacity-50 whitespace-nowrap shrink-0" : "flex items-center text-[#3B82F6] hover:text-[#2563EB] transition-colors font-medium text-[14px] py-1.5 px-3 rounded-full cursor-pointer hover:bg-blue-50 whitespace-nowrap shrink-0";
            
            // --- 动效核心逻辑 ---
            const micBtn = document.getElementById('score-action-btn');
            if (currentMode === 'gendu') {
                micBtn.style.width = '84px'; micBtn.style.opacity = '1'; micBtn.style.marginLeft = '1.25rem'; micBtn.style.transform = 'scale(1)'; micBtn.style.pointerEvents = 'auto';
            } else {
                micBtn.style.width = '0'; micBtn.style.opacity = '0'; micBtn.style.marginLeft = '0'; micBtn.style.transform = 'scale(0)'; micBtn.style.pointerEvents = 'none';
            }

            updateTopNav(); updateQueueList(); resetScoringState();
            const targetProgress = modeRound[currentMode] + 1; const unfinishedCount = scoringData.filter(item => item[currentMode + 'Progress'] < targetProgress).length;
            if (isAutoPlay && unfinishedCount > 0) { 
                clearTimeout(window.autoPlayTimer); 
                const wordGapInput = document.getElementById('word-gap');
                const wordGap = wordGapInput ? parseFloat(wordGapInput.value) * 1000 : 1000;
                window.autoPlayTimer = setTimeout(() => playSystemAudio(), wordGap); 
            }
        }

        function updateQueueList() {
            const listContainer = document.getElementById('queue-words-list'); 
            if (!listContainer) return;
            
            listContainer.style.paddingTop = listContainer.style.paddingBottom = 'calc(50% - 34px)'; 
            listContainer.innerHTML = '';
            
            scoringData.forEach((item, index) => {
                const li = document.createElement('li'); li.id = `queue-item-${index}`;
                let statusHtml = ''; const targetProgress = modeRound[currentMode] + 1;
                if (isRecording && index === currentScoreIdx) statusHtml = `<div class="text-[13px] text-red-600 bg-red-100/90 px-3 py-1.5 rounded-xl font-bold flex items-center border border-red-200 backdrop-blur-md transition-colors"><span class="relative flex h-2.5 w-2.5 mr-1.5"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-500"></span></span>录音中</div>`;
                else if (currentMode === 'gendu' && item.score !== null) { let colorClass = item.score < 60 ? 'text-red-600 bg-red-100/80 border-red-200' : (item.score <= 70 ? 'text-orange-600 bg-orange-100/80 border-orange-200' : 'text-green-600 bg-green-100/80 border-green-200'); statusHtml = `<div class="text-[13px] ${colorClass} px-3 py-1.5 rounded-xl font-bold border backdrop-blur-md">${item.score}分</div>`; }
                else if (index === currentScoreIdx) statusHtml = `<div class="text-[13px] text-[#1F5FFF] bg-[#1F5FFF]/15 px-4 py-1.5 rounded-xl font-bold flex items-center border border-[#1F5FFF]/20 backdrop-blur-md transition-colors">当前</div>`;
                else if (item[currentMode + 'Progress'] >= targetProgress) statusHtml = `<div class="text-[13px] text-green-600 bg-green-50/80 px-4 py-1.5 rounded-xl font-bold border border-green-200/50 backdrop-blur-md flex items-center">已播</div>`;
                else statusHtml = `<div class="text-[13px] ${index < currentScoreIdx ? 'text-gray-400' : 'text-gray-500 bg-gray-200/50 rounded-xl'} px-4 py-1.5 backdrop-blur-md">${index < currentScoreIdx ? '已跳过' : '即将'}</div>`;
                li.className = `${index === currentScoreIdx ? 'bg-white/95 backdrop-blur-xl opacity-100 scale-100 z-10 relative shadow-[0_8px_24px_rgba(0,0,0,0.08)] border-white' : 'bg-white/50 backdrop-blur-md opacity-70 scale-[0.98] border-white/40'} px-5 rounded-[16px] border flex justify-between items-center transition-all duration-300 h-[68px] cursor-pointer`;
                li.innerHTML = `<div class="flex-1 flex items-baseline space-x-2 overflow-hidden pr-4 min-w-0"><span class="font-bold text-[22px] ${index === currentScoreIdx ? 'text-[#2563EB]' : 'text-[#94a3b8]'} truncate shrink min-w-0 max-w-[50%]">${currentMode === 'tingxie' ? '***' : item.en}</span><span class="text-[13px] text-gray-400 font-serif shrink-0">${currentMode === 'tingxie' ? '***' : item.phon}</span><span class="text-[14px] text-gray-500 truncate font-medium shrink min-w-0 flex-1">${currentMode === 'tingxie' ? '***' : item.cn}</span></div><div class="flex-shrink-0">${statusHtml}</div>`;
                li.onclick = () => { if (!isRecording && scoringData.filter(item => item[currentMode + 'Progress'] < targetProgress).length > 0) { currentScoreIdx = index; updateScoringUI(); } };
                listContainer.appendChild(li);
            });
            setTimeout(() => { const curr = document.getElementById(`queue-item-${currentScoreIdx}`); if (curr) listContainer.scrollTo({ top: curr.offsetTop + (curr.clientHeight / 2) - listContainer.clientHeight / 2, behavior: 'smooth' }); }, 100);
            updateSubmitBar(); refreshIcons();
        }

        function updateSubmitBar() {
            const targetProgress = modeRound[currentMode] + 1; const unfinished = scoringData.filter(item => item[currentMode + 'Progress'] < targetProgress).length;
            const bar = document.getElementById('queue-submit-bar'); let btnText = currentMode === 'gendu' ? '提交本轮' : '拍照凭证'; let btnIcon = currentMode === 'gendu' ? '' : '<i data-lucide="camera" class="w-4 h-4 mr-1.5"></i>';
            if (modeRound[currentMode] >= sysConfig[currentMode].target) bar.innerHTML = `<div class="flex items-center shrink-0"><div class="w-7 h-7 rounded-full bg-[#dcfce7] flex items-center justify-center text-[#10b981] mr-2 shadow-sm shrink-0"><i data-lucide="check-circle-2" class="w-4 h-4"></i></div><span class="text-[#10b981] font-bold text-[16px] whitespace-nowrap">所有题目都已完成</span></div><div class="flex items-center space-x-5 shrink-0"><button class="bg-[#e2e8f0] text-[#94a3b8] font-bold py-2.5 px-6 rounded-xl text-[15px] cursor-not-allowed whitespace-nowrap flex items-center shrink-0">${btnIcon} ${btnText} (已完成)</button></div>`;
            else if (unfinished > 0) bar.innerHTML = `<div class="flex items-center cursor-pointer group shrink-0" onclick="scrollToFirstUnfinished()"><div class="w-6 h-6 rounded-full bg-[#eef2ff] border border-[#c7d2fe] flex items-center justify-center text-[#6366f1] mr-2 shrink-0"><span class="font-bold text-[13px] -mt-px">!</span></div><span class="text-[#6366f1] font-medium text-[15px] flex items-center whitespace-nowrap">剩余待完成: <span class="font-bold text-[22px] mx-1.5 leading-none">${unfinished}</span> 题 <i data-lucide="chevron-right" class="w-4 h-4 ml-0.5 opacity-70"></i></span></div><div class="flex items-center space-x-5 shrink-0"><button class="bg-[#e2e8f0] text-[#94a3b8] font-bold py-2.5 px-6 rounded-xl text-[15px] cursor-not-allowed whitespace-nowrap flex items-center shrink-0">${btnIcon} ${btnText}</button></div>`;
            else bar.innerHTML = `<div class="flex items-center shrink-0"><div class="w-7 h-7 rounded-full bg-[#dcfce7] flex items-center justify-center text-[#10b981] mr-2 shadow-sm shrink-0"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><polyline points="20 6 9 17 4 12"></polyline></svg></div><span class="text-[#10b981] font-bold text-[16px] whitespace-nowrap">本轮题目已完成</span></div><div class="flex items-center space-x-5 shrink-0"><button onclick="submitRound()" class="flex items-center text-white font-bold py-2.5 px-6 rounded-xl text-[15px] transition-all active:scale-95 whitespace-nowrap shrink-0 flex items-center ${currentMode === 'gendu' ? 'bg-[#1F5FFF]' : 'bg-[#f97316] animate-pulse'} shadow-sm">${btnIcon} ${btnText}</button></div>`;
            refreshIcons();
        }

        function scrollToFirstUnfinished() {
            if (isRecording) return; 
            const idx = scoringData.findIndex(item => item[currentMode + 'Progress'] < modeRound[currentMode] + 1);
            if (idx !== -1) { currentScoreIdx = idx; updateScoringUI(); setTimeout(() => { const el = document.getElementById(`queue-item-${idx}`); if (el) { el.classList.add('!border-[#818cf8]', 'shadow-[0_0_0_2px_rgba(129,140,248,0.4)]', '!bg-[#eef2ff]'); setTimeout(() => el.classList.remove('!border-[#818cf8]', 'shadow-[0_0_0_2px_rgba(129,140,248,0.4)]', '!bg-[#eef2ff]'), 1200); } }, 150); }
        }

        function prevScoreWord() { if (!isRecording && currentScoreIdx > 0) { currentScoreIdx--; updateScoringUI(); } }
        function nextScoreWord() { if (!isRecording && currentScoreIdx < scoringData.length - 1) { currentScoreIdx++; updateScoringUI(); } }

        function resetScoringState() {
            isRecording = false; isPlayingSystem = false;
            document.getElementById('scoring-status-pill').innerHTML = `等待开始...`;
            document.getElementById('scoring-status-pill').className = "flex items-center space-x-1.5 bg-white/80 backdrop-blur-md px-6 py-2.5 rounded-full border border-white text-[14px] font-medium text-gray-500 transition-colors shadow-sm whitespace-nowrap";
            const btnEl = document.getElementById('score-action-btn');
            if (btnEl && currentMode === 'gendu') {
                btnEl.className = "w-[84px] h-[84px] ml-5 bg-[#3B82F6] text-white rounded-full flex items-center justify-center shadow-[0_8px_24px_rgba(59,130,246,0.4)] hover:bg-[#2563EB] transition-all duration-500 ease-in-out focus:outline-none select-none group flex-shrink-0 relative z-10 overflow-hidden";
                btnEl.style.transform = 'scale(1)'; btnEl.innerHTML = `<i data-lucide="mic" class="w-9 h-9 pointer-events-none transition-transform group-active:scale-90 shrink-0"></i>`;
            }
            updateTopNav(); refreshIcons();
        }

        renderDashboardUI();
    </script>
</body>
</html>
