<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 记词 - 安卓原生体验</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #EFF6FF 0%, #DFE7FF 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: #1f2937;
            overflow-x: hidden;
            overscroll-behavior-y: none;
        }

        *::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        .view-section { display: none; opacity: 0; transition: opacity 0.25s ease-in-out; }
        .view-section.active { display: flex; opacity: 1; }

        /* 安卓立体投影规范 */
        .shadow-app-card {
            box-shadow: 0 8px 24px rgba(149, 157, 165, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.9);
        }
        
        .shadow-app-floating { box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.05); }

        .judge-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .modal-enter { animation: modalFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* 呼吸警示动画 (用于浅色背景) */
        @keyframes pulse-red-light {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.2); }
            50% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
        }
        .pulse-alert-light { animation: pulse-red-light 2s infinite; border: 2px solid #EF4444; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden text-[16px]">

    <!-- ================= 全局原生弹窗 ================= -->
    <div id="native-modal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-gray-900/60 backdrop-blur-sm transition-opacity duration-300 opacity-0">
        <div class="bg-white rounded-[24px] p-8 w-[90%] max-w-sm shadow-2xl flex flex-col modal-enter" id="native-modal-content">
            <h3 id="modal-title" class="text-[24px] font-bold text-gray-900 mb-3">提示</h3>
            <p id="modal-msg" class="text-[16px] text-gray-600 mb-8 leading-relaxed whitespace-pre-wrap"></p>
            <button id="modal-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-[18px] py-4 rounded-2xl shadow-lg active:scale-95 transition-all">
                我知道了
            </button>
        </div>
    </div>


    <!-- ================= 视图 1：主界面 (仪表盘) ================= -->
    <div id="view-dashboard" class="view-section active flex-col w-full h-full max-w-[1200px] mx-auto p-4 md:p-6 overflow-y-auto">
        
        <!-- Header -->
        <header class="flex justify-between items-center mb-6 shrink-0 pt-2">
            <div class="flex items-center gap-4">
                <button class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-app-card active:scale-90 transition-transform text-slate-700 cursor-pointer" onclick="showModal('返回提示', '此处将返回安卓系统的上一级页面。')">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="mr-0.5">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <h1 class="text-[32px] font-extrabold text-gray-900 tracking-tight leading-none">
                    AI 记词
                </h1>
            </div>
            <!-- 后台控制台模拟入口 -->
            <button onclick="toggleTeacherTasks()" class="bg-white text-blue-600 border border-blue-200 px-4 py-3 rounded-xl font-bold text-[14px] shadow-sm active:scale-95 transition-transform flex items-center gap-2">
                <i class="ph-bold ph-gear text-[18px]"></i> 模拟下发老师任务
            </button>
        </header>

        <!-- 1. 顶部：全局动态任务进度中枢 -->
        <div id="topTaskHub" class="mb-8 shrink-0 relative transition-all duration-300">
            
            <!-- 状态 A：无阻塞时的常规看版 (居中纯享鼓励文案) -->
            <div id="hubIdleState" class="bg-white/90 backdrop-blur-xl rounded-[24px] shadow-app-card p-6 md:p-10 flex flex-col items-center justify-center text-center overflow-hidden relative min-h-[140px]">
                <div class="absolute right-0 top-0 w-80 h-80 bg-blue-50/50 rounded-full blur-3xl -z-10 translate-x-1/2 -translate-y-1/2"></div>
                
                <div class="relative z-10">
                    <h2 class="text-[24px] md:text-[28px] font-extrabold text-gray-900 mb-2">状态绝佳 🚀</h2>
                    <p class="text-[14px] text-gray-500">当前无积压生词卡点，请在下方自由探索新词或复习旧词。</p>
                </div>
            </div>

            <!-- 状态 B：有关卡时的强制攻坚面板 (白底浅色主题、高亮红框) -->
            <div id="hubActiveState" class="hidden bg-white backdrop-blur-xl rounded-[24px] shadow-app-card p-6 md:p-8 flex-col md:flex-row items-center justify-between gap-6 pulse-alert-light relative overflow-hidden">
                <div class="absolute right-[-20px] top-[-20px] opacity-[0.03] pointer-events-none">
                    <i class="ph-fill ph-target text-[180px] text-red-500"></i>
                </div>
                <div class="absolute left-0 top-0 w-2 h-full bg-red-500"></div>
                
                <div class="flex-1 w-full relative z-10 pl-2">
                    <div class="flex items-center gap-3 mb-3">
                        <span class="bg-red-500 text-white text-[12px] font-bold px-3 py-1 rounded-full shadow-sm">系统锁定中</span>
                        <span class="text-[14px] text-gray-500 font-medium">待消灭 <span id="hubLevelCount" class="text-red-500 font-extrabold text-[18px]">0</span> 词</span>
                    </div>
                    <h2 class="text-[28px] md:text-[32px] font-extrabold text-red-600 mb-5" id="hubLevelTitle">生词深加工关卡</h2>
                    
                    <!-- 动态进度条目链 -->
                    <div class="flex flex-wrap items-center gap-2 md:gap-3" id="hubStepsContainer">
                        <!-- JS动态渲染：跟读 -> 音记 -> 听写 -->
                    </div>
                </div>

                <div class="shrink-0 w-full md:w-auto mt-2 md:mt-0 relative z-10">
                    <button onclick="simulateNextStep()" class="bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-10 rounded-[20px] shadow-[0_8px_20px_rgba(220,38,38,0.3)] active:scale-95 transition-all text-[20px] flex items-center justify-center gap-2 w-full">
                        继续攻坚 <i class="ph-bold ph-arrow-right"></i>
                    </button>
                </div>
            </div>

        </div>

        <!-- 2. 中部：核心操作区 (算法 2x2 vs 老师任务独立区) -->
        <div class="grid grid-cols-1 lg:grid-cols-[1fr_360px] gap-8 shrink-0 pb-12">
            
            <!-- 左半部分：AI 算法路径 -->
            <div class="flex flex-col gap-5 relative">
                <div class="flex items-center justify-between px-2">
                    <h2 class="text-[24px] font-bold text-gray-900">算法学习区</h2>
                    <span class="text-[12px] font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full">基于记忆曲线</span>
                </div>
                
                <!-- 层级 1: 核心过词入口 -->
                <div class="grid grid-cols-2 gap-5">
                    <!-- 学新词 -->
                    <button id="btnNew" onclick="startPassing('new', '学新词')" class="bg-white rounded-[24px] p-6 shadow-app-card flex flex-col items-center justify-center text-center active:scale-95 transition-all relative group h-[120px]">
                        <div id="lockNew" class="absolute inset-0 bg-white/70 backdrop-blur-[2px] flex flex-col items-center justify-center z-10 hidden rounded-[24px] transition-opacity">
                            <i class="ph-fill ph-lock-key text-gray-400 text-[28px] mb-1"></i>
                            <span class="text-[12px] text-gray-600 font-bold bg-white px-2 py-0.5 rounded shadow-sm">已被关卡锁定</span>
                        </div>
                        <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center mb-2 group-hover:bg-blue-600 transition-colors">
                            <i class="ph-bold ph-sparkle text-blue-600 text-[24px] group-hover:text-white transition-colors"></i>
                        </div>
                        <h3 class="font-bold text-[18px] text-gray-900">学新词</h3>
                    </button>

                    <!-- 复习旧词 -->
                    <button id="btnOld" onclick="startPassing('old', '复习旧词')" class="bg-white rounded-[24px] p-6 shadow-app-card flex flex-col items-center justify-center text-center active:scale-95 transition-all relative group h-[120px]">
                        <div id="lockOld" class="absolute inset-0 bg-white/70 backdrop-blur-[2px] flex flex-col items-center justify-center z-10 hidden rounded-[24px] transition-opacity">
                            <i class="ph-fill ph-lock-key text-gray-400 text-[28px] mb-1"></i>
                            <span class="text-[12px] text-gray-600 font-bold bg-white px-2 py-0.5 rounded shadow-sm">已被关卡锁定</span>
                        </div>
                        <div class="w-12 h-12 bg-green-50 rounded-2xl flex items-center justify-center mb-2 group-hover:bg-green-600 transition-colors">
                            <i class="ph-bold ph-clock-counter-clockwise text-green-600 text-[24px] group-hover:text-white transition-colors"></i>
                        </div>
                        <h3 class="font-bold text-[18px] text-gray-900">复习旧词</h3>
                    </button>
                </div>

                <!-- 层级 2: 生词本 (内嵌查看列表) -->
                <div class="bg-white rounded-[24px] shadow-app-card p-5 flex flex-col h-[280px]">
                    <div class="flex justify-between items-center mb-3 shrink-0">
                        <h3 class="font-bold text-[18px] text-gray-900 flex items-center gap-2">
                            <i class="ph-bold ph-notebook text-yellow-500 text-[20px]"></i> 个人生词本
                        </h3>
                        <!-- 进度提示徽章 -->
                        <div id="vocabProgressBadge" class="text-[12px] text-red-600 bg-red-50 px-2 py-1 rounded-md border border-red-100 font-medium flex items-center gap-1">
                            <span class="font-bold">0</span>/10 待生成关卡
                        </div>
                    </div>
                    <div id="inlineVocabList" class="flex-1 overflow-y-auto hide-scrollbar flex flex-col gap-2">
                        <!-- JS 动态渲染内部列表 -->
                    </div>
                </div>

            </div>

            <!-- 右半部分：老师任务 (绝对独立的通道) -->
            <div class="flex flex-col gap-5">
                <div class="flex items-center justify-between px-2">
                    <h2 class="text-[24px] font-bold text-gray-900">老师任务</h2>
                    <span class="text-[12px] font-bold px-3 py-1 rounded-full bg-indigo-50 text-indigo-600 border border-indigo-100">独立通道</span>
                </div>
                
                <div class="bg-white/80 backdrop-blur-xl rounded-[24px] shadow-app-card p-4 flex-1 flex flex-col border border-white h-full max-h-[460px]">
                    <div class="px-2 pb-3 mb-2 border-b border-gray-100 flex items-center gap-2">
                        <i class="ph-fill ph-info text-gray-400"></i>
                        <span class="text-[12px] text-gray-500">此区任务不与左侧产生互斥，可随时执行。</span>
                    </div>

                    <!-- 任务列表 -->
                    <div id="assignedTaskContainer" class="flex flex-col gap-3 overflow-y-auto hide-scrollbar pb-2">
                        <!-- JS 动态插入任务卡片 -->
                    </div>

                    <!-- 空状态 -->
                    <div id="noAssignedTaskBox" class="flex flex-col items-center justify-center flex-1 text-center opacity-60 min-h-[200px]">
                        <i class="ph-fill ph-coffee text-[48px] text-gray-300 mb-3"></i>
                        <p class="text-[16px] font-bold text-gray-500 mb-1">暂无老师派发任务</p>
                    </div>
                </div>
            </div>

        </div>
    </div>


    <!-- ================= 视图 2：记词/过词界面 ================= -->
    <div id="view-passing" class="view-section flex-col w-full h-full p-4 bg-gray-50 relative overflow-hidden">
        <div class="flex items-center justify-between mb-4 shrink-0 bg-white p-4 rounded-[20px] shadow-sm">
            <button onclick="switchView('view-dashboard')" class="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center active:scale-90 transition-transform text-slate-700">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="mr-0.5">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <h2 class="font-bold text-[24px] text-gray-900" id="passingTitle">判断是否认识</h2>
            <div class="w-12"></div>
        </div>

        <div class="flex-1 min-h-0 flex flex-col bg-white rounded-[24px] shadow-app-card relative overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50 shrink-0">
                <span class="text-[16px] text-gray-500 font-medium">共 <span id="totalPassCount">10</span> 词</span>
                <div class="flex items-center gap-4 text-[16px] font-bold">
                    <div class="flex items-center gap-2 text-gray-700"><div class="w-3 h-3 rounded-full bg-[#10B981]"></div>认识: <span id="statKnown">0</span></div>
                    <div class="flex items-center gap-2 text-gray-700"><div class="w-3 h-3 rounded-full bg-[#EF4444]"></div>不认识: <span id="statUnknown">0</span></div>
                </div>
            </div>

            <div id="wordListContainer" class="flex-1 min-h-0 overflow-y-auto px-4 py-4 flex flex-col gap-3 pb-28 hide-scrollbar">
                <!-- 动态插入单词列表 -->
            </div>

            <div class="absolute bottom-0 left-0 w-full bg-white border-t border-gray-100 px-6 py-4 flex justify-between items-center z-10 shadow-app-floating shrink-0">
                <div class="flex items-center gap-2 text-[#F97316] text-[18px] font-medium cursor-pointer active:opacity-70 transition-all" onclick="scrollToFirstUnanswered()">
                    <i class="ph-fill ph-warning-circle text-[24px]"></i>
                    <span>剩余待完成：<span id="statRemaining" class="text-[24px] font-extrabold px-1">10</span> 题</span>
                    <i class="ph-bold ph-caret-right text-[18px] ml-0.5"></i>
                </div>
                <button id="submitLevelBtn" onclick="submitPassResults()" class="bg-[#F1F5F9] text-[#94A3B8] font-bold py-3.5 px-10 text-[18px] rounded-[16px] transition-all cursor-not-allowed">
                    提 交
                </button>
            </div>
        </div>
    </div>


    <!-- Javascript 逻辑控制 -->
    <script>
        // ================= 原生弹窗工具 =================
        function showModal(title, msg, onConfirm = null) {
            const titleEl = document.getElementById('modal-title');
            const msgEl = document.getElementById('modal-msg');
            const modal = document.getElementById('native-modal');
            const btn = document.getElementById('modal-btn');
            
            if(titleEl) titleEl.innerText = title;
            if(msgEl) msgEl.innerText = msg;
            
            if (modal) {
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                setTimeout(() => modal.classList.replace('opacity-0', 'opacity-100'), 10);
            }
            if (btn) {
                btn.onclick = () => {
                    if (modal) modal.classList.replace('opacity-100', 'opacity-0');
                    setTimeout(() => {
                        if (modal) {
                            modal.classList.add('hidden');
                            modal.classList.remove('flex');
                        }
                        if (onConfirm) onConfirm();
                    }, 300);
                };
            }
        }

        // ================= 全局状态与数据模拟 =================
        const dataStore = {
            stats: { totalPlanned: 3000, totalLearned: 1250, todayLearned: 120, yesterdayLearned: 85 }
        };

        const rawWordsData = [
            { word: "dilemma", phonetic: "/dɪˈlemə/", meaning: "进退两难的困境" },
            { word: "ambitious", phonetic: "/æmˈbɪʃəs/", meaning: "有野心的" },
            { word: "extraordinary", phonetic: "/ɪkˈstrɔːrdəneri/", meaning: "非凡的" },
            { word: "phenomenon", phonetic: "/fəˈnɑːmɪnən/", meaning: "现象，杰出的人" },
            { word: "vulnerable", phonetic: "/ˈvʌlnərəbl/", meaning: "脆弱的，易受伤害的" },
            { word: "anonymous", phonetic: "/əˈnɑːnɪməs/", meaning: "匿名的，无名的" },
            { word: "symptom", phonetic: "/ˈsɪmptəm/", meaning: "症状，征兆" },
            { word: "evaluate", phonetic: "/ɪˈvæljueɪt/", meaning: "评估，评价" },
            { word: "comprehend", phonetic: "/ˌkɑːmprɪˈhend/", meaning: "理解，领悟" },
            { word: "innovative", phonetic: "/ˈɪnəveɪtɪv/", meaning: "创新的，革新的" }
        ];

        let testWords = []; 
        let TOTAL_WORDS = 0;
        
        // 核心状态机
        const state = {
            activeLevel: null, // 算法关卡阻塞器
            vocabBook: [ // 预置2个单词，为了在首页默认展示出效果
                { word: "dilemma", phonetic: "/dɪˈlemə/", meaning: "进退两难的困境" },
                { word: "phenomenon", phonetic: "/fəˈnɑːmɪnən/", meaning: "现象，杰出的人" }
            ], 
            passingStats: { known: 0, unknown: 0, remaining: 0, answered: 0 },
            currentActionType: '', 
            currentTaskId: null,
            assignedTasks: [] 
        };

        const VOCAB_THRESHOLD = 10; // 当生词本达到 10 个时，触发关卡

        function initData(count = 10) {
            const uniqueMap = new Map();
            rawWordsData.forEach(item => uniqueMap.set(item.word, item));
            const uniqueWords = Array.from(uniqueMap.values()).slice(0, count);
            TOTAL_WORDS = uniqueWords.length;
            testWords = uniqueWords.map((item, index) => ({ 
                id: index, word: item.word, phonetic: item.phonetic, meaning: item.meaning, status: null 
            }));
        }

        // ================= 视图流转 =================
        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            const targetView = document.getElementById(viewId);
            if (targetView) targetView.classList.add('active');
            if(viewId === 'view-dashboard') renderDashboardUI();
        }

        function toggleTeacherTasks() {
            if (state.assignedTasks.length > 0) {
                state.assignedTasks = [];
                showModal('老师任务更新', '模拟：已清空所有老师指派的任务。', renderDashboardUI);
            } else {
                state.assignedTasks = [
                    { id: 101, title: "高二核心易错词冲刺", count: 10 },
                    { id: 102, title: "开学摸底检测包", count: 15 }
                ];
                showModal('老师任务更新', '模拟：已下发 2 个老师任务！\n注意：此任务位于右侧独立面板，它绝不会被左侧的生词关卡锁定，也不参与生成生词卡点。', renderDashboardUI);
            }
        }

        // 渲染首页内嵌的只读生词本列表 (英文 -> 中文 -> 音标 左对齐)
        function renderVocabBookInline() {
            const container = document.getElementById('inlineVocabList');
            const badge = document.getElementById('vocabProgressBadge');
            if (!container) return;
            container.innerHTML = '';
            
            const currentCount = state.vocabBook.length;
            
            // 更新进度徽章
            if (badge) {
                badge.innerHTML = `<span class="text-red-600 font-bold">${currentCount}</span>/${VOCAB_THRESHOLD} 待生成关卡`;
            }

            if (currentCount === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-center opacity-50 m-auto py-6">
                        <i class="ph-fill ph-check-circle text-[32px] text-gray-300 mb-2"></i>
                        <p class="text-[14px] font-bold text-gray-500">生词本空空如也</p>
                    </div>`;
            } else {
                // 倒序展示，最新的排在最前
                [...state.vocabBook].reverse().forEach(item => {
                    container.innerHTML += `
                        <div class="flex items-center gap-2 p-3 bg-white rounded-xl border border-gray-100 shadow-sm shrink-0 hover:bg-gray-50 transition-colors overflow-hidden">
                            <span class="font-extrabold text-[16px] text-gray-900 shrink-0">${item.word}</span>
                            <span class="text-[13px] text-gray-600 shrink-0">${item.meaning}</span>
                            <span class="text-[12px] text-gray-400 font-medium">${item.phonetic}</span>
                        </div>
                    `;
                });
            }
        }

        // 核心面板渲染
        function renderDashboardUI() {
            renderVocabBookInline();
            
            const hasBlocker = state.activeLevel !== null;
            const hasAssignedTask = state.assignedTasks.length > 0;

            // 1. 渲染老师任务面板
            const taskContainer = document.getElementById('assignedTaskContainer');
            const noTaskBox = document.getElementById('noAssignedTaskBox');
            if (taskContainer && noTaskBox) {
                if (hasAssignedTask) {
                    taskContainer.classList.remove('hidden');
                    noTaskBox.classList.add('hidden');
                    taskContainer.innerHTML = '';
                    state.assignedTasks.forEach(task => {
                        taskContainer.innerHTML += `
                            <button onclick="startPassing('assigned', '老师任务: ${task.title}', ${task.id}, ${task.count})" class="w-full bg-white p-4 rounded-[20px] shadow-app-card transition-all flex items-center gap-4 text-left active:scale-95 border border-indigo-50 relative overflow-hidden">
                                <div class="w-12 h-12 rounded-[16px] bg-indigo-50 flex items-center justify-center shrink-0">
                                    <i class="ph-fill ph-chalkboard-teacher text-indigo-600 text-[24px]"></i>
                                </div>
                                <div class="flex-1 overflow-hidden">
                                    <h3 class="font-bold text-[16px] text-gray-900 truncate mb-1">${task.title}</h3>
                                    <p class="text-[12px] text-gray-500 font-medium">指定必修 · ${task.count} 词</p>
                                </div>
                                <div class="w-8 h-8 rounded-full bg-indigo-50 flex items-center justify-center text-indigo-600 shrink-0">
                                    <i class="ph-bold ph-play text-[14px]"></i>
                                </div>
                            </button>
                        `;
                    });
                } else {
                    taskContainer.classList.add('hidden');
                    noTaskBox.classList.remove('hidden');
                }
            }

            // 2. 更新中部的锁定状态
            const btnNew = document.getElementById('btnNew');
            const btnOld = document.getElementById('btnOld');
            const lockNew = document.getElementById('lockNew');
            const lockOld = document.getElementById('lockOld');
            
            // 3. 更新顶部的任务进度中枢
            const hubIdleState = document.getElementById('hubIdleState');
            const hubActiveState = document.getElementById('hubActiveState');
            const hubStepsContainer = document.getElementById('hubStepsContainer');
            const hubLevelTitle = document.getElementById('hubLevelTitle');
            const hubLevelCount = document.getElementById('hubLevelCount');

            if (hasBlocker) {
                // 有阻断：锁定下方新旧词按钮
                if(btnNew) btnNew.classList.add('pointer-events-none');
                if(btnOld) btnOld.classList.add('pointer-events-none');
                if(lockNew) lockNew.classList.remove('hidden');
                if(lockOld) lockOld.classList.remove('hidden');

                // 切换顶部中枢：隐藏闲置状态，展示警示白底红框状态
                if(hubIdleState) {
                    hubIdleState.classList.add('hidden');
                    hubIdleState.classList.remove('flex');
                }
                if(hubActiveState) {
                    hubActiveState.classList.remove('hidden');
                    hubActiveState.classList.add('flex');
                }
                
                // 填充顶部中枢数据
                if(hubLevelTitle) hubLevelTitle.innerText = state.activeLevel.title;
                if(hubLevelCount) hubLevelCount.innerText = state.activeLevel.wordCount;

                // 绘制顶部中枢的微缩链条进度 (浅色适配版)
                if(hubStepsContainer) {
                    let stepsHtml = '';
                    state.activeLevel.steps.forEach((step, idx) => {
                        const isDone = step.current >= step.target;
                        const isCurrent = !isDone && (idx === 0 || state.activeLevel.steps[idx-1].current >= state.activeLevel.steps[idx-1].target);
                        
                        let icon = '';
                        let textClass = '';
                        let borderClass = '';

                        if (isDone) {
                            icon = '<i class="ph-bold ph-check-circle text-green-500 text-[18px]"></i>';
                            textClass = 'text-green-600';
                            borderClass = 'border-green-100 bg-green-50';
                        } else if (isCurrent) {
                            icon = '<i class="ph-bold ph-hourglass-high text-white text-[18px] animate-pulse"></i>';
                            textClass = 'text-white font-bold';
                            borderClass = 'border-blue-500 bg-blue-500 shadow-md';
                        } else {
                            icon = '<i class="ph-fill ph-lock-key text-gray-400 text-[18px]"></i>';
                            textClass = 'text-gray-400';
                            borderClass = 'border-gray-200 bg-gray-50';
                        }

                        stepsHtml += `
                            <div class="flex items-center gap-2 px-3 py-2 rounded-xl border ${borderClass} transition-colors">
                                ${icon}
                                <div class="flex flex-col">
                                    <span class="text-[12px] leading-tight ${textClass}">${step.name}</span>
                                    <span class="text-[10px] leading-tight opacity-80 ${textClass}">${step.current}/${step.target}</span>
                                </div>
                            </div>
                        `;

                        // 箭头
                        if (idx < state.activeLevel.steps.length - 1) {
                            stepsHtml += `<i class="ph-bold ph-arrow-right text-gray-300"></i>`;
                        }
                    });
                    hubStepsContainer.innerHTML = stepsHtml;
                }
            } else {
                // 无阻断：恢复下方按钮自由
                if(btnNew) btnNew.classList.remove('pointer-events-none');
                if(btnOld) btnOld.classList.remove('pointer-events-none');
                if(lockNew) lockNew.classList.add('hidden');
                if(lockOld) lockOld.classList.add('hidden');

                // 切换顶部中枢：恢复闲置看板
                if(hubIdleState) {
                    hubIdleState.classList.remove('hidden');
                    hubIdleState.classList.add('flex');
                }
                if(hubActiveState) {
                    hubActiveState.classList.add('hidden');
                    hubActiveState.classList.remove('flex');
                }
            }
        }

        // 直接模拟进度增加
        function simulateNextStep() {
            if (!state.activeLevel) return;
            const currentStep = state.activeLevel.steps.find(s => s.current < s.target);
            if (currentStep) {
                currentStep.current++;
                renderDashboardUI(); // 实时更新顶部中枢进度
                
                // 检查是否全部通关
                const allDone = state.activeLevel.steps.every(s => s.current >= s.target);
                if (allDone) {
                    setTimeout(() => {
                        clearActiveLevel();
                    }, 300); // 稍微延迟体验更好
                }
            }
        }

        function clearActiveLevel() {
            state.activeLevel = null;
            state.vocabBook = []; // 关卡通关后，彻底清空生词本

            showModal('关卡完美攻克', '恭喜！您已成功按严格顺序完成全套深加工任务。\n算法区的锁定已解除，生词本已清空，您可以继续探索新词了。', () => {
                renderDashboardUI();
            });
        }

        // ================= 记词模块交互 =================
        function startPassing(typeKey, typeName, taskId = null, wordCount = 10) {
            // 如果算法有阻塞，只有老师通道 (assigned) 允许进入
            if(state.activeLevel !== null && typeKey !== 'assigned') return; 
            
            initData(wordCount);
            state.currentActionType = typeKey;
            state.currentTaskId = taskId;
            state.passingStats = { known: 0, unknown: 0, remaining: TOTAL_WORDS, answered: 0 };
            state._tempUnknowns = []; 
            
            const titleEl = document.getElementById('passingTitle');
            if (titleEl) titleEl.innerText = typeName;
            
            const totalEl = document.getElementById('totalPassCount');
            if (totalEl) totalEl.innerText = TOTAL_WORDS;
            
            renderWordList();
            updatePassingStats();
            switchView('view-passing');
        }

        function renderWordList() {
            const container = document.getElementById('wordListContainer');
            if(!container) return;
            container.innerHTML = '';
            
            testWords.forEach((item, index) => {
                const isAnswered = item.status !== null;
                const div = document.createElement('div');
                div.id = `word-row-${item.id}`;
                div.className = `flex justify-between items-center p-4 rounded-[16px] border border-gray-100 shadow-sm bg-white transition-colors duration-300`;
                
                div.innerHTML = `
                    <div class="flex items-center gap-4 flex-1 overflow-hidden pr-3">
                        <span id="word-text-${item.id}" class="font-extrabold text-gray-900 text-[20px] tracking-wide shrink-0 max-w-[45%] truncate">${item.word}</span>
                        <span id="word-desc-${item.id}" class="text-[16px] text-gray-400 truncate flex items-center gap-2">
                            ${item.meaning} <span class="font-normal text-gray-300 text-[14px]">${item.phonetic}</span>
                        </span>
                    </div>
                    <div class="flex gap-2 shrink-0">
                        <button id="btn-x-${item.id}" onclick="judgeWord(${item.id}, 'unknown')" class="judge-btn w-[72px] h-[44px] rounded-[12px] bg-[#F1F5F9] text-gray-400 flex items-center justify-center text-[20px] active:scale-90 transition-all"><i class="ph-bold ph-x"></i></button>
                        <button id="btn-c-${item.id}" onclick="judgeWord(${item.id}, 'known')" class="judge-btn w-[72px] h-[44px] rounded-[12px] bg-[#F1F5F9] text-gray-400 flex items-center justify-center text-[20px] active:scale-90 transition-all"><i class="ph-bold ph-check"></i></button>
                    </div>`;
                container.appendChild(div);
            });
        }

        function scrollToFirstUnanswered() {
            const firstUnanswered = testWords.find(w => w.status === null);
            if (!firstUnanswered) return;

            const rowElement = document.getElementById(`word-row-${firstUnanswered.id}`);
            if (rowElement) {
                rowElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                rowElement.classList.add('bg-[#FFF7ED]', 'border-[#F97316]');
                rowElement.classList.remove('bg-white', 'border-gray-100', 'shadow-sm');
                
                setTimeout(() => {
                    const currentWord = testWords.find(w => w.id === firstUnanswered.id);
                    if (rowElement) rowElement.classList.remove('bg-[#FFF7ED]', 'border-[#F97316]');
                    if (currentWord && currentWord.status === null && rowElement) {
                        rowElement.classList.add('bg-white', 'border-gray-100', 'shadow-sm');
                    }
                }, 1000);
            }
        }

        function judgeWord(id, result) {
            const wordObj = testWords.find(w => w.id === id);
            if (!wordObj || wordObj.status !== null) return;
            wordObj.status = result;
            
            if (result === 'unknown') {
                if (!state._tempUnknowns.includes(wordObj)) {
                    state._tempUnknowns.push(wordObj);
                }
                state.passingStats.unknown++;
            } else {
                state.passingStats.known++;
            }
            state.passingStats.answered++;
            state.passingStats.remaining = TOTAL_WORDS - state.passingStats.answered;

            const row = document.getElementById(`word-row-${id}`);
            const btnX = document.getElementById(`btn-x-${id}`);
            const btnC = document.getElementById(`btn-c-${id}`);
            const wordSpan = document.getElementById(`word-text-${id}`);
            const wordDesc = document.getElementById(`word-desc-${id}`);

            if (row && btnX && btnC) {
                row.className = `flex justify-between items-center p-4 rounded-[16px] border transition-colors duration-300`;
                btnX.className = `judge-btn w-[72px] h-[44px] rounded-[12px] flex items-center justify-center text-[20px] transition-all`;
                btnC.className = `judge-btn w-[72px] h-[44px] rounded-[12px] flex items-center justify-center text-[20px] transition-all`;

                if (result === 'unknown') {
                    row.classList.add('bg-[#FEF2F2]', 'border-[#FECACA]');
                    btnX.classList.add('bg-[#EF4444]', 'text-white', 'shadow-sm');
                    btnC.classList.add('bg-gray-50', 'text-gray-300', 'pointer-events-none');
                } else {
                    row.classList.add('bg-[#F0FDF4]', 'border-[#BBF7D0]');
                    btnC.classList.add('bg-[#10B981]', 'text-white', 'shadow-sm');
                    btnX.classList.add('bg-gray-50', 'text-gray-300', 'pointer-events-none');
                }
            }

            if(wordSpan) wordSpan.classList.add('text-gray-400');
            if(wordDesc) wordDesc.classList.add('opacity-60');

            updatePassingStats();
        }

        function updatePassingStats() {
            const elKnown = document.getElementById('statKnown');
            if (elKnown) elKnown.innerText = state.passingStats.known;
            const elUnknown = document.getElementById('statUnknown');
            if (elUnknown) elUnknown.innerText = state.passingStats.unknown;
            const elRemaining = document.getElementById('statRemaining');
            if (elRemaining) elRemaining.innerText = state.passingStats.remaining;

            const submitBtn = document.getElementById('submitLevelBtn');
            if (submitBtn) {
                if (state.passingStats.remaining === 0) {
                    submitBtn.className = 'bg-blue-600 text-white font-bold py-3.5 px-10 text-[18px] rounded-[16px] shadow-lg shadow-blue-500/30 active:scale-95 transition-all';
                    submitBtn.disabled = false;
                } else {
                    submitBtn.className = 'bg-[#F1F5F9] text-[#94A3B8] font-bold py-3.5 px-10 text-[18px] rounded-[16px] transition-all cursor-not-allowed';
                    submitBtn.disabled = true;
                }
            }
        }

        function submitPassResults() {
            if (state.passingStats.remaining > 0) return;
            
            // 老师指定任务独立闭环
            if (state.currentActionType === 'assigned') {
                if (state.currentTaskId !== null) {
                    state.assignedTasks = state.assignedTasks.filter(t => t.id !== state.currentTaskId);
                    state.currentTaskId = null;
                }
                showModal('任务提交', `指定老师任务已顺利完成，数据已上传。\n共 ${TOTAL_WORDS} 词。`, () => switchView('view-dashboard'));
                return;
            }

            // 算法路线处理：汇集生词并判断是否生成关卡
            if (state._tempUnknowns.length > 0) {
                // 将本次不认识的词合并进全局生词本
                state._tempUnknowns.forEach(w => {
                    if(!state.vocabBook.find(ex => ex.word === w.word)) {
                        state.vocabBook.push(w);
                    }
                });

                // 【检查是否触发关卡】
                if (state.vocabBook.length >= VOCAB_THRESHOLD) {
                    state.activeLevel = { 
                        title: '生词深加工关卡', 
                        wordCount: state.vocabBook.length, 
                        words: [...state.vocabBook],
                        steps: [
                            { id: 'read', name: '跟读', target: 2, current: 0 },
                            { id: 'memo', name: '音记', target: 2, current: 0 },
                            { id: 'dict', name: '听写', target: 1, current: 0 }
                        ]
                    };
                    showModal('生词数量达标', `生词本已积攒了 ${state.vocabBook.length} 个盲点词汇！\n系统已自动为您触发了深加工关卡，在攻克之前，您将无法继续学习新词。`, () => switchView('view-dashboard'));
                } else {
                    showModal('生词已收集', `本次打卡发现了 ${state._tempUnknowns.length} 个不认识的词汇，已收录进生词本。\n当前进度：${state.vocabBook.length}/${VOCAB_THRESHOLD}，集满将触发强制关卡！`, () => switchView('view-dashboard'));
                }
                return;
            }
            
            showModal('完美掌握', `本批次单词您全部认识，记忆曲线已更新！\n本次未产生生词。`, () => switchView('view-dashboard'));
        }

        // 初始化拉起
        renderDashboardUI();

    </script>
</body>
</html>
