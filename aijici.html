<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 记词 - 极致原生体验</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #EFF6FF 0%, #DFE7FF 100%);
            background-attachment: fixed;
            color: #1f2937;
            overflow: hidden; 
            overscroll-behavior-y: none;
        }

        .bg-brand { background-color: #1F5FFF; }
        .text-brand { color: #1F5FFF; }
        .border-brand { border-color: #1F5FFF; }
        .hover-bg-brand:hover { background-color: #004ce6; }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .view-section { display: none; opacity: 0; transition: opacity 0.2s ease-in-out; }
        .view-section.active { display: flex; opacity: 1; }

        .shadow-premium {
            box-shadow: 0 4px 20px -4px rgba(0, 0, 0, 0.03), 0 2px 8px -2px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.9);
        }

        .modal-enter { animation: modalFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .judge-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }

        @keyframes pulse-red-light {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.15); }
            50% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
        }
        .pulse-alert-light { animation: pulse-red-light 2s infinite; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- ================= 全局原生弹窗 ================= -->
    <div id="native-modal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-gray-900/40 backdrop-blur-sm transition-opacity duration-300 opacity-0">
        <div class="bg-white rounded-[24px] p-7 w-[90%] max-w-sm shadow-2xl flex flex-col modal-enter" id="native-modal-content">
            <h3 id="modal-title" class="text-[20px] font-bold text-gray-900 mb-2">提示</h3>
            <p id="modal-msg" class="text-[14px] text-gray-600 mb-6 leading-relaxed whitespace-pre-wrap"></p>
            <button id="modal-btn" class="w-full bg-brand hover-bg-brand text-white font-bold text-[15px] py-3.5 rounded-[16px] shadow-sm active:scale-95 transition-all">
                我知道了
            </button>
        </div>
    </div>


    <!-- ================= 视图 1：主界面 (仪表盘) ================= -->
    <div id="view-dashboard" class="view-section active flex-col w-full h-full max-w-[1300px] mx-auto p-4 md:p-5 overflow-hidden gap-5">
        
        <!-- Header -->
        <header class="flex justify-between items-center shrink-0">
            <div class="flex items-center gap-4">
                <button class="w-10 h-10 bg-white rounded-[14px] flex items-center justify-center shadow-premium active:scale-90 transition-transform text-slate-700 cursor-pointer" onclick="showModal('返回提示', '学习可随时退出，此处将返回上一级页面。')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="mr-0.5">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <h1 class="text-[32px] font-extrabold text-gray-900 tracking-tight leading-none">
                    AI 记词
                </h1>
            </div>
            <button onclick="toggleTeacherTasks()" class="bg-white text-brand border border-blue-100 px-3.5 py-2 rounded-[10px] font-bold text-[13px] shadow-sm active:scale-95 transition-transform flex items-center gap-1.5">
                <i class="ph-bold ph-gear text-[16px]"></i> 模拟下发任务
            </button>
        </header>

        <!-- 1. 顶部：极简全融合看板 -->
        <div class="bg-white/90 backdrop-blur-xl rounded-[24px] shadow-premium p-5 md:p-6 shrink-0 relative overflow-hidden flex flex-col md:flex-row items-center justify-between gap-6 md:gap-8">
            <div class="absolute right-0 top-0 w-80 h-80 bg-blue-50/50 rounded-full blur-3xl -z-10 translate-x-1/2 -translate-y-1/2"></div>
            
            <!-- 左侧：总进度 -->
            <div class="flex-1 w-full relative z-10 pr-0 md:pr-8 border-b border-gray-100 md:border-b-0 md:border-r pb-4 md:pb-0">
                <div class="flex justify-between items-end mb-3">
                    <div class="flex items-center gap-1.5 text-[15px] text-gray-500 font-bold mb-1">
                        <i class="ph-fill ph-flag-checkered text-brand text-[18px]"></i> 词汇掌握总进度
                    </div>
                    <div class="flex items-baseline gap-1">
                        <span class="text-[36px] font-extrabold text-gray-900 leading-none tracking-tight" id="statTotalLearned">1,280</span>
                        <span class="text-[14px] text-gray-400 font-bold ml-0.5">/ <span id="statTotalPlanned">3,000</span></span>
                    </div>
                </div>
                <div class="w-full h-2.5 bg-gray-100 rounded-[6px] overflow-hidden shadow-inner">
                    <div class="h-full bg-brand rounded-[6px] transition-all duration-500" id="statTotalProgress" style="width: 42%;"></div>
                </div>
            </div>

            <!-- 右侧：今日新记 (完美还原设计图的绿色风格) -->
            <div class="w-full md:w-auto relative z-10 shrink-0">
                <div class="bg-[#F0FDF4] border border-[#DCFCE7] rounded-[16px] px-5 py-3 flex flex-col justify-center shadow-sm relative overflow-hidden group min-w-[160px]">
                    <i class="ph-fill ph-drop absolute -right-3 -bottom-4 text-[72px] text-[#22C55E]/10 group-hover:scale-110 transition-transform duration-300"></i>
                    
                    <div class="text-[13px] text-[#15803D] font-bold mb-1 flex items-center gap-1.5 z-10">
                        今日新记成就 <i class="ph-fill ph-fire text-[#22C55E] text-[15px]"></i>
                    </div>
                    <div class="flex items-baseline gap-1 z-10">
                        <span class="text-[36px] font-extrabold text-[#16A34A] leading-none tracking-tight" id="statTodayLearned">120</span>
                        <span class="text-[13px] text-gray-400 font-bold ml-0.5 mb-1">词</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 2. 中下部主体：左侧生词本 vs 右侧AI中枢 (左右位置置换) -->
        <div class="flex-1 min-h-0 grid grid-cols-1 lg:grid-cols-[1fr_1.6fr] gap-5 md:gap-6">
            
            <!-- 【左侧】：生词本 (黄底细框记事本拟物化) -->
            <div class="bg-[#FFFDF8] rounded-[24px] shadow-premium flex flex-col h-full min-h-0 border border-[#FDE68A] relative overflow-hidden p-4">
                <div class="flex items-center justify-between mb-3 shrink-0 px-1">
                    <h2 class="text-[18px] font-bold text-gray-800 flex items-center gap-1.5">
                        生词本
                    </h2>
                    <div id="vocabProgressBadge" class="text-[11px] text-red-500 bg-red-50 px-2 py-0.5 rounded-[6px] border border-red-200 font-bold tracking-wide">
                        收集进度: <span class="font-extrabold">0/10</span>
                    </div>
                </div>
                
                <div class="flex-1 min-h-0 flex flex-col relative z-10">
                    <div id="inlineVocabList" class="flex-1 overflow-y-auto hide-scrollbar flex flex-col gap-2">
                        <!-- JS 动态渲染内部列表 -->
                    </div>
                </div>
            </div>

            <!-- 【右侧】：全融合无界 AI 学习中枢 -->
            <div class="bg-white rounded-[24px] shadow-premium p-4 md:p-5 flex flex-col gap-4 h-full min-h-0 relative">
                
                <!-- 【第一层】置顶横向：关卡引擎 -->
                <div class="bg-gray-50/60 rounded-[16px] border border-gray-100 p-3 shrink-0 relative overflow-hidden min-h-[80px] flex flex-col justify-center">
                    
                    <!-- 闲置状态 (居中) -->
                    <div id="hubIdleState" class="absolute inset-0 flex flex-row items-center justify-center gap-2.5 opacity-50 pointer-events-none">
                        <i class="ph-bold ph-check-circle text-[22px] text-gray-400"></i>
                        <span class="text-[14px] font-bold text-gray-500">关卡引擎畅通，暂无生词阻断</span>
                    </div>

                    <!-- 激活状态 (纯净红底实心框，横向贯穿排版) -->
                    <div id="hubActiveState" class="hidden absolute inset-0 bg-[#FFF5F5] border-[2px] border-[#FECACA] flex-row items-center justify-between p-3 z-20 pulse-alert-light rounded-[16px] gap-3">
                        <div class="flex flex-col shrink-0">
                            <h3 class="font-extrabold text-[15px] text-red-600 flex items-center gap-1"><i class="ph-fill ph-warning-circle"></i> 阻断关卡</h3>
                            <span class="text-[10px] font-bold text-red-500 mt-1">待消灭 <span id="hubLevelCount" class="text-[12px]">0</span> 词</span>
                        </div>
                        
                        <!-- 横向流程图容器 -->
                        <div class="flex-1 flex flex-row items-center justify-center gap-1 md:gap-2 overflow-hidden px-2" id="hubStepsContainer">
                            <!-- 由 JS 动态渲染横向节点 -->
                        </div>
                        
                        <button onclick="triggerLevelEntry()" class="shrink-0 bg-red-500 hover:bg-red-600 text-white font-bold py-2.5 px-4 rounded-[12px] shadow-sm active:scale-95 transition-all text-[13px] flex items-center justify-center gap-1.5">
                            攻坚解锁 <i class="ph-bold ph-arrow-right"></i>
                        </button>
                    </div>
                </div>

                <!-- 【第二层】中间引擎区：学新词 & 复习旧词 (高度压缩至90px，去除多余遮罩) -->
                <div class="grid grid-cols-2 gap-4 h-[90px] shrink-0">
                    <button id="btnNew" onclick="startPassing('new', '学习新词')" class="bg-gradient-to-br from-[#4F84FF] to-[#1F5FFF] rounded-[16px] shadow-[0_6px_20px_rgba(31,95,255,0.25)] flex flex-col items-center justify-center text-center active:scale-95 transition-all relative group overflow-hidden h-full">
                        <div class="absolute top-0 left-0 w-32 h-32 bg-white/20 rounded-full blur-3xl -translate-x-1/3 -translate-y-1/3 pointer-events-none transition-transform group-hover:scale-110"></div>
                        
                        <div class="absolute top-2.5 right-2.5 bg-white/20 backdrop-blur-md text-white text-[11px] font-bold px-2 py-0.5 rounded-[6px] border border-white/20 transition-opacity" id="badgeNew">
                            剩 <span id="badgeUnlearnedCount">1720</span> 词
                        </div>
                        
                        <div id="lockNew" class="absolute inset-0 bg-white/95 backdrop-blur-[4px] flex flex-col items-center justify-center z-10 hidden transition-opacity">
                            <i class="ph-fill ph-lock-key text-gray-400 text-[24px] mb-1"></i>
                            <span class="text-[11px] text-gray-600 font-bold bg-gray-100 px-2.5 py-0.5 rounded-[6px]">请通关后继续</span>
                        </div>
                        
                        <i class="ph-bold ph-rocket-launch text-white text-[28px] mb-1 group-hover:-translate-y-1 transition-transform duration-300 relative z-0"></i>
                        <h3 class="font-bold text-[14px] text-white relative z-0">学习新词</h3>
                    </button>

                    <button id="btnOld" onclick="startPassing('old', '复习旧词')" class="bg-gradient-to-br from-[#34D399] to-[#059669] rounded-[16px] shadow-[0_6px_20px_rgba(16,185,129,0.25)] flex flex-col items-center justify-center text-center active:scale-95 transition-all relative group overflow-hidden h-full">
                        <div class="absolute top-0 left-0 w-32 h-32 bg-white/20 rounded-full blur-3xl -translate-x-1/3 -translate-y-1/3 pointer-events-none transition-transform group-hover:scale-110"></div>
                        
                        <div id="lockOld" class="absolute inset-0 bg-white/95 backdrop-blur-[4px] flex flex-col items-center justify-center z-10 hidden transition-opacity">
                            <i class="ph-fill ph-lock-key text-gray-400 text-[24px] mb-1"></i>
                            <span class="text-[11px] text-gray-600 font-bold bg-gray-100 px-2.5 py-0.5 rounded-[6px]">请通关后继续</span>
                        </div>
                        
                        <i class="ph-bold ph-arrows-clockwise text-white text-[28px] mb-1 group-hover:-rotate-45 transition-transform duration-300 relative z-0"></i>
                        <h3 class="font-bold text-[14px] text-white relative z-0">复习旧词</h3>
                    </button>
                </div>

                <!-- 【第三层】置底横向：特训任务池 (自适应贴底填充，内部顶部对齐) -->
                <div class="bg-gray-50/60 rounded-[16px] border border-gray-100 p-3 flex-1 flex flex-col relative overflow-hidden min-h-0">
                    <div class="flex items-center gap-1.5 mb-2 px-1 shrink-0 text-slate-700">
                        <i class="ph-fill ph-chalkboard-teacher text-indigo-500 text-[16px]"></i>
                        <span class="text-[14px] font-bold">特训任务</span>
                    </div>
                    
                    <!-- 任务列表容器 (横向滚动、顶部对齐，去除垂直居中) -->
                    <div id="assignedTaskContainer" class="w-full overflow-x-auto hide-scrollbar flex flex-row gap-3 pb-1 snap-x snap-mandatory items-start">
                        <!-- JS 动态横向插入 -->
                    </div>
                    
                    <div id="noAssignedTaskBox" class="absolute inset-0 flex flex-col items-center justify-center text-center opacity-50 pointer-events-none pt-6">
                        <i class="ph-fill ph-coffee text-[32px] text-gray-400 mb-1"></i>
                        <p class="text-[12px] font-bold text-gray-500 mt-1">暂未发布重点任务</p>
                    </div>
                </div>

            </div>

        </div>
    </div>


    <!-- ================= 视图 2：记词/过词界面 ================= -->
    <div id="view-passing" class="view-section flex-col w-full h-full p-4 md:p-6 bg-[#F4F7F9] relative overflow-hidden max-w-[800px] mx-auto">
        <div class="flex items-center justify-between mb-5 shrink-0 bg-white p-3 md:p-4 rounded-[20px] shadow-premium">
            <button onclick="switchView('view-dashboard')" class="w-10 h-10 bg-gray-50 rounded-[14px] flex items-center justify-center active:scale-90 transition-transform text-slate-700">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="mr-0.5">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <h2 class="font-bold text-[20px] text-gray-900" id="passingTitle">判断是否认识</h2>
            <div class="w-10"></div>
        </div>

        <div class="flex-1 min-h-0 flex flex-col bg-white rounded-[24px] shadow-premium relative overflow-hidden">
            <div class="px-5 py-3 border-b border-gray-100 flex justify-between items-center bg-gray-50/50 shrink-0">
                <span class="text-[13px] text-gray-500 font-medium">共 <span id="totalPassCount">10</span> 词</span>
                <div class="flex items-center gap-3 text-[13px] font-bold">
                    <div class="flex items-center gap-1.5 text-gray-700"><div class="w-2.5 h-2.5 rounded-[4px] bg-[#10B981]"></div>认识: <span id="statKnown">0</span></div>
                    <div class="flex items-center gap-1.5 text-gray-700"><div class="w-2.5 h-2.5 rounded-[4px] bg-[#EF4444]"></div>不认识: <span id="statUnknown">0</span></div>
                </div>
            </div>

            <div id="wordListContainer" class="flex-1 min-h-0 overflow-y-auto px-3 py-3 flex flex-col gap-2.5 pb-24 hide-scrollbar">
                <!-- 动态插入单词列表 -->
            </div>

            <div class="absolute bottom-0 left-0 w-full bg-white border-t border-gray-100 px-5 py-3 flex justify-between items-center z-10 shadow-[0_-4px_20px_rgba(0,0,0,0.03)] shrink-0">
                <div class="flex items-center gap-1.5 text-[#F97316] text-[15px] font-medium cursor-pointer active:opacity-70 transition-all" onclick="scrollToFirstUnanswered()">
                    <i class="ph-fill ph-warning-circle text-[20px]"></i>
                    <span>剩余待完成：<span id="statRemaining" class="text-[20px] font-extrabold px-1">10</span> 题</span>
                    <i class="ph-bold ph-caret-right text-[16px] ml-0.5"></i>
                </div>
                <button id="submitLevelBtn" onclick="submitPassResults()" class="bg-[#F1F5F9] text-[#94A3B8] font-bold py-2.5 px-8 text-[15px] rounded-[12px] transition-all cursor-not-allowed">
                    提 交
                </button>
            </div>
        </div>
    </div>


    <!-- ================= 视图 3: 学习关卡 (仅直驱模拟器) ================= -->
    <div id="view-learning" class="view-section flex-col items-center justify-center w-full h-full p-4 bg-gray-900/80 backdrop-blur-md z-50 fixed inset-0">
        <div class="bg-white w-full max-w-sm rounded-[24px] shadow-2xl p-7 relative flex flex-col modal-enter items-center text-center">
            <button onclick="switchView('view-dashboard')" class="absolute top-5 right-5 text-gray-400 hover:text-gray-700 bg-gray-50 p-2 rounded-[12px] active:scale-90 transition-transform">
                <i class="ph-bold ph-x text-[16px]"></i>
            </button>

            <div class="w-14 h-14 bg-red-50 rounded-[14px] flex items-center justify-center text-red-500 mb-4 mt-2">
                <i class="ph-bold ph-fire text-[28px]"></i>
            </div>
            
            <h2 class="text-[20px] font-extrabold text-gray-900 mb-1" id="learningTitle">强制攻坚中</h2>
            <p class="text-[13px] text-gray-500 mb-6">正在执行底层关卡任务模拟</p>
            
            <div class="w-full bg-gray-50 rounded-[16px] p-3 mb-6 border border-gray-100 flex flex-col gap-2 relative" id="learningStepsContainerModal">
                <!-- 垂直时间轴由 JS 动态渲染 -->
            </div>
            
            <button id="stepActionBtn" onclick="simulateNextStep()" class="w-full py-3.5 rounded-[14px] bg-red-500 hover:bg-red-600 text-white font-bold text-[15px] shadow-sm active:scale-95 transition-all">
                点击模拟进度 +1
            </button>
        </div>
    </div>


    <!-- Javascript 逻辑控制 -->
    <script>
        function showModal(title, msg, onConfirm = null) {
            const titleEl = document.getElementById('modal-title');
            const msgEl = document.getElementById('modal-msg');
            const modal = document.getElementById('native-modal');
            const btn = document.getElementById('modal-btn');
            
            if(titleEl) titleEl.innerText = title;
            if(msgEl) msgEl.innerText = msg;
            
            if (modal) {
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                setTimeout(() => modal.classList.replace('opacity-0', 'opacity-100'), 10);
            }
            if (btn) {
                btn.onclick = () => {
                    if (modal) modal.classList.replace('opacity-100', 'opacity-0');
                    setTimeout(() => {
                        if (modal) {
                            modal.classList.add('hidden');
                            modal.classList.remove('flex');
                        }
                        if (onConfirm) onConfirm();
                    }, 300);
                };
            }
        }

        const dataStore = {
            stats: { totalPlanned: 3000, totalLearned: 1250, unlearned: 1750, todayLearned: 120 }
        };

        const rawWordsData = [
            { word: "dilemma", phonetic: "/dɪˈlemə/", meaning: "进退两难的困境" },
            { word: "ambitious", phonetic: "/æmˈbɪʃəs/", meaning: "有野心的" },
            { word: "extraordinary", phonetic: "/ɪkˈstrɔːrdəneri/", meaning: "非凡的" },
            { word: "phenomenon", phonetic: "/fəˈnɑːmɪnən/", meaning: "现象，杰出的人" },
            { word: "vulnerable", phonetic: "/ˈvʌlnərəbl/", meaning: "脆弱的，易受伤害的" },
            { word: "anonymous", phonetic: "/əˈnɑːnɪməs/", meaning: "匿名的，无名的" },
            { word: "symptom", phonetic: "/ˈsɪmptəm/", meaning: "症状，征兆" },
            { word: "evaluate", phonetic: "/ɪˈvæljueɪt/", meaning: "评估，评价" },
            { word: "comprehend", phonetic: "/ˌkɑːmprɪˈhend/", meaning: "理解，领悟" },
            { word: "innovative", phonetic: "/ˈɪnəveɪtɪv/", meaning: "创新的，革新的" }
        ];

        let testWords = []; 
        let TOTAL_WORDS = 0;
        
        const state = {
            activeLevel: null, 
            vocabBook: [ 
                { word: "dilemma", phonetic: "/dɪˈlemə/", meaning: "进退两难的困境" },
                { word: "phenomenon", phonetic: "/fəˈnɑːmɪnən/", meaning: "现象，杰出的人" },
                { word: "evaluate", phonetic: "/ɪˈvæljueɪt/", meaning: "评估，评价" },
                { word: "comprehend", phonetic: "/ˌkɑːmprɪˈhend/", meaning: "理解，领悟" }
            ], 
            passingStats: { known: 0, unknown: 0, remaining: 0, answered: 0 },
            currentActionType: '', 
            currentTaskId: null,
            assignedTasks: [] 
        };

        const VOCAB_THRESHOLD = 10; 

        function initData(count = 10) {
            const uniqueMap = new Map();
            rawWordsData.forEach(item => uniqueMap.set(item.word, item));
            const uniqueWords = Array.from(uniqueMap.values()).slice(0, count);
            TOTAL_WORDS = uniqueWords.length;
            testWords = uniqueWords.map((item, index) => ({ 
                id: index, word: item.word, phonetic: item.phonetic, meaning: item.meaning, status: null 
            }));
        }

        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            const targetView = document.getElementById(viewId);
            if (targetView) targetView.classList.add('active');
            if(viewId === 'view-dashboard') renderDashboardUI();
        }

        function getTodayDateString() {
            return new Date().toDateString(); 
        }

        function toggleTeacherTasks() {
            if (state.assignedTasks.length > 0) {
                state.assignedTasks = [];
                showModal('重置特训', '模拟：已清空老师派发的任务。', renderDashboardUI);
            } else {
                state.assignedTasks = [
                    { id: 101, title: "高二核心易错词冲刺", count: 10, target: 3, current: 0, lastDone: null },
                    { id: 102, title: "阅读长难句高频词", count: 15, target: 1, current: 0, lastDone: null },
                    { id: 103, title: "高考大纲提分包", count: 20, target: 2, current: 0, lastDone: null }
                ];
                showModal('特训送达', '模拟：已下发 3 个特训任务！\n它们会在最下方的横向画廊中展示。', renderDashboardUI);
            }
        }

        function renderDataDashboard() {
            const elTotalPlanned = document.getElementById('statTotalPlanned');
            if (elTotalPlanned) elTotalPlanned.innerText = dataStore.stats.totalPlanned.toLocaleString();

            const elTotalLearned = document.getElementById('statTotalLearned');
            if (elTotalLearned) elTotalLearned.innerText = dataStore.stats.totalLearned.toLocaleString();
            
            const elTodayLearned = document.getElementById('statTodayLearned');
            if (elTodayLearned) elTodayLearned.innerText = dataStore.stats.todayLearned;

            const badgeCount = document.getElementById('badgeUnlearnedCount');
            if (badgeCount) badgeCount.innerText = dataStore.stats.unlearned;

            const elTotalProgress = document.getElementById('statTotalProgress');
            if (elTotalProgress) elTotalProgress.style.width = `${(dataStore.stats.totalLearned / dataStore.stats.totalPlanned) * 100}%`;
        }

        function renderVocabBookInline() {
            const container = document.getElementById('inlineVocabList');
            const badge = document.getElementById('vocabProgressBadge');
            if (!container) return;
            container.innerHTML = '';
            
            const currentCount = state.vocabBook.length;
            if (badge) {
                badge.innerHTML = `收集进度: <span class="font-extrabold text-[12px]">${currentCount}</span>/${VOCAB_THRESHOLD}`;
            }

            if (currentCount === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-center opacity-40 m-auto py-6">
                        <i class="ph-fill ph-check-circle text-[32px] text-gray-400 mb-1"></i>
                        <p class="text-[13px] font-bold text-gray-500">空空如也</p>
                    </div>`;
            } else {
                [...state.vocabBook].reverse().forEach(item => {
                    container.innerHTML += `
                        <div class="flex items-center w-full bg-gradient-to-r from-[#FFFDF0] to-white p-3 rounded-[12px] shadow-sm border border-[#FDE68A]/50 hover:border-[#FDE68A] hover:from-[#FFFBEB] transition-colors z-10 shrink-0">
                            <span class="font-extrabold text-[15px] text-gray-900 w-[110px] shrink-0 truncate">${item.word}</span>
                            <span class="text-[13px] text-gray-600 flex-1 truncate px-2">${item.meaning}</span>
                            <span class="text-[12px] text-gray-400 font-medium shrink-0 font-mono">${item.phonetic}</span>
                        </div>
                    `;
                });
            }
        }

        function renderDashboardUI() {
            renderDataDashboard();
            renderVocabBookInline();
            
            const hasBlocker = state.activeLevel !== null;
            const hasAssignedTask = state.assignedTasks.length > 0;
            const today = getTodayDateString();

            // 1. 渲染老师任务 (横向画廊流，去除了图标底色块和右侧播放按钮)
            const taskContainer = document.getElementById('assignedTaskContainer');
            const noTaskBox = document.getElementById('noAssignedTaskBox');
            if (taskContainer && noTaskBox) {
                if (hasAssignedTask) {
                    taskContainer.classList.remove('hidden');
                    noTaskBox.classList.add('hidden');
                    taskContainer.innerHTML = '';
                    state.assignedTasks.forEach(task => {
                        const isDoneToday = task.lastDone === today;
                        
                        const btnClass = isDoneToday 
                            ? 'opacity-70 cursor-not-allowed bg-gradient-to-r from-gray-50 to-white border border-gray-200' 
                            : 'bg-gradient-to-r from-[#F0F5FF] to-white active:scale-95 border border-blue-100 hover:border-blue-300 cursor-pointer shadow-sm';
                        
                        // 修正颜色：今日待打卡(橙色)，今日已完成(绿色)
                        const statusBadgeHtml = isDoneToday
                            ? `<span class="text-green-600 bg-green-50 border border-green-100 px-1.5 py-0.5 rounded-[4px] flex items-center gap-0.5"><i class="ph-fill ph-check-circle text-[10px]"></i> 今日已完成</span>`
                            : `<span class="text-orange-500 bg-orange-50 border border-orange-100 px-1.5 py-0.5 rounded-[4px] flex items-center gap-0.5"><i class="ph-fill ph-sparkle text-[10px]"></i> 今日待打卡</span>`;

                        taskContainer.innerHTML += `
                            <button onclick="${isDoneToday ? '' : `startPassing('assigned', '特训任务', ${task.id}, ${task.count})`}" class="w-[180px] shrink-0 p-3 rounded-[14px] transition-colors flex flex-col justify-start text-left relative overflow-hidden snap-center ${btnClass}">
                                <!-- 纯净的左上角小图标，去除底色块 -->
                                <i class="ph-bold ph-chalkboard-teacher ${isDoneToday ? 'text-gray-400' : 'text-brand'} text-[18px] mb-2"></i>
                                
                                <div class="flex flex-col gap-1.5 w-full">
                                    <h3 class="font-bold text-[13px] ${isDoneToday ? 'text-gray-500' : 'text-gray-900'} truncate w-full">${task.title}</h3>
                                    <div class="flex items-center gap-1.5 w-full">
                                        <div class="text-[10px] font-bold ${isDoneToday ? 'text-gray-500 bg-gray-100' : 'text-blue-600 bg-blue-50'} border ${isDoneToday ? 'border-gray-200' : 'border-blue-100'} px-1.5 py-0.5 rounded-[4px] font-mono">进度 ${task.current}/${task.target}</div>
                                        <div class="text-[10px] font-bold shrink-0">${statusBadgeHtml}</div>
                                    </div>
                                </div>
                            </button>
                        `;
                    });
                } else {
                    taskContainer.classList.add('hidden');
                    noTaskBox.classList.remove('hidden');
                }
            }

            // 2. 更新 AI学习区 & 关卡引擎
            const btnNew = document.getElementById('btnNew');
            const btnOld = document.getElementById('btnOld');
            const lockNew = document.getElementById('lockNew');
            const lockOld = document.getElementById('lockOld');
            const badgeNew = document.getElementById('badgeNew');
            
            const hubIdleState = document.getElementById('hubIdleState');
            const hubActiveState = document.getElementById('hubActiveState');
            const hubStepsContainer = document.getElementById('hubStepsContainer');
            const hubLevelCount = document.getElementById('hubLevelCount');

            if (hasBlocker) {
                if(btnNew) {
                    btnNew.classList.add('pointer-events-none');
                    btnNew.classList.remove('shadow-[0_6px_20px_rgba(31,95,255,0.25)]');
                    btnNew.classList.add('shadow-sm'); // 去除发光投影
                }
                if(btnOld) {
                    btnOld.classList.add('pointer-events-none');
                    btnOld.classList.remove('shadow-[0_6px_20px_rgba(16,185,129,0.25)]');
                    btnOld.classList.add('shadow-sm'); // 去除发光投影
                }
                if(lockNew) lockNew.classList.remove('hidden');
                if(lockOld) lockOld.classList.remove('hidden');
                if(badgeNew) badgeNew.classList.add('opacity-0');

                if(hubIdleState) hubIdleState.classList.add('hidden');
                if(hubActiveState) {
                    hubActiveState.classList.remove('hidden');
                    hubActiveState.classList.add('flex');
                }
                
                if(hubLevelCount) hubLevelCount.innerText = state.activeLevel.wordCount;

                if(hubStepsContainer) {
                    let stepsHtml = '<div class="flex items-center justify-center gap-1 md:gap-2 w-full">';

                    state.activeLevel.steps.forEach((step, idx) => {
                        const isDone = step.current >= step.target;
                        const isCurrent = !isDone && (idx === 0 || state.activeLevel.steps[idx-1].current >= state.activeLevel.steps[idx-1].target);
                        
                        let icon = '', textClass = '', boxClass = '';

                        if (isDone) {
                            icon = '<i class="ph-bold ph-check text-green-500 text-[12px]"></i>';
                            textClass = 'text-green-600 line-through';
                            boxClass = 'bg-green-50/50 border-green-200';
                        } else if (isCurrent) {
                            icon = '<i class="ph-bold ph-hourglass-high text-brand text-[12px] animate-pulse"></i>';
                            textClass = 'text-brand font-bold';
                            boxClass = 'bg-blue-50 border-blue-200 shadow-sm';
                        } else {
                            icon = '<i class="ph-fill ph-lock-key text-gray-300 text-[12px]"></i>';
                            textClass = 'text-gray-400';
                            boxClass = 'bg-transparent border-gray-100';
                        }

                        stepsHtml += `
                            <div class="flex items-center gap-1.5 px-2 py-1.5 rounded-[8px] border ${boxClass} transition-colors shrink-0">
                                <div class="w-5 h-5 rounded-[6px] bg-white flex items-center justify-center z-10 shrink-0 border border-gray-100 shadow-sm">
                                    ${icon}
                                </div>
                                <div class="flex flex-col text-left">
                                    <span class="text-[11px] leading-tight ${textClass}">${step.name}</span>
                                    <span class="text-[9px] font-bold opacity-80 leading-none mt-[1px] ${textClass} font-mono">${step.current}/${step.target}</span>
                                </div>
                            </div>
                        `;
                        
                        if (idx < state.activeLevel.steps.length - 1) {
                            stepsHtml += `<i class="ph-bold ph-caret-right text-red-300 text-[12px] shrink-0"></i>`;
                        }
                    });
                    stepsHtml += '</div>';
                    hubStepsContainer.innerHTML = stepsHtml;
                }
            } else {
                if(btnNew) {
                    btnNew.classList.remove('pointer-events-none', 'shadow-sm');
                    btnNew.classList.add('shadow-[0_6px_20px_rgba(31,95,255,0.25)]');
                }
                if(btnOld) {
                    btnOld.classList.remove('pointer-events-none', 'shadow-sm');
                    btnOld.classList.add('shadow-[0_6px_20px_rgba(16,185,129,0.25)]');
                }
                if(lockNew) lockNew.classList.add('hidden');
                if(lockOld) lockOld.classList.add('hidden');
                if(badgeNew) badgeNew.classList.remove('opacity-0');

                if(hubIdleState) {
                    hubIdleState.classList.remove('hidden');
                    hubIdleState.classList.add('flex');
                }
                if(hubActiveState) {
                    hubActiveState.classList.add('hidden');
                    hubActiveState.classList.remove('flex');
                }
            }
        }

        // ================= 直驱模拟 =================
        function simulateNextStep() {
            if (!state.activeLevel) return;
            const currentStep = state.activeLevel.steps.find(s => s.current < s.target);
            if (currentStep) {
                currentStep.current++;
                renderDashboardUI(); 
                if (document.getElementById('view-learning').classList.contains('active')) {
                    renderLearningStepsModal();
                }
                
                const allDone = state.activeLevel.steps.every(s => s.current >= s.target);
                if (allDone) {
                    setTimeout(() => {
                        state.activeLevel = null;
                        state.vocabBook = []; 
                        showModal('关卡完美攻克', '恭喜！您已成功完成全套深加工任务。\n中枢死锁已解除，生词本已清空，可继续探索新词。', () => switchView('view-dashboard'));
                    }, 300);
                }
            }
        }

        // ================= 记词过词模块 =================
        function startPassing(typeKey, typeName, taskId = null, wordCount = 10) {
            if(state.activeLevel !== null && typeKey !== 'assigned') return; 
            
            initData(wordCount);
            state.currentActionType = typeKey;
            state.currentTaskId = taskId;
            state.passingStats = { known: 0, unknown: 0, remaining: TOTAL_WORDS, answered: 0 };
            state._tempUnknowns = []; 
            
            const titleEl = document.getElementById('passingTitle');
            if (titleEl) titleEl.innerText = typeName;
            
            const totalEl = document.getElementById('totalPassCount');
            if (totalEl) totalEl.innerText = TOTAL_WORDS;
            
            renderWordList();
            updatePassingStats();
            switchView('view-passing');
        }

        function renderWordList() {
            const container = document.getElementById('wordListContainer');
            if(!container) return;
            container.innerHTML = '';
            
            testWords.forEach((item, index) => {
                const isAnswered = item.status !== null;
                const div = document.createElement('div');
                div.id = `word-row-${item.id}`;
                div.className = `flex justify-between items-center p-3.5 rounded-[16px] border border-gray-100 shadow-sm bg-white transition-colors duration-300`;
                
                div.innerHTML = `
                    <div class="flex items-center gap-3 flex-1 overflow-hidden pr-2">
                        <span id="word-text-${item.id}" class="font-extrabold text-gray-900 text-[18px] tracking-wide shrink-0 max-w-[45%] truncate">${item.word}</span>
                        <span id="word-desc-${item.id}" class="text-[14px] text-gray-400 truncate flex items-center gap-2">
                            ${item.meaning} <span class="font-normal text-gray-300 text-[12px]">${item.phonetic}</span>
                        </span>
                    </div>
                    <div class="flex gap-2 shrink-0">
                        <button id="btn-x-${item.id}" onclick="judgeWord(${item.id}, 'unknown')" class="judge-btn w-[64px] h-[40px] rounded-[10px] bg-[#F1F5F9] text-gray-400 flex items-center justify-center text-[18px] active:scale-90 transition-all"><i class="ph-bold ph-x"></i></button>
                        <button id="btn-c-${item.id}" onclick="judgeWord(${item.id}, 'known')" class="judge-btn w-[64px] h-[40px] rounded-[10px] bg-[#F1F5F9] text-gray-400 flex items-center justify-center text-[18px] active:scale-90 transition-all"><i class="ph-bold ph-check"></i></button>
                    </div>`;
                container.appendChild(div);
            });
        }

        function scrollToFirstUnanswered() {
            const firstUnanswered = testWords.find(w => w.status === null);
            if (!firstUnanswered) return;

            const rowElement = document.getElementById(`word-row-${firstUnanswered.id}`);
            if (rowElement) {
                rowElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                rowElement.classList.add('bg-[#FFF7ED]', 'border-[#F97316]');
                rowElement.classList.remove('bg-white', 'border-gray-100', 'shadow-sm');
                
                setTimeout(() => {
                    const currentWord = testWords.find(w => w.id === firstUnanswered.id);
                    if (rowElement) rowElement.classList.remove('bg-[#FFF7ED]', 'border-[#F97316]');
                    if (currentWord && currentWord.status === null && rowElement) {
                        rowElement.classList.add('bg-white', 'border-gray-100', 'shadow-sm');
                    }
                }, 1000);
            }
        }

        function judgeWord(id, result) {
            const wordObj = testWords.find(w => w.id === id);
            if (!wordObj || wordObj.status !== null) return;
            wordObj.status = result;
            
            if (result === 'unknown') {
                if (!state._tempUnknowns.includes(wordObj)) {
                    state._tempUnknowns.push(wordObj);
                }
                state.passingStats.unknown++;
            } else {
                state.passingStats.known++;
            }
            state.passingStats.answered++;
            state.passingStats.remaining = TOTAL_WORDS - state.passingStats.answered;

            const row = document.getElementById(`word-row-${id}`);
            const btnX = document.getElementById(`btn-x-${id}`);
            const btnC = document.getElementById(`btn-c-${id}`);
            const wordSpan = document.getElementById(`word-text-${id}`);
            const wordDesc = document.getElementById(`word-desc-${id}`);

            if (row && btnX && btnC) {
                row.className = `flex justify-between items-center p-3.5 rounded-[16px] border transition-colors duration-300`;
                btnX.className = `judge-btn w-[64px] h-[40px] rounded-[10px] flex items-center justify-center text-[18px] transition-all`;
                btnC.className = `judge-btn w-[64px] h-[40px] rounded-[10px] flex items-center justify-center text-[18px] transition-all`;

                if (result === 'unknown') {
                    row.classList.add('bg-[#FEF2F2]', 'border-[#FECACA]');
                    btnX.classList.add('bg-[#EF4444]', 'text-white', 'shadow-sm');
                    btnC.classList.add('bg-gray-50', 'text-gray-300', 'pointer-events-none');
                } else {
                    row.classList.add('bg-[#F0FDF4]', 'border-[#BBF7D0]');
                    btnC.classList.add('bg-[#10B981]', 'text-white', 'shadow-sm');
                    btnX.classList.add('bg-gray-50', 'text-gray-300', 'pointer-events-none');
                }
            }

            if(wordSpan) wordSpan.classList.add('text-gray-400');
            if(wordDesc) wordDesc.classList.add('opacity-60');

            updatePassingStats();
        }

        function updatePassingStats() {
            const elKnown = document.getElementById('statKnown');
            if (elKnown) elKnown.innerText = state.passingStats.known;
            const elUnknown = document.getElementById('statUnknown');
            if (elUnknown) elUnknown.innerText = state.passingStats.unknown;
            const elRemaining = document.getElementById('statRemaining');
            if (elRemaining) elRemaining.innerText = state.passingStats.remaining;

            const submitBtn = document.getElementById('submitLevelBtn');
            if (submitBtn) {
                if (state.passingStats.remaining === 0) {
                    submitBtn.className = 'bg-brand hover-bg-brand text-white font-bold py-2.5 px-8 text-[15px] rounded-[14px] shadow-sm active:scale-95 transition-all';
                    submitBtn.disabled = false;
                } else {
                    submitBtn.className = 'bg-[#F1F5F9] text-[#94A3B8] font-bold py-2.5 px-8 text-[15px] rounded-[14px] transition-all cursor-not-allowed';
                    submitBtn.disabled = true;
                }
            }
        }

        function submitPassResults() {
            if (state.passingStats.remaining > 0) return;
            
            dataStore.stats.todayLearned += TOTAL_WORDS;
            dataStore.stats.totalLearned += TOTAL_WORDS;
            if (state.currentActionType === 'new') {
                dataStore.stats.unlearned = Math.max(0, dataStore.stats.unlearned - TOTAL_WORDS);
            }

            if (state.currentActionType === 'assigned') {
                if (state.currentTaskId !== null) {
                    const task = state.assignedTasks.find(t => t.id === state.currentTaskId);
                    if (task) {
                        task.current++;
                        task.lastDone = getTodayDateString(); 
                        
                        if (task.current >= task.target) {
                            state.assignedTasks = state.assignedTasks.filter(t => t.id !== task.id);
                            showModal('任务圆满达成', `太棒了！您已完成该老师任务的全部规定次数。`, () => switchView('view-dashboard'));
                        } else {
                            showModal('今日任务打卡成功', `进度 +1，当前：${task.current}/${task.target}。\n今天辛苦了，为保证记忆间隔，该任务明日才能再次打卡哦。`, () => switchView('view-dashboard'));
                        }
                    }
                }
                return;
            }

            if (state._tempUnknowns.length > 0) {
                state._tempUnknowns.forEach(w => {
                    if(!state.vocabBook.find(ex => ex.word === w.word)) {
                        state.vocabBook.push(w);
                    }
                });

                if (state.vocabBook.length >= VOCAB_THRESHOLD) {
                    state.activeLevel = { 
                        title: '生词深加工关卡', 
                        wordCount: state.vocabBook.length, 
                        words: [...state.vocabBook],
                        steps: [
                            { id: 'read', name: '跟读', target: 2, current: 0 },
                            { id: 'memo', name: '音记', target: 2, current: 0 },
                            { id: 'dict', name: '听写', target: 1, current: 0 }
                        ]
                    };
                    showModal('生词已集满', `生词本已满 ${state.vocabBook.length} 个！\n系统已为您生成强制序列深加工关卡，在攻坚解锁之前，其它区域操作已锁定。`, () => switchView('view-dashboard'));
                } else {
                    showModal('生词已收集', `本次打卡发现了 ${state._tempUnknowns.length} 个盲点，已存入生词本。\n收集进度：${state.vocabBook.length}/${VOCAB_THRESHOLD}，满10个将触发强制关卡。`, () => switchView('view-dashboard'));
                }
                return;
            }
            
            showModal('完美掌握', `本批次单词您全部认识，记忆曲线已更新！\n本次未产生生词。`, () => switchView('view-dashboard'));
        }

        function renderLearningStepsModal() {
            const container = document.getElementById('learningStepsContainerModal');
            if (!container) return;
            
            let html = '<div class="flex flex-col relative py-2 w-full text-left">';
            html += '<div class="absolute left-[20px] top-6 bottom-6 w-[2px] bg-gray-200 z-0"></div>';

            state.activeLevel.steps.forEach((step, idx) => {
                const isDone = step.current >= step.target;
                const isCurrent = !isDone && (idx === 0 || state.activeLevel.steps[idx-1].current >= state.activeLevel.steps[idx-1].target);
                
                let icon = '', textClass = '', boxClass = '', borderClass = '';
                
                if (isDone) {
                    icon = '<i class="ph-bold ph-check text-green-500 text-[16px]"></i>';
                    textClass = 'text-green-600 line-through';
                    borderClass = 'border-green-200 bg-white';
                    boxClass = 'bg-green-50/50 border-green-100';
                } else if (isCurrent) {
                    icon = '<i class="ph-bold ph-hourglass-high text-brand text-[16px] animate-pulse"></i>';
                    textClass = 'text-brand font-bold';
                    borderClass = 'border-brand bg-white border-2 shadow-sm';
                    boxClass = 'bg-blue-50 border-blue-100 shadow-sm';
                } else {
                    icon = '<i class="ph-fill ph-lock-key text-gray-400 text-[16px]"></i>';
                    textClass = 'text-gray-400';
                    borderClass = 'border-gray-200 bg-gray-50';
                    boxClass = 'bg-gray-50 border-transparent';
                }

                html += `
                    <div class="flex items-center gap-3 mb-3 last:mb-0 relative z-10 w-full">
                        <div class="w-10 h-10 rounded-[10px] flex items-center justify-center shrink-0 z-10 ${borderClass}">
                            ${icon}
                        </div>
                        <div class="flex-1 flex items-center justify-between p-3 rounded-[12px] border ${boxClass} transition-colors">
                            <span class="text-[14px] ${textClass}">${step.name}</span>
                            <span class="text-[12px] font-bold ${textClass} font-mono">${step.current}/${step.target}</span>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;

            const actionBtn = document.getElementById('stepActionBtn');
            const currentStep = state.activeLevel.steps.find(s => s.current < s.target);
            if (currentStep) {
                actionBtn.innerText = `点击执行 [${currentStep.name}] (模拟 +1)`;
            }
        }

        renderDashboardUI();
    </script>
</body>
</html>
