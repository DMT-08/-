<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教师端 - 班级学生数据及任务分配</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
    
    body {
      font-family: Inter, system-ui, -apple-system, 'Noto Sans SC', sans-serif;
      margin: 0;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      background-color: #ffffff; 
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 自定义滚动条 */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #94A3B8; }

    /* ================= 极致精准的自适应通栏表格 CSS ================= */
    table {
      border-collapse: separate;
      border-spacing: 0;
      width: 100%;
      table-layout: fixed; /* 强制均分剩余宽度 */
      font-variant-numeric: tabular-nums; /* 等宽数字 */
    }
    
    th, td {
      border-bottom: 1px solid #E2E8F0;
      border-right: 1px solid #E2E8F0;
      white-space: nowrap;
      box-sizing: border-box;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 70px; /* 保证极小屏幕下不会无限挤压，而是触发横向滚动 */
    }

    /* 修复表头缝隙：1px重叠覆盖法 */
    thead tr:nth-child(1) th { position: sticky; top: 0; z-index: 20; height: 48px; background-clip: padding-box; border-top: none; }
    thead tr:nth-child(2) th { position: sticky; top: 47px; z-index: 20; height: 48px; background-clip: padding-box; }
    
    /* 左侧列粘性定位 */
    .fixed-col { position: sticky; z-index: 10; background-clip: padding-box; }
    thead tr:nth-child(1) th.fixed-col,
    thead tr:nth-child(2) th.fixed-col { z-index: 30; }

    /* 修正列宽 */
    .fixed-col-1 { left: 0; width: 60px; min-width: 60px; max-width: 60px; border-left: none; }
    .fixed-col-2 { left: 60px; width: 100px; min-width: 100px; max-width: 100px; }
    .fixed-col-3 { left: 160px; width: 80px; min-width: 80px; max-width: 80px; }

    /* 加粗右侧阴影分割线，凸显层级 */
    .fixed-col-3::after {
      content: ''; 
      position: absolute; 
      top: 0; 
      right: -2px; 
      bottom: 0; 
      width: 2px;
      background-color: #CBD5E1; 
      box-shadow: 3px 0 8px rgba(0,0,0,0.12); 
      z-index: 5;
    }

    /* 去除表尾和表右边界的多余边框，适配通栏 */
    tbody tr:last-child td { border-bottom: none; }
    th:last-child, td:last-child { border-right: none; }

    /* 骨架屏动画 */
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skeleton-box {
      background: linear-gradient(90deg, #F1F5F9 25%, #E2E8F0 50%, #F1F5F9 75%);
      background-size: 400% 100%; animation: shimmer 1.5s infinite linear; border-radius: 4px;
    }

    /* 弹窗过渡动画 */
    .modal-enter { opacity: 0; transform: scale(0.95); }
    .modal-enter-active { opacity: 1; transform: scale(1); transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1); }
    .modal-leave { opacity: 1; transform: scale(1); }
    .modal-leave-active { opacity: 0; transform: scale(0.95); transition: all 0.15s ease-in; pointer-events: none; }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#1F5FFF', 'primary-light': '#E6F0FF' }
        }
      }
    }
  </script>
</head>
<body>

  <!-- 全局 Toast 提示 -->
  <div id="toast" class="fixed top-[45%] left-1/2 -translate-x-1/2 -translate-y-1/2 bg-gray-800/90 text-white px-8 py-3 rounded-[14px] shadow-2xl opacity-0 transition-opacity duration-300 z-[200] pointer-events-none flex items-center justify-center">
    <span class="font-bold tracking-wide text-[15px]">分配成功</span>
  </div>

  <!-- 主应用容器：自适应 100% 宽高 -->
  <div class="w-full h-full bg-white flex flex-col overflow-hidden relative">

    <!-- 顶部导航区 -->
    <header class="h-[76px] flex items-center justify-between px-8 bg-white border-b border-gray-100 flex-shrink-0 relative z-40">
      <div class="flex items-center space-x-4">
        <!-- 独立返回按钮：圆形设计，Pad 端按压反馈 -->
        <button class="w-[44px] h-[44px] flex items-center justify-center rounded-full bg-white shadow-[0_2px_8px_rgba(0,0,0,0.06)] active:scale-[0.90] transition-all text-gray-700 shrink-0">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h1 class="text-[30px] font-extrabold text-gray-900 tracking-tight ml-2 leading-none whitespace-nowrap">班级数据</h1>
        
        <div class="ml-6 flex items-center">
          <div class="relative" id="class-dropdown-container">
            <div onclick="toggleDropdown()" class="flex items-center space-x-1.5 px-4 h-[40px] bg-primary-light rounded-[12px] text-primary font-bold cursor-pointer active:scale-95 transition-all select-none whitespace-nowrap">
              <span class="text-[15px]">24级软件3班</span>
              <svg id="class-dropdown-icon" class="w-4 h-4 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
            </div>
            <div id="class-dropdown-menu" class="absolute top-full left-0 mt-2 w-48 bg-white border border-gray-100 rounded-[16px] shadow-lg opacity-0 invisible transition-all duration-200 origin-top-left z-50">
              <ul class="py-2 text-center text-[15px] font-medium">
                <li class="px-4 py-3 text-primary bg-primary-light/50 cursor-pointer">24级软件3班</li>
                <li class="px-4 py-3 text-gray-600 active:bg-gray-50 cursor-pointer">英语实验1班</li>
                <li class="px-4 py-3 text-gray-600 active:bg-gray-50 cursor-pointer">2404班</li>
              </ul>
            </div>
          </div>
        </div>
      </div>

      <div class="flex items-center space-x-6 shrink-0">
        <div class="flex bg-[#F1F5F9] p-1 rounded-[14px] text-[15px] font-bold shadow-inner">
          <button id="btn-today" class="transition-all bg-primary text-white shadow-md px-6 h-[40px] rounded-[10px] active:scale-95 whitespace-nowrap" onclick="toggleData('today')">今日数据</button>
          <button id="btn-summary" class="transition-all text-gray-500 active:bg-gray-200/50 px-6 h-[40px] rounded-[10px] bg-transparent active:scale-95 whitespace-nowrap" onclick="toggleData('summary')">汇总数据</button>
        </div>
        
        <div class="flex items-center space-x-4 border-l border-gray-200 pl-6">
          <span class="text-[13px] font-medium text-gray-400 whitespace-nowrap" id="refresh-time">上次更新: --</span>
          <button onclick="triggerRefresh()" class="w-[44px] h-[44px] flex items-center justify-center rounded-full bg-white border border-gray-200 shadow-sm active:scale-[0.90] transition-all text-gray-500 shrink-0">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          </button>
        </div>
      </div>
    </header>

    <!-- 表格区域：完全 0 padding 的通栏设计，直接铺满剩余空间 -->
    <main class="flex-1 overflow-auto custom-scrollbar p-0 bg-white relative">
      <div id="loading-overlay" class="absolute inset-0 z-50 hidden"></div>
      
      <table class="text-center text-[14px] w-full bg-white">
        <thead>
          <tr>
            <th rowspan="2" class="p-3 fixed-col fixed-col-1 bg-[#F8FAFC] text-gray-500 border-l-0">序号</th>
            <th rowspan="2" class="p-3 fixed-col fixed-col-2 bg-[#F8FAFC] text-gray-900 font-bold">学生姓名</th>
            <th rowspan="2" class="p-3 fixed-col fixed-col-3 bg-[#F8FAFC] text-gray-900 font-bold">总词汇</th>
            
            <th colspan="3" class="p-3 bg-[#EFF6FF] text-blue-600 font-bold tracking-wide">正向过词</th>
            <th colspan="3" class="p-3 bg-[#FAF5FF] text-purple-600 font-bold tracking-wide">听写</th>
            <th colspan="3" class="p-3 bg-[#F0FDF4] text-emerald-600 font-bold tracking-wide">正向测试</th>
            <th colspan="3" class="p-3 bg-[#FFFBEB] text-amber-600 font-bold tracking-wide">练习</th>
            <th colspan="3" class="p-3 bg-[#FFF1F2] text-rose-600 font-bold tracking-wide border-r-0">游戏</th>
          </tr>
          <tr id="header-row-2" class="text-[13px] font-bold">
            <!-- 由 JS 渲染二级表头 -->
          </tr>
        </thead>
        <tbody class="text-gray-700 font-medium" id="table-body">
          <!-- 数据或骨架屏由 JS 渲染 -->
        </tbody>
      </table>
    </main>
    
    <!-- ================= 任务分配弹窗 ================= -->
    <div id="assign-modal-wrapper" class="absolute inset-0 z-[100] flex items-center justify-center bg-gray-900/40 backdrop-blur-sm hidden modal-leave">
      <div class="bg-white w-[960px] h-[680px] rounded-[24px] shadow-2xl flex flex-col overflow-hidden relative mx-4">
        <div class="h-[72px] px-8 border-b border-gray-100 flex items-center justify-between bg-white flex-shrink-0">
          <div class="flex items-center space-x-3">
            <div class="w-10 h-10 rounded-[14px] bg-primary-light flex items-center justify-center text-primary">
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M15 2H9a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1Z"/><path d="M9 14h6"/><path d="M12 11v6"/></svg>
            </div>
            <h2 class="text-[20px] font-bold text-gray-800">分配任务 <span class="text-gray-300 mx-2">|</span> <span id="assign-target-name" class="text-primary">张三</span></h2>
          </div>
          <button onclick="closeAssignModal()" class="w-10 h-10 flex items-center justify-center text-gray-400 active:bg-gray-100 rounded-full transition-colors active:scale-95">
            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div class="flex-1 flex overflow-hidden bg-gray-50/50">
          <!-- 左栏：已分配 -->
          <div class="w-1/2 border-r border-gray-200 flex flex-col bg-[#F8FAFC]">
            <div class="px-6 py-4 border-b border-gray-200 bg-white shadow-sm z-10">
              <h3 class="font-bold text-[16px] text-gray-700 flex justify-between items-center">
                <span>已分配任务</span>
                <span id="assigned-count" class="bg-blue-100 text-blue-700 px-2.5 py-0.5 rounded-[8px] text-[13px]">0</span>
              </h3>
            </div>
            <div class="flex-1 overflow-y-auto p-5 space-y-4 custom-scrollbar" id="assigned-tasks-list"></div>
          </div>

          <!-- 右栏：可分配（任务库） -->
          <div class="w-1/2 flex flex-col bg-white">
            <div class="px-6 py-4 border-b border-gray-100 shadow-sm z-10 flex flex-col space-y-4">
               <h3 class="font-bold text-[16px] text-gray-700 flex justify-between items-center">
                <span>可分配任务库</span>
                <span id="available-count" class="bg-gray-100 text-gray-600 px-2.5 py-0.5 rounded-[8px] text-[13px]">0</span>
              </h3>
              <div class="relative">
                <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="task-search" placeholder="搜索任务名称..." oninput="renderAssignUI()" class="w-full bg-gray-50 border border-gray-200 rounded-[12px] pl-10 pr-4 h-[44px] text-[14px] focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all">
              </div>
            </div>
            <div class="flex-1 overflow-y-auto p-5 space-y-4 custom-scrollbar" id="available-tasks-list"></div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    // ================= 基础工具逻辑 =================
    const showToast = (message) => {
      const toast = document.getElementById('toast');
      toast.querySelector('span').innerText = message;
      toast.classList.remove('opacity-0');
      setTimeout(() => toast.classList.add('opacity-0'), 1500);
    };

    const updateRefreshTime = () => {
      const now = new Date();
      const month = (now.getMonth() + 1).toString().padStart(2, '0');
      const date = now.getDate().toString().padStart(2, '0');
      const hours = now.getHours().toString().padStart(2, '0');
      const minutes = now.getMinutes().toString().padStart(2, '0');
      document.getElementById('refresh-time').innerText = `上次更新: ${month}-${date} ${hours}:${minutes}`;
    };

    // ================= 表格数据与渲染逻辑 =================
    const names = [
      "杨永浩", "尹嘉旺", "赵永好", "陈韵铃", "周义龙", "魏志豪", "陈佳瑶", "陈嘉睿", 
      "程艾琳", "华建文", "陈雨婷", "陈锦营", "刘耿鸿", "彭少杰", "伍腾康", "杨大宇", 
      "杨振权", "黄雅娜", "李佳恒", "彭梓俊", "胡语健", "庄学波", "张晓峰", "潘昱慈", 
      "杨晟旭", "黄宏伟", "康耀", "谢文楠", "谢镇城", "李测试", "郑伟华", "吴一凡"
    ];

    let currentView = 'today'; 
    let studentsData = [];
    
    const categoryStyles = [
      { bg: 'bg-[#EFF6FF]', text: 'text-blue-500' },
      { bg: 'bg-[#FAF5FF]', text: 'text-purple-500' },
      { bg: 'bg-[#F0FDF4]', text: 'text-emerald-500' },
      { bg: 'bg-[#FFFBEB]', text: 'text-amber-500' },
      { bg: 'bg-[#FFF1F2]', text: 'text-rose-500' }
    ];

    const generateStudentData = () => {
      const data = [];
      for (let i = 0; i < 32; i++) {
        const totalVocab = [2893, 2910, 3103, 3109, 2996, 3194][Math.floor(Math.random() * 6)];
        data.push({
          id: i + 1,
          name: names[i] || `学生${i+1}`,
          totalVocab: totalVocab,
          today: {
            zxTotal: Math.floor(Math.random() * 1400) + 100, zxTodayAdd: Math.random() > 0.5 ? Math.floor(Math.random() * 50) : 0, zxYestAdd: Math.random() > 0.3 ? Math.floor(Math.random() * 40) : 0,
            txTotal: Math.floor(Math.random() * 2800) + 50,  txTodayAdd: Math.random() > 0.7 ? Math.floor(Math.random() * 20) : 0, txYestAdd: Math.random() > 0.5 ? Math.floor(Math.random() * 15) : 0,
            ztTotal: Math.random() > 0.6 ? Math.floor(Math.random() * 300) : 0, ztTodayAdd: 0, ztYestAdd: 0,
            lxTotal: Math.floor(Math.random() * 1000), lxTodayAdd: Math.random() > 0.8 ? Math.floor(Math.random() * 10) : 0, lxYestAdd: 0,
            yxTotal: Math.floor(Math.random() * 1000), yxTodayAdd: Math.random() > 0.5 ? Math.floor(Math.random() * 100) : 0, yxYestAdd: Math.random() > 0.5 ? Math.floor(Math.random() * 80) : 0
          },
          summary: {
            zxPass: Math.floor(Math.random() * 1400) + 100, zxFail: Math.floor(Math.random() * 50), zxUnknown: Math.floor(Math.random() * 1000),
            txPass: Math.floor(Math.random() * 2000) + 500, txFail: Math.floor(Math.random() * 10), txUnknown: Math.floor(Math.random() * 500),
            ztPass: Math.random() > 0.6 ? Math.floor(Math.random() * 100) : 0, ztFail: 0, ztUnknown: Math.floor(Math.random() * 2800),
            lxPass: Math.floor(Math.random() * 800), lxFail: Math.floor(Math.random() * 20), lxUnknown: Math.floor(Math.random() * 2000),
            yxPass: Math.floor(Math.random() * 1000), yxFail: Math.floor(Math.random() * 200), yxUnknown: Math.floor(Math.random() * 1500)
          }
        });
      }
      return data;
    };

    const renderHeaders = () => {
      const headerRow2 = document.getElementById('header-row-2');
      let cols = currentView === 'today' ? ['总量', '今增', '昨增'] : ['通过', '未过', '未知'];
      
      let headerHTML = '';
      for(let i = 0; i < 5; i++) {
          const style = categoryStyles[i];
          const isLast = i === 4;
          headerHTML += `
            <th class="p-2 ${style.bg} ${style.text} border-t border-b border-gray-200 border-r">${cols[0]}</th>
            <th class="p-2 ${style.bg} ${style.text} border-t border-b border-gray-200 border-r">${cols[1]}</th>
            <th class="p-2 ${style.bg} ${style.text} border-t border-b border-gray-200 ${isLast ? 'border-r-0' : 'border-r'}">${cols[2]}</th>
          `;
      }
      headerRow2.innerHTML = headerHTML;
    };

    const formatNum = (num, type) => {
      if (num === 0) return `<span class="text-gray-300">0</span>`;
      if (type === 'add') return `<span class="text-emerald-500 font-bold">+${num}</span>`;
      if (type === 'fail') return `<span class="text-rose-500 font-bold">${num}</span>`;
      return num;
    };

    const renderTable = () => {
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = '';

      studentsData.forEach((student, index) => {
        const isEven = index % 2 === 0;
        const rowBg = isEven ? 'bg-white' : 'bg-[#FAFAFA]';
        const hoverBg = 'active:bg-[#F0F7FF]';
        
        const tr = document.createElement('tr');
        tr.className = `${rowBg} ${hoverBg} transition-colors cursor-default`;
        
        const nameCellHtml = `
            <div class="inline-flex items-center space-x-1 cursor-pointer text-blue-600 active:text-blue-800 font-bold transition-colors" onclick="openAssignModal('${student.name}', 'student')">
                 <span class="underline underline-offset-4">${student.name}</span>
                 <svg class="w-4 h-4 text-blue-500 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                    <path d="M15 2H9a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1Z"/>
                    <path d="M9 14h6"/><path d="M12 11v6"/>
                 </svg>
            </div>`;

        let colsHTML = `
          <td class="p-2 fixed-col fixed-col-1 ${rowBg} ${hoverBg} text-gray-400 text-xs transition-colors h-[48px] border-l-0">${student.id}</td>
          <td class="p-2 fixed-col fixed-col-2 ${rowBg} ${hoverBg} transition-colors h-[48px]">${nameCellHtml}</td>
          <td class="p-2 fixed-col fixed-col-3 ${rowBg} ${hoverBg} font-extrabold text-gray-800 transition-colors h-[48px]">${student.totalVocab}</td>
        `;

        if (currentView === 'today') {
          const td = student.today;
          colsHTML += `
            <td class="p-2 h-[48px]">${formatNum(td.zxTotal)}</td><td class="p-2 h-[48px]">${formatNum(td.zxTodayAdd, 'add')}</td><td class="p-2 h-[48px]">${formatNum(td.zxYestAdd, 'add')}</td>
            <td class="p-2 h-[48px]">${formatNum(td.txTotal)}</td><td class="p-2 h-[48px]">${formatNum(td.txTodayAdd, 'add')}</td><td class="p-2 h-[48px]">${formatNum(td.txYestAdd, 'add')}</td>
            <td class="p-2 h-[48px]">${formatNum(td.ztTotal)}</td><td class="p-2 h-[48px]">${formatNum(td.ztTodayAdd, 'add')}</td><td class="p-2 h-[48px]">${formatNum(td.ztYestAdd, 'add')}</td>
            <td class="p-2 h-[48px]">${formatNum(td.lxTotal)}</td><td class="p-2 h-[48px]">${formatNum(td.lxTodayAdd, 'add')}</td><td class="p-2 h-[48px]">${formatNum(td.lxYestAdd, 'add')}</td>
            <td class="p-2 h-[48px]">${formatNum(td.yxTotal)}</td><td class="p-2 h-[48px]">${formatNum(td.yxTodayAdd, 'add')}</td><td class="p-2 h-[48px] border-r-0">${formatNum(td.yxYestAdd, 'add')}</td>
          `;
        } else {
           const sd = student.summary;
           colsHTML += `
            <td class="p-2 h-[48px]">${formatNum(sd.zxPass)}</td><td class="p-2 h-[48px]">${formatNum(sd.zxFail, 'fail')}</td><td class="p-2 h-[48px] text-gray-400">${formatNum(sd.zxUnknown)}</td>
            <td class="p-2 h-[48px]">${formatNum(sd.txPass)}</td><td class="p-2 h-[48px]">${formatNum(sd.txFail, 'fail')}</td><td class="p-2 h-[48px] text-gray-400">${formatNum(sd.txUnknown)}</td>
            <td class="p-2 h-[48px]">${formatNum(sd.ztPass)}</td><td class="p-2 h-[48px]">${formatNum(sd.ztFail, 'fail')}</td><td class="p-2 h-[48px] text-gray-400">${formatNum(sd.ztUnknown)}</td>
            <td class="p-2 h-[48px]">${formatNum(sd.lxPass)}</td><td class="p-2 h-[48px]">${formatNum(sd.lxFail, 'fail')}</td><td class="p-2 h-[48px] text-gray-400">${formatNum(sd.lxUnknown)}</td>
            <td class="p-2 h-[48px]">${formatNum(sd.yxPass)}</td><td class="p-2 h-[48px]">${formatNum(sd.yxFail, 'fail')}</td><td class="p-2 h-[48px] text-gray-400 border-r-0">${formatNum(sd.yxUnknown)}</td>
          `;
        }
        
        tr.innerHTML = colsHTML;
        tbody.appendChild(tr);
      });
    };

    const renderSkeleton = () => {
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = '';
      for (let i = 0; i < 16; i++) {
        const isEven = i % 2 === 0;
        const rowBg = isEven ? 'bg-white' : 'bg-[#FAFAFA]';
        const tr = document.createElement('tr');
        tr.className = `${rowBg}`;
        let colsHTML = `
          <td class="p-2 fixed-col fixed-col-1 h-[48px] ${rowBg} border-l-0"><div class="skeleton-box h-4 w-6 mx-auto"></div></td>
          <td class="p-2 fixed-col fixed-col-2 h-[48px] ${rowBg}"><div class="skeleton-box h-4 w-14 mx-auto"></div></td>
          <td class="p-2 fixed-col fixed-col-3 h-[48px] ${rowBg}"><div class="skeleton-box h-4 w-12 mx-auto"></div></td>
        `;
        for (let j = 0; j < 15; j++) { 
          const borderClass = j === 14 ? 'border-r-0' : '';
          colsHTML += `<td class="p-2 h-[48px] ${borderClass}"><div class="skeleton-box h-4 w-8 mx-auto"></div></td>`; 
        }
        tr.innerHTML = colsHTML;
        tbody.appendChild(tr);
      }
    };

    window.toggleData = (viewType) => {
      if (currentView === viewType) return; 
      currentView = viewType;
      
      const btnToday = document.getElementById('btn-today');
      const btnSummary = document.getElementById('btn-summary');

      if (viewType === 'today') {
        btnToday.className = "transition-all bg-primary text-white shadow-md px-6 h-[40px] rounded-[10px] active:scale-95";
        btnSummary.className = "transition-all text-gray-500 active:bg-gray-200/50 px-6 h-[40px] rounded-[10px] bg-transparent active:scale-95";
      } else {
        btnSummary.className = "transition-all bg-primary text-white shadow-md px-6 h-[40px] rounded-[10px] active:scale-95";
        btnToday.className = "transition-all text-gray-500 active:bg-gray-200/50 px-6 h-[40px] rounded-[10px] bg-transparent active:scale-95";
      }

      renderHeaders();
      renderTable();
    };

    window.triggerRefresh = () => {
      renderSkeleton();
      setTimeout(() => { 
        studentsData = generateStudentData(); 
        renderTable(); 
        updateRefreshTime(); 
      }, 800);
    };

    // ================= 任务分配弹窗逻辑 =================
    const taskDatabase = [
      { id: 101, name: '必修一 Unit 1 核心词汇', words: 45 },
      { id: 102, name: '单元音单音节(新)', words: 30 },
      { id: 103, name: '必修一 Unit 2 重点词组', words: 25 },
      { id: 104, name: '模块三 综合复习卷一', words: 60 },
      { id: 105, name: '高考高频词 冲刺一', words: 50 },
      { id: 106, name: '高二听力特训预习词汇', words: 40 },
      { id: 107, name: '期中考试模拟核心词', words: 100 },
      { id: 108, name: '拓展阅读词汇(上)', words: 35 },
      { id: 109, name: '不规则动词变化表(一)', words: 20 },
      { id: 110, name: '四级高频词汇精选', words: 80 }
    ];

    let assignedIds = []; 

    window.openAssignModal = (targetName, type) => {
      document.getElementById('assign-target-name').innerText = targetName;
      assignedIds = [101, 102];
      document.getElementById('task-search').value = '';
      
      const wrapper = document.getElementById('assign-modal-wrapper');
      wrapper.classList.remove('hidden');
      requestAnimationFrame(() => {
        wrapper.classList.remove('modal-leave', 'modal-leave-active');
        wrapper.classList.add('modal-enter');
        requestAnimationFrame(() => wrapper.classList.add('modal-enter-active'));
      });
      renderAssignUI();
    };

    window.closeAssignModal = () => {
      const wrapper = document.getElementById('assign-modal-wrapper');
      wrapper.classList.remove('modal-enter', 'modal-enter-active');
      wrapper.classList.add('modal-leave-active');
      setTimeout(() => {
        wrapper.classList.add('hidden');
        wrapper.classList.remove('modal-leave-active');
      }, 200);
    };

    window.moveTask = (taskId, action) => {
      if (action === 'add' && !assignedIds.includes(taskId)) {
        assignedIds.unshift(taskId);
        showToast('分配成功');
      } else if (action === 'remove') {
        assignedIds = assignedIds.filter(id => id !== taskId);
      }
      renderAssignUI();
    };

    window.renderAssignUI = () => {
      const keyword = document.getElementById('task-search').value.trim().toLowerCase();
      
      const assignedTasks = taskDatabase.filter(t => assignedIds.includes(t.id));
      const availableTasks = taskDatabase.filter(t => !assignedIds.includes(t.id) && t.name.toLowerCase().includes(keyword));

      document.getElementById('assigned-count').innerText = assignedTasks.length;
      document.getElementById('available-count').innerText = availableTasks.length;

      const assignedList = document.getElementById('assigned-tasks-list');
      if (assignedTasks.length === 0) {
        assignedList.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-gray-400 text-sm"><svg class="w-12 h-12 mb-3 text-gray-200" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>暂无分配任务</div>`;
      } else {
        assignedList.innerHTML = assignedTasks.map((t, index) => {
          const num = index + 1;
          return `
          <div class="bg-white p-4 rounded-[20px] border border-gray-100 shadow-sm flex items-center justify-between transition-colors">
            <div class="flex items-center space-x-3">
              <span class="text-[14px] font-bold text-gray-400 font-mono w-5 text-center">${num}</span>
              <div class="flex flex-col items-start space-y-1">
                <span class="text-[15px] font-bold text-gray-800">${t.name}</span>
                <span class="inline-block bg-gray-50 border border-gray-200 text-gray-500 px-2 py-[2px] rounded-[6px] text-[11px] font-bold">${t.words} 词</span>
              </div>
            </div>
            <button onclick="moveTask(${t.id}, 'remove')" class="px-5 h-[44px] rounded-[14px] text-[14px] font-bold text-red-500 bg-red-50 active:bg-red-500 active:text-white transition-all active:scale-95">取消</button>
          </div>
        `}).join('');
      }

      const availableList = document.getElementById('available-tasks-list');
      if (availableTasks.length === 0) {
        availableList.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-gray-400 text-sm"><svg class="w-10 h-10 mb-3 text-gray-200" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>未搜索到相关任务</div>`;
      } else {
        availableList.innerHTML = availableTasks.map((t, index) => {
          const num = index + 1;
          return `
          <div class="bg-white p-4 rounded-[20px] border border-gray-100 shadow-sm flex items-center justify-between transition-colors">
            <div class="flex items-center space-x-3">
              <span class="text-[14px] font-bold text-gray-400 font-mono w-5 text-center">${num}</span>
              <div class="flex flex-col items-start space-y-1">
                <span class="text-[15px] font-bold text-gray-800">${t.name}</span>
                <span class="inline-block bg-gray-50 border border-gray-200 text-gray-500 px-2 py-[2px] rounded-[6px] text-[11px] font-bold">${t.words} 词</span>
              </div>
            </div>
            <button onclick="moveTask(${t.id}, 'add')" class="px-6 h-[44px] rounded-[14px] text-[14px] font-bold text-white bg-primary active:bg-blue-700 shadow-sm transition-all flex items-center justify-center min-w-[80px] active:scale-95">
              加入
            </button>
          </div>
        `}).join('');
      }
    };

    // 班级下拉框逻辑
    window.toggleDropdown = () => {
      const menu = document.getElementById('class-dropdown-menu');
      const icon = document.getElementById('class-dropdown-icon');
      if (menu.classList.contains('invisible')) {
        menu.classList.remove('invisible', 'opacity-0');
        menu.classList.add('visible', 'opacity-100');
        icon.classList.add('rotate-180');
      } else {
        menu.classList.add('invisible', 'opacity-0');
        menu.classList.remove('visible', 'opacity-100');
        icon.classList.remove('rotate-180');
      }
    };

    document.addEventListener('click', (e) => {
      const container = document.getElementById('class-dropdown-container');
      if (container && !container.contains(e.target)) {
        const menu = document.getElementById('class-dropdown-menu');
        const icon = document.getElementById('class-dropdown-icon');
        menu.classList.add('invisible', 'opacity-0');
        menu.classList.remove('visible', 'opacity-100');
        icon.classList.remove('rotate-180');
      }
    });

    // 初始化
    updateRefreshTime();
    studentsData = generateStudentData();
    renderHeaders();
    renderTable();
  </script>
</body>
</html>
