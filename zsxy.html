<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>英语音频校对</title>
    <style>
        :root {
            --primary-color: #1F5FFF; 
            --primary-light: rgba(31, 95, 255, 0.1);
            --bg-start: #EFF6FF;
            --bg-end: #DFE7FF;
            
            --text-title: #111827;
            --text-main: #334155;
            --text-secondary: #64748B;
            
            --danger-color: #EF4444;
            --danger-light: rgba(239, 68, 68, 0.1);
            --success-color: #10B981;
            --success-light: rgba(16, 185, 129, 0.1);
            --warning-color: #F59E0B;
            --warning-light: rgba(245, 158, 11, 0.1);
            --pending-color: #3B82F6;
            --pending-light: rgba(59, 130, 246, 0.1);
            
            --border-line: rgba(0,0,0,0.06);

            --tag-eng-bg: rgba(244, 114, 182, 0.15); 
            --tag-eng-text: #DB2777;                 
            --tag-chi-bg: rgba(245, 158, 11, 0.15);  
            --tag-chi-text: #D97706;                 
            --tag-math-bg: rgba(16, 185, 129, 0.15); 
            --tag-math-text: #059669;                
            --tag-type-bg: rgba(59, 130, 246, 0.12); 
            --tag-type-text: #2563EB;                
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #E2E8F0;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .device-simulator {
            width: 375px; height: 812px;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            position: relative; overflow: hidden; border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15); 
            display: flex; flex-direction: column;
        }
        
        .device-simulator::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 40px; box-shadow: inset 0 0 0 8px #FFFFFF, inset 0 0 0 9px rgba(0,0,0,0.1);
            pointer-events: none; z-index: 1000;
        }

        .page-view {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
        }
        .page-view.hidden-left { transform: translateX(-100%); opacity: 0; pointer-events: none; }
        .page-view.hidden-right { transform: translateX(100%); opacity: 0; pointer-events: none; }
        .page-view.active { transform: translateX(0); opacity: 1; pointer-events: auto; }

        .nav-bar {
            padding: 48px 20px 12px; display: flex; align-items: center; justify-content: space-between;
            position: relative; z-index: 10; flex-shrink: 0;
        }
        .nav-title-group { display: flex; flex-direction: column; align-items: center; }
        .nav-title { font-size: 17px; font-weight: 800; color: var(--text-title); letter-spacing: 0.5px;}
        .icon-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-title); }

        /* 顶部导航栏药丸按钮样式 (恢复到顶部栏右侧使用) */
        .header-pill-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 3px;
            height: 26px; padding: 0 8px; border-radius: 8px; border: 1px solid transparent;
            font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            white-space: nowrap; user-select: none;
        }
        .header-pill-btn:active { transform: scale(0.95); }
        .header-pill-btn svg { width: 13px; height: 13px; stroke-width: 2.5; }
        
        .hp-primary { background: var(--primary-light); color: var(--primary-color); border-color: rgba(31, 95, 255, 0.15); }
        .hp-success { background: var(--success-light); color: var(--success-color); border-color: rgba(16, 185, 129, 0.15); }
        .hp-warning { background: var(--warning-light); color: var(--warning-color); border-color: rgba(245, 158, 11, 0.15); }
        .hp-neutral { background: rgba(0, 0, 0, 0.05); color: var(--text-secondary); border-color: rgba(0, 0, 0, 0.08); }

        .main-content {
            flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 0 20px 20px 20px; scrollbar-width: none;
        }
        .main-content::-webkit-scrollbar { display: none; }

        .glass-card {
            background: rgba(255, 255, 255, 0.75); 
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 24px rgba(31, 95, 255, 0.04);
        }

        .version-list-container, .field-list-container, .task-list-container { 
            display: flex; flex-direction: column; gap: 14px; padding-bottom: 40px; 
        }
        
        .list-card {
            background: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 20px; 
            padding: 18px 20px; cursor: pointer;
            box-shadow: 0 8px 24px rgba(31, 95, 255, 0.05); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; justify-content: space-between; align-items: center; gap: 16px;
        }
        .list-card:active {
            transform: scale(0.97); background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 4px 12px rgba(31, 95, 255, 0.08);
        }
        
        .version-info { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .version-tags { display: flex; gap: 8px; flex-wrap: wrap; }
        .version-title { font-size: 17px; font-weight: 800; color: var(--text-title); line-height: 1.4; letter-spacing: 0.2px; }
        
        .task-info { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
        .task-title { font-size: 16px; font-weight: 800; color: var(--text-title); }
        .task-desc { font-size: 13px; color: var(--text-secondary); font-weight: 500; }

        .task-toolbar {
            position: sticky; top: -1px; z-index: 20; margin: 0 -20px 12px; padding: 10px 20px 12px;
            background: rgba(239, 246, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.5); display: flex; flex-direction: column; gap: 12px;
        }

        .tag {
            display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 8px; 
            font-size: 12px; font-weight: 700; letter-spacing: 0.3px;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.7); box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02); 
        }
        .tag-subject-english { background: var(--tag-eng-bg); color: var(--tag-eng-text); }
        .tag-subject-chinese { background: var(--tag-chi-bg); color: var(--tag-chi-text); }
        .tag-subject-math { background: var(--tag-math-bg); color: var(--tag-math-text); }
        .tag-type { background: var(--tag-type-bg); color: var(--tag-type-text); }

        .version-arrow-container {
            display: flex; align-items: center; justify-content: center; width: 32px; height: 32px;
            border-radius: 50%; background: rgba(255, 255, 255, 0.5); color: var(--text-secondary); transition: all 0.2s ease;
        }
        .list-card:active .version-arrow-container {
            background: rgba(31, 95, 255, 0.1); color: var(--primary-color); transform: translateX(4px);
        }

        .stats-card {
            border-radius: 16px; padding: 14px 12px; display: flex; justify-content: space-between;
            margin-bottom: 12px; flex-shrink: 0;
        }
        .stat-item { text-align: center; flex: 1; position: relative; transition: all 0.3s ease; }
        .stat-item:not(:last-child)::after { content: ''; position: absolute; right: 0; top: 15%; height: 70%; width: 1px; background: rgba(0,0,0,0.06); }
        .stat-value { font-size: 18px; font-weight: 800; margin-bottom: 2px; }
        .stat-label { font-size: 11px; color: var(--text-secondary); font-weight: 600; }

        .sticky-toolbar {
            position: sticky; top: -1px; z-index: 20; margin: 0 -20px 12px; padding: 10px 20px 12px;
            background: rgba(239, 246, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.5);
            display: flex; flex-direction: column; gap: 10px;
        }

        .toolbar-row-1 { display: flex; gap: 10px; align-items: center; }
        
        .custom-filter-container { position: relative; width: 104px; flex-shrink: 0; z-index: 30; }
        .custom-filter-trigger {
            height: 38px; background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.9); border-radius: 12px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 12px; font-size: 13px; font-weight: 700; color: var(--primary-color);
            cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.02); transition: all 0.2s;
        }
        .custom-filter-trigger:active { background: rgba(255, 255, 255, 0.95); }
        .custom-filter-trigger svg { width: 14px; height: 14px; transition: transform 0.3s; color: var(--primary-color);}
        .custom-filter-trigger.open svg { transform: rotate(180deg); }
        
        .custom-filter-dropdown {
            position: absolute; top: 100%; left: 0; right: 0; margin-top: 6px;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.9); border-radius: 12px;
            box-shadow: 0 10px 24px rgba(31, 95, 255, 0.08); opacity: 0; pointer-events: none;
            transform: translateY(-10px); transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); overflow: hidden;
        }
        .custom-filter-dropdown.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .filter-option {
            padding: 12px 14px; font-size: 13px; font-weight: 600; color: var(--text-title);
            cursor: pointer; transition: background 0.2s, color 0.2s; border-bottom: 1px solid var(--border-line);
        }
        .filter-option:last-child { border-bottom: none; }
        .filter-option:active { background: rgba(31, 95, 255, 0.1); }
        .filter-option.selected { color: var(--primary-color); background: rgba(31, 95, 255, 0.05); }

        .search-container { position: relative; flex: 1; }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: #9CA3AF; }
        .search-input {
            width: 100%; padding: 10px 14px 10px 36px; border-radius: 10px;
            background: rgba(255, 255, 255, 0.6); border: 1px solid rgba(255, 255, 255, 0.8);
            font-size: 14px; font-weight: 400; color: var(--text-title); outline: none; transition: all 0.2s ease;
        }
        .search-input:focus { background: rgba(255, 255, 255, 0.9); border-color: rgba(31, 95, 255, 0.3); box-shadow: 0 0 0 2px var(--primary-light); }
        .search-input::placeholder { color: #9CA3AF; }

        /* 修复：移除 space-between，让右侧通过 margin-left: auto 自动对齐贴边，释放中间空间 */
        .toolbar-row-2 { display: flex; align-items: center; gap: 6px; }
        
        /* 优化：允许向右侧延展占领部分空隙，并使其两端自然排版 */
        .batch-pill {
            display: flex; align-items: center; background: rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.9); border-radius: 12px; padding: 4px 4px 4px 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03); 
            flex: 1; /* 允许向右侧延展占领部分空隙 */
            max-width: 115px; /* 精确设定的舒适最大宽度 */
            height: 34px;
            justify-content: space-between; /* 数量和刷新按钮分布两端，视觉比例更匀称 */
        }
        .batch-pill-text { font-size: 13px; color: var(--text-secondary); font-weight: 600; white-space: nowrap;}
        
        /* 修复：隐藏 number 原生的上下箭头，微调宽度防止挤压 */
        .batch-pill-input { width: 36px; text-align: center; border: none; background: transparent; font-size: 15px; font-weight: 800; color: var(--text-title); outline: none; padding: 0; -moz-appearance: textfield; }
        .batch-pill-input::-webkit-outer-spin-button,
        .batch-pill-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .batch-pill-btn {
            background: var(--primary-light); color: var(--primary-color); border: none;
            width: 24px; height: 24px; border-radius: 8px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-left: 6px;
        }

        /* 新增：次要操作按钮样式，用于试听开关 */
        .btn-action-secondary {
            display: inline-flex; align-items: center; justify-content: center; gap: 4px;
            background: rgba(31, 95, 255, 0.1); color: var(--primary-color);
            border: 1px solid rgba(31, 95, 255, 0.2); border-radius: 12px;
            height: 34px; padding: 0 10px;
            font-size: 13px; font-weight: 700; cursor: pointer;
            transition: all 0.2s; white-space: nowrap; flex-shrink: 0;
        }
        .btn-action-secondary:active { transform: scale(0.95); background: rgba(31, 95, 255, 0.15); }
        .btn-action-secondary.off {
            background: rgba(0,0,0,0.05); color: var(--text-secondary); border-color: rgba(0,0,0,0.08);
        }

        .btn-action-primary {
            display: inline-flex; align-items: center; justify-content: center; gap: 4px; background: var(--primary-color); color: #fff;
            border: none; border-radius: 12px; height: 34px; padding: 0 14px; font-size: 13px; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 12px rgba(31, 95, 255, 0.25); transition: transform 0.2s; white-space: nowrap; flex-shrink: 0;
        }
        .btn-action-primary:active { transform: scale(0.95); }
        .btn-action-primary svg, .btn-action-secondary svg { width: 14px; height: 14px; }

        .table-container {
            background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.9); border-radius: 16px; box-shadow: 0 8px 24px rgba(31, 95, 255, 0.04);
            margin-bottom: 80px; display: flex; flex-direction: column; height: auto; 
        }
        .table-row {
            display: flex; align-items: stretch; border-bottom: 1px solid var(--border-line); transition: background 0.2s;
            scroll-margin-top: 140px; flex-shrink: 0; 
        }
        .table-row:last-child { border-bottom: none; }
        .table-row.focused { background: rgba(31, 95, 255, 0.08); }

        .row-index-col {
            width: 52px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-right: 1px solid var(--border-line); flex-shrink: 0; padding: 12px 4px; gap: 6px;
        }
        .row-index { font-size: 15px; font-weight: 800; color: var(--text-secondary); font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        
        .badge { display: inline-flex; padding: 2px 6px; border-radius: 6px; font-size: 10px; font-weight: 700; white-space: nowrap; text-align: center; }
        .badge-warning { background: var(--warning-light); color: var(--warning-color); }
        .badge-pending { background: var(--pending-light); color: var(--pending-color); }
        .badge-success { background: var(--success-light); color: var(--success-color); }
        .badge-rejected { background: var(--danger-light); color: var(--danger-color); }

        .row-content-col { flex: 1; display: flex; align-items: center; justify-content: space-between; padding: 16px 14px 16px 12px; min-width: 0; gap: 12px; }
        .row-left-content { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 6px;}
        
        .en-display { display: flex; flex-direction: column; gap: 3px; }
        .en-word-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap;}
        .en-text { font-size: 16px; font-weight: 700; color: var(--text-title); word-break: break-word; }
        .en-phonetic { font-size: 13px; color: var(--text-secondary); font-family: ui-monospace, sans-serif; }
        .en-trans { font-size: 14px; color: var(--text-main); font-weight: 500; }
        .row-text { font-size: 15px; font-weight: 500; color: var(--text-main); word-break: break-word; }
        
        .inline-speaker {
            display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; border: none; outline: none;
            background: var(--primary-light); color: var(--primary-color); cursor: pointer; transition: all 0.2s; 
            vertical-align: middle; flex-shrink: 0;
        }
        .inline-speaker svg { width: 13px; height: 13px; fill: currentColor; }
        .inline-speaker:disabled { background: transparent; color: #CBD5E1; cursor: not-allowed; }
        .inline-speaker.playing-ai { background: var(--primary-color); color: white; animation: pulse-blue 1.5s infinite; }

        .row-right-action { flex-shrink: 0; display: flex; align-items: center; gap: 8px;}
        
        .review-actions { display: flex; gap: 10px; align-items: center; }
        .btn-review { width: 34px; height: 34px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.2s, background 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .btn-review:active { transform: scale(0.9); }
        .btn-approve { background: var(--success-light); color: var(--success-color); border: 1px solid rgba(16, 185, 129, 0.2); }
        .btn-approve:active { background: var(--success-color); color: white; }
        .btn-reject { background: var(--danger-light); color: var(--danger-color); border: 1px solid rgba(239, 68, 68, 0.2); }
        .btn-reject:active { background: var(--danger-color); color: white; }

        .btn-record {
            width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: none; cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(135deg, #FF4B4B 0%, #E11D48 100%); color: white; box-shadow: 0 4px 10px rgba(225, 29, 72, 0.25);
            user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
        }
        .btn-record svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .btn-record.recording { background: #E11D48; transform: scale(1.15); box-shadow: 0 0 0 6px rgba(225, 29, 72, 0.15); }
        
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; text-align: center; color: var(--text-secondary); }
        .empty-state svg { width: 64px; height: 64px; color: #CBD5E1; margin-bottom: 16px; }
        .empty-state h3 { font-size: 16px; font-weight: 700; color: var(--text-title); margin-bottom: 8px; }
        .empty-state p { font-size: 13px; line-height: 1.5; }

        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0 rgba(31, 95, 255, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(31, 95, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(31, 95, 255, 0); } }
        
        .floating-player {
            position: absolute; bottom: 30px; left: 20px; right: 20px; background: rgba(31, 95, 255, 0.95); backdrop-filter: blur(16px); border-radius: 20px; padding: 16px 20px; 
            display: flex; justify-content: space-between; align-items: center; box-shadow: 0 12px 32px rgba(31, 95, 255, 0.3); 
            transform: translateY(150%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 50;
        }
        .floating-player.show { transform: translateY(0); }
        .fp-info { color: white; display: flex; flex-direction: column; gap: 4px; flex: 1; overflow: hidden; white-space: nowrap;}
        .fp-title { font-size: 16px; font-weight: 700; text-overflow: ellipsis; overflow: hidden;}
        .fp-subtitle { font-size: 12px; opacity: 0.8; }
        .fp-controls { display: flex; align-items: center; gap: 12px; flex-shrink: 0;}
        .fp-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.2); color: white; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; transition: all 0.2s;}
        .fp-btn:active { transform: scale(0.9); }
        .fp-btn svg { width: 16px; height: 16px; fill: currentColor; stroke: currentColor;}
        .fp-btn-close { width: 28px; height: 28px; background: transparent; padding:0; color: white;}

        .toast { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.75); color: white; padding: 12px 24px; border-radius: 12px; font-size: 14px; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 200; backdrop-filter: blur(4px); text-align: center;}
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<div class="device-simulator">
    <!-- PAGE 1: 版本选择 -->
    <div id="page-versions" class="page-view active">
        <div class="nav-bar">
            <div class="icon-btn" style="margin-left: -8px;" onclick="showToast('返回外部系统')">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </div>
            <div class="nav-title-group">
                <div class="nav-title" id="version-nav-title">选择音记版本</div>
            </div>
            <div class="icon-btn"></div>
        </div>
        
        <div class="main-content">
            <div class="version-list-container" id="versionList" style="padding-top: 10px;">
                <!-- 由 JS 渲染版本列表 -->
            </div>
        </div>
    </div>

    <!-- PAGE 2: 任务选择 -->
    <div id="page-tasks" class="page-view hidden-right" style="display:none;">
        <div class="nav-bar">
            <div class="icon-btn" style="margin-left: -8px;" onclick="goBackToVersions()">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </div>
            <div class="nav-title-group">
                <div class="nav-title" id="task-nav-title">选任务</div>
            </div>
            <div class="icon-btn"></div>
        </div>
        
        <div class="main-content">

<script>
    const iconMic = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>`;
    const iconPlay = `<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6 4 19 12 6 20 6 4"></polygon></svg>`;
    const iconPause = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>`;
    const iconInlineSpeaker = `<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>`;
    const iconArrowRight = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>`;
    const iconCheck = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
    const iconCross = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
    
    const iconSoundOn = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>`;
    const iconSoundOff = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="1" x2="1" y2="23"></line><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>`;
    const iconMicSm = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>`;
    const iconShield = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>`;

    const fieldConfig = {
        'english': [
            { id: 'en_word', name: '英文' },
            { id: 'en_zh', name: '中文' },
            { id: 'en_sentence', name: '英文句子' }
        ],
        'chinese': [
            { id: 'zh_word', name: '词语' },
            { id: 'zh_pinyin', name: '拼音' },
            { id: 'zh_meaning', name: '意思' }
        ],
        'math': [
            { id: 'math_name', name: '名称' },
            { id: 'math_formula', name: '公式' }
        ]
    };

    const versions = [
        { id: 'v1', subject: 'english', title: '高一英语必修一核心词库', typeName: '英文词汇' },
        { id: 'v1_1', subject: 'english', title: '剑桥雅思核心1000词', typeName: '英文词汇' },
        { id: 'v2', subject: 'chinese', title: '人教版初二语文古诗词', typeName: '古诗词' },
        { id: 'v3', subject: 'math', title: '高考理科综合：数学必背长公式', typeName: '数学公式' }
    ];

    const subjectNames = { 'english': '英语', 'chinese': '语文', 'math': '数学' };

    let activeVersion = null;
    let activeFieldId = null; 
    let activeFieldName = null;
    let activeTaskId = null;
    let activeTaskName = null;
    let currentUserRole = 'executor'; 
    
    let isAutoListenEnabled = true;
    let allTasks = [];
    let allWordsInField = []; 
    let currentBatchOffset = 0; 
    let currentFilteredView = []; 
    let renderedItems = []; 
    let activeFilterValue = '未录音'; 

    const mockContentDict = {
        'english': {
            'en_word': [
                { en: "Apple", ph: "/ˈæpl/", zh: "苹果" },
                { en: "Photosynthesis", ph: "/ˌfoʊtoʊˈsɪnθəsɪs/", zh: "光合作用" },
                { en: "Incomprehensibility", ph: "/ɪnˌkɒmprɪˌhɛnsɪˈbɪlɪti/", zh: "不可理解的事物" },
                { en: "Algorithm", ph: "/ˈælɡərɪðəm/", zh: "算法" }
            ],
            'en_zh': [
                { en: "Book", ph: "/bʊk/", zh: "书本" },
                { en: "Computer", ph: "/kəmˈpjuːtər/", zh: "电脑" }
            ],
            'en_sentence': [
                { en: "I eat an apple every day.", ph: "Sentence", zh: "我每天吃一个苹果。" },
                { en: "Photosynthesis is a crucial biological process.", ph: "Sentence", zh: "光合作用是一个至关重要的生物过程。" }
            ]
        },
        'chinese': {
            'zh_word': [{ text: "落霞" }, { text: "踌躇满志" }, { text: "魑魅魍魉" }],
            'zh_pinyin': [{ text: "luò xiá" }, { text: "chóu chú mǎn zhì" }],
            'zh_meaning': [{ text: "落日的彩霞。" }, { text: "形容对自己的现状非常得意。" }]
        },
        'math': {
            'math_name': [{ text: "勾股定理" }, { text: "泰勒展开式" }],
            'math_formula': [{ text: "a² + b² = c²" }, { text: "f(x) = f(a) + f'(a)(x-a) + ..." }]
        }
    };

    function init() {
        renderVersions();
        
        document.addEventListener('click', function(event) {
            const container = document.getElementById('filterContainer');
            const dropdown = document.getElementById('filterDropdown');
            const trigger = document.getElementById('filterTrigger');
            if (container && !container.contains(event.target)) {
                dropdown.classList.remove('show');
                trigger.classList.remove('open');
            }
        });
    }

    function renderVersions() {
        const listEl = document.getElementById('versionList');
        listEl.innerHTML = '';
        versions.forEach(v => {
            const card = document.createElement('div');
            card.className = 'list-card';
            card.onclick = () => openTaskSelection(v.id); 
            const subjectLabel = subjectNames[v.subject] || '通用';
            const subjectClass = `tag-subject-${v.subject}`;
            
            card.innerHTML = `
                <div class="version-info">
                    <div class="version-tags">
                        <span class="tag ${subjectClass}">${subjectLabel}</span>
                        <span class="tag tag-type">${v.typeName}</span>
                    </div>
                    <div class="version-title">${v.title}</div>
                </div>
                <div class="version-arrow-container">${iconArrowRight}</div>
            `;
            listEl.appendChild(card);
        });
    }

    function openTaskSelection(vId) {
        activeVersion = versions.find(v => v.id === vId);
        document.getElementById('task-nav-title').innerText = '选任务';
        
        allTasks = [];
        for(let i = 1; i <= 15; i++) {
            let taskCount = 100; 
            let creatorName = ['张老师', '李老师', '王老师'][Math.floor(Math.random()*3)];
            
            allTasks.push({
                id: `task_${i}`,
                name: `任务分包 ${i}`,
                total: taskCount,
                creatorName: creatorName
            });
        }

        document.getElementById('taskSearchInput').value = '';
        applyTaskFiltersAndRender();

        document.getElementById('page-tasks').style.display = 'flex';
        document.getElementById('page-versions').classList.replace('active', 'hidden-left');
        document.getElementById('page-tasks').classList.replace('hidden-right', 'active');
        setTimeout(() => { document.getElementById('page-versions').style.display = 'none'; }, 400);
    }

    function handleTaskSearch() {
        applyTaskFiltersAndRender();
    }

    function applyTaskFiltersAndRender() {
        const searchTerm = document.getElementById('taskSearchInput').value.toLowerCase().trim();
        const taskListEl = document.getElementById('taskListContainer');
        const emptyStateEl = document.getElementById('taskEmptyState');
        
        taskListEl.innerHTML = '';

        let filteredTasks = allTasks.filter(task => {
            let searchTarget = `${task.name} ${task.creatorName}`.toLowerCase();
            return searchTarget.includes(searchTerm);
        });

        if (filteredTasks.length === 0) {
            taskListEl.style.display = 'none';
            emptyStateEl.style.display = 'flex';
            return;
        } else {
            taskListEl.style.display = 'flex';
            emptyStateEl.style.display = 'none';
        }

        filteredTasks.forEach(task => {
            const card = document.createElement('div');
            card.className = 'list-card';
            
            card.onclick = () => {
                openFieldSelection(task.id, task.name, task.total);
            };
            
            card.innerHTML = `
                <div class="task-info">
                    <div class="task-title">${task.name}</div>
                    <div class="task-desc" style="margin-top:6px; display:flex; align-items:center; gap:8px;">
                        <span style="background:rgba(31,95,255,0.08); color:var(--primary-color); padding:2px 8px; border-radius:4px; font-weight:700;">${task.total} 词条</span>
                        <span style="color:var(--text-secondary); opacity:0.8;">创建人: ${task.creatorName}</span>
                    </div>
                </div>
                <div class="version-arrow-container" style="background: rgba(31, 95, 255, 0.05);">${iconArrowRight}</div>
            `;
            taskListEl.appendChild(card);
        });
    }

    function openFieldSelection(taskId, taskName, totalCount) {
        activeTaskId = taskId;
        activeTaskName = taskName;
        document.getElementById('field-nav-title').innerText = '选字段';
        
        renderFieldsForSubject(activeVersion.subject, totalCount);
        
        document.getElementById('page-fields').style.display = 'flex';
        requestAnimationFrame(() => {
            document.getElementById('page-tasks').classList.replace('active', 'hidden-left');
            document.getElementById('page-fields').classList.replace('hidden-right', 'active');
        });
        setTimeout(() => { document.getElementById('page-tasks').style.display = 'none'; }, 400);
    }

    function renderFieldsForSubject(subjectKey, taskTotalCount) {
        const fieldListEl = document.getElementById('fieldListContainer');
        fieldListEl.innerHTML = '';
        const fields = fieldConfig[subjectKey];

        fields.forEach(f => {
            const card = document.createElement('div');
            card.className = 'list-card';
            card.onclick = () => openWorkspace(f.id, f.name, taskTotalCount); 
            card.innerHTML = `
                <div class="task-title" style="flex:1;">${f.name}</div>
                <div class="version-arrow-container" style="background: rgba(31, 95, 255, 0.05);">${iconArrowRight}</div>
            `;
            fieldListEl.appendChild(card);
        });
    }

    function openWorkspace(fieldId, fieldName, totalCount) {
        activeFieldId = fieldId;
        activeFieldName = fieldName;
        
        document.getElementById('ws-nav-title').innerText = `${fieldName}音频校对`;
        
        generateWordsForTask(activeVersion.subject, activeFieldId, totalCount);
        updateStatsBoard();

        document.getElementById('searchInput').value = '';
        
        if(currentUserRole === 'reviewer') {
            selectFilter('待审核', null);
        } else {
            selectFilter('未录音', null); 
        }
        
        currentBatchOffset = 0;
        
        document.getElementById('page-workspace').style.display = 'flex';
        requestAnimationFrame(() => {
            document.getElementById('page-fields').classList.replace('active', 'hidden-left');
            document.getElementById('page-workspace').classList.replace('hidden-right', 'active');
        });
        setTimeout(() => { document.getElementById('page-fields').style.display = 'none'; }, 400);
        
        applyFiltersAndRender();
    }

    function goBackToVersions() {
        document.getElementById('page-versions').style.display = 'flex';
        requestAnimationFrame(() => {
            document.getElementById('page-tasks').classList.replace('active', 'hidden-right');
            document.getElementById('page-versions').classList.replace('hidden-left', 'active');
        });
        setTimeout(() => { document.getElementById('page-tasks').style.display = 'none'; }, 400);
    }

    function goBackToTasks() {
        document.getElementById('page-tasks').style.display = 'flex';
        requestAnimationFrame(() => {
            document.getElementById('page-fields').classList.replace('active', 'hidden-right');
            document.getElementById('page-tasks').classList.replace('hidden-left', 'active');
        });
        setTimeout(() => { document.getElementById('page-fields').style.display = 'none'; }, 400);
    }

    function goBackToFields() {
        closeAutoPlay();
        document.getElementById('page-fields').style.display = 'flex';
        requestAnimationFrame(() => {
            document.getElementById('page-workspace').classList.replace('active', 'hidden-right');
            document.getElementById('page-fields').classList.replace('hidden-left', 'active');
        });
        setTimeout(() => { document.getElementById('page-workspace').style.display = 'none'; }, 400);
    }

    function toggleAutoListen() {
        isAutoListenEnabled = !isAutoListenEnabled;
        const trigger = document.getElementById('autoListenToggle');
        
        if(isAutoListenEnabled) {
            trigger.className = 'btn-action-secondary';
            trigger.innerHTML = `${iconSoundOn} 自动播`;
            showToast('已开启录音后自动试听');
        } else {
            trigger.className = 'btn-action-secondary off';
            trigger.innerHTML = `${iconSoundOff} 手动播`;
            showToast('已关闭自动试听');
        }
    }

    function toggleRole() {
        currentUserRole = currentUserRole === 'executor' ? 'reviewer' : 'executor';
        const trigger = document.getElementById('roleTrigger');
        
        if(currentUserRole === 'reviewer') {
            trigger.className = 'header-pill-btn hp-warning';
            trigger.innerHTML = `${iconShield} <span>审核视图</span>`;
            showToast('已切换至审核视图');
            selectFilter('待审核', null);
        } else {
            trigger.className = 'header-pill-btn hp-success';
            trigger.innerHTML = `${iconMicSm} <span>录音视图</span>`;
            showToast('已切换至录音视图');
            selectFilter('未录音', null);
        }
        
        updateStatsBoard();
        applyFiltersAndRender();
    }

    function generateWordsForTask(subjectKey, fieldId, totalCount) {
        allWordsInField = [];
        let dataPool = mockContentDict[subjectKey][fieldId];
        if(!dataPool) dataPool = [{ text: "模拟数据", en: "Mock", ph: "/mɒk/", zh: "模拟" }];

        const statuses = ['unrecorded', 'pending', 'approved', 'rejected'];

        for(let i=0; i<totalCount; i++) {
            let itemData = dataPool[i % dataPool.length];
            let isEnglish = subjectKey === 'english';
            let initialStatus = statuses[i % statuses.length];
            
            let obj = { id: `item_${i}`, status: initialStatus };
            if (isEnglish) {
                obj.en = itemData.en + (i >= dataPool.length ? ` ${i}` : '');
                obj.ph = itemData.ph;
                obj.zh = itemData.zh;
                obj.searchKey = `${obj.en} ${obj.zh}`.toLowerCase();
            } else {
                obj.text = itemData.text + (i >= dataPool.length ? ` (${i})` : '');
                obj.searchKey = obj.text.toLowerCase();
            }
            allWordsInField.push(obj);
        }
    }

    function updateStatsBoard() {
        let total = allWordsInField.length;
        let unrecorded = allWordsInField.filter(w => w.status === 'unrecorded').length;
        let pending = allWordsInField.filter(w => w.status === 'pending').length;
        let approved = allWordsInField.filter(w => w.status === 'approved').length;
        let rejected = allWordsInField.filter(w => w.status === 'rejected').length;
        
        const container = document.getElementById('statsBoardContainer');
        
        if (currentUserRole === 'reviewer') {
            container.innerHTML = `
                <div class="stat-item">
                    <div class="stat-value" style="color: var(--text-title);">${total}</div>
                    <div class="stat-label">总数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" style="color: var(--pending-color);">${pending}</div>
                    <div class="stat-label">待审</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" style="color: var(--success-color);">${approved}</div>
                    <div class="stat-label">已通过</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" style="color: var(--danger-color);">${rejected}</div>
                    <div class="stat-label">需重录</div>
                </div>
            `;
        } else {
            let recorded = pending + approved;
            container.innerHTML = `
                <div class="stat-item">
                    <div class="stat-value" style="color: var(--text-title);">${total}</div>
                    <div class="stat-label">总数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" style="color: var(--success-color);">${recorded}</div>
                    <div class="stat-label">已录</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" style="color: var(--warning-color);">${unrecorded}</div>
                    <div class="stat-label">未录</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" style="color: var(--danger-color);">${rejected}</div>
                    <div class="stat-label">需重录</div>
                </div>
            `;
        }
    }

    function toggleCustomFilter(e) {
        if(e) e.stopPropagation();
        const dropdown = document.getElementById('filterDropdown');
        const trigger = document.getElementById('filterTrigger');
        dropdown.classList.toggle('show');
        trigger.classList.toggle('open');
    }

    function selectFilter(value, e) {
        if(e) e.stopPropagation();
        activeFilterValue = value;
        document.getElementById('filterLabel').innerText = value;
        
        const options = document.querySelectorAll('.filter-option');
        options.forEach(opt => {
            if(opt.innerText === value) opt.classList.add('selected');
            else opt.classList.remove('selected');
        });

        document.getElementById('filterDropdown').classList.remove('show');
        document.getElementById('filterTrigger').classList.remove('open');
        currentBatchOffset = 0; 
        applyFiltersAndRender(); 
        closeAutoPlay();
    }

    function handleSearch() {
        currentBatchOffset = 0; 
        applyFiltersAndRender();
        closeAutoPlay();
    }

    function fetchNextBatch() {
        let batchSize = parseInt(document.getElementById('batchSizeInput').value) || 10;
        currentBatchOffset += batchSize;
        if (currentBatchOffset >= currentFilteredView.length) {
            currentBatchOffset = 0;
            showToast('已循环至开头');
        } else {
            showToast('已加载下一批');
        }
        closeAutoPlay();
        renderCurrentBatch();
    }

    function applyFiltersAndRender() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();

        currentFilteredView = allWordsInField.filter(w => {
            let matchFilter = true;
            if (activeFilterValue !== '全部') {
                if (activeFilterValue === '未录音') matchFilter = w.status === 'unrecorded';
                else if (activeFilterValue === '待审核') matchFilter = w.status === 'pending';
                else if (activeFilterValue === '已通过') matchFilter = w.status === 'approved';
                else if (activeFilterValue === '需重录') matchFilter = w.status === 'rejected';
            }

            let matchSearch = true;
            if (searchTerm !== '') matchSearch = w.searchKey.includes(searchTerm);

            return matchFilter && matchSearch;
        });

        if(currentBatchOffset >= currentFilteredView.length) currentBatchOffset = 0;
        renderCurrentBatch();
    }

    function renderCurrentBatch() {
        const container = document.getElementById('wordListContainer');
        container.innerHTML = '';
        
        let batchSize = parseInt(document.getElementById('batchSizeInput').value) || 10;
        renderedItems = currentFilteredView.slice(currentBatchOffset, currentBatchOffset + batchSize);
        
        document.getElementById('listCountStr').innerText = renderedItems.length > 0 ? `(1-${renderedItems.length})` : '(0)';

        if(renderedItems.length === 0) {
            document.getElementById('wordListContainer').style.display = 'none';
            document.getElementById('emptyState').style.display = 'flex';
            return;
        } else {
            document.getElementById('wordListContainer').style.display = 'flex';
            document.getElementById('emptyState').style.display = 'none';
        }

        renderedItems.forEach((item, index) => {
            let displayIndex = index + 1; 
            let badgeHTML = '';
            let speakerDisabled = '';
            
            if (item.status === 'unrecorded') {
                badgeHTML = `<span class="badge badge-warning">未录音</span>`;
                speakerDisabled = 'disabled';
            } else if (item.status === 'pending') {
                badgeHTML = `<span class="badge badge-pending">待审核</span>`;
            } else if (item.status === 'approved') {
                badgeHTML = `<span class="badge badge-success">已通过</span>`;
            } else if (item.status === 'rejected') {
                badgeHTML = `<span class="badge badge-rejected">需重录</span>`;
            }

            let contentHTML = '';
            if (activeFieldId === 'en_word') {
                contentHTML = `
                    <div class="en-display">
                        <div class="en-word-row">
                            <span class="en-text">${item.en}</span>
                            <button class="inline-speaker" id="play-${item.id}" onclick="handleInlinePlay(this, '${item.id}')" ${speakerDisabled}>${iconInlineSpeaker}</button>
                        </div>
                        <div class="en-phonetic">${item.ph}</div>
                        <div class="en-trans">${item.zh}</div>
                    </div>
                `;
            } else {
                let displayStr = item.text;
                if (activeVersion.subject === 'english') {
                    if (activeFieldId === 'en_zh') displayStr = item.zh;
                    else if (activeFieldId === 'en_sentence') displayStr = item.en;
                    else displayStr = item.en || item.text;
                }
                
                contentHTML = `
                    <div class="en-word-row">
                        <span class="row-text">${displayStr}</span>
                        <button class="inline-speaker" id="play-${item.id}" onclick="handleInlinePlay(this, '${item.id}')" ${speakerDisabled}>${iconInlineSpeaker}</button>
                    </div>
                `;
            }

            let actionHTML = '';
            
            if (currentUserRole === 'reviewer') {
                actionHTML = `
                    <div class="review-actions">
                        <button class="btn-review btn-approve" onclick="handleReview('${item.id}', 'approved')" title="通过审核">${iconCheck}</button>
                        <button class="btn-review btn-reject" onclick="handleReview('${item.id}', 'rejected')" title="需重录">${iconCross}</button>
                    </div>
                `;
            } else {
                const pressEvents = `
                    onmousedown="handlePressStart(this, '${item.id}', event)"
                    onmouseup="handlePressEnd(this, '${item.id}', true, event)"
                    onmouseleave="handlePressEnd(this, '${item.id}', false, event)"
                    ontouchstart="handlePressStart(this, '${item.id}', event)"
                    ontouchend="handlePressEnd(this, '${item.id}', true, event)"
                    ontouchcancel="handlePressEnd(this, '${item.id}', false, event)"
                `;
                actionHTML = `<button class="btn-record" ${pressEvents}>${iconMic}</button>`;
            }

            const itemDiv = document.createElement('div');
            itemDiv.className = 'table-row';
            itemDiv.id = `item-el-${item.id}`;
            
            itemDiv.innerHTML = `
                <div class="row-index-col">
                    <span class="row-index">${displayIndex}</span>
                    <div class="word-meta" id="meta-${item.id}">
                        ${badgeHTML}
                    </div>
                </div>
                <div class="row-content-col">
                    <div class="row-left-content">
                        ${contentHTML}
                    </div>
                    <div class="row-right-action">
                        ${actionHTML}
                    </div>
                </div>
            `;
            container.appendChild(itemDiv);
        });
    }

    function handlePressStart(btn, itemId, e) {
        if(e.type === 'touchstart') { if (e.cancelable) e.preventDefault(); }
        if(isAutoPlaying) togglePauseAutoPlay();
        if (btn.dataset.recording === 'true') return;
        btn.dataset.recording = 'true';
        btn.classList.add('recording');
        
        const itemEl = document.getElementById(`item-el-${itemId}`);
        document.querySelectorAll('.table-row').forEach(el => el.classList.remove('focused'));
        itemEl.classList.add('focused');
        showToast('正在录音...', 800);
    }

    function handlePressEnd(btn, itemId, saveRecord, e) {
        if(e.type === 'touchend' && e.cancelable) e.preventDefault();
        if (btn.dataset.recording !== 'true') return;
        btn.dataset.recording = 'false';
        
        btn.classList.remove('recording');
        const itemEl = document.getElementById(`item-el-${itemId}`);
        itemEl.classList.remove('focused');

        if (saveRecord) {
            if (isAutoListenEnabled) {
                showToast('已保存，自动试听中...');
            } else {
                showToast('已保存，进入待审状态');
            }
            
            setTimeout(() => {
                let item = allWordsInField.find(w => w.id === itemId);
                if(item) {
                    item.status = 'pending';
                    updateStatsBoard();
                    let metaDiv = itemEl.querySelector(`#meta-${item.id}`);
                    metaDiv.innerHTML = `<span class="badge badge-pending">待审核</span>`;
                    let speakerBtn = document.getElementById(`play-${item.id}`);
                    if (speakerBtn) {
                        speakerBtn.disabled = false;
                        if (isAutoListenEnabled) {
                            handleInlinePlay(speakerBtn, item.id);
                        }
                    }
                }
            }, 200);
        } else {
            showToast('已取消录音');
        }
    }

    function handleReview(itemId, newStatus) {
        let item = allWordsInField.find(w => w.id === itemId);
        if (item) {
            if (item.status === 'unrecorded') {
                showToast('该词条尚未录音');
                return;
            }
            item.status = newStatus;
            updateStatsBoard();
            
            const itemEl = document.getElementById(`item-el-${itemId}`);
            if(itemEl) {
                let metaDiv = itemEl.querySelector(`#meta-${item.id}`);
                if (newStatus === 'approved') {
                    metaDiv.innerHTML = `<span class="badge badge-success">已通过</span>`;
                    showToast('审核：已通过', 1000);
                } else {
                    metaDiv.innerHTML = `<span class="badge badge-rejected">需重录</span>`;
                    showToast('审核：需重录', 1000);
                }
            }
        }
    }

    let currentlyPlayingBtn = null;
    let manualPlayTimer = null;

    function handleInlinePlay(btn, itemId) {
        if (btn.disabled) return;
        if(isAutoPlaying) {
            clearTimeout(autoPlayTimer);
            let newIndex = renderedItems.findIndex(w => w.id === itemId);
            if (newIndex !== -1) {
                autoPlayIndex = newIndex;
                isAutoPlayPaused = false;
                document.getElementById('fpPauseBtn').innerHTML = iconPause;
                document.getElementById('fpSubtitle').innerText = '当前批次连播中...';
                playNextInBatch();
            }
            return;
        }

        if (btn.classList.contains('playing-ai')) {
            clearTimeout(manualPlayTimer);
            btn.classList.remove('playing-ai');
            currentlyPlayingBtn = null;
            return;
        }
        if (currentlyPlayingBtn && currentlyPlayingBtn !== btn) {
            clearTimeout(manualPlayTimer);
            currentlyPlayingBtn.classList.remove('playing-ai');
        }
        currentlyPlayingBtn = btn;
        btn.classList.add('playing-ai');
        
        manualPlayTimer = setTimeout(() => {
            if (currentlyPlayingBtn === btn) {
                btn.classList.remove('playing-ai');
                currentlyPlayingBtn = null;
            }
        }, 1500);
    }

    let isAutoPlaying = false;
    let isAutoPlayPaused = false;
    let autoPlayIndex = 0;        
    let autoPlayTimer = null;

    function startAutoPlay() {
        if(renderedItems.length === 0) {
            showToast('当前批次无可播内容');
            return;
        }

        const hasRecordableItem = renderedItems.some(item => item.status !== 'unrecorded');
        if (!hasRecordableItem) {
            showToast('当前批次暂无录音文件');
            return;
        }

        if (currentlyPlayingBtn) {
            clearTimeout(manualPlayTimer);
            currentlyPlayingBtn.classList.remove('playing-ai');
            currentlyPlayingBtn = null;
        }
        document.getElementById('floatingPlayer').classList.add('show');
        isAutoPlaying = true;
        isAutoPlayPaused = false;
        autoPlayIndex = 0;
        document.getElementById('fpPauseBtn').innerHTML = iconPause;
        document.getElementById('fpSubtitle').innerText = '当前批次连播中...';
        playNextInBatch();
    }
    
    function playNextInBatch() {
        if(!isAutoPlaying || isAutoPlayPaused) return;

        let foundValid = false;
        while(autoPlayIndex < renderedItems.length) {
            let item = renderedItems[autoPlayIndex];
            if (item.status !== 'unrecorded') { foundValid = true; break; }
            autoPlayIndex++;
        }

        if(!foundValid || autoPlayIndex >= renderedItems.length) {
            closeAutoPlay();
            showToast('批次连播已完成');
            return;
        }

        let item = renderedItems[autoPlayIndex];
        let displaySeq = autoPlayIndex + 1; 
        
        let textToDisplay = item.text;
        if (activeVersion.subject === 'english') {
            if (activeFieldId === 'en_zh') textToDisplay = item.zh;
            else if (activeFieldId === 'en_sentence' || activeFieldId === 'en_word') textToDisplay = item.en;
            else textToDisplay = item.en || item.text;
        }

        let shortText = textToDisplay.length > 15 ? textToDisplay.substring(0, 15) + '...' : textToDisplay;
        document.getElementById('fpTitle').innerText = `${displaySeq}. ${shortText}`;

        let itemEl = document.getElementById(`item-el-${item.id}`);
        if(itemEl) {
            itemEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            document.querySelectorAll('.inline-speaker.playing-ai').forEach(btn => btn.classList.remove('playing-ai'));
            let targetPlayBtn = document.getElementById(`play-${item.id}`);
            if(targetPlayBtn) targetPlayBtn.classList.add('playing-ai');
        }

        autoPlayTimer = setTimeout(() => {
            autoPlayIndex++;      
            playNextInBatch();
        }, 1500);
    }

    function togglePauseAutoPlay() {
        if(!isAutoPlaying) return;
        isAutoPlayPaused = !isAutoPlayPaused;
        document.getElementById('fpPauseBtn').innerHTML = isAutoPlayPaused ? iconPlay : iconPause;
        document.getElementById('fpSubtitle').innerText = isAutoPlayPaused ? '已暂停连播' : '当前批次连播中...';
        
        if (isAutoPlayPaused) {
            clearTimeout(autoPlayTimer);
            document.querySelectorAll('.inline-speaker.playing-ai').forEach(btn => btn.classList.remove('playing-ai'));
        } else {
            playNextInBatch();
        }
    }
    
    function closeAutoPlay() {
        if(!isAutoPlaying) return;
        document.getElementById('floatingPlayer').classList.remove('show');
        isAutoPlaying = false;
        clearTimeout(autoPlayTimer);
        document.querySelectorAll('.inline-speaker.playing-ai').forEach(btn => btn.classList.remove('playing-ai'));
    }

    function showToast(msg, duration = 1500) {
        let toast = document.getElementById('sys-toast');
        toast.innerText = msg; toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), duration);
    }

    window.onload = init;
</script>
</body>
</html>
