<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>英语音频校对</title>
    <style>
        :root {
            --primary-color: #1F5FFF; 
            --primary-light: rgba(31, 95, 255, 0.1);
            --bg-start: #EFF6FF;
            --bg-end: #DFE7FF;
            
            --text-title: #111827;
            --text-main: #334155;
            --text-secondary: #64748B;
            
            --danger-color: #EF4444;
            --danger-light: rgba(239, 68, 68, 0.1);
            --success-color: #10B981;
            --success-light: rgba(16, 185, 129, 0.1);
            --warning-color: #F59E0B;
            --warning-light: rgba(245, 158, 11, 0.1);
            
            --border-line: rgba(0,0,0,0.06);

            /* 修改：马卡龙糖果色系标签 */
            --tag-eng-bg: rgba(244, 114, 182, 0.15); /* 马卡龙粉色 */
            --tag-eng-text: #DB2777;                 
            --tag-chi-bg: rgba(245, 158, 11, 0.15);  /* 马卡龙黄棕/焦糖色 */
            --tag-chi-text: #D97706;                 
            --tag-math-bg: rgba(16, 185, 129, 0.15); /* 马卡龙清新绿 */
            --tag-math-text: #059669;                
            --tag-type-bg: rgba(59, 130, 246, 0.12); /* 清透水蓝 Blue */
            --tag-type-text: #2563EB;                
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #E2E8F0;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .device-simulator {
            width: 375px; height: 812px;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            position: relative; overflow: hidden; border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15); 
            display: flex; flex-direction: column;
        }
        
        .device-simulator::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 40px; box-shadow: inset 0 0 0 8px #FFFFFF, inset 0 0 0 9px rgba(0,0,0,0.1);
            pointer-events: none; z-index: 1000;
        }

        .page-view {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
        }
        .page-view.hidden-left { transform: translateX(-100%); opacity: 0; pointer-events: none; }
        .page-view.hidden-right { transform: translateX(100%); opacity: 0; pointer-events: none; }
        .page-view.active { transform: translateX(0); opacity: 1; pointer-events: auto; }

        .nav-bar {
            padding: 48px 20px 12px; display: flex; align-items: center; justify-content: space-between;
            position: relative; z-index: 10; flex-shrink: 0;
        }
        .nav-title-group { display: flex; flex-direction: column; align-items: center; }
        .nav-title { font-size: 17px; font-weight: 800; color: var(--text-title); letter-spacing: 0.5px;}
        .icon-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-title); }

        .main-content {
            flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 0 20px 20px 20px; scrollbar-width: none;
        }
        .main-content::-webkit-scrollbar { display: none; }

        .glass-card {
            background: rgba(255, 255, 255, 0.75); 
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 24px rgba(31, 95, 255, 0.04);
        }

        .version-list-container { display: flex; flex-direction: column; gap: 16px; padding-bottom: 40px; }
        
        .version-card {
            background: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 20px; 
            padding: 18px 20px; cursor: pointer;
            box-shadow: 0 8px 24px rgba(31, 95, 255, 0.05); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; justify-content: space-between; align-items: center; gap: 16px;
        }
        .version-card:active {
            transform: scale(0.97); background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 4px 12px rgba(31, 95, 255, 0.08);
        }
        
        .version-info { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .version-tags { display: flex; gap: 8px; flex-wrap: wrap; }
        .version-title { font-size: 17px; font-weight: 800; color: var(--text-title); line-height: 1.4; letter-spacing: 0.2px; }

        .tag {
            display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 8px; 
            font-size: 12px; font-weight: 700; letter-spacing: 0.3px;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.7); box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02); 
        }
        .tag-subject-english { background: var(--tag-eng-bg); color: var(--tag-eng-text); }
        .tag-subject-chinese { background: var(--tag-chi-bg); color: var(--tag-chi-text); }
        .tag-subject-math { background: var(--tag-math-bg); color: var(--tag-math-text); }
        .tag-type { background: var(--tag-type-bg); color: var(--tag-type-text); }

        .version-arrow-container {
            display: flex; align-items: center; justify-content: center; width: 32px; height: 32px;
            border-radius: 50%; background: rgba(255, 255, 255, 0.5); color: var(--text-secondary); transition: all 0.2s ease;
        }
        .version-card:active .version-arrow-container {
            background: rgba(31, 95, 255, 0.1); color: var(--primary-color); transform: translateX(4px);
        }

        /* 新增：独立玻璃卡片式的字段选项 (替换之前的紧凑列表) */
        .field-list-container { display: flex; flex-direction: column; gap: 14px; padding: 12px 0 40px; }
        .field-card {
            background: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 18px; 
            padding: 18px 20px; cursor: pointer;
            box-shadow: 0 6px 20px rgba(31, 95, 255, 0.04); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; justify-content: space-between; align-items: center;
        }
        .field-card:active {
            transform: scale(0.97); background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 4px 12px rgba(31, 95, 255, 0.08);
        }
        .field-card-title { font-size: 16px; font-weight: 700; color: var(--text-title); letter-spacing: 0.2px; }

        .stats-card {
            border-radius: 16px; padding: 14px 16px; display: flex; justify-content: space-between;
            margin-bottom: 12px; flex-shrink: 0;
        }
        .stat-item { text-align: center; flex: 1; position: relative; }
        .stat-item:not(:last-child)::after { content: ''; position: absolute; right: 0; top: 15%; height: 70%; width: 1px; background: rgba(0,0,0,0.06); }
        .stat-value { font-size: 22px; font-weight: 800; margin-bottom: 2px; }
        .stat-label { font-size: 11px; color: var(--text-secondary); font-weight: 600; }

        .sticky-toolbar {
            position: sticky; top: -1px; z-index: 20; margin: 0 -20px 12px; padding: 10px 20px 12px;
            background: rgba(239, 246, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.5);
            display: flex; flex-direction: column; gap: 10px;
        }

        .toolbar-row-1 { display: flex; gap: 10px; align-items: center; }
        
        /* 修改：全新的自定义下拉框样式 */
        .custom-filter-container { position: relative; width: 104px; flex-shrink: 0; z-index: 30; }
        .custom-filter-trigger {
            height: 38px; background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.9); border-radius: 12px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 12px; font-size: 13px; font-weight: 700; color: var(--primary-color);
            cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.02); transition: all 0.2s;
        }
        .custom-filter-trigger:active { background: rgba(255, 255, 255, 0.95); }
        .custom-filter-trigger svg { width: 14px; height: 14px; transition: transform 0.3s; color: var(--primary-color);}
        .custom-filter-trigger.open svg { transform: rotate(180deg); }
        
        .custom-filter-dropdown {
            position: absolute; top: 100%; left: 0; right: 0; margin-top: 6px;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.9); border-radius: 12px;
            box-shadow: 0 10px 24px rgba(31, 95, 255, 0.08); opacity: 0; pointer-events: none;
            transform: translateY(-10px); transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); overflow: hidden;
        }
        .custom-filter-dropdown.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .filter-option {
            padding: 12px 14px; font-size: 13px; font-weight: 600; color: var(--text-title);
            cursor: pointer; transition: background 0.2s, color 0.2s; border-bottom: 1px solid var(--border-line);
        }
        .filter-option:last-child { border-bottom: none; }
        .filter-option:active { background: rgba(31, 95, 255, 0.1); }
        .filter-option.selected { color: var(--primary-color); background: rgba(31, 95, 255, 0.05); }

        .search-container { position: relative; flex: 1; }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: #9CA3AF; }
        .search-input {
            width: 100%; padding: 10px 14px 10px 36px; border-radius: 10px;
            background: rgba(255, 255, 255, 0.6); border: 1px solid rgba(255, 255, 255, 0.8);
            font-size: 14px; font-weight: 400; color: var(--text-title); outline: none; transition: all 0.2s ease;
        }
        .search-input:focus { background: rgba(255, 255, 255, 0.9); border-color: rgba(31, 95, 255, 0.3); box-shadow: 0 0 0 2px var(--primary-light); }
        .search-input::placeholder { color: #9CA3AF; }

        .toolbar-row-2 { display: flex; justify-content: space-between; align-items: stretch; gap: 8px; }
        .batch-pill {
            display: flex; align-items: center; flex: 1; background: rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.9); border-radius: 12px; padding: 4px 6px 4px 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03); min-width: 0; justify-content: space-between;
        }
        .batch-pill-text { font-size: 12px; color: var(--text-secondary); font-weight: 600; margin-right: 2px; white-space: nowrap;}
        .batch-pill-input { width: 28px; text-align: center; border: none; background: transparent; font-size: 14px; font-weight: 800; color: var(--text-title); outline: none; padding: 0;}
        .batch-pill-btn {
            background: var(--primary-light); color: var(--primary-color); border: none;
            padding: 6px 10px; border-radius: 8px; font-size: 12px; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; gap: 2px; flex-shrink: 0; white-space: nowrap;
        }

        .btn-action-primary {
            display: inline-flex; align-items: center; justify-content: center; gap: 4px; background: var(--primary-color); color: #fff;
            border: none; padding: 0 14px; border-radius: 12px; font-size: 13px; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 12px rgba(31, 95, 255, 0.25); transition: transform 0.2s; white-space: nowrap; flex-shrink: 0;
        }
        .btn-action-primary:active { transform: scale(0.95); }

        .table-container {
            background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.9); border-radius: 16px; box-shadow: 0 8px 24px rgba(31, 95, 255, 0.04);
            margin-bottom: 80px; display: flex; flex-direction: column; height: auto; 
        }
        .table-row {
            display: flex; align-items: stretch; border-bottom: 1px solid var(--border-line); transition: background 0.2s;
            scroll-margin-top: 140px; flex-shrink: 0; 
        }
        .table-row:last-child { border-bottom: none; }
        .table-row.focused { background: rgba(31, 95, 255, 0.08); }

        .row-index-col {
            width: 52px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-right: 1px solid var(--border-line); flex-shrink: 0; padding: 12px 4px; gap: 6px;
        }
        .row-index { font-size: 15px; font-weight: 800; color: var(--text-secondary); font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        .badge { display: inline-flex; padding: 2px 6px; border-radius: 6px; font-size: 10px; font-weight: 700; white-space: nowrap; text-align: center; }
        .badge-success { background: var(--success-light); color: var(--success-color); }
        .badge-warning { background: var(--warning-light); color: var(--warning-color); }

        .row-content-col { flex: 1; display: flex; align-items: center; justify-content: space-between; padding: 16px 14px 16px 12px; min-width: 0; gap: 12px; }
        .row-left-content { flex: 1; min-width: 0; line-height: 1.5; }
        .row-text { font-size: 15px; font-weight: 500; color: var(--text-main); word-break: break-word; vertical-align: middle; }
        
        .inline-speaker {
            display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; border: none; outline: none;
            background: var(--primary-light); color: var(--primary-color); cursor: pointer; transition: all 0.2s; 
            vertical-align: middle; margin-left: 6px; margin-top: -2px; flex-shrink: 0;
        }
        .inline-speaker svg { width: 13px; height: 13px; fill: currentColor; }
        .inline-speaker:disabled { background: transparent; color: #CBD5E1; cursor: not-allowed; }
        .inline-speaker.playing-ai { background: var(--primary-color); color: white; animation: pulse-blue 1.5s infinite; }

        .row-right-action { flex-shrink: 0; display: flex; align-items: center;}
        .btn-record {
            width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: none; cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(135deg, #FF4B4B 0%, #E11D48 100%); color: white; box-shadow: 0 4px 10px rgba(225, 29, 72, 0.25);
            user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
        }
        .btn-record svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .btn-record.recording { background: #E11D48; transform: scale(1.15); box-shadow: 0 0 0 6px rgba(225, 29, 72, 0.15); }
        
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; text-align: center; color: var(--text-secondary); }
        .empty-state svg { width: 64px; height: 64px; color: #CBD5E1; margin-bottom: 16px; }
        .empty-state h3 { font-size: 16px; font-weight: 700; color: var(--text-title); margin-bottom: 8px; }
        .empty-state p { font-size: 13px; line-height: 1.5; }

        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0 rgba(31, 95, 255, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(31, 95, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(31, 95, 255, 0); } }
        
        .floating-player {
            position: absolute; bottom: 30px; left: 20px; right: 20px; background: rgba(31, 95, 255, 0.95); backdrop-filter: blur(16px); border-radius: 20px; padding: 16px 20px; 
            display: flex; justify-content: space-between; align-items: center; box-shadow: 0 12px 32px rgba(31, 95, 255, 0.3); 
            transform: translateY(150%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 50;
        }
        .floating-player.show { transform: translateY(0); }
        .fp-info { color: white; display: flex; flex-direction: column; gap: 4px; flex: 1; overflow: hidden; white-space: nowrap;}
        .fp-title { font-size: 16px; font-weight: 700; text-overflow: ellipsis; overflow: hidden;}
        .fp-subtitle { font-size: 12px; opacity: 0.8; }
        .fp-controls { display: flex; align-items: center; gap: 12px; flex-shrink: 0;}
        .fp-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.2); color: white; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; transition: all 0.2s;}
        .fp-btn:active { transform: scale(0.9); }
        .fp-btn svg { width: 16px; height: 16px; fill: currentColor; stroke: currentColor;}
        .fp-btn-close { width: 28px; height: 28px; background: transparent; padding:0; color: white;}

        .toast { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.75); color: white; padding: 12px 24px; border-radius: 12px; font-size: 14px; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 200; backdrop-filter: blur(4px); }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<div class="device-simulator">
    <!-- PAGE 1: 版本选择 -->
    <div id="page-versions" class="page-view active">
        <div class="nav-bar">
            <div class="icon-btn" style="margin-left: -8px;" onclick="showToast('返回外部系统')">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </div>
            <div class="nav-title-group">
                <div class="nav-title" id="version-nav-title">选择音记版本</div>
            </div>
            <div class="icon-btn"></div>
        </div>
        
        <div class="main-content">
            <div class="version-list-container" id="versionList" style="padding-top: 10px;">
                <!-- 由 JS 渲染卡片式列表 -->
            </div>
        </div>
    </div>

    <!-- PAGE 2: 动态字段选择 -->
    <div id="page-fields" class="page-view hidden-right" style="display:none;">
        <div class="nav-bar">
            <div class="icon-btn" style="margin-left: -8px;" onclick="goBackToVersions()">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </div>
            <div class="nav-title-group">
                <div class="nav-title">选择字段</div>
            </div>
            <div class="icon-btn"></div>
        </div>
        
        <div class="main-content">
            <!-- 替换为新的卡片式容器 -->
            <div class="field-list-container" id="fieldListContainer">
                <!-- 由 JS 动态渲染独立玻璃卡片 -->
            </div>
        </div>
    </div>

    <!-- PAGE 3: 录音工作台 -->
    <div id="page-workspace" class="page-view hidden-right" style="display:none;">
        <div class="nav-bar">
            <div class="icon-btn" onclick="goBackToFields()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </div>
            <div class="nav-title-group">
                <div class="nav-title" id="ws-nav-title">音频校对</div>
            </div>
            <div class="icon-btn"></div>
        </div>

        <div class="main-content">
            <div class="stats-card glass-card">
                <div class="stat-item">
                    <div class="stat-value" style="color: var(--text-title);" id="stat-total">0</div>
                    <div class="stat-label">总项数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" style="color: var(--success-color);" id="stat-recorded">0</div>
                    <div class="stat-label">已录音</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" style="color: var(--warning-color);" id="stat-unrecorded">0</div>
                    <div class="stat-label">未录音</div>
                </div>
            </div>

            <div class="sticky-toolbar">
                <div class="toolbar-row-1">
                    <!-- 全新自定义的玻璃态下拉菜单 -->
                    <div class="custom-filter-container" id="filterContainer">
                        <div class="custom-filter-trigger" id="filterTrigger" onclick="toggleCustomFilter(event)">
                            <span id="filterLabel">未录音</span>
                            <svg class="filter-icon-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </div>
                        <div class="custom-filter-dropdown" id="filterDropdown">
                            <div class="filter-option" onclick="selectFilter('全部', event)">全部</div>
                            <div class="filter-option selected" id="opt-unrecorded" onclick="selectFilter('未录音', event)">未录音</div>
                            <div class="filter-option" onclick="selectFilter('已录音', event)">已录音</div>
                            <div class="filter-option" onclick="selectFilter('需重录', event)">需重录</div>
                        </div>
                    </div>
                    
                    <div class="search-container">
                        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <input type="text" id="searchInput" class="search-input" placeholder="输入关键字搜索..." oninput="handleSearch()">
                    </div>
                </div>

                <div class="toolbar-row-2">
                    <div class="batch-pill">
                        <span class="batch-pill-text">提取</span>
                        <input type="number" id="batchSizeInput" class="batch-pill-input" value="10" min="1" max="100">
                        <span class="batch-pill-text">项</span>
                        <button class="batch-pill-btn" onclick="fetchNextBatch()">
                            <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                            换一批
                        </button>
                    </div>
                    <button class="btn-action-primary" onclick="startAutoPlay()">
                        <svg class="icon-sm" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                        连播 <span id="listCountStr" style="font-weight:500; opacity:0.9; margin-left:2px;">(1-10)</span>
                    </button>
                </div>
            </div>

            <div class="table-container" id="wordListContainer">
                <!-- 列表由 JS 渲染 -->
            </div>
            
            <div id="emptyState" class="empty-state" style="display: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                <h3>无匹配数据</h3>
                <p>当前筛选条件下暂无需要校对的词汇</p>
            </div>
        </div>
    </div>

    <!-- 底部连播浮窗 -->
    <div class="floating-player" id="floatingPlayer">
        <div class="fp-info">
            <div class="fp-title" id="fpTitle">Apple</div>
            <div class="fp-subtitle" id="fpSubtitle">自动连播中...</div>
        </div>
        <div class="fp-controls">
            <button class="fp-btn" id="fpPauseBtn" onclick="togglePauseAutoPlay()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
            </button>
            <button class="fp-btn fp-btn-close" onclick="closeAutoPlay()">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
    </div>

    <div class="toast" id="sys-toast"></div>
</div>

<script>
    const iconMic = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>`;
    const iconPlay = `<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6 4 19 12 6 20 6 4"></polygon></svg>`;
    const iconPause = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>`;
    const iconInlineSpeaker = `<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>`;
    const iconArrowRight = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>`;

    const fieldConfig = {
        'english': [
            { id: 'en_word', name: '英文' },
            { id: 'en_zh', name: '中文' },
            { id: 'en_sentence', name: '英文句子' }
        ],
        'chinese': [
            { id: 'zh_word', name: '词语' },
            { id: 'zh_pinyin', name: '拼音' },
            { id: 'zh_meaning', name: '意思' }
        ],
        'math': [
            { id: 'math_name', name: '名称' },
            { id: 'math_formula', name: '公式' }
        ]
    };

    const versions = [
        { id: 'v1', subject: 'english', title: '高一英语必修一核心词库', typeName: '英文词汇' },
        { id: 'v1_1', subject: 'english', title: '剑桥雅思核心1000词', typeName: '英文词汇' },
        { id: 'v1_2', subject: 'english', title: '托福听力场景必背词汇', typeName: '英文句子' },
        { id: 'v1_3', subject: 'english', title: '专四核心词组搭配', typeName: '中英对照' },
        { id: 'v1_4', subject: 'english', title: '考研英语历年真题长难句', typeName: '长难句' },
        { id: 'v2', subject: 'chinese', title: '人教版初二语文古诗词', typeName: '古诗词' },
        { id: 'v2_1', subject: 'chinese', title: '高中必背文言文大全', typeName: '文言文' },
        { id: 'v2_2', subject: 'chinese', title: '现代汉语常用词语表', typeName: '现代汉语' },
        { id: 'v3', subject: 'math', title: '高考理科综合：数学必背长公式', typeName: '数学公式' }, 
        { id: 'v3_1', subject: 'math', title: '微积分导数与积分常用表', typeName: '微积分' }, 
        { id: 'v3_2', subject: 'math', title: '解析几何定理推导集合', typeName: '解析几何' }, 
    ];

    const subjectNames = { 'english': '英语', 'chinese': '语文', 'math': '数学' };

    let activeVersion = null;
    let activeFieldId = null; 
    let activeFieldName = null;
    
    let allWordsInField = []; 
    let currentBatchOffset = 0; 
    let currentFilteredView = []; 
    let renderedItems = []; 
    let activeFilterValue = '未录音'; // 默认筛选改为“未录音”

    const mockContentDict = {
        'english': {
            'en_word': ["Apple", "Photosynthesis", "Incomprehensibilities"],
            'en_zh': ["苹果", "光合作用", "不可理解的事物"],
            'en_sentence': ["I eat an apple.", "Photosynthesis is a process.", "The sheer incomprehensibilities..."]
        },
        'chinese': {
            'zh_word': ["落霞", "踌躇满志", "魑魅魍魉"],
            'zh_pinyin': ["luò xiá", "chóu chú mǎn zhì", "chī mèi wǎng liǎng"],
            'zh_meaning': ["落日的彩霞。", "形容对自己的现状或取得的成就非常得意。", "指传说中害人的鬼怪。"]
        },
        'math': {
            'math_name': ["勾股定理", "泰勒展开式", "高斯-博内定理"],
            'math_formula': ["a² + b² = c²", "f(x) = f(a) + f'(a)(x-a) + ...", "∫∫_M K dA + ∫_∂M k_g ds = 2πχ(M)"]
        }
    };

    function init() {
        renderVersions();
        
        // 点击页面其他地方关闭自定义下拉框
        document.addEventListener('click', function(event) {
            const container = document.getElementById('filterContainer');
            const dropdown = document.getElementById('filterDropdown');
            const trigger = document.getElementById('filterTrigger');
            if (container && !container.contains(event.target)) {
                dropdown.classList.remove('show');
                trigger.classList.remove('open');
            }
        });
    }

    function renderVersions() {
        const listEl = document.getElementById('versionList');
        listEl.innerHTML = '';

        versions.forEach(v => {
            const card = document.createElement('div');
            card.className = 'version-card';
            card.onclick = () => openFieldSelection(v.id);
            
            const subjectLabel = subjectNames[v.subject] || '通用';
            const subjectClass = `tag-subject-${v.subject}`;
            
            // 标签在上，标题在下
            card.innerHTML = `
                <div class="version-info">
                    <div class="version-tags">
                        <span class="tag ${subjectClass}">${subjectLabel}</span>
                        <span class="tag tag-type">${v.typeName}</span>
                    </div>
                    <div class="version-title">${v.title}</div>
                </div>
                <div class="version-arrow-container">
                    ${iconArrowRight}
                </div>
            `;
            listEl.appendChild(card);
        });
    }

    function openFieldSelection(vId) {
        activeVersion = versions.find(v => v.id === vId);
        renderFieldsForSubject(activeVersion.subject);
        
        document.getElementById('page-fields').style.display = 'flex';
        document.getElementById('page-versions').classList.replace('active', 'hidden-left');
        document.getElementById('page-fields').classList.replace('hidden-right', 'active');
        
        setTimeout(() => { document.getElementById('page-versions').style.display = 'none'; }, 400);
    }

    function renderFieldsForSubject(subjectKey) {
        const fieldListEl = document.getElementById('fieldListContainer');
        fieldListEl.innerHTML = '';
        const fields = fieldConfig[subjectKey];

        // 采用全新的独立卡片渲染字段，抛弃之前的紧凑组
        fields.forEach(f => {
            const card = document.createElement('div');
            card.className = 'field-card';
            card.onclick = () => openWorkspace(f.id, f.name);
            card.innerHTML = `
                <div class="field-card-title">${f.name}</div>
                <div class="version-arrow-container" style="background: rgba(31, 95, 255, 0.05);">
                    ${iconArrowRight}
                </div>
            `;
            fieldListEl.appendChild(card);
        });
    }

    function goBackToVersions() {
        document.getElementById('page-versions').style.display = 'flex';
        // 稍微延时以确保 display:flex 生效后再进行过渡
        requestAnimationFrame(() => {
            document.getElementById('page-fields').classList.replace('active', 'hidden-right');
            document.getElementById('page-versions').classList.replace('hidden-left', 'active');
        });
        
        setTimeout(() => { document.getElementById('page-fields').style.display = 'none'; }, 400);
    }

    function openWorkspace(fieldKey, fieldName) {
        activeFieldId = fieldKey;
        activeFieldName = fieldName;
        
        // 动态设置标题，例如：英文音频校对、词语音频校对
        document.getElementById('ws-nav-title').innerText = `${fieldName}音频校对`;
        
        generateWordsForField(activeVersion.subject, fieldKey);
        updateStatsBoard();

        document.getElementById('searchInput').value = '';
        
        // 初始化恢复为“未录音”筛选态
        selectFilter('未录音', null); 
        currentBatchOffset = 0;
        
        document.getElementById('page-workspace').style.display = 'flex';
        requestAnimationFrame(() => {
            document.getElementById('page-fields').classList.replace('active', 'hidden-left');
            document.getElementById('page-workspace').classList.replace('hidden-right', 'active');
        });
        
        setTimeout(() => { document.getElementById('page-fields').style.display = 'none'; }, 400);
        
        applyFiltersAndRender();
    }

    function goBackToFields() {
        closeAutoPlay();
        document.getElementById('page-fields').style.display = 'flex';
        requestAnimationFrame(() => {
            document.getElementById('page-workspace').classList.replace('active', 'hidden-right');
            document.getElementById('page-fields').classList.replace('hidden-left', 'active');
        });
        setTimeout(() => { document.getElementById('page-workspace').style.display = 'none'; }, 400);
    }

    function toggleCustomFilter(e) {
        if(e) e.stopPropagation();
        const dropdown = document.getElementById('filterDropdown');
        const trigger = document.getElementById('filterTrigger');
        dropdown.classList.toggle('show');
        trigger.classList.toggle('open');
    }

    function selectFilter(value, e) {
        if(e) e.stopPropagation();
        activeFilterValue = value;
        document.getElementById('filterLabel').innerText = value;
        
        // 更新下拉列表中的选中样式
        const options = document.querySelectorAll('.filter-option');
        options.forEach(opt => {
            if(opt.innerText === value) opt.classList.add('selected');
            else opt.classList.remove('selected');
        });

        // 收起下拉框
        document.getElementById('filterDropdown').classList.remove('show');
        document.getElementById('filterTrigger').classList.remove('open');

        // 触发列表渲染
        currentBatchOffset = 0; 
        applyFiltersAndRender(); 
        closeAutoPlay();
    }

    function generateWordsForField(subjectKey, fieldId) {
        allWordsInField = [];
        let dataPool = mockContentDict[subjectKey][fieldId];
        if(!dataPool) dataPool = ["模拟数据1", "模拟数据2"];

        const totalToGen = 50; 
        const recordedCount = 15; 
        
        for(let i=0; i<totalToGen; i++) {
            let text = dataPool[i % dataPool.length];
            if(i > dataPool.length) text += ` (测试长文本自动换行 ${i})`;
            let status = i < recordedCount ? 'recorded' : 'unrecorded';
            allWordsInField.push({ id: `item_${i}`, text: text, status: status });
        }
    }

    function updateStatsBoard() {
        let total = allWordsInField.length;
        let recorded = allWordsInField.filter(w => w.status === 'recorded').length;
        let unrecorded = total - recorded; 
        
        document.getElementById('stat-total').innerText = total;
        document.getElementById('stat-recorded').innerText = recorded;
        document.getElementById('stat-unrecorded').innerText = unrecorded;
    }

    function handleSearch() {
        currentBatchOffset = 0; 
        applyFiltersAndRender();
        closeAutoPlay();
    }

    function fetchNextBatch() {
        let batchSize = parseInt(document.getElementById('batchSizeInput').value) || 10;
        currentBatchOffset += batchSize;
        if (currentBatchOffset >= currentFilteredView.length) {
            currentBatchOffset = 0;
            showToast('已循环至开头');
        } else {
            showToast('已加载下一批');
        }
        closeAutoPlay();
        renderCurrentBatch();
    }

    function applyFiltersAndRender() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();

        if (activeFilterValue === '需重录') {
            document.getElementById('wordListContainer').style.display = 'none';
            document.getElementById('emptyState').style.display = 'flex';
            document.getElementById('listCountStr').innerText = '(0)';
            renderedItems = [];
            return;
        } else {
            document.getElementById('wordListContainer').style.display = 'flex';
            document.getElementById('emptyState').style.display = 'none';
        }

        currentFilteredView = allWordsInField.filter(w => {
            let matchFilter = true;
            if (activeFilterValue === '未录音') matchFilter = w.status === 'unrecorded';
            else if (activeFilterValue === '已录音') matchFilter = w.status === 'recorded';

            let matchSearch = true;
            if (searchTerm !== '') matchSearch = w.text.toLowerCase().includes(searchTerm);

            return matchFilter && matchSearch;
        });

        if(currentBatchOffset >= currentFilteredView.length) currentBatchOffset = 0;
        renderCurrentBatch();
    }

    function renderCurrentBatch() {
        const container = document.getElementById('wordListContainer');
        container.innerHTML = '';
        
        let batchSize = parseInt(document.getElementById('batchSizeInput').value) || 10;
        renderedItems = currentFilteredView.slice(currentBatchOffset, currentBatchOffset + batchSize);
        
        document.getElementById('listCountStr').innerText = renderedItems.length > 0 ? `(1-${renderedItems.length})` : '(0)';

        if(renderedItems.length === 0) {
            document.getElementById('wordListContainer').style.display = 'none';
            document.getElementById('emptyState').style.display = 'flex';
            return;
        } else {
            document.getElementById('wordListContainer').style.display = 'flex';
            document.getElementById('emptyState').style.display = 'none';
        }

        renderedItems.forEach((item, index) => {
            let displayIndex = index + 1; 
            let badgeHTML = '';
            let speakerDisabled = '';
            
            if (item.status === 'unrecorded') {
                badgeHTML = `<span class="badge badge-warning">待录音</span>`;
                speakerDisabled = 'disabled';
            } else {
                badgeHTML = `<span class="badge badge-success">已录音</span>`;
            }

            const pressEvents = `
                onmousedown="handlePressStart(this, '${item.id}', event)"
                onmouseup="handlePressEnd(this, '${item.id}', true, event)"
                onmouseleave="handlePressEnd(this, '${item.id}', false, event)"
                ontouchstart="handlePressStart(this, '${item.id}', event)"
                ontouchend="handlePressEnd(this, '${item.id}', true, event)"
                ontouchcancel="handlePressEnd(this, '${item.id}', false, event)"
            `;

            const itemDiv = document.createElement('div');
            itemDiv.className = 'table-row';
            itemDiv.id = `item-el-${item.id}`;
            
            itemDiv.innerHTML = `
                <div class="row-index-col">
                    <span class="row-index">${displayIndex}</span>
                    <div class="word-meta" id="meta-${item.id}">
                        ${badgeHTML}
                    </div>
                </div>
                <div class="row-content-col">
                    <div class="row-left-content">
                        <span class="row-text">${item.text}</span>
                        <button class="inline-speaker" id="play-${item.id}" onclick="handleInlinePlay(this, '${item.id}')" ${speakerDisabled}>
                            ${iconInlineSpeaker}
                        </button>
                    </div>
                    <div class="row-right-action">
                        <button class="btn-record" ${pressEvents}>${iconMic}</button>
                    </div>
                </div>
            `;
            container.appendChild(itemDiv);
        });
    }

    function handlePressStart(btn, itemId, e) {
        if(e.type === 'touchstart') { if (e.cancelable) e.preventDefault(); }
        if(isAutoPlaying) togglePauseAutoPlay();
        if (btn.dataset.recording === 'true') return;
        btn.dataset.recording = 'true';
        btn.classList.add('recording');
        
        const itemEl = document.getElementById(`item-el-${itemId}`);
        document.querySelectorAll('.table-row').forEach(el => el.classList.remove('focused'));
        itemEl.classList.add('focused');
        showToast('正在录音，松开保存...', 800);
    }

    function handlePressEnd(btn, itemId, saveRecord, e) {
        if(e.type === 'touchend' && e.cancelable) e.preventDefault();
        if (btn.dataset.recording !== 'true') return;
        btn.dataset.recording = 'false';
        
        btn.classList.remove('recording');
        const itemEl = document.getElementById(`item-el-${itemId}`);
        itemEl.classList.remove('focused');

        if (saveRecord) {
            showToast('保存成功');
            setTimeout(() => {
                let item = allWordsInField.find(w => w.id === itemId);
                if(item) {
                    item.status = 'recorded';
                    updateStatsBoard();
                    let metaDiv = itemEl.querySelector(`#meta-${item.id}`);
                    metaDiv.innerHTML = `<span class="badge badge-success">已录音</span>`;
                    let speakerBtn = document.getElementById(`play-${item.id}`);
                    if (speakerBtn) speakerBtn.disabled = false;
                }
            }, 200);
        } else {
            showToast('已取消录音');
        }
    }

    let currentlyPlayingBtn = null;
    let manualPlayTimer = null;

    function handleInlinePlay(btn, itemId) {
        if (btn.disabled) return;
        if(isAutoPlaying) {
            clearTimeout(autoPlayTimer);
            let newIndex = renderedItems.findIndex(w => w.id === itemId);
            if (newIndex !== -1) {
                autoPlayIndex = newIndex;
                isAutoPlayPaused = false;
                document.getElementById('fpPauseBtn').innerHTML = iconPause;
                document.getElementById('fpSubtitle').innerText = '当前批次连播中...';
                playNextInBatch();
            }
            return;
        }

        if (btn.classList.contains('playing-ai')) {
            clearTimeout(manualPlayTimer);
            btn.classList.remove('playing-ai');
            currentlyPlayingBtn = null;
            return;
        }
        if (currentlyPlayingBtn && currentlyPlayingBtn !== btn) {
            clearTimeout(manualPlayTimer);
            currentlyPlayingBtn.classList.remove('playing-ai');
        }
        currentlyPlayingBtn = btn;
        btn.classList.add('playing-ai');
        
        manualPlayTimer = setTimeout(() => {
            if (currentlyPlayingBtn === btn) {
                btn.classList.remove('playing-ai');
                currentlyPlayingBtn = null;
            }
        }, 2000);
    }

    let isAutoPlaying = false;
    let isAutoPlayPaused = false;
    let autoPlayIndex = 0;       
    let autoPlayTimer = null;

    function startAutoPlay() {
        if(renderedItems.length === 0) {
            showToast('当前批次无可播内容');
            return;
        }

        // 新增检查：当前批次内是否至少存在一个“已录音”的项目
        const hasRecordedItem = renderedItems.some(item => item.status === 'recorded');
        if (!hasRecordedItem) {
            showToast('当前批次无录音文件可播');
            return;
        }

        if (currentlyPlayingBtn) {
            clearTimeout(manualPlayTimer);
            currentlyPlayingBtn.classList.remove('playing-ai');
            currentlyPlayingBtn = null;
        }
        document.getElementById('floatingPlayer').classList.add('show');
        isAutoPlaying = true;
        isAutoPlayPaused = false;
        autoPlayIndex = 0;
        document.getElementById('fpPauseBtn').innerHTML = iconPause;
        document.getElementById('fpSubtitle').innerText = '当前批次连播中...';
        playNextInBatch();
    }
    
    function playNextInBatch() {
        if(!isAutoPlaying || isAutoPlayPaused) return;

        let foundValid = false;
        while(autoPlayIndex < renderedItems.length) {
            let item = renderedItems[autoPlayIndex];
            // 修改：只有状态是 recorded (已录音) 时，才认为是有效可播放的
            if (item.status === 'recorded') { foundValid = true; break; }
            autoPlayIndex++;
        }

        if(!foundValid || autoPlayIndex >= renderedItems.length) {
            closeAutoPlay();
            showToast('批次连播已完成');
            return;
        }

        let item = renderedItems[autoPlayIndex];
        let displaySeq = autoPlayIndex + 1; 
        let shortText = item.text.length > 15 ? item.text.substring(0, 15) + '...' : item.text;
        document.getElementById('fpTitle').innerText = `${displaySeq}. ${shortText}`;

        let itemEl = document.getElementById(`item-el-${item.id}`);
        if(itemEl) {
            itemEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            document.querySelectorAll('.inline-speaker.playing-ai').forEach(btn => btn.classList.remove('playing-ai'));
            let targetPlayBtn = document.getElementById(`play-${item.id}`);
            if(targetPlayBtn) targetPlayBtn.classList.add('playing-ai');
        }

        autoPlayTimer = setTimeout(() => {
            autoPlayIndex++;      
            playNextInBatch();
        }, 2000);
    }

    function togglePauseAutoPlay() {
        if(!isAutoPlaying) return;
        isAutoPlayPaused = !isAutoPlayPaused;
        document.getElementById('fpPauseBtn').innerHTML = isAutoPlayPaused ? iconPlay : iconPause;
        document.getElementById('fpSubtitle').innerText = isAutoPlayPaused ? '已暂停连播' : '当前批次连播中...';
        
        if (isAutoPlayPaused) {
            clearTimeout(autoPlayTimer);
            document.querySelectorAll('.inline-speaker.playing-ai').forEach(btn => btn.classList.remove('playing-ai'));
        } else {
            playNextInBatch();
        }
    }
    
    function closeAutoPlay() {
        if(!isAutoPlaying) return;
        document.getElementById('floatingPlayer').classList.remove('show');
        isAutoPlaying = false;
        clearTimeout(autoPlayTimer);
        document.querySelectorAll('.inline-speaker.playing-ai').forEach(btn => btn.classList.remove('playing-ai'));
    }

    function showToast(msg, duration = 1500) {
        let toast = document.getElementById('sys-toast');
        toast.innerText = msg; toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), duration);
    }

    window.onload = init;
</script>
</body>
</html>
