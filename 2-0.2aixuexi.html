<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教师端 - 班级学生数据及任务分配</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
    
    :root {
      --brand: #1F5FFF;
      --brand-hover: #004CE6;
      --surface: #FFFFFF;
      --surface-soft: #F8FAFC;
    }

    body {
      font-family: Inter, system-ui, -apple-system, 'Noto Sans SC', sans-serif;
      margin: 0;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      background-color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }

    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

    table {
      border-collapse: separate;
      border-spacing: 0;
      width: 100%;
      table-layout: fixed;
      font-variant-numeric: tabular-nums; 
    }
    
    th, td {
      border-bottom: 1px solid #E2E8F0;
      border-right: 1px solid #E2E8F0;
      white-space: nowrap;
      box-sizing: border-box;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 70px; 
    }

    thead tr:nth-child(1) th { position: sticky; top: 0; z-index: 20; height: 48px; background-clip: padding-box; border-top: none; }
    thead tr:nth-child(2) th { position: sticky; top: 47px; z-index: 20; height: 48px; background-clip: padding-box; }
    
    .fixed-col { position: sticky; z-index: 10; background-clip: padding-box; }
    thead tr:nth-child(1) th.fixed-col,
    thead tr:nth-child(2) th.fixed-col { z-index: 30; }

    .fixed-col-1 { left: 0; width: 60px; min-width: 60px; max-width: 60px; border-left: none; }
    .fixed-col-2 { left: 60px; width: 100px; min-width: 100px; max-width: 100px; }
    .fixed-col-3 { left: 160px; width: 80px; min-width: 80px; max-width: 80px; }

    .fixed-col-3::after {
      content: ''; position: absolute; top: 0; right: -2px; bottom: 0; width: 2px;
      background-color: #CBD5E1; box-shadow: 3px 0 8px rgba(0,0,0,0.12); z-index: 5;
    }

    tbody tr:last-child td { border-bottom: none; }
    th:last-child, td:last-child { border-right: none; }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skeleton-box {
      background: linear-gradient(90deg, #F1F5F9 25%, #E2E8F0 50%, #F1F5F9 75%);
      background-size: 400% 100%; animation: shimmer 1.5s infinite linear; border-radius: 6px;
    }

    .page-enter { opacity: 0; transform: scale(0.98); }
    .page-enter-active { opacity: 1; transform: scale(1); transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1); }
    .page-leave { opacity: 1; transform: scale(1); }
    .page-leave-active { opacity: 0; transform: scale(0.98); transition: all 0.15s ease-in; pointer-events: none; }

    .vocab-clickable { cursor: pointer; transition: all 0.15s ease; }
    .vocab-clickable:hover { color: #1F5FFF; }
    .vocab-clickable:active { transform: scale(0.95); }

    /* 详情页表格 */
    .detail-table {
      border-collapse: separate;
      border-spacing: 0;
      width: 100%;
      font-variant-numeric: tabular-nums;
    }
    .detail-table th,
    .detail-table td {
      border-bottom: 1px solid #E2E8F0;
      border-right: 1px solid #E2E8F0;
      white-space: nowrap;
      box-sizing: border-box;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 50px;
    }
    .detail-table thead tr:nth-child(1) th { position: sticky; top: 0; z-index: 20; height: 48px; background-clip: padding-box; border-top: none; }
    .detail-table thead tr:nth-child(2) th { position: sticky; top: 47px; z-index: 20; height: 48px; background-clip: padding-box; }
    .detail-table tbody tr:last-child td { border-bottom: none; }
    .detail-table th:last-child, .detail-table td:last-child { border-right: none; }

    .detail-fixed-date {
      position: sticky; left: 0; z-index: 10; background-clip: padding-box;
      width: 100px; min-width: 100px; max-width: 100px;
    }
    .detail-fixed-vocab {
      position: sticky; left: 100px; z-index: 10; background-clip: padding-box;
      width: 75px; min-width: 75px; max-width: 75px;
    }
    .detail-table thead tr:nth-child(1) th.detail-fixed-date,
    .detail-table thead tr:nth-child(2) th.detail-fixed-date,
    .detail-table thead tr:nth-child(1) th.detail-fixed-vocab,
    .detail-table thead tr:nth-child(2) th.detail-fixed-vocab { z-index: 30; }
    .detail-fixed-vocab::after {
      content: ''; position: absolute; top: 0; right: -2px; bottom: 0; width: 2px;
      background-color: #CBD5E1; box-shadow: 3px 0 8px rgba(0,0,0,0.12); z-index: 5;
    }

    /* 跳过天数提示行 */
    .skip-row td {
      border-bottom: 1px dashed #E2E8F0 !important;
      height: 32px !important;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#1F5FFF', 'primary-light': '#E6F0FF' }
        }
      }
    }
  </script>
</head>
<body>

  <div id="toast" class="fixed top-[45%] left-1/2 -translate-x-1/2 -translate-y-1/2 bg-gray-800/90 text-white px-8 py-3 rounded-[16px] shadow-2xl opacity-0 transition-opacity duration-300 z-[200] pointer-events-none flex items-center justify-center">
    <span class="font-bold tracking-wide text-[15px]">分配成功</span>
  </div>

  <div class="w-full h-full bg-white flex flex-col overflow-hidden relative">

    <header class="h-[76px] flex items-center justify-between px-8 bg-white border-b border-gray-100 flex-shrink-0 relative z-40">
      <div class="flex items-center space-x-4">
        <button class="w-[44px] h-[44px] flex items-center justify-center rounded-full bg-white shadow-[0_2px_8px_rgba(0,0,0,0.06)] active:scale-[0.90] transition-all text-gray-700 shrink-0">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h1 class="text-[30px] font-extrabold text-gray-900 tracking-tight ml-2 leading-none whitespace-nowrap">班级数据</h1>
        <div class="ml-6 flex items-center">
          <div class="relative" id="class-dropdown-container">
            <div onclick="toggleDropdown()" class="flex items-center space-x-1.5 px-4 h-[40px] bg-primary-light rounded-[12px] text-primary font-bold cursor-pointer active:scale-95 transition-all select-none whitespace-nowrap">
              <span class="text-[15px]">24级软件3班</span>
              <svg id="class-dropdown-icon" class="w-4 h-4 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
            </div>
            <div id="class-dropdown-menu" class="absolute top-full left-0 mt-2 w-48 bg-white border border-gray-100 rounded-[16px] shadow-lg opacity-0 invisible transition-all duration-200 origin-top-left z-50">
              <ul class="py-2 text-center text-[15px] font-medium">
                <li class="px-4 py-3 text-primary bg-primary-light/50 cursor-pointer">24级软件3班</li>
                <li class="px-4 py-3 text-gray-600 active:bg-gray-50 cursor-pointer">英语实验1班</li>
                <li class="px-4 py-3 text-gray-600 active:bg-gray-50 cursor-pointer">2404班</li>
              </ul>
            </div>
          </div>
        </div>
      </div>

      <div class="flex items-center space-x-6 shrink-0">
        <div class="flex bg-[#F1F5F9] p-1 rounded-[14px] text-[15px] font-bold shadow-inner">
          <button id="btn-today" class="transition-all bg-primary text-white shadow-md px-6 h-[40px] rounded-[10px] active:scale-95 whitespace-nowrap" onclick="toggleData('today')">今日数据</button>
          <button id="btn-summary" class="transition-all text-gray-500 active:bg-gray-200/50 px-6 h-[40px] rounded-[10px] bg-transparent active:scale-95 whitespace-nowrap" onclick="toggleData('summary')">汇总数据</button>
        </div>
        <div class="flex items-center space-x-4 border-l border-gray-200 pl-6">
          <span class="text-[13px] font-medium text-gray-400 whitespace-nowrap" id="refresh-time">上次更新: --</span>
          <button onclick="triggerRefresh()" class="w-[44px] h-[44px] flex items-center justify-center rounded-full bg-white border border-gray-200 shadow-sm active:scale-[0.90] transition-all text-gray-500 shrink-0">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          </button>
        </div>
      </div>
    </header>

    <main class="flex-1 flex flex-col overflow-hidden bg-white relative">


      <div class="flex-1 overflow-auto custom-scrollbar relative">
        <div id="loading-overlay" class="absolute inset-0 z-50 hidden"></div>
        <table id="main-table" class="text-center text-[14px] w-full bg-white relative">
          <thead id="main-thead"></thead>
          <tbody class="text-gray-700 font-medium" id="table-body"></tbody>
        </table>
      </div>
    </main>
    
    <!-- ================= 分配任务二级页面 ================= -->
    <div id="assign-modal-wrapper" class="fixed inset-0 z-[100] bg-white flex flex-col overflow-hidden hidden page-leave">
      <header class="h-[76px] px-8 border-b border-gray-100 flex items-center bg-white flex-shrink-0">
        <button onclick="closeAssignModal()" class="w-[44px] h-[44px] flex items-center justify-center rounded-full bg-white shadow-[0_2px_8px_rgba(0,0,0,0.06)] active:scale-[0.90] transition-all text-gray-700 shrink-0 mr-4">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h2 class="text-[28px] font-extrabold text-gray-900 tracking-tight leading-none flex items-center">
          分配任务 <span class="text-gray-300 mx-3 font-normal font-sans">|</span> <span id="assign-target-name" class="text-primary">张三</span>
        </h2>
      </header>
      <div class="flex-1 flex overflow-hidden bg-gray-50/50">
        <div class="w-1/2 border-r border-gray-200 flex flex-col bg-[#F8FAFC]">
          <div class="px-8 py-5 border-b border-gray-200 bg-white shadow-sm z-10 flex-shrink-0">
            <h3 class="font-bold text-[18px] text-gray-700 flex justify-between items-center">
              <span>已分配任务</span>
              <span id="assigned-count" class="bg-blue-100 text-blue-700 px-3 py-1 rounded-[10px] text-[14px]">0</span>
            </h3>
          </div>
          <div class="flex-1 overflow-y-auto p-8 space-y-4 custom-scrollbar" id="assigned-tasks-list"></div>
        </div>
        <div class="w-1/2 flex flex-col bg-white">
          <div class="px-8 py-5 border-b border-gray-100 shadow-sm z-10 flex flex-col space-y-4 flex-shrink-0">
             <h3 class="font-bold text-[18px] text-gray-700 flex justify-between items-center">
              <span>可分配任务库</span>
              <span id="available-count" class="bg-gray-100 text-gray-600 px-3 py-1 rounded-[10px] text-[14px]">0</span>
            </h3>
            <div class="relative">
              <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="text" id="task-search" placeholder="搜索任务名称..." oninput="renderAssignUI()" class="w-full bg-gray-50 border border-gray-200 rounded-[14px] pl-12 pr-4 h-[48px] text-[15px] focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all">
            </div>
          </div>
          <div class="flex-1 overflow-y-auto p-8 space-y-4 custom-scrollbar" id="available-tasks-list"></div>
        </div>
      </div>
    </div>

    <!-- ================= 学生详情二级页面 ================= -->
    <div id="student-detail-wrapper" class="fixed inset-0 z-[100] bg-white flex flex-col overflow-hidden hidden page-leave">
      <header class="h-[76px] px-8 border-b border-gray-100 flex items-center justify-between bg-white flex-shrink-0">
        <div class="flex items-center">
          <button onclick="closeStudentDetail()" class="w-[44px] h-[44px] flex items-center justify-center rounded-full bg-white shadow-[0_2px_8px_rgba(0,0,0,0.06)] active:scale-[0.90] transition-all text-gray-700 shrink-0 mr-4">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <h2 class="text-[28px] font-extrabold text-gray-900 tracking-tight leading-none flex items-center">
            每日详情 <span class="text-gray-300 mx-3 font-normal font-sans">|</span> <span id="detail-student-name" class="text-primary">张三</span>
          </h2>
        </div>

      </header>



      <div class="flex-1 overflow-auto custom-scrollbar relative">
        <table class="detail-table text-center text-[14px] w-full bg-white relative">
          <thead>
            <tr class="h-[48px]">
              <th rowspan="2" class="p-3 detail-fixed-date bg-[#F8FAFC] text-gray-900 font-bold">日期</th>
              <th rowspan="2" class="p-3 detail-fixed-vocab bg-[#F8FAFC] text-gray-900 font-bold">总词汇</th>
              <th colspan="3" class="p-3 bg-[#EFF6FF] text-blue-600 font-bold tracking-wide">正向过词</th>
              <th colspan="3" class="p-3 bg-[#FAF5FF] text-purple-600 font-bold tracking-wide">听写</th>
              <th colspan="3" class="p-3 bg-[#F0FDF4] text-emerald-600 font-bold tracking-wide">正向测试</th>
              <th colspan="3" class="p-3 bg-[#FFFBEB] text-amber-600 font-bold tracking-wide">练习</th>
              <th colspan="3" class="p-3 bg-[#FFF1F2] text-rose-600 font-bold tracking-wide border-r-0">游戏</th>
            </tr>
            <tr class="text-[13px] font-bold h-[48px]">
              <th class="p-2 bg-[#EFF6FF] text-blue-500 border-t border-b border-gray-200 border-r">通过</th>
              <th class="p-2 bg-[#EFF6FF] text-blue-500 border-t border-b border-gray-200 border-r">未过</th>
              <th class="p-2 bg-[#EFF6FF] text-blue-500 border-t border-b border-gray-200 border-r">未知</th>
              <th class="p-2 bg-[#FAF5FF] text-purple-500 border-t border-b border-gray-200 border-r">通过</th>
              <th class="p-2 bg-[#FAF5FF] text-purple-500 border-t border-b border-gray-200 border-r">未过</th>
              <th class="p-2 bg-[#FAF5FF] text-purple-500 border-t border-b border-gray-200 border-r">未知</th>
              <th class="p-2 bg-[#F0FDF4] text-emerald-500 border-t border-b border-gray-200 border-r">通过</th>
              <th class="p-2 bg-[#F0FDF4] text-emerald-500 border-t border-b border-gray-200 border-r">未过</th>
              <th class="p-2 bg-[#F0FDF4] text-emerald-500 border-t border-b border-gray-200 border-r">未知</th>
              <th class="p-2 bg-[#FFFBEB] text-amber-500 border-t border-b border-gray-200 border-r">通过</th>
              <th class="p-2 bg-[#FFFBEB] text-amber-500 border-t border-b border-gray-200 border-r">未过</th>
              <th class="p-2 bg-[#FFFBEB] text-amber-500 border-t border-b border-gray-200 border-r">未知</th>
              <th class="p-2 bg-[#FFF1F2] text-rose-500 border-t border-b border-gray-200 border-r">通过</th>
              <th class="p-2 bg-[#FFF1F2] text-rose-500 border-t border-b border-gray-200 border-r">未过</th>
              <th class="p-2 bg-[#FFF1F2] text-rose-500 border-t border-b border-gray-200 border-r-0">未知</th>
            </tr>
          </thead>
          <tbody class="text-gray-700 font-medium" id="detail-table-body"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    // ================= 基础工具 =================
    const showToast = (message) => {
      const toast = document.getElementById('toast');
      toast.querySelector('span').innerText = message;
      toast.classList.remove('opacity-0');
      setTimeout(() => toast.classList.add('opacity-0'), 1500);
    };

    const updateRefreshTime = () => {
      const now = new Date();
      const month = (now.getMonth() + 1).toString().padStart(2, '0');
      const date = now.getDate().toString().padStart(2, '0');
      const hours = now.getHours().toString().padStart(2, '0');
      const minutes = now.getMinutes().toString().padStart(2, '0');
      document.getElementById('refresh-time').innerText = `上次更新: ${month}-${date} ${hours}:${minutes}`;
    };

    // ================= 数据生成 =================
    const names = [
      "杨永浩", "尹嘉旺", "赵永好", "陈韵铃", "周义龙", "魏志豪", "陈佳瑶", "陈嘉睿", 
      "程艾琳", "华建文", "陈雨婷", "陈锦营", "刘耿鸿", "彭少杰", "伍腾康", "杨大宇", 
      "杨振权", "黄雅娜", "李佳恒", "彭梓俊", "胡语健", "庄学波", "张晓峰", "潘昱慈", 
      "杨晟旭", "黄宏伟", "康耀", "谢文楠", "谢镇城", "李测试", "郑伟华", "吴一凡"
    ];

    let currentView = 'today'; 
    let studentsData = [];
    let currentDetailStudentId = null;

    const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
    const maybe = (prob, valFn, fallback = 0) => Math.random() < prob ? valFn() : fallback;

    const generateStudentData = () => {
      let data = [];
      const todayDate = new Date();

      for (let i = 0; i < 32; i++) {
        const totalVocabBase = [2893, 2910, 3103, 3109, 2996, 3194][Math.floor(Math.random() * 6)];

        const zxPass = randInt(200, 1500);
        const zxFail = randInt(5, 60);
        const zxUnknown = Math.max(0, totalVocabBase - zxPass - zxFail);

        const txPass = randInt(300, 2200);
        const txFail = randInt(0, 15);
        const txUnknown = Math.max(0, totalVocabBase - txPass - txFail);

        const ztPass = maybe(0.7, () => randInt(20, 200));
        const ztFail = maybe(0.3, () => randInt(0, 5));
        const ztUnknown = Math.max(0, totalVocabBase - ztPass - ztFail);

        const lxPass = randInt(50, 900);
        const lxFail = randInt(0, 30);
        const lxUnknown = Math.max(0, totalVocabBase - lxPass - lxFail);

        const yxPass = randInt(30, 1100);
        const yxFail = randInt(0, 250);
        const yxUnknown = Math.max(0, totalVocabBase - yxPass - yxFail);

        const zxTodayAdd = maybe(0.55, () => randInt(1, 45));
        const zxYestAdd = maybe(0.65, () => randInt(1, 35));
        const txTodayAdd = maybe(0.3, () => randInt(1, 20));
        const txYestAdd = maybe(0.45, () => randInt(1, 12));
        const ztTodayAdd = maybe(0.15, () => randInt(1, 8));
        const ztYestAdd = maybe(0.1, () => randInt(1, 5));

        // 生成近30天每日数据
        const dailyData = [];
        const vocabGrowthRate = randInt(1, 5);
        
        for (let d = 0; d < 30; d++) {
          const date = new Date(todayDate);
          date.setDate(date.getDate() - d);
          const dateStr = `${date.getFullYear()}-${(date.getMonth()+1).toString().padStart(2,'0')}-${date.getDate().toString().padStart(2,'0')}`;
          const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
          const dayOfWeek = date.getDay();

          const dayVocab = Math.max(totalVocabBase - 50, totalVocabBase - d * vocabGrowthRate);

          // 判断是否为无变化日：周末概率高，工作日也有小概率
          const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
          const noActivityProb = isWeekend ? 0.7 : 0.15;
          const isNoActivity = d > 0 && Math.random() < noActivityProb; // 今天(d=0)一定有数据

          const decay = d * randInt(8, 22);
          const dayZxPass = Math.max(50, zxPass - decay);
          const dayTxPass = Math.max(30, txPass - d * randInt(5, 16));
          const dayZtPass = Math.max(0, ztPass - d * randInt(1, 5));
          const dayLxPass = Math.max(10, lxPass - d * randInt(3, 12));
          const dayYxPass = Math.max(5, yxPass - d * randInt(2, 15));

          const dayZxFail = Math.max(0, zxFail + randInt(-3, 5));
          const dayTxFail = Math.max(0, txFail + randInt(-2, 3));
          const dayZtFail = Math.max(0, ztFail + randInt(-1, 2));
          const dayLxFail = Math.max(0, lxFail + randInt(-2, 4));
          const dayYxFail = Math.max(0, yxFail + randInt(-5, 10));

          const dayZxUnknown = Math.max(0, dayVocab - dayZxPass - dayZxFail);
          const dayTxUnknown = Math.max(0, dayVocab - dayTxPass - dayTxFail);
          const dayZtUnknown = Math.max(0, dayVocab - dayZtPass - dayZtFail);
          const dayLxUnknown = Math.max(0, dayVocab - dayLxPass - dayLxFail);
          const dayYxUnknown = Math.max(0, dayVocab - dayYxPass - dayYxFail);

          // 无变化日所有增量为0
          const dayZxTodayAdd = isNoActivity ? 0 : (d === 0 ? zxTodayAdd : maybe(0.5, () => randInt(1, 50)));
          const dayTxTodayAdd = isNoActivity ? 0 : (d === 0 ? txTodayAdd : maybe(0.3, () => randInt(1, 18)));
          const dayZtTodayAdd = isNoActivity ? 0 : (d === 0 ? ztTodayAdd : maybe(0.15, () => randInt(1, 8)));

          dailyData.push({
            date: dateStr,
            weekDay: weekDays[dayOfWeek],
            dayIndex: d,
            totalVocab: dayVocab,
            hasActivity: !isNoActivity,
            zxPass: dayZxPass, zxFail: dayZxFail, zxUnknown: dayZxUnknown, zxTodayAdd: dayZxTodayAdd,

            yxPass: dayYxPass, yxFail: dayYxFail, yxUnknown: dayYxUnknown, yxTodayAdd: dayYxTodayAdd
          });
        }

          today: {

            txPass, txTodayAdd, txYestAdd,

            ztPass, ztFail, ztUnknown,
            lxPass, lxFail, lxUnknown,
            yxPass, yxFail, yxUnknown
          },
          dailyData
        });

                </div>
              </div>
            </div>
            <button onclick="moveTask(${t.id}, 'remove')" class="px-6 h-[44px] rounded-[14px] text-[15px] font-bold text-red-500 bg-red-50 active:bg-red-500 active:text-white transition-all active:scale-95">取消</button>
          </div>
        `}).join('');
      }

      const availableList = document.getElementById('available-tasks-list');
      if (availableTasks.length === 0) {
        availableList.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-gray-400 text-[15px]"><svg class="w-12 h-12 mb-4 text-gray-200" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>未搜索到相关任务</div>`;
      } else {
        availableList.innerHTML = availableTasks.map((t, index) => {
          const num = index + 1;
          return `
          <div class="bg-white p-5 rounded-[20px] border border-gray-100 shadow-sm flex items-center justify-between transition-colors">
            <div class="flex items-center space-x-4">
              <span class="text-[16px] font-bold text-gray-400 font-mono w-6 text-center">${num}</span>
              <div class="flex flex-col items-start space-y-2">
                <span class="text-[16px] font-bold text-gray-800">${t.name}</span>
                <span class="inline-block bg-gray-50 border border-gray-200 text-gray-500 px-2 py-0.5 rounded-[6px] text-[12px] font-bold">${t.words} 词</span>
              </div>
            </div>
            <button onclick="moveTask(${t.id}, 'add')" class="px-8 h-[44px] rounded-[14px] text-[15px] font-bold text-white bg-primary active:bg-blue-700 shadow-sm transition-all flex items-center justify-center min-w-[80px] active:scale-95">
              加入
            </button>
          </div>
        `}).join('');
      }
    };

    window.toggleDropdown = () => {
      const menu = document.getElementById('class-dropdown-menu');
      const icon = document.getElementById('class-dropdown-icon');
      if (menu.classList.contains('invisible')) {
        menu.classList.remove('invisible', 'opacity-0');
        menu.classList.add('visible', 'opacity-100');
        icon.classList.add('rotate-180');
      } else {
        menu.classList.add('invisible', 'opacity-0');
        menu.classList.remove('visible', 'opacity-100');
        icon.classList.remove('rotate-180');
      }
    };

    document.addEventListener('click', (e) => {
      const container = document.getElementById('class-dropdown-container');
      if (container && !container.contains(e.target)) {
        const menu = document.getElementById('class-dropdown-menu');
        const icon = document.getElementById('class-dropdown-icon');
        menu.classList.add('invisible', 'opacity-0');
        menu.classList.remove('visible', 'opacity-100');
        icon.classList.remove('rotate-180');
      }
    });

    updateRefreshTime();
    studentsData = generateStudentData();
    renderHeaders();
    renderTable();
  </script>
</body>
</html>
