<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#EFF6FF">
    <title>掌上校园 · 班级详情与业务交互优化 7.28</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#1F5FFF',
                        ink: '#111827',
                        body: '#334155',
                        muted: '#64748B'
                    }
                }
            }
        };
    </script>
    <style>
        :root {
            --brand: #1F5FFF;
            --brand-soft: rgba(31, 95, 255, 0.10);
            --brand-border: rgba(31, 95, 255, 0.16);
            --ink: #111827;
            --body: #334155;
            --muted: #64748B;
            --danger: #EF4444;
            --success: #10B981;
            --warning: #F59E0B;
            --page: linear-gradient(135deg, #EFF6FF 0%, #DFE7FF 100%);
            --glass: rgba(255, 255, 255, 0.72);
            --glass-strong: rgba(255, 255, 255, 0.84);
            --line: rgba(15, 23, 42, 0.07);
            --shadow: 0 8px 24px rgba(31, 95, 255, 0.055);
        }

        * { box-sizing: border-box; }
        html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
        body {
            display: grid;
            place-items: center;
            background: #E8F0FF;
            color: var(--body);
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
        }
        button, input, select, textarea { font: inherit; }
        button { -webkit-tap-highlight-color: transparent; }
        button:active { transform: scale(0.95); }

        .device {
            position: relative;
            width: 375px;
            height: 812px;
            max-width: 100vw;
            max-height: 100vh;
            overflow: hidden;
            border-radius: 40px;
            background: var(--page);
            box-shadow: 0 24px 70px rgba(30, 64, 175, 0.16);
            isolation: isolate;
        }
        .device::before,
        .device::after {
            content: "";
            position: absolute;
            z-index: -1;
            border-radius: 999px;
            filter: blur(1px);
            pointer-events: none;
        }
        .device::before {
            width: 210px;
            height: 210px;
            right: -78px;
            top: 74px;
            background: radial-gradient(circle, rgba(31,95,255,0.18), rgba(31,95,255,0));
        }
        .device::after {
            width: 180px;
            height: 180px;
            left: -92px;
            bottom: 104px;
            background: radial-gradient(circle, rgba(16,185,129,0.10), rgba(16,185,129,0));
        }

        .topbar {
            position: absolute;
            inset: 0 0 auto;
            z-index: 40;
            display: grid;
            grid-template-columns: 60px 1fr 60px;
            align-items: center;
            padding: max(48px, env(safe-area-inset-top, 48px)) 20px 12px;
            background: linear-gradient(180deg, rgba(239,246,255,0.96), rgba(239,246,255,0.76));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .nav-button {
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 0;
            border-radius: 14px;
            color: var(--ink);
            background: rgba(255,255,255,0.58);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.84);
            transition: transform .16s ease, background .16s ease;
        }
        .nav-button svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        .nav-action {
            min-width: 52px;
            height: 36px;
            justify-self: end;
            border: 0;
            border-radius: 11px;
            color: var(--brand);
            background: var(--brand-soft);
            font-size: 12px;
            font-weight: 800;
            transition: transform .16s ease, background .16s ease;
        }
        .nav-action.is-saving { background: var(--brand); color: #fff; box-shadow: 0 8px 16px rgba(31,95,255,.18); }
        .nav-title { text-align: center; color: var(--ink); font-size: 18px; font-weight: 800; letter-spacing: .02em; }

        .scroll-area {
            position: absolute;
            inset: 0;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 112px 20px 34px;
            scrollbar-width: none;
            overscroll-behavior-y: contain;
            -webkit-overflow-scrolling: touch;
        }
        .scroll-area::-webkit-scrollbar { display: none; }

        .glass {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.88);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }
        .hero {
            position: relative;
            overflow: hidden;
            padding: 18px;
            border-radius: 22px;
        }
        .hero::after {
            content: "";
            position: absolute;
            width: 120px;
            height: 120px;
            right: -48px;
            top: -52px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(31,95,255,.16), rgba(31,95,255,0));
            pointer-events: none;
        }
        .hero-name { color: var(--ink); font-size: 21px; font-weight: 900; line-height: 1.1; }
        .hero-sub { margin-top: 5px; color: var(--muted); font-size: 12px; font-weight: 700; }
        .pill {
            min-height: 26px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 4px 10px;
            border: 1px solid rgba(255,255,255,.86);
            border-radius: 8px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,.76), 0 5px 12px rgba(31,95,255,.04);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            font-size: 12px;
            font-weight: 800;
            line-height: 1.1;
        }
        .pill.success { color: #047857; background: rgba(16,185,129,.12); border-color: rgba(16,185,129,.20); box-shadow: inset 0 1px 0 rgba(255,255,255,.76), 0 5px 12px rgba(16,185,129,.07); }
        .pill.warning { color: #92400E; background: rgba(245,158,11,.13); border-color: rgba(245,158,11,.21); box-shadow: inset 0 1px 0 rgba(255,255,255,.76), 0 5px 12px rgba(245,158,11,.07); }
        .pill.danger { color: #B91C1C; background: rgba(239,68,68,.11); border-color: rgba(239,68,68,.20); box-shadow: inset 0 1px 0 rgba(255,255,255,.76), 0 5px 12px rgba(239,68,68,.07); }
        .pill.info { color: #1747C8; background: rgba(31,95,255,.10); border-color: rgba(31,95,255,.18); box-shadow: inset 0 1px 0 rgba(255,255,255,.76), 0 5px 12px rgba(31,95,255,.07); }
        .pill.neutral { color: #475569; background: rgba(100,116,139,.09); border-color: rgba(100,116,139,.16); box-shadow: inset 0 1px 0 rgba(255,255,255,.76), 0 5px 12px rgba(100,116,139,.055); }
        .hero-facts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 14px;
        }
        .hero-fact {
            min-width: 0;
            padding: 10px 11px;
            border-radius: 14px;
            background: rgba(255,255,255,.58);
            border: 1px solid rgba(255,255,255,.84);
        }
        .hero-fact span { display: block; color: var(--muted); font-size: 10px; font-weight: 750; }
        .hero-fact strong { display: block; margin-top: 4px; overflow: hidden; color: var(--ink); font-size: 12px; font-weight: 850; text-overflow: ellipsis; white-space: nowrap; }
        .hero-alert {
            display: grid;
            grid-template-columns: auto minmax(0,1fr);
            gap: 8px;
            align-items: start;
            margin-top: 10px;
            padding: 10px 11px;
            border-radius: 14px;
            background: rgba(255,255,255,.58);
            border: 1px solid rgba(255,255,255,.84);
        }
        .hero-alert strong { color: var(--ink); font-size: 12px; font-weight: 800; line-height: 1.45; }
        .quick-actions { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; margin-top: 12px; }
        .quick-button {
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            border-radius: 12px;
            border: 1px solid rgba(31,95,255,.16);
            color: var(--brand);
            background: rgba(255,255,255,.66);
            font-size: 12px;
            font-weight: 800;
            transition: transform .16s ease, background .16s ease;
        }
        .quick-button.primary { color: #fff; background: var(--brand); box-shadow: 0 8px 16px rgba(31,95,255,.18); }
        .quick-button svg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }

        .tab-dock {
            position: sticky;
            top: 0;
            z-index: 25;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 6px;
            margin: 12px 0;
            padding: 7px;
            border-radius: 18px;
            background: rgba(239,246,255,.88);
            border: 1px solid rgba(255,255,255,.86);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 8px 20px rgba(31,95,255,.05);
        }
        .tab-button {
            min-height: 38px;
            border: 1px solid transparent;
            border-radius: 11px;
            color: #52637E;
            background: transparent;
            font-size: 12px;
            font-weight: 800;
            transition: transform .16s ease, color .16s ease, background .16s ease, box-shadow .16s ease;
        }
        .tab-button[aria-selected="true"] {
            color: #fff;
            background: var(--brand);
            box-shadow: 0 7px 14px rgba(31,95,255,.18);
        }

        .panel-stack { display: grid; gap: 12px; animation: panelIn .26s cubic-bezier(.2,.75,.25,1); }
        .section-card { overflow: hidden; border-radius: 20px; }
        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 15px 16px 11px;
        }
        .section-title { color: var(--ink); font-size: 16px; font-weight: 900; }
        .section-note { margin-top: 3px; color: var(--muted); font-size: 11px; font-weight: 650; line-height: 1.35; }
        .soft-action {
            min-height: 34px;
            padding: 0 11px;
            border: 1px solid var(--brand-border);
            border-radius: 10px;
            color: var(--brand);
            background: var(--brand-soft);
            font-size: 11px;
            font-weight: 800;
        }
        .info-list { padding: 0 16px 4px; }
        .info-row {
            min-width: 0;
            display: grid;
            grid-template-columns: 92px minmax(0,1fr);
            gap: 10px;
            align-items: center;
            min-height: 48px;
            padding: 10px 0;
            border-top: 1px solid var(--line);
        }
        .info-label { color: var(--muted); font-size: 12px; font-weight: 750; line-height: 1.4; }
        .info-value { min-width: 0; color: var(--ink); font-size: 13px; font-weight: 800; line-height: 1.5; text-align: right; word-break: break-word; }
        .info-row.multiline { align-items: start; }
        .info-row.multiline .info-label { padding-top: 2px; }
        .info-row.multiline .info-value { white-space: normal; overflow-wrap: anywhere; }
        .empty-value { color: var(--danger); }
        .edit-control {
            width: 100%;
            min-width: 0;
            min-height: 40px;
            padding: 9px 11px;
            border: 1px solid rgba(31,95,255,.16);
            border-radius: 11px;
            outline: none;
            color: var(--ink);
            background: rgba(255,255,255,.76);
            font-size: 13px;
            font-weight: 750;
            text-align: right;
        }
        textarea.edit-control { min-height: 76px; resize: vertical; text-align: left; }

        .metric-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; padding: 0 16px 14px; }
        .metric-card { padding: 12px; border-radius: 15px; background: rgba(247,250,255,.76); border: 1px solid rgba(31,95,255,.08); }
        .metric-card span { color: var(--muted); font-size: 12px; font-weight: 750; }
        .metric-card strong { display: block; margin-top: 5px; color: var(--ink); font-size: 18px; font-weight: 900; }
        .metric-card small { color: var(--muted); font-size: 11px; font-weight: 700; }

        .subcard-list { display: grid; gap: 10px; padding: 0 16px 16px; }
        .subcard { padding: 14px; border-radius: 18px; background: rgba(255,255,255,.62); border: 1px solid rgba(255,255,255,.90); box-shadow: 0 8px 20px rgba(31,95,255,.05), inset 0 1px 0 rgba(255,255,255,.82); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
        .subcard-title { color: var(--ink); font-size: 14px; font-weight: 900; }
        .subcard-meta { margin-top: 5px; color: var(--muted); font-size: 12px; font-weight: 700; line-height: 1.5; }
        .score { color: var(--brand); font-size: 27px; font-weight: 950; line-height: 1; }

        .record-head { min-width: 0; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
        .record-copy { min-width: 0; }
        .record-eyebrow { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; color: var(--brand); font-size: 12px; font-weight: 900; letter-spacing: .3px; }
        .record-footer { display: flex; align-items: flex-end; justify-content: space-between; gap: 10px; margin-top: 12px; padding-top: 11px; border-top: 1px solid rgba(31,95,255,.08); }
        .record-contact span { display: block; color: var(--muted); font-size: 12px; font-weight: 750; }
        .record-contact strong { display: block; margin-top: 3px; color: var(--body); font-size: 13px; font-weight: 900; }
        .family-card { position: relative; overflow: hidden; }
        .family-card::before { content: ''; position: absolute; inset: 0 auto 0 0; width: 3px; border-radius: 999px; background: linear-gradient(180deg, rgba(31,95,255,.76), rgba(31,95,255,.14)); }
        .health-record-core { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 8px; margin-top: 12px; }
        .health-record-core div { padding: 9px 10px; border-radius: 13px; background: rgba(239,246,255,.72); border: 1px solid rgba(31,95,255,.07); }
        .health-record-core span { display: block; color: var(--muted); font-size: 12px; font-weight: 750; }
        .health-record-core strong { display: block; margin-top: 4px; color: var(--ink); font-size: 13px; font-weight: 900; }
        .record-note { margin-top: 10px; padding: 10px 11px; border-radius: 13px; color: var(--body); background: rgba(255,255,255,.58); font-size: 12px; font-weight: 750; line-height: 1.5; }
        .grade-record { padding: 15px; }
        .grade-score { min-width: 64px; padding: 9px 10px; border-radius: 15px; color: var(--brand); background: rgba(31,95,255,.09); border: 1px solid rgba(31,95,255,.10); text-align: center; }
        .grade-score span { display: block; font-size: 12px; font-weight: 800; letter-spacing: .3px; }
        .grade-score .score { display: block; margin-top: 3px; }
        .material-list { display: grid; gap: 10px; padding: 0 16px 16px; }
        .material-card { min-width: 0; padding: 14px; border: 1px solid rgba(255,255,255,.92); border-radius: 18px; background: rgba(255,255,255,.64); box-shadow: 0 8px 20px rgba(31,95,255,.05), inset 0 1px 0 rgba(255,255,255,.86); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
        .material-name { color: var(--ink); font-size: 13px; font-weight: 850; }
        .material-meta { margin-top: 4px; color: var(--muted); font-size: 12px; font-weight: 650; line-height: 1.4; }
        .material-side { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 12px; padding-top: 10px; border-top: 1px solid rgba(31,95,255,.08); }
        .account-summary { margin: 0 16px 16px; overflow: hidden; border: 1px solid rgba(255,255,255,.92); border-radius: 18px; background: linear-gradient(145deg,rgba(255,255,255,.76),rgba(239,246,255,.62)); box-shadow: 0 9px 22px rgba(31,95,255,.055), inset 0 1px 0 rgba(255,255,255,.90); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); }
        .account-summary-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 14px 14px 4px; }
        .account-summary-head div { min-width: 0; }
        .account-summary-head span:first-child { display: block; color: var(--muted); font-size: 12px; font-weight: 750; }
        .account-summary-head strong { display: block; margin-top: 3px; overflow: hidden; color: var(--ink); font-size: 15px; font-weight: 900; text-overflow: ellipsis; white-space: nowrap; }
        .account-summary .info-list { padding-top: 4px; }

        .edit-footer { display: grid; grid-template-columns: 1fr 1.4fr; gap: 9px; margin-top: 12px; }
        .footer-button { min-height: 48px; border-radius: 13px; font-size: 13px; font-weight: 850; }
        .footer-button.cancel { border: 1px solid rgba(100,116,139,.16); color: var(--muted); background: rgba(255,255,255,.66); }
        .footer-button.save { border: 0; color: #fff; background: var(--brand); box-shadow: 0 8px 18px rgba(31,95,255,.20); }

        .toast {
            position: absolute;
            z-index: 90;
            left: 50%;
            bottom: 28px;
            max-width: calc(100% - 40px);
            padding: 11px 15px;
            border-radius: 13px;
            color: #fff;
            background: rgba(17,24,39,.88);
            box-shadow: 0 12px 28px rgba(15,23,42,.22);
            font-size: 12px;
            font-weight: 750;
            line-height: 1.4;
            text-align: center;
            opacity: 0;
            visibility: hidden;
            transform: translate(-50%, 12px);
            transition: opacity .2s ease, transform .2s ease, visibility .2s;
            backdrop-filter: blur(14px);
        }
        .toast.show { opacity: 1; visibility: visible; transform: translate(-50%, 0); }

        .dialog-layer {
            position: absolute;
            z-index: 100;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(15,23,42,.38);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
        .dialog-layer[hidden] { display: none; }
        .dialog {
            width: 100%;
            max-height: 78%;
            overflow-y: auto;
            padding: 20px;
            border-radius: 22px;
            background: rgba(255,255,255,.92);
            border: 1px solid rgba(255,255,255,.96);
            box-shadow: 0 24px 60px rgba(15,23,42,.20);
            scrollbar-width: none;
        }
        .dialog::-webkit-scrollbar { display: none; }
        .dialog-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
        .dialog-title { color: var(--ink); font-size: 18px; font-weight: 900; }
        .dialog-desc { margin-top: 7px; color: var(--muted); font-size: 12px; font-weight: 650; line-height: 1.55; }
        .dialog-close { width: 36px; height: 36px; flex: 0 0 36px; display: grid; place-items: center; border: 0; border-radius: 12px; color: var(--muted); background: rgba(100,116,139,.08); }
        .dialog-close svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; }
        .dialog-body { display: grid; gap: 12px; margin-top: 16px; }
        .dialog-field label { display: block; margin-bottom: 6px; color: var(--body); font-size: 12px; font-weight: 800; }
        .dialog-field input, .dialog-field select, .dialog-field textarea {
            width: 100%;
            min-height: 44px;
            padding: 10px 12px;
            border: 1px solid rgba(31,95,255,.15);
            border-radius: 12px;
            outline: none;
            color: var(--ink);
            background: rgba(248,250,252,.88);
            font-size: 13px;
            font-weight: 700;
        }
        .dialog-field textarea { min-height: 78px; resize: vertical; }
        .dialog-actions { display: grid; grid-template-columns: 1fr 1.35fr; gap: 9px; margin-top: 18px; }
        .dialog-button { min-height: 46px; border-radius: 13px; font-size: 13px; font-weight: 850; }
        .dialog-button.cancel { border: 1px solid rgba(100,116,139,.14); color: var(--muted); background: rgba(248,250,252,.88); }
        .dialog-button.confirm { border: 0; color: #fff; background: var(--brand); box-shadow: 0 8px 16px rgba(31,95,255,.18); }
        .dialog-button.danger { background: var(--danger); box-shadow: 0 8px 16px rgba(239,68,68,.16); }

        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
        :focus-visible { outline: 3px solid rgba(31,95,255,.30); outline-offset: 3px; }
        .edit-control:focus, .dialog-field input:focus, .dialog-field select:focus, .dialog-field textarea:focus { border-color: rgba(31,95,255,.45); box-shadow: 0 0 0 3px rgba(31,95,255,.09); }

        /* 7.17 只保留学校管理入口与学生档案链路，所有视图均从 7.13 设计体系原生构建。 */
        .app-view {
            position: absolute;
            inset: 0;
            z-index: 10;
            overflow: hidden;
            opacity: 0;
            visibility: hidden;
            transform: translateX(100%);
            transition: transform .38s cubic-bezier(.22,.82,.2,1), opacity .28s ease, visibility .38s;
        }
        .app-view.active { opacity: 1; visibility: visible; transform: translateX(0); }
        .app-view.behind { opacity: 0; visibility: hidden; transform: translateX(-100%); pointer-events: none; }

        .home-topbar {
            position: absolute;
            inset: 0 0 auto;
            z-index: 20;
            padding: max(50px, env(safe-area-inset-top, 50px)) 20px 14px;
            background: linear-gradient(180deg, rgba(239,246,255,.98), rgba(239,246,255,.78));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .home-topbar-row { display: flex; align-items: center; justify-content: space-between; gap: 14px; }
        .home-heading span { display: block; color: var(--brand); font-size: 11px; font-weight: 850; letter-spacing: .12em; }
        .home-heading h1 { margin: 5px 0 0; color: var(--ink); font-size: 24px; font-weight: 950; line-height: 1.08; letter-spacing: -.02em; }
        .profile-button {
            width: 44px;
            height: 44px;
            flex: 0 0 44px;
            display: grid;
            place-items: center;
            border: 1px solid rgba(255,255,255,.88);
            border-radius: 15px;
            color: var(--brand);
            background: rgba(255,255,255,.62);
        }
        .profile-button svg { width: 21px; height: 21px; fill: none; stroke: currentColor; stroke-width: 2.3; stroke-linecap: round; stroke-linejoin: round; }
        .home-scroll, .list-scroll {
            position: absolute;
            inset: 0;
            overflow-x: hidden;

                const matchesQuery = !query || [item.name, item.studentNo, item.className, item.major].some(value => String(value || '').toLowerCase().includes(query));
                const matchesClass = state.classFilter === 'all' || item.className === state.classFilter;
                const matchesStatus = state.statusFilter === 'all' || item.studentStatus === state.statusFilter;
                return matchesQuery && matchesClass && matchesStatus;
            });
        }

        function getStudentClassShortLabel(className) {
            const text = String(className || '').trim();
            if (!text) return '待分班';
            const match = text.match(/(\d+\s*班)$/);
            return match ? match[1].replace(/\s+/g, '') : text;
        }

        function getSelectedClass() {
            return schoolClasses.find(item => item.id === state.selectedClassId) || schoolClasses[0];
        }

        function getClassDisplayName(classInfo) {
            return String(classInfo?.name || '班级详情').replace(/\s+班$/, '班');
        }

        function classAvatarSvg(gender) {
            return gender === '男'
                ? '<svg aria-hidden="true" viewBox="0 0 32 32"><circle cx="16" cy="11" r="5.2"></circle><path d="M7.5 27c.8-5.4 3.7-8.1 8.5-8.1s7.7 2.7 8.5 8.1"></path><path d="M11.2 7.8c1.1-2.1 3-3.1 5.8-3.1 2.3 0 4 1 5 2.8"></path></svg>'
                : '<svg aria-hidden="true" viewBox="0 0 32 32"><circle cx="16" cy="11.2" r="5"></circle><path d="M7.7 27c.8-5.3 3.6-8 8.3-8 4.7 0 7.5 2.7 8.3 8"></path><path d="M10.2 12.8c-.6-5.5 1.4-8.2 5.8-8.2 4.5 0 6.5 2.7 5.8 8.2"></path><path d="M10.8 9.7c1.8.2 3.8-.8 5-2.4 1.3 1.8 3.2 2.8 5.4 2.7"></path></svg>';
        }

        function makeRosterName(gender, index, classInfo) {
            const pool = gender === '男' ? maleNames : femaleNames;
            if (index < pool.length) return pool[index];
            const surnames = ['陈','林','周','徐','叶','许','顾','沈','梁','何','宋','唐','江','罗','韩','邓','彭','余','高','秦'];
            const given = gender === '男'
                ? ['知衡','景川','明远','承泽','嘉佑','亦航','星澈','书珩','云舟','屿安','修然','砚清']
                : ['知微','清遥','念安','语宁','诗晴','若安','星妍','嘉禾','婉清','书意','芷宁','沐瑶'];
            return `${surnames[(index + Number(classInfo.code.slice(-2))) % surnames.length]}${given[(index * 3 + Number(classInfo.grade)) % given.length]}`;
        }

        function ensureClassRoster(classInfo) {
            if (classRosters.has(classInfo.id)) return classRosters.get(classInfo.id);
            const roster = students.filter(item => item.className === classInfo.name);
            const fillGender = (gender, target) => {
                let count = roster.filter(item => item.gender === gender).length;
                while (count < target) {
                    const sequence = roster.length + 1;
                    const name = makeRosterName(gender, count, classInfo);
                    const serial = `${classInfo.code}${String(sequence).padStart(2,'0')}`;
                    const phoneRaw = `13${gender === '男' ? '8' : '6'}${String(24000000 + Number(classInfo.code) * 31 + sequence).slice(-8)}`;
                    const generated = createStudent({
                        id: `STU20${classInfo.grade}${serial}`,
                        name,
                        gender,
                        studentNo: `20${classInfo.grade}${serial}`,
                        phoneRaw,
                        phone: formatPhone(phoneRaw),
                        major: classInfo.major,
                        className: classInfo.name,
                        registeredGrade: `20${classInfo.grade} 级`,
                        registeredClass: classInfo.name,
                        classPlan: `${classInfo.major}专业人才培养方案（20${classInfo.grade}版）`,
                        entryDate: classInfo.openedAt,
                        studentStatus: '正常在读',
                        guardianName: `${name.slice(0,1)}女士`,
                        guardianPhoneRaw: `139${String(52000000 + sequence * 173 + Number(classInfo.code)).slice(-8)}`,
                        guardianPhone: formatPhone(`139${String(52000000 + sequence * 173 + Number(classInfo.code)).slice(-8)}`),
                        updatedAt: '2026-07-15 09:30'
                    });
                    students.push(generated);
                    roster.push(generated);
                    count += 1;
                }
            };
            fillGender('男', classInfo.male);
            fillGender('女', classInfo.female);
            roster.length = Math.min(roster.length, classInfo.total);
            roster.forEach((item, index) => {
                item.dormAssigned = index >= 4;
                item.authenticated = index >= 3;
                item.violationPending = index < 2;
                item.logPending = index < 6;
            });
            classRosters.set(classInfo.id, roster);
            return roster;
        }

        const workflowClassId = 'CLS2403';

        function getClassPendingCounts(classInfo = getSelectedClass()) {
            if (!classInfo || classInfo.id !== workflowClassId) return { leave: 0, dorm: 0, auth: 0, discipline: 0, logs: 0, total: 0 };
            const roster = ensureClassRoster(classInfo);
            const counts = {
                leave: classWorkflowState.leave.filter(item => item.status === '待审批').length,
                dorm: classWorkflowState.dorm.filter(item => !item.assignment).length,
                auth: roster.filter(item => !item.authenticated).length,
                discipline: classWorkflowState.discipline.filter(item => item.status === '待处理').length,
                logs: classWorkflowState.logs.filter(item => item.status === '待批阅').length
            };
            counts.total = counts.leave + counts.dorm + counts.auth + counts.discipline + counts.logs;
            return counts;
        }

        function getModulePendingCount(module, classInfo = getSelectedClass()) {
            const counts = getClassPendingCounts(classInfo);
            return ({ leave: counts.leave, dorm: counts.dorm, discipline: counts.discipline, logs: counts.logs })[module] || 0;
        }

        function hasStudentPending(item) {
            return Boolean(item?.nextAction) || (item?.attachments || []).some(record => /待|未|不通过/.test(record.status || ''));
        }

        function schoolFeatureHasPending(label) {
            if (label === '全校班级') return schoolClasses.some(classInfo => getClassPendingCounts(classInfo).total > 0);
            if (label === '全校学生') return students.some(hasStudentPending);
            return false;
        }

        }

        function renderClassSchoolSummary() {
            const totals = schoolClasses.reduce((sum, item) => ({ total: sum.total + item.total, male: sum.male + item.male, female: sum.female + item.female }), { total: 0, male: 0, female: 0 });
            classSchoolSummary.innerHTML = `

                <div class="class-summary-stats">

                    <div class="class-summary-stat male"><strong>${totals.male}</strong><span>男生</span></div>
                    <div class="class-summary-stat female"><strong>${totals.female}</strong><span>女生</span></div>
                </div>`;
        }

        function getFilteredClasses() {
            const query = state.classSearch.trim().toLowerCase();
            return schoolClasses.filter(item => {
                const matchesGrade = state.classGrade === 'all' || item.grade === state.classGrade;
                const matchesSearch = !query || [item.name, item.teacher, item.major, item.code].some(value => String(value).toLowerCase().includes(query));
                return matchesGrade && matchesSearch;

        function renderClassDirectory() {

                return `
                <button type="button" class="class-row${pending ? ' has-pending' : ''}" data-class-id="${escapeHtml(item.id)}" aria-label="第${index + 1}个班级，${escapeHtml(getClassDisplayName(item))}，班主任${escapeHtml(item.teacher)}，男生${item.male}人，女生${item.female}人${pending ? `，有${pending}项待处理` : ''}">
                    <span class="class-index" aria-hidden="true">${String(index + 1).padStart(2,'0')}</span>
                    <span class="class-row-main">
                        <span class="class-row-title">${escapeHtml(getClassDisplayName(item))}</span>

            classOverviewPanel.innerHTML = `

                ${state.classStudentFilter === 'auth' ? '<div class="class-filter-notice"><span>当前仅显示未完成身份认证的学生</span><button type="button" data-action="clear-class-student-filter">查看全部</button></div>' : ''}
                <div class="class-student-list">${filteredRoster.map(item => `

            '考勤与统计': ['返校点名','回家点名','返校统计','回家统计','课堂点名统计'],
            '教学与成长': ['班级作业','班级报修','班级日志','学生评语','学生特长班','期末成绩'],
            '班级配置': ['宿舍设置','行为设置','班级座位设置','班级就业','班级指标','班干部设置','特长班请假']
        };
        const classCoreModules = { '学生假条': 'leave', '实时点名': 'rollcall', '学生违纪': 'discipline', '班级日志': 'logs', '宿舍设置': 'dorm' };

                button.classList.toggle('active', active);

        function calculateAge(birthDate, now = new Date()) {
            const match = String(birthDate || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
            if (!match) return '';
            let age = now.getFullYear() - Number(match[1]);
            const month = Number(match[2]) - 1;
            const day = Number(match[3]);
            if (now.getMonth() < month || (now.getMonth() === month && now.getDate() < day)) age -= 1;
            return String(Math.max(0, age));
        }

                        <div class="hero-fact"><span>最近更新</span><strong>${escapeHtml(data.updatedAt)}</strong></div>
                    </div>
                    <div class="hero-alert"><span class="pill warning">待补充</span><strong>${escapeHtml(data.nextAction)}</strong></div>
                    <div class="quick-actions">
                        <button type="button" class="quick-button primary" data-action="call-student">${icon('phone')}<span>拨打学生</span></button>
                        <button type="button" class="quick-button" data-action="call-guardian">${icon('guardian')}<span>联系监护人</span></button>
                    </div>
                </section>`;
        }

        function renderControl(label, path, options = {}) {
            const data = currentData();
            const value = getPath(data, path);
            const multiline = options.type === 'textarea' ? ' multiline' : '';
            const id = `edit-${slug(path)}`;
            if (!state.editMode || options.readonly) {
                const display = options.display ? options.display(value, data) : (value || '待补充');
                const empty = !value || value === '待补充' ? ' empty-value' : '';
                return `<div class="info-row${multiline}"><span class="info-label">${escapeHtml(label)}</span><strong class="info-value${empty}">${options.rawHtml ? display : escapeHtml(display)}</strong></div>`;
            }
            let control;
            if (options.type === 'select') {
                control = `<button type="button" class="edit-control custom-field-trigger" id="${id}" data-action="open-select-picker" data-picker-path="${escapeHtml(path)}" data-picker-label="${escapeHtml(label)}" data-picker-options="${escapeHtml(JSON.stringify(options.choices || []))}" aria-haspopup="dialog" aria-controls="pickerLayer" aria-expanded="false"><span>${escapeHtml(value || '请选择')}</span><svg aria-hidden="true" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg></button>`;
            } else if (options.type === 'date') {
                control = `<button type="button" class="edit-control custom-field-trigger" id="${id}" data-action="open-date-picker" data-picker-path="${escapeHtml(path)}" data-picker-label="${escapeHtml(label)}" aria-haspopup="dialog" aria-controls="pickerLayer" aria-expanded="false"><span>${escapeHtml(value || '请选择日期')}</span><svg aria-hidden="true" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"></rect><path d="M8 3v4M16 3v4M3 10h18"></path></svg></button>`;
            } else if (options.type === 'textarea') {
                control = `<textarea class="edit-control" id="${id}" data-path="${escapeHtml(path)}">${escapeHtml(value)}</textarea>`;
            } else if (options.type === 'tel') {
                const phoneDigits = String(value || '').replace(/\D/g, '').slice(0, 11);
                control = `<div class="phone-input-shell"><input class="edit-control" id="${id}" type="tel" inputmode="numeric" maxlength="11" data-phone-input data-path="${escapeHtml(path)}" value="${escapeHtml(phoneDigits)}"><span class="phone-counter" aria-hidden="true">${phoneDigits.length}/11</span></div>`;
            } else {
                control = `<input class="edit-control" id="${id}" type="${escapeHtml(options.type || 'text')}" data-path="${escapeHtml(path)}" value="${escapeHtml(value)}">`;
            }
            return `<div class="info-row${multiline}"><label class="info-label" for="${id}">${escapeHtml(label)}</label><div class="info-value">${control}</div></div>`;
        }

        function card(title, subtitle, content, action = '') {
            return `<section class="section-card glass"><div class="section-head"><h2 class="section-title">${escapeHtml(title)}</h2>${action}</div>${content}</section>`;
        }

        function renderIdentity() {
            const basic = `<div class="info-list">
                ${renderControl('学生姓名', 'name')}${renderControl('性别', 'gender', { type: 'select', choices: ['男','女'] })}
                ${renderControl('出生日期', 'birthDate', { type: 'date' })}${renderControl('年龄', 'age', { readonly: true })}
                ${renderControl('学生学号', 'studentNo')}${renderControl('就读方式', 'educationMode', { type: 'select', choices: ['全日制','校企协同'] })}
                ${renderControl('专业', 'major')}${renderControl('联系电话', 'phone', { type: 'tel' })}
            </div>`;
            const identity = `<div class="info-list">
                ${renderControl('证件类型', 'idType', { type: 'select', choices: ['身份证','户口本','华侨证','其他'] })}
                ${renderControl('证件号码', 'idNumber')}
                ${renderControl('民族', 'ethnicity')}${renderControl('政治面貌', 'politicalStatus', { type: 'select', choices: ['共青团员','群众'] })}
                ${renderControl('户口性质', 'householdType', { type: 'select', choices: ['居民户口','农业户口','非农业户口'] })}${renderControl('户口所在地', 'householdLocation')}
                ${renderControl('招生方式', 'admissionMethod')}${renderControl('准考证号', 'examNo')}
            </div>`;
            return `<div class="panel-stack">${card('个人基本信息','',basic)}${card('身份与生源','',identity)}</div>`;

        function renderSchool() {
            const data = currentData();
            const status = `<div class="status-overview"><div class="status-overview-main"><div class="status-overview-copy"><span>当前学籍状态</span><strong>主状态用于列表与统计</strong></div>${pill(data.studentStatus,statusTone(data.studentStatus))}</div><div class="status-overview-meta"><div><span>学籍注册</span><strong>${escapeHtml(data.registrationStatus)}</strong></div><div><span>实习进度</span><strong>${escapeHtml(data.internshipStatus)}</strong></div><div><span>休学情况</span><strong>${escapeHtml(data.suspensionStatus)}</strong></div></div></div>`;
            const roll = `<div class="info-list">
                ${renderControl('学生状态','studentStatus',{type:'select',choices:['正常在读','顶岗实习','休学保留学籍','已毕业']})}
                ${renderControl('入学日期','entryDate',{type:'date'})}${renderControl('毕业日期','graduationDate',{type:'date'})}
                ${renderControl('变动日期','statusChangedAt',{type:'date'})}${renderControl('变动原因','statusReason',{type:'textarea'})}

                ${renderControl('注册年级','registeredGrade')}${renderControl('注册班级','registeredClass')}
                ${renderControl('注册学期','registeredTerm')}${renderControl('班级培养计划','classPlan',{type:'textarea'})}
                ${renderControl('个人培养计划','personalPlans',{type:'textarea',display:value => Array.isArray(value) ? value.join('、') : value})}

        function renderFamily() {
            const contact = `<div class="info-list">
                ${renderControl('学生电话','phone',{type:'tel'})}${renderControl('现居地址','address',{type:'textarea'})}
                ${renderControl('电子邮箱','email',{type:'email'})}${renderControl('微信号','wechat')}${renderControl('QQ号','qq')}
                ${renderControl('紧急联系人','emergencyName')}${renderControl('紧急电话','emergencyPhone',{type:'tel'})}
            </div>`;

                ${renderControl('监护人姓名','family.0.name')}
                ${renderControl('监护人身份证号码','family.0.idNumber')}
                ${renderControl('监护人电话','family.0.phone',{type:'tel'})}
            </div>`;
            const comprehensive = `<div class="info-list">${renderControl('家庭经济','familyEconomy')}${renderControl('父母情况','parentsSeparated',{type:'select',choices:['否','是']})}${renderControl('学习风格','learningStyle')}${renderControl('个性特征','personality')}${renderControl('情绪状态','emotion')}${renderControl('兴趣爱好','hobbies',{type:'textarea'})}${renderControl('擅长技能','skills',{type:'textarea'})}</div>`;
            return `<div class="panel-stack">${card('联系方式','',contact)}${card('监护人','',guardian)}${card('综合档案','',comprehensive)}</div>`;
        }

        function renderHealth() {
            const data = currentData();
            const metricText = (value, unit = '') => value ? `${escapeHtml(value)}${unit ? `<small> ${unit}</small>` : ''}` : '<span class="empty-value">待补充</span>';
            const metrics = state.editMode ? `<div class="metric-grid">
                <div class="metric-card editable"><span>身高（cm）</span><input class="metric-edit-control" type="number" inputmode="decimal" data-path="height" value="${escapeHtml(data.height)}" aria-label="编辑身高"></div>
                <div class="metric-card editable"><span>体重（kg）</span><input class="metric-edit-control" type="number" inputmode="decimal" data-path="weight" value="${escapeHtml(data.weight)}" aria-label="编辑体重"></div>
                <div class="metric-card editable"><span>左 / 右视力</span><div class="metric-vision-edit"><input class="metric-edit-control" type="text" inputmode="decimal" data-path="leftVision" value="${escapeHtml(data.leftVision)}" aria-label="编辑左眼视力"><span>/</span><input class="metric-edit-control" type="text" inputmode="decimal" data-path="rightVision" value="${escapeHtml(data.rightVision)}" aria-label="编辑右眼视力"></div></div>
                <div class="metric-card editable"><span>血型</span><button type="button" class="custom-field-trigger metric-edit-control" data-action="open-select-picker" data-picker-path="bloodType" data-picker-label="选择血型" data-picker-options='["A 型","B 型","AB 型","O 型","不详"]' aria-haspopup="dialog" aria-controls="pickerLayer" aria-expanded="false"><span>${escapeHtml(data.bloodType || '请选择')}</span><svg aria-hidden="true" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg></button></div>
            </div>` : `<div class="metric-grid"><div class="metric-card"><span>身高</span><strong>${metricText(data.height,'cm')}</strong></div><div class="metric-card"><span>体重</span><strong>${metricText(data.weight,'kg')}</strong></div><div class="metric-card"><span>左 / 右视力</span><strong>${data.leftVision || data.rightVision ? `${escapeHtml(data.leftVision || '待补充')} / ${escapeHtml(data.rightVision || '待补充')}` : '<span class="empty-value">待补充</span>'}</strong></div><div class="metric-card"><span>血型</span><strong>${metricText(data.bloodType)}</strong></div></div>`;
            const details = `<div class="info-list">${renderControl('健康状况','healthStatus')}${renderControl('过敏信息','allergies',{type:'textarea'})}${renderControl('既往病史','medicalHistory',{type:'textarea'})}</div>`;
            const records = data.healthRecords.map(record => `<article class="subcard health-record"><div class="record-head"><div class="record-copy"><div class="record-eyebrow">${escapeHtml(record.date)}</div><h3 class="subcard-title">健康体检记录</h3></div>${pill(record.status,statusTone(record.status))}</div><div class="health-record-core"><div><span>身高</span><strong>${escapeHtml(record.height)} cm</strong></div><div><span>体重</span><strong>${escapeHtml(record.weight)} kg</strong></div></div><p class="record-note">${escapeHtml(record.conclusion)}</p></article>`).join('');
            const add = `<button type="button" class="soft-action" data-action="add-health">新增记录</button>`;
            return `<div class="panel-stack">${card('健康概览','',metrics + details)}${card('历史体检','',`<div class="subcard-list">${records}</div>`,add)}</div>`;
        }

        function renderGrades() {
            const data = currentData();
            const records = data.grades.map(record => `<article class="subcard grade-record"><div class="record-head"><div class="record-copy"><div class="record-eyebrow">${escapeHtml(record.examType)}</div><h3 class="subcard-title">${escapeHtml(record.subject)}</h3><p class="subcard-meta">考试日期 · ${escapeHtml(record.date)}</p></div><div class="grade-score"><span>成绩</span><strong class="score">${escapeHtml(record.score)}</strong></div></div></article>`).join('');
            const add = `<button type="button" class="soft-action" data-action="add-grade">新增成绩</button>`;
            return `<div class="panel-stack">${card('中考与入学成绩','',`<div class="subcard-list">${records}</div>`,add)}</div>`;
        }

        function renderMaterials() {
            const data = currentData();
            const materials = data.attachments.map((item,index) => `<article class="material-card"><div class="record-head"><div class="record-copy"><div class="record-eyebrow">档案材料</div><div class="material-name">${escapeHtml(item.name)}</div></div>${pill(item.status,statusTone(item.status))}</div><div class="material-meta">${escapeHtml(item.updatedAt)} · ${escapeHtml(item.note)}</div><div class="material-side"><span class="material-meta">${/不通过|未上传/.test(item.status) ? '需要补充有效文件' : '材料已进入档案'}</span><button type="button" class="soft-action" data-action="material" data-index="${index}" aria-label="${/不通过|未上传/.test(item.status) ? '补传' : '查看'}${escapeHtml(item.name)}">${/不通过|未上传/.test(item.status) ? '补传' : '查看'}</button></div></article>`).join('');
            const accountStatus = data.account.enabled ? pill('已启用','success') : pill('已停用','danger');
            const account = `<div class="account-summary"><div class="account-summary-head"><div><span>登录用户名</span><strong>${escapeHtml(data.account.username)}</strong></div>${accountStatus}</div><div class="info-list"><div class="info-row"><span class="info-label">最后登录</span><strong class="info-value">${escapeHtml(data.account.lastLogin)}</strong></div></div><div class="px-4 pb-4 grid grid-cols-2 gap-2"><button type="button" class="quick-button" data-action="toggle-account">${data.account.enabled ? '停用账号' : '启用账号'}</button><button type="button" class="quick-button" data-action="reset-password">重置密码</button></div></div>`;
            return `<div class="panel-stack">${card('证件与材料','',`<div class="material-list">${materials}</div>`)}${card('学生账号','',account)}</div>`;
        }

        function renderPanel() {
            const renderers = { identity: renderIdentity, school: renderSchool, family: renderFamily, health: renderHealth, grades: renderGrades, materials: renderMaterials };
            panelRoot.innerHTML = renderers[state.activeTab]();
            renderEditFooter();
        }

        function renderEditFooter() {
            editFooterRoot.innerHTML = state.editMode ? `<div class="edit-footer"><button type="button" class="footer-button cancel" data-action="cancel-edit">取消编辑</button><button type="button" class="footer-button save" data-action="save-edit">保存学生档案</button></div>` : '';
        }

        function renderAll() {
            detailView.classList.toggle('is-editing', state.editMode);
            editButton.hidden = state.editMode;
            editButton.textContent = '编辑';
            editButton.classList.remove('is-saving');
            editButton.setAttribute('aria-label', '编辑学生档案');
            renderHero();
            renderPanel();
        }

        function getDetailTabAnchorTop() {
            const tabStyle = getComputedStyle(tabDock);
            const scrollStyle = getComputedStyle(scrollArea);
            const naturalTabTop = heroRoot.offsetTop + heroRoot.offsetHeight + (parseFloat(tabStyle.marginTop) || 0);
            return Math.max(0, naturalTabTop - (parseFloat(scrollStyle.paddingTop) || 0));
        }

        function switchTab(tab, focus = false) {
            if (!tabOrder.includes(tab)) return;
            state.activeTab = tab;
            panelRoot.setAttribute('aria-labelledby', `tab-${tab}`);
            document.querySelectorAll('#detailView [role="tab"]').forEach(button => {
                const active = button.dataset.tab === tab;
                button.setAttribute('aria-selected', active ? 'true' : 'false');
                button.tabIndex = active ? 0 : -1;
            });
            renderPanel();
            scrollArea.scrollTop = Math.min(scrollArea.scrollTop, getDetailTabAnchorTop());
            if (focus) document.getElementById(`tab-${tab}`).focus();
        }

        let toastTimer;
        function showToast(message, duration = 1900) {
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), duration);
        }

        function enterEdit() {
            state.draft = clone(student);
            if (!Array.isArray(state.draft.family) || !state.draft.family.length) {
                state.draft.family = [{ relation: '监护人', name: '', idNumber: '', phone: '', phoneRaw: '', guardian: true }];
            }
            enforceSinglePrimaryGuardian(state.draft);
            state.editMode = true;
            renderAll();
            showToast('已进入编辑模式');
        }

        function cancelEdit() {
            confirmDiscardChanges(() => {
                state.editMode = false;
                state.draft = null;
                renderAll();
                showToast('已放弃本次修改');
            }, '放弃修改');
        }

        const studentChangeFields = [
            ['name','学生姓名'], ['gender','性别'], ['birthDate','出生日期'], ['age','年龄'], ['studentNo','学生学号'],
            ['educationMode','就读方式'], ['major','专业'], ['phone','联系电话'], ['idType','证件类型'], ['idNumber','证件号码'],
            ['ethnicity','民族'], ['politicalStatus','政治面貌'], ['householdType','户口性质'], ['householdLocation','户口所在地'],
            ['admissionMethod','招生方式'], ['examNo','准考证号'], ['graduationSchool','毕业学校'], ['graduationClass','原毕业班级'],
            ['studentStatus','学生状态'], ['entryDate','入学日期'], ['graduationDate','毕业日期'], ['statusChangedAt','变动日期'],
            ['statusReason','变动原因'], ['schoolRollNo','学籍号'], ['registrationStatus','学籍注册'], ['internshipStatus','实习状态'],
            ['suspensionStatus','休学状态'], ['workStudyStatus','勤工俭学'], ['registeredGrade','注册年级'], ['registeredClass','注册班级'],
            ['registeredTerm','注册学期'], ['classPlan','班级培养计划'], ['personalPlans','个人培养计划'], ['address','现居地址'],
            ['email','电子邮箱'], ['wechat','微信号'], ['qq','QQ号'], ['emergencyName','紧急联系人'], ['emergencyPhone','紧急电话'],
            ['familyEconomy','家庭经济'], ['parentsSeparated','父母情况'], ['learningStyle','学习风格'], ['personality','个性特征'],
            ['emotion','情绪状态'], ['hobbies','兴趣爱好'], ['skills','擅长技能'], ['family','监护人'],
            ['healthStatus','健康状况'], ['height','身高'], ['weight','体重'], ['bloodType','血型'], ['leftVision','左眼视力'],
            ['rightVision','右眼视力'], ['allergies','过敏信息'], ['medicalHistory','既往病史'],
            ['healthRecords','体检记录'], ['grades','成绩记录'], ['attachments','档案材料'], ['account.enabled','学生账号']
        ];

        function normalizeStudentChangeValue(path, value) {
            if (path === 'family') {
                const guardians = (value || [])
                    .filter(member => member?.name || member?.idNumber || member?.phone || member?.phoneRaw)
                    .map(member => ({ name: member.name || '', idNumber: member.idNumber || '', phone: String(member.phone || member.phoneRaw || '').replace(/\D/g, '') }));
                return JSON.stringify(guardians);
            }
            if (Array.isArray(value) || (value && typeof value === 'object')) return JSON.stringify(value);
            return String(value ?? '').trim().replace(/\s+/g, ' ');
        }

        function displayStudentChangeValue(path, value) {
            if (path === 'personalPlans') return (value || []).join('、');
            if (path === 'family') {
                const guardian = (value || [])[0];
                return guardian ? `姓名：${guardian.name || '未填写'}；身份证号码：${guardian.idNumber || '未填写'}；电话：${guardian.phone || '未填写'}` : '';
            }
            if (path === 'healthRecords') return (value || []).map(record => `${record.date || '未填写日期'}：${record.conclusion || '未填写结论'}`).join('；');
            if (path === 'grades') return (value || []).map(record => `${record.subject || '科目'} ${record.score || '待录入'}分`).join('、');
            if (path === 'attachments') return (value || []).map(item => `${item.name || '材料'}（${item.status || '待处理'}）`).join('、');
            if (path === 'account.enabled') return value ? '已启用' : '已停用';
            return String(value ?? '').trim();
        }

        function getStudentChanges(before, after) {
            return studentChangeFields.reduce((changes, [path, label]) => {
                const beforeValue = getPath(before, path);
                const afterValue = getPath(after, path);
                if (normalizeStudentChangeValue(path, beforeValue) !== normalizeStudentChangeValue(path, afterValue)) {
                    changes.push({ label, before: displayStudentChangeValue(path, beforeValue), after: displayStudentChangeValue(path, afterValue) });
                }
                return changes;
            }, []);
        }

        function renderStudentChangeValue(value, tagName) {
            const raw = String(value ?? '').trim();
            return `<${tagName}${raw ? '' : ' class="empty-change-value"'}>${escapeHtml(raw || '空')}</${tagName}>`;
        }

        function renderStudentChanges(changes) {
            return `<div class="change-list">${changes.map(change => `<div class="change-row"><div class="change-label">${escapeHtml(change.label)}</div><div class="change-values">${renderStudentChangeValue(change.before,'span')}<em>→</em>${renderStudentChangeValue(change.after,'strong')}</div></div>`).join('')}</div>`;
        }

        function confirmSave() {
            const changes = getStudentChanges(student, state.draft);
            if (!changes.length) {
                showToast('没有检测到修改，无需保存');
                return;
            }
            openDialog({
                title: '确认保存修改？',
                desc: `已标注 ${changes.length} 项实际变化，确认后将同步更新学生档案。`,
                body: renderStudentChanges(changes),
                confirmLabel: '确认保存',
                cancelLabel: '继续编辑',
                onConfirm: () => {
                    enforceSinglePrimaryGuardian(state.draft);
                    state.draft.phoneRaw = String(state.draft.phone || '').replace(/\D/g, '');
                    state.draft.phone = formatPhone(state.draft.phoneRaw);
                    state.draft.emergencyPhoneRaw = String(state.draft.emergencyPhone || '').replace(/\D/g, '');
                    state.draft.emergencyPhone = formatPhone(state.draft.emergencyPhoneRaw);
                    Object.keys(student).forEach(key => delete student[key]);
                    Object.assign(student, clone(state.draft));
                    student.updatedAt = new Date().toLocaleString('zh-CN', { hour12: false }).replaceAll('/', '-');
                    state.editMode = false;
                    state.draft = null;
                    renderAll();
                    renderStudentList();
                    showToast('学生档案已保存');
                }
            });
        }

        function openDialog({ title, desc = '', body = '', confirmLabel = '确认', cancelLabel = '取消', danger = false, onConfirm }) {
            state.dialogReturnFocus = document.activeElement;
            state.dialogAction = onConfirm || null;
            dialogTitle.textContent = title;
            dialogDesc.textContent = desc;
            dialogBody.innerHTML = body;
            dialogConfirm.textContent = confirmLabel;
            document.getElementById('dialogCancel').textContent = cancelLabel;
            dialogConfirm.classList.toggle('danger', danger);
            dialogLayer.hidden = false;
            requestAnimationFrame(() => dialog.focus());
        }

        function closeDialog() {
            dialogLayer.hidden = true;
            dialogBody.innerHTML = '';
            state.dialogAction = null;
            if (state.dialogReturnFocus && typeof state.dialogReturnFocus.focus === 'function') state.dialogReturnFocus.focus();
        }

        function getPickerButtonContext(button) {
            if (button === classFilterTrigger) {
                return { kind: 'class', trigger: button, currentValue: state.classFilter };
            }

        function showPicker(title) {

        function closePicker(restoreFocus = true) {
            const trigger = state.pickerContext?.trigger;
            if (trigger) trigger.setAttribute('aria-expanded', 'false');
            pickerLayer.hidden = true;

        function trapFocusWithin(event, container) {
            if (event.key !== 'Tab') return false;
            const focusable = Array.from(container.querySelectorAll('button:not([disabled]), input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])'))
                .filter(element => !element.hidden && element.getAttribute('aria-hidden') !== 'true');
            if (!focusable.length) return false;
            const first = focusable[0];
            const last = focusable[focusable.length - 1];
            if (!container.contains(document.activeElement)) {
                event.preventDefault();
                (event.shiftKey ? last : first).focus();
            } else if (event.shiftKey && document.activeElement === first) {
                event.preventDefault();
                last.focus();
            } else if (!event.shiftKey && document.activeElement === last) {
                event.preventDefault();
                first.focus();
            }
            return true;
        }

        function applyPickerValue(value, label = value) {
            const context = state.pickerContext;
            if (!context) return;
            const trigger = context.trigger;
            const triggerId = trigger?.id;
            closePicker(false);
            if (context.kind === 'draft') {

                renderAll();
                if (triggerId) requestAnimationFrame(() => document.getElementById(triggerId)?.focus());
                showToast('已更新选择');
                return;
            }
            if (context.kind === 'class') {
                state.classFilter = value;
                updateClassFilterTrigger(label);
                renderStudentList();
                trigger?.focus();
                return;
            }
            const target = document.getElementById(context.targetId);
            if (target) target.value = value;
            const copy = trigger?.querySelector('span');
            if (copy) copy.textContent = label || '请选择';
            trigger?.focus();
        }

        function openSelectPicker(button, optionsOverride = null) {
            const context = getPickerButtonContext(button);

            if (!options) {
                try { options = JSON.parse(button.dataset.pickerOptions || '[]'); }
                catch { options = []; }
            }
            context.type = 'select';
            context.options = (options || []).map(option => typeof option === 'object' ? option : { label: option, value: option });
            state.pickerContext = context;
            pickerBody.setAttribute('role', 'listbox');
            pickerBody.setAttribute('aria-label', button.dataset.pickerLabel || '请选择');
            pickerBody.innerHTML = context.options.map((option, index) => {
                const active = String(option.value) === String(context.currentValue);
                return `<button type="button" class="picker-option${active ? ' active' : ''}" role="option" aria-selected="${active ? 'true' : 'false'}" data-action="picker-select" data-picker-index="${index}"><span>${escapeHtml(option.label)}</span>${active ? '<svg aria-hidden="true" viewBox="0 0 24 24"><polyline points="5 12 10 17 19 7"></polyline></svg>' : ''}</button>`;
            }).join('');

        function parsePickerDate(value) {
            const match = String(value || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
            const now = new Date();
            if (!match) return { year: now.getFullYear(), month: now.getMonth() + 1, day: now.getDate() };
            return { year: Number(match[1]), month: Number(match[2]), day: Number(match[3]) };
        }

        function getMonthDays(year, month) {
            return new Date(year, month, 0).getDate();
        }

        function renderDateWheel() {
            const context = state.pickerContext;
            if (!context?.parts) return;
            const parts = context.parts;
            const years = Array.from({ length: 7 }, (_, index) => parts.year - 2 + index);
            const months = Array.from({ length: 12 }, (_, index) => index + 1);
            const dayCount = getMonthDays(parts.year, parts.month);
            if (parts.day > dayCount) parts.day = dayCount;
            const days = Array.from({ length: dayCount }, (_, index) => index + 1);
            const column = (part, title, values, selected, suffix) => `<div class="wheel-column-shell"><div class="wheel-column-title">${title}</div><div class="wheel-column" data-wheel-column="${part}">${values.map(value => `<button type="button" class="wheel-option${value === selected ? ' selected' : ''}" data-action="wheel-select" data-wheel-part="${part}" data-wheel-value="${value}">${part === 'year' ? value : String(value).padStart(2,'0')}${suffix}</button>`).join('')}</div></div>`;
            pickerBody.innerHTML = `<div class="datetime-section-title">日期</div><div class="date-wheel">${column('year','年',years,parts.year,'年')}${column('month','月',months,parts.month,'月')}${column('day','日',days,parts.day,'日')}</div><div class="date-wheel-actions"><button type="button" class="date-clear" data-action="picker-clear-date">清空</button><button type="button" class="date-confirm" data-action="picker-confirm-date">确定</button></div>`;
            pickerBody.querySelectorAll('.wheel-column').forEach(element => {
                element.addEventListener('scroll', () => {
                    if (element.dataset.syncing === '1') return;
                    clearTimeout(wheelScrollTimers.get(element));
                    wheelScrollTimers.set(element, setTimeout(() => {
                        const activeContext = state.pickerContext;
                        if (!element.isConnected || !pickerBody.contains(element) || activeContext !== context || !activeContext?.parts) return;
                        const options = Array.from(element.querySelectorAll('.wheel-option'));
                        const center = element.scrollTop + element.clientHeight / 2;
                        const option = options.reduce((nearest, item) => {
                            const distance = Math.abs(item.offsetTop + item.offsetHeight / 2 - center);
                            return !nearest || distance < nearest.distance ? { item, distance } : nearest;
                        }, null)?.item;
                        const part = element.dataset.wheelColumn;
                        const nextValue = Number(option?.dataset.wheelValue);
                        if (!option || activeContext.parts[part] === nextValue) return;
                        activeContext.parts[part] = nextValue;
                        renderDateWheel();
                    }, 90));
                }, { passive: true });
            });
            requestAnimationFrame(() => {
                pickerBody.querySelectorAll('.wheel-column').forEach(element => {
                    const selected = element.querySelector('.wheel-option.selected');
                    if (!selected) return;
                    element.dataset.syncing = '1';
                    element.scrollTop = Math.max(0, selected.offsetTop - (element.clientHeight - selected.clientHeight) / 2);
                    setTimeout(() => { element.dataset.syncing = ''; }, 120);
                });
            });
        }

            if (!file || state.materialIndex == null) return;
            const item = currentData().attachments[state.materialIndex];
            item.status = '待审核';
            item.updatedAt = new Date().toLocaleDateString('zh-CN').replaceAll('/', '-');
            item.note = `已补传 ${file.name}`;
            state.materialIndex = null;
            materialFileInput.value = '';
            renderPanel();
            showToast('材料已补传，等待审核');
        });

        document.getElementById('dialogClose').addEventListener('click', closeDialog);
        document.getElementById('dialogCancel').addEventListener('click', closeDialog);
        document.getElementById('pickerClose').addEventListener('click', () => closePicker());
        document.getElementById('callCancelButton').addEventListener('click', closeCallSheet);
        document.getElementById('callConfirmLink').addEventListener('click', () => {
            showToast(`正在调用系统拨号 ${document.getElementById('callPersonPhone').textContent}`);
            setTimeout(closeCallSheet, 160);
        });
        callLayer.addEventListener('click', event => { if (event.target === callLayer) closeCallSheet(); });
        dialogConfirm.addEventListener('click', () => {
            const result = state.dialogAction?.();
            if (result !== false) closeDialog();
        });
        dialogLayer.addEventListener('click', event => { if (event.target === dialogLayer) closeDialog(); });
        pickerLayer.addEventListener('click', event => { if (event.target === pickerLayer) closePicker(); });
        document.addEventListener('keydown', event => {
            if (!callLayer.hidden) {
                if (event.key === 'Escape') { event.preventDefault(); closeCallSheet(); }
                else trapFocusWithin(event, callLayer);
                return;
            }
            if (!pickerLayer.hidden) {
                if (event.key === 'Escape') { event.preventDefault(); closePicker(); }
                else trapFocusWithin(event, pickerLayer);
                return;
            }
            if (dialogLayer.hidden) return;
            if (event.key === 'Escape') { event.preventDefault(); closeDialog(); return; }
            trapFocusWithin(event, dialog);
        });

        initializeClassFilter();
        renderSchoolHome();
        renderClassDirectory();
        renderStudentList();
        renderAll();
        const previewRoute = new URLSearchParams(window.location.search).get('preview');
        if (previewRoute) document.body.classList.add('qa-static');
        if (previewRoute === 'class-list') openClassList();
        else if (previewRoute === 'class-list-scrolled') { openClassList(); requestAnimationFrame(() => requestAnimationFrame(() => { classListScroll.scrollTop = 108; })); }
        else if (previewRoute === 'class-overview') openClassDetail('CLS2403');
        else if (previewRoute === 'class-overview-todos' || previewRoute === 'class-todos') { openClassDetail('CLS2403'); openClassTodos(); }
        else if (previewRoute === 'class-management') { openClassDetail('CLS2403'); switchClassTab('management'); }
        else if (previewRoute === 'class-info') { openClassDetail('CLS2403'); switchClassTab('info'); }
        else if (previewRoute === 'students') openStudentList();
        else if (previewRoute === 'add-student') { openStudentList(); openAddStudentDialog(); }
        else if (previewRoute === 'student-edit') { openStudentList(); openStudentDetail(students[0].id); enterEdit(); switchTab('identity'); }
        else if (previewRoute === 'student-edit-phone') { openStudentList(); openStudentDetail(students[0].id); enterEdit(); switchTab('family'); }
        else if (['leave','rollcall','discipline','logs','dorm'].includes(previewRoute)) { openClassDetail('CLS2403'); openClassModule(previewRoute); }
        else setView('home');
        if (previewRoute === 'dorm-picker') {
            openClassDetail('CLS2403');
            openClassModule('dorm');
            const arrangeButton = classModuleRoot.querySelector('[data-action="open-dorm-picker"]');
            if (arrangeButton) openDormPicker(arrangeButton);
        }
        if (previewRoute === 'dorm-assigned') {
            openClassDetail('CLS2403');
            openClassModule('dorm');
            const arrangeButton = classModuleRoot.querySelector('[data-action="open-dorm-picker"]');
            if (arrangeButton) {
                openDormPicker(arrangeButton);
                selectDormBed(2);
                confirmDormAssignment();
            }
        }
        if (previewRoute === 'leave-reject') {
            openClassDetail('CLS2403');
            openClassModule('leave');
            const rejectButton = classModuleRoot.querySelector('[data-workflow-value="已驳回"]');
            if (rejectButton) openLeaveRejectDialog(rejectButton.dataset.workflowId, rejectButton);
        }
        if (previewRoute === 'leave-reject-submitted') {
            openClassDetail('CLS2403');
            openClassModule('leave');
            const rejectButton = classModuleRoot.querySelector('[data-workflow-value="已驳回"]');
            if (rejectButton) {
                openLeaveRejectDialog(rejectButton.dataset.workflowId, rejectButton);
                document.getElementById('leaveRejectReason').value = '外出时间与提交凭证不一致，请核实后重新提交。';
                state.dialogAction?.();
                closeDialog();
            }
        }
        if (previewRoute === 'class-info' && new URLSearchParams(window.location.search).get('call') === '1') {
            requestAnimationFrame(() => {
                const firstCallButton = classInfoPanel.querySelector('[data-call-phone]');
                if (firstCallButton) openCallSheet(firstCallButton);
            });
        }
        if (new URLSearchParams(window.location.search).get('metrics') === '1') {
            requestAnimationFrame(() => requestAnimationFrame(() => {
                const activeView = document.querySelector('.app-view.active');
                const activeScroller = activeView?.querySelector('main');
                document.body.setAttribute('data-qa-metrics', JSON.stringify({
                    deviceClient: document.getElementById('device').clientWidth,
                    deviceScroll: document.getElementById('device').scrollWidth,
                    viewClient: activeView?.clientWidth || 0,
                    viewScroll: activeView?.scrollWidth || 0,
                    scrollerClient: activeScroller?.clientWidth || 0,
                    scrollerScroll: activeScroller?.scrollWidth || 0
                }));
            }));
        }
    </script>
</body>
</html>
