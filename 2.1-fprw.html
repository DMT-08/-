        function selectStudentForDormBed(recordId) {
            if (state.pickerContext?.type !== 'dorm-bed-student') return;
            state.pickerContext.recordId = recordId;
            renderDormBedStudentPicker();
            requestAnimationFrame(() => pickerBody.querySelector(`[data-dorm-id="${recordId}"]`)?.focus());
        }

        function selectDormRoom(roomId) {
            if (state.pickerContext?.type !== 'dorm') return;
            const record = getDormPickerRecord();
            const rooms = dormInventory[record?.gender] || [];
            state.pickerContext.roomId = roomId;
            state.pickerContext.bedNumber = record?.roomId === roomId ? record.bedNumber : '';
            renderDormPicker();
            requestAnimationFrame(() => pickerBody.querySelector(`[data-room-id="${roomId}"]`)?.focus());
        }

        function selectDormBed(bedNumber) {
            if (state.pickerContext?.type !== 'dorm') return;
            state.pickerContext.bedNumber = Number(bedNumber);
            renderDormPicker();
            requestAnimationFrame(() => pickerBody.querySelector(`[data-bed-number="${bedNumber}"]`)?.focus());
        }

        function assignDormStudentToBed(record, room, bed) {
            const isCurrentBed = Boolean(record && record.roomId === room?.id && Number(record.bedNumber) === bed?.number);
            if (!record || !room || !bed || (bed.occupied && !isCurrentBed) || getDormRoomGender(room.id) !== record.gender) return false;
            const previousRoom = getDormRoom(record.roomId);
            const previousBed = previousRoom?.beds.find(item => item.number === Number(record.bedNumber));
            if (previousBed && !isCurrentBed) {
                previousBed.occupied = false;
                previousBed.studentName = '';
            }
            record.assignment = formatDormBedLabel(room, bed);
            record.roomId = room.id;
            record.bedNumber = bed.number;
            bed.occupied = true;
            bed.studentName = record.name;
            state.dormRoomId = room.id;
            return true;
        }

        function confirmDormAssignment() {
            const context = state.pickerContext;
            const record = getDormPickerRecord();
            const room = (dormInventory[record?.gender] || []).find(item => item.id === context?.roomId);
            const bed = room?.beds.find(item => item.number === Number(context?.bedNumber));
            if (!assignDormStudentToBed(record, room, bed)) return showToast('请选择可用床位');
            closePicker(false);
            refreshClassWorkflowViews();
            requestAnimationFrame(() => scrollDormRoomIntoCenter(state.dormRoomId));
            showToast('宿舍与床位已安排');
        }

        function confirmStudentForDormBed() {
            const context = state.pickerContext;
            if (context?.type !== 'dorm-bed-student') return;
            const record = classWorkflowState.dorm.find(item => item.id === context.recordId);
            const room = getDormRoom(context.roomId);
            const bed = room?.beds.find(item => item.number === Number(context.bedNumber));
            if (!record || !room || !bed) return showToast('请选择可安排的学生');
            const completeAssignment = () => {
                if (!assignDormStudentToBed(record, room, bed)) {
                    showToast('该床位当前不可安排');
                    return false;
                }
                closePicker(false);
                refreshClassWorkflowViews();
                requestAnimationFrame(() => scrollDormRoomIntoCenter(state.dormRoomId));
                const placement = getBedPlacement(bed.number, room.beds.length);
                showToast(`${record.name}已安排到${room.name} ${placement.unitNumber}号床${placement.bunk}`);
            };
            if (record.assignment) {
                const returnFocus = context.trigger;
                closePicker(false);
                openDialog({
                    title: `确认调整${record.name}的床位？`,
                    desc: '该学生已有宿舍，确认后原床位会自动释放。',
                    body: `<div class="leave-detail-grid"><div class="leave-detail-row"><span>当前床位</span><strong>${escapeHtml(record.assignment)}</strong></div><div class="leave-detail-row"><span>调整至</span><strong>${escapeHtml(formatDormBedLabel(room, bed))}</strong></div></div>`,
                    confirmLabel: '确认调整',
                    cancelLabel: '暂不调整',
                    onConfirm: completeAssignment
                });
                state.dialogReturnFocus = returnFocus;
                return;
            }
            completeAssignment();
        }

        function removeDormAssignment(recordId) {
            const record = classWorkflowState.dorm.find(item => item.id === recordId);
            if (!record?.assignment) return;
            openDialog({
                title: `将${record.name}从当前宿舍移除？`,
                desc: record.assignment,
                confirmLabel: '确认移除',
                danger: true,
                onConfirm: () => {
                    const room = getDormRoom(record.roomId);
                    const bed = room?.beds.find(item => item.number === Number(record.bedNumber));
                    if (bed) { bed.occupied = false; bed.studentName = ''; }
                    record.assignment = '';
                    record.roomId = '';
                    record.bedNumber = '';
                    refreshClassWorkflowViews();
                    showToast('学生已从当前宿舍移除');
                }
            });
        }

        function handleClassWorkflow(button) {
            const type = button.dataset.workflow;
            const id = button.dataset.workflowId;
            if (type === 'leave') {
                const item = classWorkflowState.leave.find(record => record.id === id);
                if (button.dataset.workflowValue === '已驳回') return openLeaveRejectDialog(id, button);
                if (item) {
                    item.status = '已通过';
                    delete item.rejectReason;
                }
                showToast('假条已通过');
            }
            if (type === 'rollcall') {
                classWorkflowState.rollcall[id] = rollcallStatuses.includes(button.dataset.workflowValue) ? button.dataset.workflowValue : '到课';
                classWorkflowState.rollcallSessionDrafts[state.rollcallSessionKey] = clone(classWorkflowState.rollcall);
                state.rollcallExpandedId = '';
            }
            refreshClassWorkflowViews();
        }

        function calculateAge(birthDate, now = new Date()) {
            const match = String(birthDate || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
            if (!match) return '';
            let age = now.getFullYear() - Number(match[1]);
            const month = Number(match[2]) - 1;
            const day = Number(match[3]);
            if (now.getMonth() < month || (now.getMonth() === month && now.getDate() < day)) age -= 1;
            return String(Math.max(0, age));
        }

        function renderControl(label, path, options = {}) {
            const data = currentData();
            const value = getPath(data, path);
            const multiline = options.type === 'textarea' ? ' multiline' : '';
            const id = `edit-${slug(path)}`;
            if (!state.editMode || options.readonly) {
                const display = options.display ? options.display(value, data) : value;
                const missing = value == null || (Array.isArray(value) ? value.length === 0 : !String(value).trim() || String(value).trim() === '待补充');
                if (!state.editMode && (missing || display == null || !String(display).trim() || String(display).trim() === '待补充')) return '';
                const empty = missing ? ' empty-value' : '';
                if (options.type === 'tel') {
                    return `<div class="info-row"><span class="info-label">${escapeHtml(label)}</span><div class="info-value phone-value${empty}">${phoneDisplayMarkup(value, label)}</div></div>`;
                }
                return `<div class="info-row${multiline}"><span class="info-label">${escapeHtml(label)}</span><strong class="info-value${empty}">${options.rawHtml ? display : escapeHtml(display)}</strong></div>`;
            }
            let control;
            if (options.type === 'select') {
                control = `<button type="button" class="edit-control custom-field-trigger" id="${id}" data-action="open-select-picker" data-picker-path="${escapeHtml(path)}" data-picker-label="${escapeHtml(label)}" data-picker-options="${escapeHtml(JSON.stringify(options.choices || []))}" aria-haspopup="dialog" aria-controls="pickerLayer" aria-expanded="false"><span>${escapeHtml(value || '请选择')}</span><svg aria-hidden="true" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg></button>`;
            } else if (options.type === 'date') {
                control = `<button type="button" class="edit-control custom-field-trigger" id="${id}" data-action="open-date-picker" data-picker-path="${escapeHtml(path)}" data-picker-label="${escapeHtml(label)}" aria-haspopup="dialog" aria-controls="pickerLayer" aria-expanded="false"><span>${escapeHtml(value || '请选择日期')}</span><svg aria-hidden="true" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"></rect><path d="M8 3v4M16 3v4M3 10h18"></path></svg></button>`;
            } else if (options.type === 'textarea') {
                control = `<textarea class="edit-control" id="${id}" data-path="${escapeHtml(path)}">${escapeHtml(value)}</textarea>`;
            } else if (options.type === 'tel') {
                const phoneDigits = String(value || '').replace(/\D/g, '').slice(0, 11);
                control = `<div class="phone-input-shell"><input class="edit-control" id="${id}" type="tel" inputmode="numeric" maxlength="11" data-phone-input data-path="${escapeHtml(path)}" value="${escapeHtml(phoneDigits)}"><span class="phone-counter" aria-hidden="true">${phoneDigits.length}/11</span></div>`;
            } else {
                control = `<input class="edit-control" id="${id}" type="${escapeHtml(options.type || 'text')}" data-path="${escapeHtml(path)}" value="${escapeHtml(value)}">`;
            }
            return `<div class="info-row${multiline}"><label class="info-label" for="${id}">${escapeHtml(label)}</label><div class="info-value">${control}</div></div>`;
        }

        function getMaterialSlots(data = currentData()) {
            const attachments = Array.isArray(data.attachments) ? data.attachments : [];
            const names = [...new Set([...requiredMaterialNames, ...attachments.map(item => item.name).filter(Boolean)])];
            return names.map(name => ({ name, item: attachments.find(item => item.name === name) || null }));
        }

        function hasStudentMaterialPending(data = currentData()) {
            return getMaterialSlots(data).some(slot => requiredMaterialNames.includes(slot.name) && (!slot.item || /不通过/.test(slot.item.status || '')));

        function formatLocalDate(date = new Date()) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
        }

        function formatLocalTime(date = new Date()) {
            return `${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
        }

        function timeToMinutes(value) {
            const [hours, minutes] = String(value || '00:00').split(':').map(Number);
            return hours * 60 + minutes;
        }

        function getCurrentAttendanceCourse(date = new Date()) {
            const current = date.getHours() * 60 + date.getMinutes();
            const active = attendanceCourseSchedule.find(item => current >= timeToMinutes(item.start) && current <= timeToMinutes(item.end));
            if (active) return active;
            return attendanceCourseSchedule.reduce((closest, item) => {
                const midpoint = (timeToMinutes(item.start) + timeToMinutes(item.end)) / 2;
                const distance = Math.abs(current - midpoint);
                return !closest || distance < closest.distance ? { ...item, distance } : closest;
            }, null);
        }

        function isAttendanceRecordEditable(record) {
            const recordDate = new Date(`${record?.date || ''}T00:00:00`);
            if (Number.isNaN(recordDate.getTime())) return false;
            const todayText = formatLocalDate();
            const today = new Date(`${todayText}T00:00:00`);
            const difference = today.getTime() - recordDate.getTime();
            return difference >= 0 && difference <= 7 * 24 * 60 * 60 * 1000;
        }

        function getAttendanceRecords(data = currentData()) {
            return Array.isArray(data.attendanceRecords) ? data.attendanceRecords : [];
        }

        function getFilteredAttendanceRecords() {
            const records = getAttendanceRecords();
            const currentMonth = formatLocalDate().slice(0, 7);
            return records.filter(record => {
                const matchesPeriod = state.attendancePeriodFilter === 'all'
                    || (state.attendancePeriodFilter === 'week' && isDateInCurrentWeek(record.date))
                    || (state.attendancePeriodFilter === 'month' && record.date?.startsWith(currentMonth))
                    || (state.attendancePeriodFilter === 'term' && String(record.date || '') >= ACADEMIC_TERM_START);
                const matchesStatus = state.attendanceStatusFilter === 'all' || record.status === state.attendanceStatusFilter;
                return matchesPeriod && matchesStatus;
            }).sort((a, b) => {
                const dateOrder = String(b.date || '').localeCompare(String(a.date || ''));
                if (dateOrder) return dateOrder;
                const courseA = attendanceCourseSchedule.findIndex(item => item.period === a.period && item.course === a.course);
                const courseB = attendanceCourseSchedule.findIndex(item => item.period === b.period && item.course === b.course);
                return (courseA < 0 ? 99 : courseA) - (courseB < 0 ? 99 : courseB);
            });
        }

        function formatAttendanceDay(value) {
            const date = parseLocalDate(value);
            if (!date) return { date: value || '未记录', weekday: '' };
            const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
            return { date: `${date.getMonth() + 1}/${date.getDate()}`, weekday: weekdays[date.getDay()] };
        }

        function getAttendanceFilterRange(filter = state.attendancePeriodFilter) {
            const today = new Date();
            today.setHours(0,0,0,0);
            if (filter === 'week') {
                const start = getLocalWeekStart(today);
                const end = new Date(start);
                end.setDate(start.getDate() + 6);
                return { start, end };
            }
            if (filter === 'month') return { start: new Date(today.getFullYear(), today.getMonth(), 1), end: new Date(today.getFullYear(), today.getMonth() + 1, 0) };
            if (filter === 'term') return { start: parseLocalDateValue(ACADEMIC_TERM_START), end: today };
            return null;
        }

        function getAttendancePeriodLabel(filter = state.attendancePeriodFilter) {
            return formatDateRangeShort(getAttendanceFilterRange(filter));
        }

                else records.push(payload);

        function trapFocusWithin(event, container) {
            if (event.key !== 'Tab') return false;
            const focusable = Array.from(container.querySelectorAll('button:not([disabled]), a[href], input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])'))
                .filter(element => !element.hidden && element.getAttribute('aria-hidden') !== 'true');
            if (!focusable.length) return false;
            const first = focusable[0];
            const last = focusable[focusable.length - 1];
            if (!container.contains(document.activeElement)) {
                event.preventDefault();
                (event.shiftKey ? last : first).focus();
            } else if (event.shiftKey && document.activeElement === first) {
                event.preventDefault();
                last.focus();
            } else if (!event.shiftKey && document.activeElement === last) {
                event.preventDefault();
                first.focus();
            }
            return true;
        }

        function parsePickerDate(value) {
            const match = String(value || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
            const now = new Date();
            if (!match) return { year: now.getFullYear(), month: now.getMonth() + 1, day: now.getDate() };
            return { year: Number(match[1]), month: Number(match[2]), day: Number(match[3]) };

        function renderDateWheel() {
            const context = state.pickerContext;
            if (!context?.parts) return;
            const parts = context.parts;
            const years = Array.from({ length: 7 }, (_, index) => parts.year - 2 + index);
            const months = Array.from({ length: 12 }, (_, index) => index + 1);
            const dayCount = getMonthDays(parts.year, parts.month);
            if (parts.day > dayCount) parts.day = dayCount;
            const days = Array.from({ length: dayCount }, (_, index) => index + 1);
            const column = (part, title, values, selected, suffix) => `<div class="wheel-column-shell"><div class="wheel-column-title">${title}</div><div class="wheel-column" data-wheel-column="${part}">${values.map(value => `<button type="button" class="wheel-option${value === selected ? ' selected' : ''}" data-action="wheel-select" data-wheel-part="${part}" data-wheel-value="${value}">${part === 'year' ? value : String(value).padStart(2,'0')}${suffix}</button>`).join('')}</div></div>`;
            pickerBody.innerHTML = `<div class="datetime-section-title">日期</div><div class="date-wheel">${column('year','年',years,parts.year,'年')}${column('month','月',months,parts.month,'月')}${column('day','日',days,parts.day,'日')}</div><div class="date-wheel-actions"><button type="button" class="date-clear" data-action="picker-clear-date">清空</button><button type="button" class="date-confirm" data-action="picker-confirm-date">确定</button></div>`;
            pickerBody.querySelectorAll('.wheel-column').forEach(element => {
                element.addEventListener('scroll', () => {
                    if (element.dataset.syncing === '1') return;
                    clearTimeout(wheelScrollTimers.get(element));
                    wheelScrollTimers.set(element, setTimeout(() => {
                        const activeContext = state.pickerContext;
                        if (!element.isConnected || !pickerBody.contains(element) || activeContext !== context || !activeContext?.parts) return;
                        const options = Array.from(element.querySelectorAll('.wheel-option'));
                        const center = element.scrollTop + element.clientHeight / 2;
                        const option = options.reduce((nearest, item) => {
                            const distance = Math.abs(item.offsetTop + item.offsetHeight / 2 - center);
                            return !nearest || distance < nearest.distance ? { item, distance } : nearest;
                        }, null)?.item;
                        const part = element.dataset.wheelColumn;
                        const nextValue = Number(option?.dataset.wheelValue);
                        if (!option || activeContext.parts[part] === nextValue) return;
                        activeContext.parts[part] = nextValue;
                        renderDateWheel();
                    }, 90));
                }, { passive: true });
            });
            requestAnimationFrame(() => {
                pickerBody.querySelectorAll('.wheel-column').forEach(element => {
                    const selected = element.querySelector('.wheel-option.selected');
                    if (!selected) return;
                    element.dataset.syncing = '1';
                    element.scrollTop = Math.max(0, selected.offsetTop - (element.clientHeight - selected.clientHeight) / 2);
                    setTimeout(() => { element.dataset.syncing = ''; }, 120);
                });
            });
        }

            }
            if (dialogLayer.hidden) return;
            if (event.key === 'Escape') { event.preventDefault(); closeDialog(); return; }
            trapFocusWithin(event, dialog);
        });

        initializeClassFilter();
        renderSchoolHome();
        renderClassDirectory();
        renderStudentList();
        renderAll();
        const previewRoute = new URLSearchParams(window.location.search).get('preview');
        if (previewRoute) document.body.classList.add('qa-static');
        if (previewRoute === 'class-list') openClassList();
        else if (previewRoute === 'class-list-scrolled') { openClassList(); requestAnimationFrame(() => requestAnimationFrame(() => { classListScroll.scrollTop = 108; })); }
        else if (previewRoute === 'class-overview') openClassDetail('CLS2403');
        else if (previewRoute === 'class-management') { openClassDetail('CLS2403'); switchClassTab('management'); }
        else if (previewRoute === 'class-info') { openClassDetail('CLS2403'); switchClassTab('info'); }
        else if (previewRoute === 'students') openStudentList();
        else if (previewRoute === 'add-student') { openStudentList(); openAddStudentDialog(); }
        else if (previewRoute === 'student-detail') { openStudentList(); openStudentDetail(students[0].id); }
        else if (previewRoute === 'student-materials') { openStudentList(); openStudentDetail(students[0].id); switchTab('materials'); }
        else if (previewRoute === 'student-attendance') { openStudentList(); openStudentDetail(students[0].id); openStudentAttendance(); }
        else if (previewRoute === 'student-attendance-edit') { openStudentList(); openStudentDetail(students[0].id); openStudentAttendance(); openStudentAttendanceStatusPicker(attendanceBackButton, formatLocalDate()); toggleAttendanceEditorMode(); }
        else if (previewRoute === 'student-edit') { openStudentList(); openStudentDetail(students[0].id); enterEdit(); switchTab('identity'); }
        else if (previewRoute === 'student-edit-phone') { openStudentList(); openStudentDetail(students[0].id); enterEdit(); switchTab('family'); }
        else if (previewRoute === 'leave-detail') { openClassDetail('CLS2403'); openClassModule('leave'); openLeaveDetail('leave-1'); }
        else if (previewRoute === 'log-detail') { openClassDetail('CLS2403'); openClassModule('logs'); openLogDetail('log-1'); }
        else if (previewRoute === 'student-log-history') { openClassDetail('CLS2403'); openClassModule('logs'); const logStudent = ensureClassRoster(getSelectedClass()).find(item => item.name === '林知夏') || ensureClassRoster(getSelectedClass())[0]; openStudentLogHistory(logStudent.id); }
        else if (previewRoute === 'rollcall-history') { openClassDetail('CLS2403'); openClassModule('rollcall'); openRollcallHistory(); }
        else if (previewRoute === 'rollcall-record') { openClassDetail('CLS2403'); openClassModule('rollcall'); openRollcallHistory(); openRollcallRecord('rollcall-history-1'); }
        else if (previewRoute === 'discipline-detail') { openClassDetail('CLS2403'); openClassModule('discipline'); openDisciplineDetail('discipline-1'); }
        else if (previewRoute === 'discipline-add') { openClassDetail('CLS2403'); openClassModule('discipline'); openDisciplineAddPage(); }
        else if (previewRoute === 'leave-filter') { openClassDetail('CLS2403'); openClassModule('leave'); openLeaveTimeFilter(document.getElementById('leaveTimeTrigger')); }
        else if (previewRoute === 'dorm-occupied') { openClassDetail('CLS2403'); openClassModule('dorm'); const occupiedBed = classModuleRoot.querySelector('[data-action="open-occupied-bed-actions"]'); if (occupiedBed) openOccupiedBedActions(occupiedBed); }
        else if (['leave','rollcall','discipline','logs','dorm'].includes(previewRoute)) { openClassDetail('CLS2403'); openClassModule(previewRoute); }
        else setView('home');
        if (previewRoute === 'dorm-picker') {
            openClassDetail('CLS2403');
            openClassModule('dorm');
            const arrangeButton = classModuleRoot.querySelector('[data-action="open-dorm-picker"]');
            if (arrangeButton) openDormPicker(arrangeButton);
        }
        if (previewRoute === 'dorm-assigned') {
            openClassDetail('CLS2403');
            openClassModule('dorm');
            const arrangeButton = classModuleRoot.querySelector('[data-action="open-dorm-picker"]');
            if (arrangeButton) {
                openDormPicker(arrangeButton);
                const previewRoom = getDormRoom(state.pickerContext?.roomId);
                const previewBed = previewRoom?.beds.find(item => !item.occupied);
                if (previewBed) {
                    selectDormBed(previewBed.number);
                    confirmDormAssignment();
                }
            }
        }
        if (previewRoute === 'leave-reject') {
            openClassDetail('CLS2403');
            openClassModule('leave');
            const rejectButton = classModuleRoot.querySelector('[data-workflow-value="已驳回"]');
            if (rejectButton) openLeaveRejectDialog(rejectButton.dataset.workflowId, rejectButton);
        }
        if (previewRoute === 'leave-reject-submitted') {
            openClassDetail('CLS2403');
            openClassModule('leave');
            const rejectButton = classModuleRoot.querySelector('[data-workflow-value="已驳回"]');
            if (rejectButton) {
                openLeaveRejectDialog(rejectButton.dataset.workflowId, rejectButton);
                document.getElementById('leaveRejectReason').value = '外出时间与提交凭证不一致，请核实后重新提交。';
                state.dialogAction?.();
                closeDialog();
            }
        }
        if (previewRoute === 'class-info' && new URLSearchParams(window.location.search).get('call') === '1') {
            requestAnimationFrame(() => {
                const firstCallButton = classInfoPanel.querySelector('[data-call-phone]');
                if (firstCallButton) openCallSheet(firstCallButton);
            });
        }
        if (new URLSearchParams(window.location.search).get('metrics') === '1') {
            requestAnimationFrame(() => requestAnimationFrame(() => {
                const activeView = document.querySelector('.app-view.active');
                const activeScroller = activeView?.querySelector('main');
                document.body.setAttribute('data-qa-metrics', JSON.stringify({
                    deviceClient: document.getElementById('device').clientWidth,
                    deviceScroll: document.getElementById('device').scrollWidth,
                    viewClient: activeView?.clientWidth || 0,
                    viewScroll: activeView?.scrollWidth || 0,
                    scrollerClient: activeScroller?.clientWidth || 0,
                    scrollerScroll: activeScroller?.scrollWidth || 0
                }));
            }));
        }
    </script>
</body>
</html>
