<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#EFF6FF">
    <title>掌上校园 · 学生管理权限新增与保存反馈优化 7.23</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#1F5FFF',
                        ink: '#111827',
                        body: '#334155',
                        muted: '#64748B'
                    }
                }
            }
        };
    </script>
    <style>
        :root {
            --brand: #1F5FFF;
            --brand-soft: rgba(31, 95, 255, 0.10);
            --brand-border: rgba(31, 95, 255, 0.16);
            --ink: #111827;
            --body: #334155;
            --muted: #64748B;
            --danger: #EF4444;
            --success: #10B981;
            --warning: #F59E0B;
            --page: linear-gradient(135deg, #EFF6FF 0%, #DFE7FF 100%);
            --glass: rgba(255, 255, 255, 0.72);
            --glass-strong: rgba(255, 255, 255, 0.84);
            --line: rgba(15, 23, 42, 0.07);
            --shadow: 0 8px 24px rgba(31, 95, 255, 0.055);
        }

        * { box-sizing: border-box; }
        html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
        body {
            display: grid;
            place-items: center;
            background: #E8F0FF;
            color: var(--body);
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
        }
        button, input, select, textarea { font: inherit; }
        button { -webkit-tap-highlight-color: transparent; }
        button:active { transform: scale(0.95); }

        .device {
            position: relative;
            width: 375px;
            height: 812px;
            max-width: 100vw;
            max-height: 100vh;
            overflow: hidden;
            border-radius: 40px;
            background: var(--page);
            box-shadow: 0 24px 70px rgba(30, 64, 175, 0.16);
            isolation: isolate;
        }
        .device::before,
        .device::after {
            content: "";
            position: absolute;
            z-index: -1;
            border-radius: 999px;
            filter: blur(1px);
            pointer-events: none;
        }
        .device::before {
            width: 210px;
            height: 210px;
            right: -78px;
            top: 74px;
            background: radial-gradient(circle, rgba(31,95,255,0.18), rgba(31,95,255,0));
        }
        .device::after {
            width: 180px;
            height: 180px;
            left: -92px;
            bottom: 104px;
            background: radial-gradient(circle, rgba(16,185,129,0.10), rgba(16,185,129,0));
        }

        .topbar {
            position: absolute;
            inset: 0 0 auto;
            z-index: 40;
            display: grid;
            grid-template-columns: 60px 1fr 60px;
            align-items: center;
            padding: max(48px, env(safe-area-inset-top, 48px)) 20px 12px;
            background: linear-gradient(180deg, rgba(239,246,255,0.96), rgba(239,246,255,0.76));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .nav-button {
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 0;
            border-radius: 14px;
            color: var(--ink);
            background: rgba(255,255,255,0.58);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.84);
            transition: transform .16s ease, background .16s ease;
        }
        .nav-button svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        .nav-action {
            min-width: 52px;
            height: 36px;
            justify-self: end;
            border: 0;
            border-radius: 11px;
            color: var(--brand);
            background: var(--brand-soft);
            font-size: 12px;
            font-weight: 800;
            transition: transform .16s ease, background .16s ease;
        }
        .nav-action.is-saving { background: var(--brand); color: #fff; box-shadow: 0 8px 16px rgba(31,95,255,.18); }
        .nav-title { text-align: center; color: var(--ink); font-size: 18px; font-weight: 800; letter-spacing: .02em; }

        .scroll-area {
            position: absolute;
            inset: 0;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 112px 20px 34px;
            scrollbar-width: none;
            overscroll-behavior-y: contain;
            -webkit-overflow-scrolling: touch;
        }
        .scroll-area::-webkit-scrollbar { display: none; }

        .glass {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.88);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }
        .hero {
            position: relative;
            overflow: hidden;
            padding: 18px;
            border-radius: 22px;
        }
        .hero::after {
            content: "";
            position: absolute;
            width: 120px;
            height: 120px;
            right: -48px;
            top: -52px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(31,95,255,.16), rgba(31,95,255,0));
            pointer-events: none;
        }
        .hero-name { color: var(--ink); font-size: 21px; font-weight: 900; line-height: 1.1; }
        .hero-sub { margin-top: 5px; color: var(--muted); font-size: 12px; font-weight: 700; }
        .pill {
            min-height: 26px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 4px 10px;
            border: 1px solid rgba(255,255,255,.86);
            border-radius: 8px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,.76), 0 5px 12px rgba(31,95,255,.04);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            font-size: 12px;
            font-weight: 800;
            line-height: 1.1;
        }
        .pill.success { color: #047857; background: rgba(16,185,129,.12); border-color: rgba(16,185,129,.20); box-shadow: inset 0 1px 0 rgba(255,255,255,.76), 0 5px 12px rgba(16,185,129,.07); }
        .pill.warning { color: #92400E; background: rgba(245,158,11,.13); border-color: rgba(245,158,11,.21); box-shadow: inset 0 1px 0 rgba(255,255,255,.76), 0 5px 12px rgba(245,158,11,.07); }
        .pill.danger { color: #B91C1C; background: rgba(239,68,68,.11); border-color: rgba(239,68,68,.20); box-shadow: inset 0 1px 0 rgba(255,255,255,.76), 0 5px 12px rgba(239,68,68,.07); }
        .pill.info { color: #1747C8; background: rgba(31,95,255,.10); border-color: rgba(31,95,255,.18); box-shadow: inset 0 1px 0 rgba(255,255,255,.76), 0 5px 12px rgba(31,95,255,.07); }
        .pill.neutral { color: #475569; background: rgba(100,116,139,.09); border-color: rgba(100,116,139,.16); box-shadow: inset 0 1px 0 rgba(255,255,255,.76), 0 5px 12px rgba(100,116,139,.055); }
        .hero-facts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 14px;
        }
        .hero-fact {
            min-width: 0;
            padding: 10px 11px;
            border-radius: 14px;
            background: rgba(255,255,255,.58);
            border: 1px solid rgba(255,255,255,.84);
        }
        .hero-fact span { display: block; color: var(--muted); font-size: 10px; font-weight: 750; }
        .hero-fact strong { display: block; margin-top: 4px; overflow: hidden; color: var(--ink); font-size: 12px; font-weight: 850; text-overflow: ellipsis; white-space: nowrap; }
        .hero-alert {
            display: grid;
            grid-template-columns: auto minmax(0,1fr);
            gap: 8px;
            align-items: start;
            margin-top: 10px;
            padding: 10px 11px;
            border-radius: 14px;
            background: rgba(255,255,255,.58);
            border: 1px solid rgba(255,255,255,.84);
        }
        .hero-alert strong { color: var(--ink); font-size: 12px; font-weight: 800; line-height: 1.45; }
        .quick-actions { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; margin-top: 12px; }
        .quick-button {
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            border-radius: 12px;
            border: 1px solid rgba(31,95,255,.16);
            color: var(--brand);
            background: rgba(255,255,255,.66);
            font-size: 12px;
            font-weight: 800;
            transition: transform .16s ease, background .16s ease;
        }
        .quick-button.primary { color: #fff; background: var(--brand); box-shadow: 0 8px 16px rgba(31,95,255,.18); }
        .quick-button svg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }

        .tab-dock {
            position: sticky;
            top: 0;
            z-index: 25;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 6px;
            margin: 12px 0;
            padding: 7px;
            border-radius: 18px;
            background: rgba(239,246,255,.88);
            border: 1px solid rgba(255,255,255,.86);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 8px 20px rgba(31,95,255,.05);
        }
        .tab-button {
            min-height: 38px;
            border: 1px solid transparent;
            border-radius: 11px;
            color: #52637E;
            background: transparent;
            font-size: 12px;
            font-weight: 800;
            transition: transform .16s ease, color .16s ease, background .16s ease, box-shadow .16s ease;
        }
        .tab-button[aria-selected="true"] {
            color: #fff;
            background: var(--brand);
            box-shadow: 0 7px 14px rgba(31,95,255,.18);
        }

        .panel-stack { display: grid; gap: 12px; animation: panelIn .26s cubic-bezier(.2,.75,.25,1); }
        .section-card { overflow: hidden; border-radius: 20px; }
        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 15px 16px 11px;
        }
        .section-title { color: var(--ink); font-size: 16px; font-weight: 900; }
        .section-note { margin-top: 3px; color: var(--muted); font-size: 11px; font-weight: 650; line-height: 1.35; }
        .soft-action {
            min-height: 34px;
            padding: 0 11px;
            border: 1px solid var(--brand-border);
            border-radius: 10px;
            color: var(--brand);
            background: var(--brand-soft);
            font-size: 11px;
            font-weight: 800;
        }
        .info-list { padding: 0 16px 4px; }
        .info-row {
            min-width: 0;
            display: grid;
            grid-template-columns: 92px minmax(0,1fr);
            gap: 10px;
            align-items: center;
            min-height: 48px;
            padding: 10px 0;
            border-top: 1px solid var(--line);
        }
        .info-label { color: var(--muted); font-size: 12px; font-weight: 750; line-height: 1.4; }
        .info-value { min-width: 0; color: var(--ink); font-size: 13px; font-weight: 800; line-height: 1.5; text-align: right; word-break: break-word; }
        .info-row.multiline { align-items: start; }
        .info-row.multiline .info-label { padding-top: 2px; }
        .info-row.multiline .info-value { white-space: normal; overflow-wrap: anywhere; }
        .empty-value { color: var(--danger); }
        .edit-control {
            width: 100%;
            min-width: 0;
            min-height: 40px;
            padding: 9px 11px;
            border: 1px solid rgba(31,95,255,.16);
            border-radius: 11px;
            outline: none;
            color: var(--ink);
            background: rgba(255,255,255,.76);
            font-size: 13px;
            font-weight: 750;
            text-align: right;
        }
        textarea.edit-control { min-height: 76px; resize: vertical; text-align: left; }

        .metric-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; padding: 0 16px 14px; }
        .metric-card { padding: 12px; border-radius: 15px; background: rgba(247,250,255,.76); border: 1px solid rgba(31,95,255,.08); }
        .metric-card span { color: var(--muted); font-size: 12px; font-weight: 750; }
        .metric-card strong { display: block; margin-top: 5px; color: var(--ink); font-size: 18px; font-weight: 900; }
        .metric-card small { color: var(--muted); font-size: 11px; font-weight: 700; }

        .subcard-list { display: grid; gap: 10px; padding: 0 16px 16px; }
        .subcard { padding: 14px; border-radius: 18px; background: rgba(255,255,255,.62); border: 1px solid rgba(255,255,255,.90); box-shadow: 0 8px 20px rgba(31,95,255,.05), inset 0 1px 0 rgba(255,255,255,.82); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
        .subcard-title { color: var(--ink); font-size: 14px; font-weight: 900; }
        .subcard-meta { margin-top: 5px; color: var(--muted); font-size: 12px; font-weight: 700; line-height: 1.5; }
        .score { color: var(--brand); font-size: 27px; font-weight: 950; line-height: 1; }

        .record-head { min-width: 0; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
        .record-copy { min-width: 0; }
        .record-eyebrow { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; color: var(--brand); font-size: 12px; font-weight: 900; letter-spacing: .3px; }
        .record-footer { display: flex; align-items: flex-end; justify-content: space-between; gap: 10px; margin-top: 12px; padding-top: 11px; border-top: 1px solid rgba(31,95,255,.08); }
        .record-contact span { display: block; color: var(--muted); font-size: 12px; font-weight: 750; }
        .record-contact strong { display: block; margin-top: 3px; color: var(--body); font-size: 13px; font-weight: 900; }
        .family-card { position: relative; overflow: hidden; }
        .family-card::before { content: ''; position: absolute; inset: 0 auto 0 0; width: 3px; border-radius: 999px; background: linear-gradient(180deg, rgba(31,95,255,.76), rgba(31,95,255,.14)); }
        .health-record-core { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 8px; margin-top: 12px; }
        .health-record-core div { padding: 9px 10px; border-radius: 13px; background: rgba(239,246,255,.72); border: 1px solid rgba(31,95,255,.07); }
        .health-record-core span { display: block; color: var(--muted); font-size: 12px; font-weight: 750; }
        .health-record-core strong { display: block; margin-top: 4px; color: var(--ink); font-size: 13px; font-weight: 900; }
        .record-note { margin-top: 10px; padding: 10px 11px; border-radius: 13px; color: var(--body); background: rgba(255,255,255,.58); font-size: 12px; font-weight: 750; line-height: 1.5; }
        .grade-record { padding: 15px; }
        .grade-score { min-width: 64px; padding: 9px 10px; border-radius: 15px; color: var(--brand); background: rgba(31,95,255,.09); border: 1px solid rgba(31,95,255,.10); text-align: center; }
        .grade-score span { display: block; font-size: 12px; font-weight: 800; letter-spacing: .3px; }
        .grade-score .score { display: block; margin-top: 3px; }
        .material-list { display: grid; gap: 10px; padding: 0 16px 16px; }
        .material-card { min-width: 0; padding: 14px; border: 1px solid rgba(255,255,255,.92); border-radius: 18px; background: rgba(255,255,255,.64); box-shadow: 0 8px 20px rgba(31,95,255,.05), inset 0 1px 0 rgba(255,255,255,.86); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
        .material-name { color: var(--ink); font-size: 13px; font-weight: 850; }
        .material-meta { margin-top: 4px; color: var(--muted); font-size: 12px; font-weight: 650; line-height: 1.4; }
        .material-side { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 12px; padding-top: 10px; border-top: 1px solid rgba(31,95,255,.08); }
        .account-summary { margin: 0 16px 16px; overflow: hidden; border: 1px solid rgba(255,255,255,.92); border-radius: 18px; background: linear-gradient(145deg,rgba(255,255,255,.76),rgba(239,246,255,.62)); box-shadow: 0 9px 22px rgba(31,95,255,.055), inset 0 1px 0 rgba(255,255,255,.90); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); }
        .account-summary-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 14px 14px 4px; }
        .account-summary-head div { min-width: 0; }
        .account-summary-head span:first-child { display: block; color: var(--muted); font-size: 12px; font-weight: 750; }
        .account-summary-head strong { display: block; margin-top: 3px; overflow: hidden; color: var(--ink); font-size: 15px; font-weight: 900; text-overflow: ellipsis; white-space: nowrap; }
        .account-summary .info-list { padding-top: 4px; }

        .permission-card { padding: 14px 16px 16px; }
        .permission-button {
            width: 100%;
            min-height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 12px 13px;
            border: 1px solid rgba(100,116,139,.18);
            border-radius: 15px;
            color: var(--ink);
            background: rgba(248,250,252,.76);
            text-align: left;
        }
        .permission-button span { display: block; color: var(--muted); font-size: 10px; font-weight: 750; }
        .permission-button strong { display: block; margin-top: 3px; font-size: 12px; font-weight: 850; line-height: 1.4; }
        .permission-button svg { width: 18px; height: 18px; flex: 0 0 auto; fill: none; stroke: var(--brand); stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }

        .edit-footer { display: grid; grid-template-columns: 1fr 1.4fr; gap: 9px; margin-top: 12px; }
        .footer-button { min-height: 48px; border-radius: 13px; font-size: 13px; font-weight: 850; }
        .footer-button.cancel { border: 1px solid rgba(100,116,139,.16); color: var(--muted); background: rgba(255,255,255,.66); }
        .footer-button.save { border: 0; color: #fff; background: var(--brand); box-shadow: 0 8px 18px rgba(31,95,255,.20); }

        .toast {
            position: absolute;
            z-index: 90;
            left: 50%;
            bottom: 28px;
            max-width: calc(100% - 40px);
            padding: 11px 15px;
            border-radius: 13px;
            color: #fff;
            background: rgba(17,24,39,.88);
            box-shadow: 0 12px 28px rgba(15,23,42,.22);
            font-size: 12px;
            font-weight: 750;
            line-height: 1.4;
            text-align: center;
            opacity: 0;
            visibility: hidden;
            transform: translate(-50%, 12px);
            transition: opacity .2s ease, transform .2s ease, visibility .2s;
            backdrop-filter: blur(14px);
        }
        .toast.show { opacity: 1; visibility: visible; transform: translate(-50%, 0); }

        .dialog-layer {
            position: absolute;
            z-index: 100;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(15,23,42,.38);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
        .dialog-layer[hidden] { display: none; }
        .dialog {
            width: 100%;
            max-height: 78%;
            overflow-y: auto;
            padding: 20px;
            border-radius: 22px;
            background: rgba(255,255,255,.92);
            border: 1px solid rgba(255,255,255,.96);
            box-shadow: 0 24px 60px rgba(15,23,42,.20);
            scrollbar-width: none;
        }
        .dialog::-webkit-scrollbar { display: none; }
        .dialog-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
        .dialog-title { color: var(--ink); font-size: 18px; font-weight: 900; }
        .dialog-desc { margin-top: 7px; color: var(--muted); font-size: 12px; font-weight: 650; line-height: 1.55; }
        .dialog-close { width: 36px; height: 36px; flex: 0 0 36px; display: grid; place-items: center; border: 0; border-radius: 12px; color: var(--muted); background: rgba(100,116,139,.08); }
        .dialog-close svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; }
        .dialog-body { display: grid; gap: 12px; margin-top: 16px; }
        .dialog-field label { display: block; margin-bottom: 6px; color: var(--body); font-size: 12px; font-weight: 800; }
        .dialog-field input, .dialog-field select, .dialog-field textarea {
            width: 100%;
            min-height: 44px;
            padding: 10px 12px;
            border: 1px solid rgba(31,95,255,.15);
            border-radius: 12px;
            outline: none;
            color: var(--ink);
            background: rgba(248,250,252,.88);
            font-size: 13px;
            font-weight: 700;
        }
        .dialog-field textarea { min-height: 78px; resize: vertical; }
        .dialog-actions { display: grid; grid-template-columns: 1fr 1.35fr; gap: 9px; margin-top: 18px; }
        .dialog-button { min-height: 46px; border-radius: 13px; font-size: 13px; font-weight: 850; }
        .dialog-button.cancel { border: 1px solid rgba(100,116,139,.14); color: var(--muted); background: rgba(248,250,252,.88); }
        .dialog-button.confirm { border: 0; color: #fff; background: var(--brand); box-shadow: 0 8px 16px rgba(31,95,255,.18); }
        .dialog-button.danger { background: var(--danger); }

        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
        :focus-visible { outline: 3px solid rgba(31,95,255,.30); outline-offset: 3px; }
        .edit-control:focus, .dialog-field input:focus, .dialog-field select:focus, .dialog-field textarea:focus { border-color: rgba(31,95,255,.45); box-shadow: 0 0 0 3px rgba(31,95,255,.09); }

        /* 7.17 只保留学校管理入口与学生档案链路，所有视图均从 7.13 设计体系原生构建。 */
        .app-view {
            position: absolute;
            inset: 0;
            z-index: 10;
            overflow: hidden;
            opacity: 0;
            visibility: hidden;
            transform: translateX(100%);
            transition: transform .38s cubic-bezier(.22,.82,.2,1), opacity .28s ease, visibility .38s;
        }
        .app-view.active { opacity: 1; visibility: visible; transform: translateX(0); }
        .app-view.behind { opacity: 0; visibility: hidden; transform: translateX(-100%); pointer-events: none; }

        .home-topbar {
            position: absolute;
            inset: 0 0 auto;
            z-index: 20;
            padding: max(50px, env(safe-area-inset-top, 50px)) 20px 14px;
            background: linear-gradient(180deg, rgba(239,246,255,.98), rgba(239,246,255,.78));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .home-topbar-row { display: flex; align-items: center; justify-content: space-between; gap: 14px; }

        /* 修复家长选择项中通用 span 规则覆盖图标容器造成的错位。 */
        .parent-options { gap: 0; }

        .custom-field-trigger svg, .dialog-picker-trigger svg { width: 16px; height: 16px; flex: 0 0 16px; fill: none; stroke: var(--brand); stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
        .info-row .custom-field-trigger { justify-content: flex-end; }
        .picker-layer { position: absolute; inset: 0; z-index: 160; background: rgba(15,23,42,.28); backdrop-filter: blur(7px); -webkit-backdrop-filter: blur(7px); }
        .picker-layer[hidden] { display: none; }
        .picker-sheet { position: absolute; inset: auto 0 0; max-height: 72%; overflow: hidden; padding: 10px 16px max(24px,env(safe-area-inset-bottom,24px)); border-radius: 30px 30px 0 0; background: linear-gradient(155deg,rgba(255,255,255,.88),rgba(239,246,255,.80)); border: 1px solid rgba(255,255,255,.92); box-shadow: 0 -20px 54px rgba(31,95,255,.14), inset 0 1px 0 rgba(255,255,255,.96); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px); animation: pickerIn .35s cubic-bezier(.2,.8,.2,1); }

        .picker-close { justify-self: end; }
        .picker-close svg, .calendar-nav svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
        .picker-body { max-height: 410px; display: grid; gap: 8px; overflow-y: auto; padding: 2px; scrollbar-width: none; }
        .picker-body::-webkit-scrollbar { display: none; }
        .picker-option { width: 100%; min-height: 46px; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 0 14px; border: 1px solid rgba(255,255,255,.90); border-radius: 16px; color: var(--body); background: rgba(255,255,255,.64); box-shadow: inset 0 1px 0 rgba(255,255,255,.90), 0 7px 17px rgba(31,95,255,.045); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); font-size: 13px; font-weight: 800; text-align: left; transition: transform .18s ease, color .18s ease, background .18s ease, border-color .18s ease; }
        .picker-option:active { transform: scale(.97); }

        .picker-option svg { width: 17px; height: 17px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

        .calendar-day.muted { color: #B4BFCE; }

        .calendar-day.today:not(.selected) { color: var(--brand); background: var(--brand-soft); }
        .date-wheel { position: relative; height: 210px; display: grid; grid-template-columns: 1.35fr 1fr 1fr; gap: 7px; overflow: hidden; }
        .wheel-selection { position: absolute; left: 0; right: 0; top: 84px; z-index: 0; height: 42px; border-radius: 13px; background: rgba(31,95,255,.08); border: 1px solid rgba(31,95,255,.10); pointer-events: none; }
        .wheel-column { position: relative; z-index: 1; height: 210px; overflow-y: auto; padding: 84px 0; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .wheel-column::-webkit-scrollbar { display: none; }
        .wheel-option { width: 100%; height: 42px; display: flex; align-items: center; justify-content: center; border: 0; color: #94A3B8; background: transparent; font-size: 13px; font-weight: 750; scroll-snap-align: center; }
        .wheel-option.selected { color: var(--brand); font-size: 15px; font-weight: 950; }
        .date-wheel-actions { display: grid; grid-template-columns: .8fr 1.2fr; gap: 9px; margin-top: 14px; }
        .date-clear, .date-confirm { min-height: 44px; border-radius: 13px; font-size: 13px; font-weight: 850; }

        .date-confirm { border: 0; color: #fff; background: var(--brand); box-shadow: 0 8px 16px rgba(31,95,255,.18); }

        .nav-action {

        .status-overview { margin: 0 16px 10px; padding: 13px 14px; border: 1px solid rgba(255,255,255,.92); border-radius: 17px; background: linear-gradient(145deg,rgba(255,255,255,.74),rgba(239,246,255,.56)); box-shadow: inset 0 1px 0 rgba(255,255,255,.94), 0 8px 18px rgba(31,95,255,.045); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }

        .status-overview-meta { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 7px; margin-top: 11px; padding-top: 11px; border-top: 1px solid rgba(31,95,255,.08); }
        .status-overview-meta div { min-width: 0; }

        .change-label { color: var(--ink); font-size: 12px; font-weight: 950; }
        .change-values { min-width: 0; display: grid; grid-template-columns: minmax(0,1fr) auto minmax(0,1.15fr); align-items: center; gap: 7px; color: var(--muted); font-size: 11px; font-weight: 800; line-height: 1.45; }
        .change-values em { color: #94A3B8; font-style: normal; font-weight: 900; }
        .change-values span, .change-values strong { min-width: 0; overflow-wrap: anywhere; }
        .change-values strong { color: var(--brand); font-weight: 950; }
        .change-values .empty-change-value { color: #94A3B8; }

        .add-student-banner { display: grid; grid-template-columns: 40px minmax(0,1fr); gap: 11px; align-items: center; padding: 12px; border: 1px solid rgba(31,95,255,.11); border-radius: 16px; background: linear-gradient(145deg,rgba(31,95,255,.10),rgba(255,255,255,.68)); }
        .add-student-banner-icon { width: 40px; height: 40px; display: grid; place-items: center; border-radius: 13px; color: var(--brand); background: rgba(255,255,255,.72); border: 1px solid rgba(255,255,255,.90); box-shadow: 0 7px 15px rgba(31,95,255,.07); }
        .add-student-banner-icon svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2.3; stroke-linecap: round; stroke-linejoin: round; }
        .add-student-banner strong { display: block; color: var(--ink); font-size: 13px; font-weight: 950; }
        .add-student-banner span { display: block; margin-top: 3px; color: var(--muted); font-size: 10px; font-weight: 750; line-height: 1.4; }

        @keyframes panelIn { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: translateY(0); } }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; scroll-behavior: auto !important; }
            button:active { transform: none; }
        }

        }

        function addStudentFromDialog() {
            const field = id => document.getElementById(id);
            const value = id => field(id)?.value.trim() || '';
            const required = [
                ['addStudentName','请填写学生姓名'], ['addStudentNo','请填写学生学号'],
                ['addStudentMajor','请填写专业'], ['addStudentClass','请填写班级']
            ];
            for (const [id, message] of required) {
                if (!value(id)) { field(id)?.focus(); showToast(message); return false; }
            }
            const studentNo = value('addStudentNo');
            if (students.some(item => String(item.studentNo) === studentNo)) {
                field('addStudentNo')?.focus();
                showToast('该学号已存在，请核对后再添加');
                return false;
            }
            const parentName = value('addParentName');
            const parentPhoneRaw = value('addParentPhone').replace(/\D/g, '');
            if ((parentName && !parentPhoneRaw) || (!parentName && parentPhoneRaw)) {
                field(parentName ? 'addParentPhone' : 'addParentName')?.focus();
                showToast('请完整填写主要家长姓名和电话');
                return false;
            }
            const phoneRaw = value('addStudentPhone').replace(/\D/g, '');
            const studentStatus = value('addStudentStatus') || '正常在读';
            const parentRelation = value('addParentRelation') || '家长';
            const updatedAt = new Date().toLocaleString('zh-CN', { hour12: false }).replaceAll('/', '-');
            const newStudent = enforceSinglePrimaryGuardian({
                id: `STU${studentNo}`,
                name: value('addStudentName'), gender: value('addStudentGender') || '女', age: '', birthDate: '', studentNo,
                phone: formatPhone(phoneRaw), phoneRaw, educationMode: '全日制', admissionStatus: '通过', admissionMethod: '',
                examNo: '', graduationSchool: '', graduationClass: '', idType: '居民身份证', idNumber: '', ethnicity: '',
                politicalStatus: '', householdType: '', householdLocation: '', major: value('addStudentMajor'), className: value('addStudentClass'),
                entryDate: '', graduationDate: '', studentStatus, statusChangedAt: '', statusReason: '新增学生档案',
                registrationStatus: studentStatus === '休学保留学籍' ? '暂停注册' : '已注册',
                internshipStatus: studentStatus === '顶岗实习' ? '实习中' : '未实习',
                suspensionStatus: studentStatus === '休学保留学籍' ? '休学中' : '正常', workStudyStatus: '未申请', schoolRollNo: '',
                registeredGrade: '', registeredClass: value('addStudentClass'), registeredTerm: '',
                classPlan: `${value('addStudentMajor')}专业人才培养方案`, personalPlans: [],
                guardianName: parentName, guardianPhone: formatPhone(parentPhoneRaw), guardianPhoneRaw: parentPhoneRaw,
                emergencyName: '', emergencyPhone: '', emergencyPhoneRaw: '', address: '', email: '', wechat: '', qq: '',
                familyEconomy: '', parentsSeparated: '', learningStyle: '', personality: '', emotion: '', hobbies: '', skills: '',
                family: parentName ? [{ relation: parentRelation, name: parentName, education: '待补充', job: '待补充', phone: formatPhone(parentPhoneRaw), phoneRaw: parentPhoneRaw, guardian: true }] : [],
                healthStatus: '', height: '', weight: '', bloodType: '', leftVision: '', rightVision: '', allergies: '', medicalHistory: '', healthFollowUp: '',
                healthRecords: [], grades: [], attachments: [], account: { username: phoneRaw || studentNo, enabled: true, lastLogin: '从未登录' },
                updatedAt, nextAction: '完善身份信息、学籍信息和档案材料'
            });
            students.unshift(newStudent);
            state.search = '';
            state.classFilter = 'all';
            state.statusFilter = 'all';
            state.detailReturnStudentId = newStudent.id;
            studentSearch.value = '';
            updateClassFilterTrigger('全部班级');
            statusFilters.querySelectorAll('[data-status]').forEach(item => {
                const active = item.dataset.status === 'all';
                item.classList.toggle('active', active);
                item.setAttribute('aria-pressed', active ? 'true' : 'false');
            });
            renderStudentList();
            requestAnimationFrame(() => studentList.querySelector(`[data-student-id="${newStudent.id}"]`)?.focus());
            showToast(`已添加学生 ${newStudent.name}`);
        }

        function renderControl(label, path, options = {}) {
            const data = currentData();
            const value = getPath(data, path);
            const multiline = options.type === 'textarea' ? ' multiline' : '';
            const id = `edit-${slug(path)}`;
            if (!state.editMode || options.readonly) {
                const display = options.display ? options.display(value, data) : (value || '待补充');
                const empty = !value || value === '待补充' ? ' empty-value' : '';
                return `<div class="info-row${multiline}"><span class="info-label">${escapeHtml(label)}</span><strong class="info-value${empty}">${options.rawHtml ? display : escapeHtml(display)}</strong></div>`;
            }
            let control;
            if (options.type === 'select') {
                control = `<button type="button" class="edit-control custom-field-trigger" id="${id}" data-action="open-select-picker" data-picker-path="${escapeHtml(path)}" data-picker-label="${escapeHtml(label)}" data-picker-options="${escapeHtml(JSON.stringify(options.choices || []))}" aria-haspopup="dialog" aria-controls="pickerLayer" aria-expanded="false"><span>${escapeHtml(value || '请选择')}</span><svg aria-hidden="true" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg></button>`;
            } else if (options.type === 'date') {
                control = `<button type="button" class="edit-control custom-field-trigger" id="${id}" data-action="open-date-picker" data-picker-path="${escapeHtml(path)}" data-picker-label="${escapeHtml(label)}" aria-haspopup="dialog" aria-controls="pickerLayer" aria-expanded="false"><span>${escapeHtml(value || '请选择日期')}</span><svg aria-hidden="true" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"></rect><path d="M8 3v4M16 3v4M3 10h18"></path></svg></button>`;
            } else if (options.type === 'textarea') {
                control = `<textarea class="edit-control" id="${id}" data-path="${escapeHtml(path)}">${escapeHtml(value)}</textarea>`;
            } else {
                control = `<input class="edit-control" id="${id}" type="${escapeHtml(options.type || 'text')}" data-path="${escapeHtml(path)}" value="${escapeHtml(value)}">`;
            }
            return `<div class="info-row${multiline}"><label class="info-label" for="${id}">${escapeHtml(label)}</label><div class="info-value">${control}</div></div>`;
        }

        function card(title, subtitle, content, action = '') {
            return `<section class="section-card glass"><div class="section-head"><h2 class="section-title">${escapeHtml(title)}</h2>${action}</div>${content}</section>`;
        }

            return Math.max(0, naturalTabTop - (parseFloat(scrollStyle.paddingTop) || 0));
        }

        function switchTab(tab, focus = false) {
            if (!tabOrder.includes(tab)) return;
            state.activeTab = tab;
            panelRoot.setAttribute('aria-labelledby', `tab-${tab}`);
            document.querySelectorAll('[role="tab"]').forEach(button => {
                const active = button.dataset.tab === tab;
                button.setAttribute('aria-selected', active ? 'true' : 'false');
                button.tabIndex = active ? 0 : -1;
            });
            renderPanel();
            scrollArea.scrollTop = Math.min(scrollArea.scrollTop, getDetailTabAnchorTop());
            if (focus) document.getElementById(`tab-${tab}`).focus();
        }

        function normalizeStudentChangeValue(value) {
            if (Array.isArray(value) || (value && typeof value === 'object')) return JSON.stringify(value);
            return String(value ?? '').trim().replace(/\s+/g, ' ');
        }

        function displayStudentChangeValue(path, value) {
            if (path === 'personalPlans') return (value || []).join('、');
            if (path === 'family') return (value || []).map(member => `${member.relation || '家长'}${member.name || ''}${member.guardian ? '（主要家长）' : ''}`).join('、');
            if (path === 'healthRecords') return (value || []).map(record => `${record.date || '未填写日期'}：${record.conclusion || '未填写结论'}`).join('；');
            if (path === 'grades') return (value || []).map(record => `${record.subject || '科目'} ${record.score || '待录入'}分`).join('、');
            if (path === 'attachments') return (value || []).map(item => `${item.name || '材料'}（${item.status || '待处理'}）`).join('、');
            if (path === 'account.enabled') return value ? '已启用' : '已停用';
            return String(value ?? '').trim();
        }

        function getStudentChanges(before, after) {
            return studentChangeFields.reduce((changes, [path, label]) => {
                const beforeValue = getPath(before, path);
                const afterValue = getPath(after, path);
                if (normalizeStudentChangeValue(beforeValue) !== normalizeStudentChangeValue(afterValue)) {
                    changes.push({ label, before: displayStudentChangeValue(path, beforeValue), after: displayStudentChangeValue(path, afterValue) });
                }
                return changes;
            }, []);
        }

        function renderStudentChangeValue(value, tagName) {
            const raw = String(value ?? '').trim();
            return `<${tagName}${raw ? '' : ' class="empty-change-value"'}>${escapeHtml(raw || '空')}</${tagName}>`;
        }

        function renderStudentChanges(changes) {
            return `<div class="change-list">${changes.map(change => `<div class="change-row"><div class="change-label">${escapeHtml(change.label)}</div><div class="change-values">${renderStudentChangeValue(change.before,'span')}<em>→</em>${renderStudentChangeValue(change.after,'strong')}</div></div>`).join('')}</div>`;
        }

        function openDialog({ title, desc = '', body = '', confirmLabel = '确认', cancelLabel = '取消', danger = false, onConfirm }) {
            state.dialogReturnFocus = document.activeElement;
            state.dialogAction = onConfirm || null;

            dialogConfirm.textContent = confirmLabel;

        function closeDialog() {
            dialogLayer.hidden = true;

        function getPickerButtonContext(button) {
            if (button === classFilterTrigger) {
                return { kind: 'class', trigger: button, currentValue: state.classFilter };
            }
            if (button.dataset.pickerTarget) {
                const input = document.getElementById(button.dataset.pickerTarget);
                return { kind: 'input', trigger: button, targetId: button.dataset.pickerTarget, currentValue: input?.value || '' };
            }
            const path = button.dataset.pickerPath;
            return { kind: 'draft', trigger: button, path, currentValue: getPath(state.draft || currentData(), path) };
        }

        function showPicker(title) {
            pickerTitle.textContent = title || '请选择';
            const trigger = state.pickerContext?.trigger;
            if (trigger) {
                trigger.setAttribute('aria-haspopup', 'dialog');
                trigger.setAttribute('aria-controls', 'pickerLayer');
                trigger.setAttribute('aria-expanded', 'true');
            }
            pickerLayer.hidden = false;
            requestAnimationFrame(() => document.getElementById('pickerClose').focus());
        }

        function closePicker(restoreFocus = true) {
            const trigger = state.pickerContext?.trigger;
            if (trigger) trigger.setAttribute('aria-expanded', 'false');
            pickerLayer.hidden = true;
            pickerBody.innerHTML = '';
            pickerBody.removeAttribute('role');
            pickerBody.removeAttribute('aria-label');
            state.pickerContext = null;
            if (restoreFocus && trigger?.isConnected) trigger.focus();
        }

        function trapFocusWithin(event, container) {
            if (event.key !== 'Tab') return false;
            const focusable = Array.from(container.querySelectorAll('button:not([disabled]), input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])'))
                .filter(element => !element.hidden && element.getAttribute('aria-hidden') !== 'true');
            if (!focusable.length) return false;
            const first = focusable[0];
            const last = focusable[focusable.length - 1];
            if (!container.contains(document.activeElement)) {
                event.preventDefault();
                (event.shiftKey ? last : first).focus();
            } else if (event.shiftKey && document.activeElement === first) {
                event.preventDefault();
                last.focus();
            } else if (!event.shiftKey && document.activeElement === last) {
                event.preventDefault();
                first.focus();
            }
            return true;
        }

        function applyPickerValue(value, label = value) {
            const context = state.pickerContext;
            if (!context) return;
            const trigger = context.trigger;
            const triggerId = trigger?.id;
            closePicker(false);
            if (context.kind === 'draft') {
                setPath(state.draft, context.path, value);
                renderAll();
                if (triggerId) requestAnimationFrame(() => document.getElementById(triggerId)?.focus());
                showToast('已更新选择');
                return;
            }
            if (context.kind === 'class') {
                state.classFilter = value;
                updateClassFilterTrigger(label);
                renderStudentList();
                trigger?.focus();
                return;
            }
            const target = document.getElementById(context.targetId);
            if (target) target.value = value;
            const copy = trigger?.querySelector('span');
            if (copy) copy.textContent = label || '请选择';
            trigger?.focus();
        }

        function openSelectPicker(button, optionsOverride = null) {
            const context = getPickerButtonContext(button);
            let options = optionsOverride;
            if (!options) {
                try { options = JSON.parse(button.dataset.pickerOptions || '[]'); }
                catch { options = []; }
            }
            context.type = 'select';
            context.options = (options || []).map(option => typeof option === 'object' ? option : { label: option, value: option });
            state.pickerContext = context;
            pickerBody.setAttribute('role', 'listbox');
            pickerBody.setAttribute('aria-label', button.dataset.pickerLabel || '请选择');
            pickerBody.innerHTML = context.options.map((option, index) => {
                const active = String(option.value) === String(context.currentValue);
                return `<button type="button" class="picker-option${active ? ' active' : ''}" role="option" aria-selected="${active ? 'true' : 'false'}" data-action="picker-select" data-picker-index="${index}"><span>${escapeHtml(option.label)}</span>${active ? '<svg aria-hidden="true" viewBox="0 0 24 24"><polyline points="5 12 10 17 19 7"></polyline></svg>' : ''}</button>`;
            }).join('');
            showPicker(button.dataset.pickerLabel || '请选择');
            requestAnimationFrame(() => (pickerBody.querySelector('[aria-selected="true"]') || pickerBody.querySelector('[role="option"]'))?.focus());
        }

        function openClassPicker() {
            const options = [{ label: '全部班级', value: 'all' }, ...[...new Set(students.map(item => item.className))].map(value => ({ label: value, value }))];
            openSelectPicker(classFilterTrigger, options);

        function parsePickerDate(value) {
            const match = String(value || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
            const now = new Date();
            if (!match) return { year: now.getFullYear(), month: now.getMonth() + 1, day: now.getDate() };
            return { year: Number(match[1]), month: Number(match[2]), day: Number(match[3]) };
        }

        function getMonthDays(year, month) {
            return new Date(year, month, 0).getDate();
        }

        function renderDateWheel() {
            const context = state.pickerContext;
            if (!context?.parts) return;
            const parts = context.parts;
            const currentYear = new Date().getFullYear();
            const years = Array.from({ length: 46 }, (_, index) => currentYear - 40 + index);
            const months = Array.from({ length: 12 }, (_, index) => index + 1);
            const dayCount = getMonthDays(parts.year, parts.month);
            if (parts.day > dayCount) parts.day = dayCount;
            const days = Array.from({ length: dayCount }, (_, index) => index + 1);
            const column = (part, values, selected, suffix) => `<div class="wheel-column" data-wheel-column="${part}">${values.map(value => `<button type="button" class="wheel-option${value === selected ? ' selected' : ''}" data-action="wheel-select" data-wheel-part="${part}" data-wheel-value="${value}">${value}${suffix}</button>`).join('')}</div>`;
            pickerBody.innerHTML = `<div class="date-wheel"><div class="wheel-selection"></div>${column('year', years, parts.year, '年')}${column('month', months, parts.month, '月')}${column('day', days, parts.day, '日')}</div><div class="date-wheel-actions"><button type="button" class="date-clear" data-action="picker-clear-date">清空</button><button type="button" class="date-confirm" data-action="picker-confirm-date">确定</button></div>`;
            pickerBody.querySelectorAll('.wheel-column').forEach(element => {
                element.addEventListener('scroll', () => {
                    clearTimeout(wheelScrollTimers.get(element));
                    wheelScrollTimers.set(element, setTimeout(() => {
                        const activeContext = state.pickerContext;
                        if (!element.isConnected || !pickerBody.contains(element) || activeContext !== context || !activeContext?.parts) return;
                        const options = Array.from(element.querySelectorAll('.wheel-option'));
                        const index = Math.max(0, Math.min(options.length - 1, Math.round(element.scrollTop / 42)));
                        const option = options[index];
                        const part = element.dataset.wheelColumn;
                        const nextValue = Number(option?.dataset.wheelValue);
                        if (!option || activeContext.parts[part] === nextValue) return;
                        activeContext.parts[part] = nextValue;
                        if (part === 'year' || part === 'month') renderDateWheel();
                        else options.forEach(item => item.classList.toggle('selected', item === option));
                    }, 90));
                }, { passive: true });
            });
            requestAnimationFrame(() => {
                pickerBody.querySelectorAll('.wheel-column').forEach(element => {
                    const selected = element.querySelector('.wheel-option.selected');
                    if (selected) element.scrollTop = Math.max(0, selected.offsetTop - 84);
                });
            });
        }

        function openDatePicker(button) {
            const context = getPickerButtonContext(button);
            context.type = 'date';
            context.parts = parsePickerDate(context.currentValue);
            state.pickerContext = context;
            pickerBody.removeAttribute('role');
            pickerBody.removeAttribute('aria-label');
            showPicker(button.dataset.pickerLabel || '选择日期');
            renderDateWheel();
        }

        function confirmDatePicker() {
            const parts = state.pickerContext?.parts;
            if (!parts) return;
            const value = `${parts.year}-${String(parts.month).padStart(2, '0')}-${String(parts.day).padStart(2, '0')}`;
            applyPickerValue(value, value);
        }

        function handleAction(button) {
            const action = button.dataset.action;
            if (action === 'call-student') showToast(`正在拨打学生电话 ${currentData().phone}`);
            if (action === 'call-guardian') openParentPicker();
            if (action === 'call-family') showToast(`正在拨打 ${button.dataset.phone}`);
            if (action === 'call-parent') {
                const parent = (currentData().family || [])[Number(button.dataset.parentIndex)];
                if (parent) { closeDialog(); showToast(`正在拨打${parent.relation}${parent.name} ${parent.phone}`); }
            }
            if (action === 'add-student') openAddStudentDialog();
            if (action === 'copy') navigator.clipboard?.writeText(button.dataset.copy).then(() => showToast('号码已复制')).catch(() => showToast('复制失败，请手动复制'));
            if (action === 'add-health') addHealthDialog();
            if (action === 'add-grade') addGradeDialog();
            if (action === 'reset-password') resetPassword();
            if (action === 'toggle-account') toggleAccount();
            if (action === 'cancel-edit') cancelEdit();
            if (action === 'save-edit') confirmSave();
            if (action === 'placeholder') showToast('该功能入口已保留，本版聚焦学生管理');
            if (action === 'bottom-placeholder') showToast('该底部导航按原版保留');
            if (action === 'open-class-picker') openClassPicker();
            if (action === 'open-select-picker') openSelectPicker(button);
            if (action === 'open-date-picker') openDatePicker(button);
            if (action === 'picker-select') {
                const option = state.pickerContext?.options?.[Number(button.dataset.pickerIndex)];
                if (option) applyPickerValue(option.value, option.label);
            }
            if (action === 'wheel-select') {
                const part = button.dataset.wheelPart;
                if (state.pickerContext?.parts && ['year','month','day'].includes(part)) {
                    state.pickerContext.parts[part] = Number(button.dataset.wheelValue);
                    renderDateWheel();
                }
            }
            if (action === 'picker-clear-date') applyPickerValue('', '请选择日期');
            if (action === 'picker-confirm-date') confirmDatePicker();
            if (action === 'material') {
                const index = Number(button.dataset.index);
                const item = currentData().attachments[index];
                if (/不通过|未上传/.test(item.status)) { state.materialIndex = index; materialFileInput.click(); }
                else showToast(`已打开 ${item.name}`);
            }
        }

        document.querySelectorAll('[role="tab"]').forEach(button => {
            button.addEventListener('click', () => switchTab(button.dataset.tab));
            button.addEventListener('keydown', event => {
                const index = tabOrder.indexOf(button.dataset.tab);
                let next = index;
                if (event.key === 'ArrowRight') next = (index + 1) % tabOrder.length;
                else if (event.key === 'ArrowLeft') next = (index - 1 + tabOrder.length) % tabOrder.length;
                else if (event.key === 'ArrowDown') next = (index + 3) % tabOrder.length;
                else if (event.key === 'ArrowUp') next = (index - 3 + tabOrder.length) % tabOrder.length;
                else if (event.key === 'Home') next = 0;
                else if (event.key === 'End') next = tabOrder.length - 1;
                else return;
                event.preventDefault();
                switchTab(tabOrder[next], true);
            });
        });

        editButton.addEventListener('click', () => state.editMode ? confirmSave() : enterEdit());
        backButton.addEventListener('click', () => {
            if (state.editMode) {
                openDialog({
                    title: '放弃本次修改？',
                    desc: '返回后未保存的内容将不会保留。',
                    confirmLabel: '放弃并返回',

                        state.editMode = false;

                        setView('list');
                        focusAfterViewChange(getStudentReturnTarget);
                    }
                });
            } else {
                setView('list');
                focusAfterViewChange(getStudentReturnTarget);
            }
        });

        listBackButton.addEventListener('click', () => {
            setView('home');
            focusAfterViewChange(getHomeReturnTarget);
        });

        schoolFeatureSearch.addEventListener('input', event => {
            schoolFeatureQuery = event.target.value;
            renderSchoolHome();
        });

        manageSchoolFeatures.addEventListener('click', toggleSchoolManageMode);

        studentSearch.addEventListener('input', event => {
            state.search = event.target.value;
            renderStudentList();
        });

        statusFilters.addEventListener('click', event => {
            const chip = event.target.closest('[data-status]');
            if (!chip) return;
            state.statusFilter = chip.dataset.status;
            statusFilters.querySelectorAll('[data-status]').forEach(item => {
                const active = item === chip;
                item.classList.toggle('active', active);
                item.setAttribute('aria-pressed', active ? 'true' : 'false');
            });
            renderStudentList();
        });

        document.getElementById('device').addEventListener('click', event => {
            const schoolTab = event.target.closest('[data-school-tab]');
            if (schoolTab) { switchSchoolTab(schoolTab.dataset.schoolTab, schoolTab); return; }
            const schoolFeature = event.target.closest('[data-school-feature]');
            if (schoolFeature) { handleSchoolFeature(schoolFeature); return; }
            const toggleSchoolManage = event.target.closest('[data-action="toggle-school-manage"]');
            if (toggleSchoolManage) { toggleSchoolManageMode(); return; }
            const route = event.target.closest('[data-route]');
            if (route?.dataset.route === 'students') { openStudentList(); return; }
            const studentRow = event.target.closest('[data-student-id]');
            if (studentRow) { openStudentDetail(studentRow.dataset.studentId); return; }
            const button = event.target.closest('[data-action]');
            if (button) handleAction(button);
        });

        panelRoot.addEventListener('input', event => {
            const control = event.target.closest('[data-path]');
            if (!control || !state.editMode) return;
            const path = control.dataset.path;
            if (path === 'personalPlans') state.draft.personalPlans = control.value.split(/[、,，\n]/).map(item => item.trim()).filter(Boolean);
            else setPath(state.draft, path, control.value);
            renderHero();
        });

        materialFileInput.addEventListener('change', () => {
            const file = materialFileInput.files?.[0];
            if (!file || state.materialIndex == null) return;
            const item = currentData().attachments[state.materialIndex];
            item.status = '待审核';
            item.updatedAt = new Date().toLocaleDateString('zh-CN').replaceAll('/', '-');
            item.note = `已补传 ${file.name}`;
            state.materialIndex = null;
            materialFileInput.value = '';
            renderPanel();
            showToast('材料已补传，等待审核');
        });

        document.getElementById('dialogClose').addEventListener('click', closeDialog);
        document.getElementById('dialogCancel').addEventListener('click', closeDialog);
        document.getElementById('pickerClose').addEventListener('click', () => closePicker());
        dialogConfirm.addEventListener('click', () => {
            const result = state.dialogAction?.();
            if (result !== false) closeDialog();
        });
        dialogLayer.addEventListener('click', event => { if (event.target === dialogLayer) closeDialog(); });
        pickerLayer.addEventListener('click', event => { if (event.target === pickerLayer) closePicker(); });
        document.addEventListener('keydown', event => {
            if (!pickerLayer.hidden) {
                if (event.key === 'Escape') { event.preventDefault(); closePicker(); }
                else trapFocusWithin(event, pickerLayer);
                return;
            }
            if (dialogLayer.hidden) return;
            if (event.key === 'Escape') { event.preventDefault(); closeDialog(); return; }
            trapFocusWithin(event, dialog);
        });

        initializeClassFilter();
        renderSchoolHome();
        renderStudentList();
        renderAll();
        setView('home');
    </script>
</body>
</html>
